        rerenderWbsAndGanttFromCache();
        return;
      }
      if (action === "move-up") {
        await handleMoveScheduleOrderClick(scheduleId, "up");
        return;
      }
      if (action === "move-down") {
        await handleMoveScheduleOrderClick(scheduleId, "down");
        return;
      }
      if (action === "add-child") {
        handleAddChildScheduleButtonClick(scheduleId);
        return;
      }
      if (action === "edit") {
        handleWbsRowClick(scheduleId);
        return;
      }
      if (action === "delete") {
        await handleDeleteScheduleButtonClick(scheduleId);
        return;
      }
    }

    // ===== UI：その他のイベントハンドラ =====
    // 【設計判断】issuesの追加は今回スコープの手前でprompt()ベースの最小限のまま据え置く
    //   （マインドマップのスライドパネル化自体を今回は見送っているため）。

    // 変更履歴（changelog）に記録するタスク管理(tasks)の対象フィールド。
    // 既存のタスク編集モーダル（handleTaskModalSaveButtonClick）自体は変更履歴を記録していないため、
    // 使用箇所は現時点でH2データ取込（差分適用の「変更」ログ）のみ。
    const TASK_LOGGED_FIELD_LABELS = {
      title: "タスク名",
      status: "ステータス",
      priority: "優先度",
      dueDate: "期日",
      description: "メモ",
    };

    // 【前提】formElement は「.kanban-add-form」要素（data-column-status属性でstatus値を持つ）。
    // 【処理】埋め込みフォームの入力値を読み取り、タスク名が空でなければaddTaskで保存する
    //   （モーダル・ダイアログ一覧P1：モーダルを介さずその場で追加）。
    // 【結果】保存後、カンバンパネルを再描画する（入力欄は再描画により自動的に空になる）。
    async function handleKanbanAddFormSubmit(formElement) {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const title = formElement.querySelector(".kanban-add-title-input").value.trim();
      if (!title) {
        window.alert("タスク名を入力してください");
        return;
      }
      const priority = Number(formElement.querySelector(".kanban-add-priority-select").value);
      const dueDate = formElement.querySelector(".kanban-add-duedate-input").value;
      const columnStatus = formElement.dataset.columnStatus;
      const taskToSave = {
        id: generateId(),
        projectId: currentSelectedProjectId,
        title,
        status: columnStatus,
        done: columnStatus === "done",
        doneAt: columnStatus === "done" ? new Date().toISOString() : null,
        priority,
        dueDate,
        description: "",
        order: 0,
      };
      await addTask(taskToSave);
      await recordChangelogEntry("add", currentSelectedProjectId, "tasks", "タスク", taskToSave.id, taskToSave.title, null, taskToSave, {});
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // 【前提】task は編集対象の既存タスクオブジェクト。
    // 【処理】タイトル・ステータス・優先度・期日・メモ（詳細）の入力欄を持つモーダルの
    //   HTML文字列を組み立てる（詳細設計書3.3.2：saveTodoEdit相当。作成後は一切編集
    //   できなかった従来の制約を解消する。新規作成は列埋め込みフォームで行うため、
    //   このモーダルは編集専用で新規作成モードを持たない）。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    function renderTaskModalToHtml(task) {
      const statusOptionsHtml = Object.entries(TASK_STATUS_LABELS)
        .map(([value, label]) => `<option value="${value}"${value === task.status ? " selected" : ""}>${label}</option>`)
        .join("");
      const priorityOptionsHtml = Object.entries(TASK_PRIORITY_LABELS)
        .map(([value, label]) => `<option value="${value}"${Number(value) === task.priority ? " selected" : ""}>${label}</option>`)
        .join("");
      return `
        <h2>タスク編集</h2>
        <div class="modal-field">
          <label for="taskModalTitleInput">タスク名</label>
          <input type="text" id="taskModalTitleInput" value="${escapeHtmlText(task.title)}">
        </div>
        <div class="modal-field">
          <label for="taskModalStatusSelect">ステータス</label>
          <select id="taskModalStatusSelect">${statusOptionsHtml}</select>
        </div>
        <div class="modal-field">
          <label for="taskModalPrioritySelect">優先度</label>
          <select id="taskModalPrioritySelect">${priorityOptionsHtml}</select>
        </div>
        <div class="modal-field">
          <label for="taskModalDueDateInput">期日</label>
          <input type="date" id="taskModalDueDateInput" value="${escapeHtmlText(task.dueDate || "")}">
        </div>
        <div class="modal-field">
          <label for="taskModalDescriptionTextarea">メモ（詳細）</label>
          <textarea id="taskModalDescriptionTextarea" rows="4">${escapeHtmlText(task.description || "")}</textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="taskModalCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="taskModalSaveButton">保存</button>
        </div>
      `;
    }

    // 【前提】task は編集対象の既存タスクオブジェクト。
    // 【処理】タスク編集モーダルを開き、キャンセル・保存にイベントを登録する。
    // 【結果】モーダルが操作可能な状態で表示される。
    function openTaskEditModal(task) {
      openModal(renderTaskModalToHtml(task));
      document.getElementById("taskModalCancelButton").addEventListener("click", closeModal);
      document.getElementById("taskModalSaveButton").addEventListener("click", () => handleTaskModalSaveButtonClick(task));
    }

    // 【前提】existingTask は編集開始時点のタスクオブジェクト。
    // 【処理】モーダル内の入力値を読み取り、タイトルが空でなければaddTaskで上書き保存する。
    //   ステータスを"done"に変更した場合はdoneAtを現在時刻にし、"done"以外に変更した場合は
    //   done/doneAtをリセットする（列埋め込みフォームでの新規作成時と同じ不変条件を維持する。
    //   すでに"done"だった場合はdoneAtの上書きをせず、最初に完了した時刻を保持する）。
    // 【結果】保存成功時はモーダルを閉じ、カンバンパネルを更新する。
    async function handleTaskModalSaveButtonClick(existingTask) {
      const title = document.getElementById("taskModalTitleInput").value.trim();
      if (!title) {
        window.alert("タスク名を入力してください");
        return;
      }
      const status = document.getElementById("taskModalStatusSelect").value;
      const priority = Number(document.getElementById("taskModalPrioritySelect").value);
      const dueDate = document.getElementById("taskModalDueDateInput").value;
      const description = document.getElementById("taskModalDescriptionTextarea").value;
      const taskToSave = {
        ...existingTask,
        title,
        status,
        priority,
        dueDate,
        description,
        done: status === "done",
        doneAt: status === "done" ? (existingTask.status === "done" ? existingTask.doneAt : new Date().toISOString()) : null,
      };
      await addTask(taskToSave);
      closeModal();
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // 【前提】taskId はクリックされたカードのタスクid。
    // 【処理】最新のタスク一覧から対象を探し、編集モーダルを開く。
    // 【結果】編集モーダルが表示される。
    async function handleOpenTaskEditModalClick(taskId) {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const task = taskList.find((candidateTask) => candidateTask.id === taskId);
      if (!task) return;
      openTaskEditModal(task);
    }

    // 【前提】taskId は移動対象のタスクid。targetColumnStatus はドロップ先の列status
    //   （"backlog"|"doing"|"done"）。
    // 【処理】対象タスクのstatusをtargetColumnStatusに更新する（詳細設計書3.3.3：
    //   dropTodoCard。基本設計書1.3節に明記されている既知の非整合どおり、タスクのstatusは
    //   スケジュールのtaskStatusとは独立した別概念のため、他ストアとの連動は行わない）。
    //   ステータスを"done"に変更した場合のみdoneAtを現在時刻にする（編集モーダル保存時と
    //   同じ不変条件を維持する）。
    // 【結果】ステータスが実際に変わっていれば保存してカンバンパネルを再描画する。同じ列への
    //   ドロップ等、変わっていなければ何もしない。
    async function handleTaskDragDrop(taskId, targetColumnStatus) {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const task = taskList.find((candidateTask) => candidateTask.id === taskId);
      if (!task || task.status === targetColumnStatus) return;
      await addTask({
        ...task,
        status: targetColumnStatus,
        done: targetColumnStatus === "done",
        doneAt: targetColumnStatus === "done" ? new Date().toISOString() : null,
      });
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    async function handleAddIssueButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const issueTitle = window.prompt("ノードのタイトルを入力してください");
      if (!issueTitle) return;
      // 新規ノードが重ならないよう、ある程度ばらけた座標に配置する
      // （初期配置のみランダム。配置後はドラッグで自由に動かせる＝下記の一連のハンドラ）。
      const randomX = Math.round(80 + Math.random() * 320);
      const randomY = Math.round(60 + Math.random() * 300);
      const colorIndex = Math.floor(Math.random() * MINDMAP_NODE_COLORS.length);
      await addIssue({
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: issueTitle,
        parentNodeId: null,
        x: randomX,
        y: randomY,
        color: MINDMAP_NODE_COLORS[colorIndex],
        order: 0,
      });
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // ===== マインドマップ：ノードのドラッグ配置 =====
    // 【設計判断】ノードの自由な2次元配置の変更は、HTML5のdraggable属性（discreteな
    //   ドロップ先を前提とするAPIで、WBS行の並び替えのような「入れ替え」向き）ではなく、
    //   pointerdown/pointermove/pointerupで座標を直接計算する方式にする。
    //   ドラッグ中は見た目（left/top）だけを更新し、DBへの保存はpointerup時の1回だけ行う
    //   （ドラッグ中に毎回addIssueするのは書き込み回数・再描画の面で無駄なため）。

    // ドラッグ中のノードのissueId。ドラッグしていない時はnull。
    let draggedMindmapIssueId = null;
    let mindmapDragStartPointerX = 0;
    let mindmapDragStartPointerY = 0;
    let mindmapDragStartNodeX = 0;
    let mindmapDragStartNodeY = 0;
    // これ未満の移動量は「クリック」とみなし、座標の保存を行わない（誤操作での無駄な書き込み防止）。
    const MINDMAP_DRAG_THRESHOLD_PX = 3;

    // 【前提】event はmindmap-node要素上でのpointerdownイベント。issueId はそのノードのid。
    //   nodeElement はイベントが発生した実際のDOM要素。
    // 【処理】ドラッグ開始時点のポインタ座標・ノード座標を記録する（以降のpointermoveで
    //   差分計算するための基準点）。
    // 【結果】ドラッグ状態が開始される（実際の座標更新はpointermoveハンドラが行う）。
    function handleMindmapNodePointerDown(event, issueId, nodeElement) {
      draggedMindmapIssueId = issueId;
      mindmapDragStartPointerX = event.clientX;
      mindmapDragStartPointerY = event.clientY;
      mindmapDragStartNodeX = parseFloat(nodeElement.style.left) || 0;
      mindmapDragStartNodeY = parseFloat(nodeElement.style.top) || 0;
      nodeElement.classList.add("is-dragging");
      nodeElement.setPointerCapture(event.pointerId);
    }

    // 【前提】draggedMindmapIssueIdが設定済み（ドラッグ中）であること。
    // 【処理】ポインタの移動量ぶん、ドラッグ中ノードのleft/topスタイルを直接書き換える。
    //   DBへの保存はしない（見た目だけをポインタに追従させる）。
    // 【結果】ノードが視覚的にポインタへ追従する。
    function handleMindmapNodePointerMove(event) {
      if (!draggedMindmapIssueId) return;
      const nodeElement = document.querySelector(`.mindmap-node[data-issue-id="${draggedMindmapIssueId}"]`);
      if (!nodeElement) return;
      const deltaX = event.clientX - mindmapDragStartPointerX;
      const deltaY = event.clientY - mindmapDragStartPointerY;
      nodeElement.style.left = `${mindmapDragStartNodeX + deltaX}px`;
      nodeElement.style.top = `${mindmapDragStartNodeY + deltaY}px`;
    }

    // 【前提】ドラッグ中であること。
    // 【処理】移動量がMINDMAP_DRAG_THRESHOLD_PX未満なら「クリック」とみなし何もしない。
    //   それ以上動いていれば、最終的なleft/topをissueのx/yとしてaddIssueで保存する
    //   （辺の再描画はrefreshMindmapPanelに任せる）。
    // 【結果】ノードの新しい座標がDBに保存され、パネルが再描画される。
    async function handleMindmapNodePointerUp(event) {
      if (!draggedMindmapIssueId) return;
      const issueId = draggedMindmapIssueId;
      draggedMindmapIssueId = null;
      const nodeElement = document.querySelector(`.mindmap-node[data-issue-id="${issueId}"]`);
      if (!nodeElement) return;
      nodeElement.classList.remove("is-dragging");

      const deltaX = event.clientX - mindmapDragStartPointerX;
      const deltaY = event.clientY - mindmapDragStartPointerY;
      if (Math.abs(deltaX) < MINDMAP_DRAG_THRESHOLD_PX && Math.abs(deltaY) < MINDMAP_DRAG_THRESHOLD_PX) {
        return;
      }

      const newX = Math.round(mindmapDragStartNodeX + deltaX);
      const newY = Math.round(mindmapDragStartNodeY + deltaY);
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const existingIssue = issueList.find((issue) => issue.id === issueId);
      if (!existingIssue) return;
      await addIssue({ ...existingIssue, x: newX, y: newY });
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // ===== マインドマップ：右クリックメニュー =====
    // 【設計判断】メニューはDOM上に1つだけ常設し（#mindmapContextMenu）、開くたびに
    //   表示位置（クリック位置）とcurrentContextMenuIssueId（対象ノード）を差し替える。
    //   モーダルと同じ「入れ物を使い回す」設計に揃えている。

    // 現在メニューが開いている対象ノードのissueId。閉じている間はnull。
    let currentContextMenuIssueId = null;

    // 【前提】issueId は右クリックされたノードのid。clientX/clientY はイベント発生位置。
    // 【処理】メニューを対象ノードのidと紐づけて、クリックされた座標に表示する。
    // 【結果】右クリックメニューが画面上に表示される。
    function openMindmapContextMenu(issueId, clientX, clientY) {
      currentContextMenuIssueId = issueId;
      const menuElement = document.getElementById("mindmapContextMenu");
      menuElement.style.left = `${clientX}px`;
      menuElement.style.top = `${clientY}px`;
      menuElement.hidden = false;
    }

    // 【前提】なし。
    // 【処理】メニューを非表示にし、対象ノードの紐づけを解除する。
    // 【結果】右クリックメニューが閉じる。
    function closeMindmapContextMenu() {
      currentContextMenuIssueId = null;
      document.getElementById("mindmapContextMenu").hidden = true;
    }

    // 変更履歴（changelog）に記録するissue(マインドマップノード)の対象フィールド。
    // 現状ユーザーが直接編集できる値はtitle（名前変更）のみのため、これだけを対象にする
    // （x/y座標はドラッグのたびに変わるため対象に含めない＝下記の判断ポイント参照）。
    const ISSUE_LOGGED_FIELD_LABELS = { title: "名前" };

    // 【前提】issueId は名前を変更したいノードのid。
    // 【処理】prompt()で新しい名前を受け取り、空でなければaddIssueで保存する
    //   （モーダル・ダイアログ一覧P7：右クリックメニュー「名前を変更」に対応）。
    // 【結果】保存後、変更履歴を記録し、パネルを再描画する。
    async function handleRenameIssueButtonClick(issueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const existingIssue = issueList.find((issue) => issue.id === issueId);
      if (!existingIssue) return;
      const newTitle = window.prompt("新しいノード名を入力してください", existingIssue.title);
      if (!newTitle) return;
      const issueToSave = { ...existingIssue, title: newTitle };
      await addIssue(issueToSave);
      await recordChangelogEntry("edit", issueToSave.projectId, "issues", "マインドマップノード", issueToSave.id, issueToSave.title, existingIssue, issueToSave, ISSUE_LOGGED_FIELD_LABELS);
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】parentIssueId は子ノードを追加したい親ノードのid。
    // 【処理】parentNodeIdをparentIssueIdに固定した新規ノードを、親の近くの座標に作成する
    //   （モーダル・ダイアログ一覧P7：右クリックメニュー「子ノード追加」に対応）。
    // 【結果】保存後、変更履歴を記録し、パネルを再描画する。
    async function handleAddChildIssueButtonClick(parentIssueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const parentIssue = issueList.find((issue) => issue.id === parentIssueId);
      if (!parentIssue) return;
      const childTitle = window.prompt("子ノードのタイトルを入力してください");
      if (!childTitle) return;
      const colorIndex = Math.floor(Math.random() * MINDMAP_NODE_COLORS.length);
      const issueToSave = {
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: childTitle,
        parentNodeId: parentIssueId,
        x: parentIssue.x + 120,
        y: parentIssue.y + 60,
        color: MINDMAP_NODE_COLORS[colorIndex],
        order: 0,
      };
      await addIssue(issueToSave);
      await recordChangelogEntry("add", issueToSave.projectId, "issues", "マインドマップノード", issueToSave.id, issueToSave.title, null, issueToSave, ISSUE_LOGGED_FIELD_LABELS);
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】siblingIssueId は兄弟ノードを追加したい基準ノードのid。
    // 【処理】siblingIssueIdと同じparentNodeIdを持つ新規ノードを、基準ノードの近くの座標に
    //   作成する（モーダル・ダイアログ一覧P7：右クリックメニュー「兄弟ノード追加」に対応）。
    //   基準ノードがルート（parentNodeId:null）の場合は、新規ノードもルートとして作る。
    // 【結果】保存後、変更履歴を記録し、パネルを再描画する。
    async function handleAddSiblingIssueButtonClick(siblingIssueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const siblingIssue = issueList.find((issue) => issue.id === siblingIssueId);
      if (!siblingIssue) return;
      const newTitle = window.prompt("兄弟ノードのタイトルを入力してください");
      if (!newTitle) return;
      const colorIndex = Math.floor(Math.random() * MINDMAP_NODE_COLORS.length);
      const issueToSave = {
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: newTitle,
        parentNodeId: siblingIssue.parentNodeId,
        x: siblingIssue.x,
        y: siblingIssue.y + 80,
        color: MINDMAP_NODE_COLORS[colorIndex],
        order: 0,
      };
      await addIssue(issueToSave);
      await recordChangelogEntry("add", issueToSave.projectId, "issues", "マインドマップノード", issueToSave.id, issueToSave.title, null, issueToSave, ISSUE_LOGGED_FIELD_LABELS);
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】action は右クリックメニューのdata-action値（"rename"|"add-child"|"add-sibling"|
    //   "toggle-collapse"|"delete"）。currentContextMenuIssueIdがメニューを開いた時点の
    //   対象ノードを保持している。
    // 【処理】メニューを閉じてから、actionに応じた処理へ委譲する。
    // 【結果】選択した操作が実行される。
    async function handleMindmapContextMenuAction(action) {
      const issueId = currentContextMenuIssueId;
      closeMindmapContextMenu();
      if (!issueId) return;
      if (action === "rename") {
        await handleRenameIssueButtonClick(issueId);
      } else if (action === "add-child") {
        await handleAddChildIssueButtonClick(issueId);
      } else if (action === "add-sibling") {
        await handleAddSiblingIssueButtonClick(issueId);
      } else if (action === "toggle-collapse") {
        handleToggleIssueCollapseButtonClick(issueId);
      } else if (action === "delete") {
        await handleDeleteIssueButtonClick(issueId);
      }
    }

    // 【前提】issueId は削除起点のノードid。
    // 【処理】削除対象件数（起点＋子孫）をcollectIssueSubtreeIdsで数え、詳細設計書3.5.3節の
    //   仕様どおり3件を超える場合のみconfirm()で確認する（3件以下は誤操作しても
    //   取り返しがつく範囲とみなし、即削除する）。
    // 【結果】確認OK、または3件以下ならdeleteIssueCascadeで削除しパネルを再描画する。
    //   キャンセル時は何もしない。
    async function handleDeleteIssueButtonClick(issueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      if (!issueList.some((issue) => issue.id === issueId)) return;
      const subtreeIds = collectIssueSubtreeIds(issueList, issueId);
      if (subtreeIds.length > 3) {
        const confirmMessage = `このノードと子孫ノード計${subtreeIds.length}件を削除しますか？`;
        if (!window.confirm(confirmMessage)) return;
      }
      await deleteIssueCascade(issueId, currentSelectedProjectId);
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】issueId は開閉を切り替えたいノードのid。
    // 【処理】collapsedMindmapIssueIdsへの追加/削除だけを行い、パネルを再描画する
    //   （折りたたみ状態はDB非保存の画面上だけの一時状態。collapsedScheduleIdsと同じ設計）。
    // 【結果】対象ノードの子孫が表示/非表示になる。
    function handleToggleIssueCollapseButtonClick(issueId) {
      if (collapsedMindmapIssueIds.has(issueId)) {
        collapsedMindmapIssueIds.delete(issueId);
      } else {
        collapsedMindmapIssueIds.add(issueId);
      }
      refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】currentProjectObjectが設定済み（プロジェクト選択済み）であること。
    // 【処理】現在のプロジェクトのlockedを反転させて保存し、画面のロック表示を更新する
    //   （基本設計書3.3節：ロックONで薄赤帯表示・スケジュール追加ボタン無効化）。
    // 【結果】ロック状態がDBに保存され、画面にも反映される。トースト「ロックしました」／
    //   「ロックを解除しました」を、切替後の状態に応じて表示する（詳細設計書3.1.3）。
    async function handleLockToggleButtonClick() {
      if (!currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const updatedProject = { ...currentProjectObject, locked: !currentProjectObject.locked };
      await addProject(updatedProject);
      currentProjectObject = updatedProject;
      applyLockState(updatedProject.locked);
      showToast(updatedProject.locked ? "ロックしました" : "ロックを解除しました");
    }

    // 【前提】currentTimelineStartDateStringが設定済み（ガントパネルが1度は描画済み）であること。
    // 【処理】今日の日付がタイムライン先頭から何日目かを計算し、その位置が見えるよう
    //   ガントのスクロール領域を横スクロールする（基本設計書2.2節「今日」ボタンの仕様）。
    // 【結果】ガントチャートが今日の日付付近までスクロールされる。
    function handleTodayButtonClick() {
      if (!currentTimelineStartDateString) return;
      const todayDateString = new Date().toISOString().slice(0, 10);
      const dayOffset = calculateDayOffsetFromTimelineStart(todayDateString, currentTimelineStartDateString);
      const pixelsPerDay = GRANULARITY_PIXELS_PER_DAY[currentGranularity];
      document.querySelector(".gantt-scroll-area").scrollLeft = Math.max(dayOffset * pixelsPerDay - 100, 0);
    }

    // ===== WBSパネルとガント本体の縦スクロール同期（対応表No.41） =====
    // 【設計判断】#wbsPanelと.gantt-scroll-areaは、それぞれ独立したoverflow-y:autoの
    //   スクロールコンテナ（CSS側でheight:100%＋overflow-y:autoを付与済み）。片方をscrollTopで
    //   追従させると、その操作自体がscrollイベントを発火させ、もう片方が今度は最初の要素を
    //   追従させようとして…と無限に呼び合う恐れがある。isSyncingVerticalScrollという
    //   同期中フラグを1つ持ち、「自分がスクロールを起こした側の処理中である間は、相手からの
    //   scrollイベントを無視する」ことでこの無限ループを防ぐ。
    let isSyncingVerticalScroll = false;

    // 【前提】WBSパネルのscrollイベントから呼ばれる。
    // 【処理】isSyncingVerticalScrollが立っていれば何もしない（ガント側の同期処理が今まさに
    //   WBSパネルのscrollTopを書き換えたことで発火したscrollイベントのため、ここで反応すると
    //   無限ループになる）。そうでなければフラグを立てて、ガント側のscrollTopをWBS側に
    //   合わせ、フラグを下ろす。
    // 【結果】ガント本体がWBSパネルと同じ縦位置までスクロールされる。
    function handleWbsPanelVerticalScroll() {
      if (isSyncingVerticalScroll) return;
      isSyncingVerticalScroll = true;
      document.querySelector(".gantt-scroll-area").scrollTop = document.getElementById("wbsPanel").scrollTop;
      isSyncingVerticalScroll = false;
    }

    // 【前提】ガント本体（.gantt-scroll-area）のscrollイベントから呼ばれる。
    // 【処理】handleWbsPanelVerticalScrollと対になる処理。isSyncingVerticalScrollが立っていれば
    //   何もしない（WBS側の同期処理由来のscrollイベントのため）。そうでなければフラグを立てて
    //   WBSパネルのscrollTopをガント側に合わせ、フラグを下ろす。
    // 【結果】WBSパネルがガント本体と同じ縦位置までスクロールされる。
    function handleGanttScrollAreaVerticalScroll() {
      if (isSyncingVerticalScroll) return;
      isSyncingVerticalScroll = true;
      document.getElementById("wbsPanel").scrollTop = document.querySelector(".gantt-scroll-area").scrollTop;
      isSyncingVerticalScroll = false;
    }

    // ===== ガント背景ドラッグによる自動スクロール（対応表No.42） =====
    // 【設計判断】ganttPanelBodyへのpointerdownは、既存のバードラッグ処理
    //   （handleBarPointerDown呼び出し側）が「.gantt-bar要素が見つかった場合のみ」処理する
    //   分岐になっている。背景ドラッグはその逆＝「.gantt-bar要素が見つからなかった場合」に
    //   だけ開始するため、既存のバー操作とは完全に排他で干渉しない（同じイベントの中で
    //   if/elseのどちらか一方だけが実行される）。
    //   ドラッグ中の状態はisBackgroundDraggingという専用フラグで管理し、バードラッグの
    //   draggedBarScheduleIdとは別の変数のため、document側のpointermove/pointerupリスナーも
    //   互いのフラグを見て自分の担当外なら何もしないだけで、取り合いにならない。
    //   スクロール位置の直接書き換えは.gantt-scroll-areaのscrollイベントを発火させるため、
    //   対応表No.41で実装したhandleGanttScrollAreaVerticalScrollが自動的にWBSパネルを
    //   追従させる（背景ドラッグ用に別の同期処理は不要）。

    // ドラッグ中かどうか。ドラッグ開始時点のポインタ座標・スクロール位置も保持する。
    let isBackgroundDragging = false;
    let backgroundDragStartClientX = 0;
    let backgroundDragStartClientY = 0;
    let backgroundDragStartScrollLeft = 0;
    let backgroundDragStartScrollTop = 0;

    // 【前提】event はganttPanelBody上でのpointerdownイベントのうち、.gantt-bar要素にも
    //   .gantt-bar-handleにも当たらなかった場合（＝何もない背景／グリッド部分）にのみ呼ばれる。
    // 【処理】ドラッグ開始時点のポインタ座標と、.gantt-scroll-areaの現在のスクロール位置を
    //   記録する。カーソルを「掴んでいる」見た目にするクラスを付ける。
    // 【結果】背景ドラッグの状態が開始される（実際のスクロールはpointermoveハンドラが行う）。
    function handleGanttBackgroundPointerDown(event) {
      isBackgroundDragging = true;
      backgroundDragStartClientX = event.clientX;
      backgroundDragStartClientY = event.clientY;
      const scrollAreaElement = document.querySelector(".gantt-scroll-area");
      backgroundDragStartScrollLeft = scrollAreaElement.scrollLeft;
      backgroundDragStartScrollTop = scrollAreaElement.scrollTop;
      scrollAreaElement.classList.add("is-background-dragging");
    }

    // 【前提】isBackgroundDraggingが設定済み（ドラッグ中）であること。
    // 【処理】ポインタの移動量を計算し、地図アプリと同じ向き（ポインタを右へ動かす＝
    //   コンテンツを右へ引く＝スクロール位置は左へ動く）でscrollLeft/scrollTopを
    //   「開始時のスクロール位置－移動量」に設定する。
    // 【結果】ガント本体（および対応表No.41の同期によりWBSパネルも）がポインタに追従してスクロールする。
    function handleGanttBackgroundPointerMove(event) {
      if (!isBackgroundDragging) return;
      const deltaX = event.clientX - backgroundDragStartClientX;
      const deltaY = event.clientY - backgroundDragStartClientY;
      const scrollAreaElement = document.querySelector(".gantt-scroll-area");
      scrollAreaElement.scrollLeft = backgroundDragStartScrollLeft - deltaX;
      scrollAreaElement.scrollTop = backgroundDragStartScrollTop - deltaY;
    }

    // 【前提】なし。
    // 【処理】ドラッグ状態を終了し、カーソルの見た目を元に戻す。
    // 【結果】背景ドラッグが終了する。
    function handleGanttBackgroundPointerUp() {
      if (!isBackgroundDragging) return;
      isBackgroundDragging = false;
      document.querySelector(".gantt-scroll-area").classList.remove("is-background-dragging");
    }

    // 【前提】granularity は "day" | "week" | "month" | "quarter"。buttonElement はクリックされたボタン。
    // 【処理】表示粒度を切り替え、ボタンの選択状態を更新した上でガントパネルを再描画する
    //   （DBへの再問い合わせは不要。currentProjectObjectの日付情報だけで再計算できるため）。
    // 【結果】ガントチャートが新しい粒度の見出し・列幅で再描画される。
    function handleGranularityButtonClick(granularity, buttonElement) {
      currentGranularity = granularity;
      for (const granularityButton of document.querySelectorAll("[data-granularity]")) {
        granularityButton.classList.toggle("is-active", granularityButton === buttonElement);
      }
      refreshGanttPanel(currentSelectedProjectId);
    }

    // 【前提】columnKey は "startDate" | "endDate" | "status"。buttonElement はクリックされたボタン。
    // 【処理】該当列の表示/非表示を反転させ、ボタンの選択状態を更新した上で、
    //   キャッシュ済みのcurrentScheduleTreeRowsを使ってWBSパネルだけを再描画する
    //   （DBへの再問い合わせは不要。表示/非表示の切り替えだけなのでガント本体は再描画しない）。
    // 【結果】WBSパネルに列が追加/削除された状態が反映される。
    function handleToggleColumnClick(columnKey, buttonElement) {
      visibleWbsColumns[columnKey] = !visibleWbsColumns[columnKey];
      buttonElement.classList.toggle("is-active", visibleWbsColumns[columnKey]);
      applyWbsPanel(renderWbsPanelToHtml(currentScheduleTreeRows, visibleWbsColumns, collapsedScheduleIds));
    }

    // 【前提】なし。
    // 【処理】タスク管理（P1）は右側スライドパネルの開閉トグル（toggleSlidePanel）。
    //   マインドマップ（P7）もSIDE_PANEL_DEFINITIONS経由の共通配線に統合済みのため、
    //   ここではP1のみを扱う（P1は既存の専用ハンドラのまま据え置いている）。
    // 【結果】タスク管理パネルの開閉が行われる。
    function handleSwitchToKanbanButtonClick() {
      toggleSlidePanel("kanbanSlidePanel");
      document.getElementById("switchToKanbanButton").classList.toggle(
        "is-active",
        document.getElementById("kanbanSlidePanel").classList.contains("is-open")
      );
    }

    // 【前提】event.currentTargetがdata-out-of-scope-label属性を持つボタンであること。
    // 【処理】今回のスコープ外機能（サイドパネル・モーダル・インポート/エクスポート等）を
    //   クリックした際、「未実装ではなく意図的なスコープ外」であることを利用者に伝える。
    // 【結果】アラートで機能名とスコープ外である旨を表示する（データは変更しない）。
    function handleOutOfScopeButtonClick(event) {
      const featureLabel = event.currentTarget.dataset.outOfScopeLabel;
      window.alert(`「${featureLabel}」は今回のスコープ外です（別工程で実装予定）。`);
    }

    // 【前提】DOMの構築が完了していること（DOMContentLoaded後に呼ばれる想定）。
    // 【処理】各ボタン・<select>にイベントを登録し、プロジェクト一覧を取得して
    //   先頭のプロジェクトを初期選択状態にする。
    // 【結果】画面を開いた直後から、先頭プロジェクトのデータが3パネルに表示された状態になる
    //   （プロジェクトが1件も無い場合は空状態表示のまま）。
    async function initializeApp() {
      initializePanelResizeHandles();
      document.addEventListener("pointerdown", handlePanelResizePointerDown);
      document.addEventListener("pointermove", handlePanelResizePointerMove);
      document.addEventListener("pointerup", handlePanelResizePointerUp);
      document.getElementById("projectSelectDropdown").addEventListener("change", (event) => {
        switchToProject(event.target.value || null);
      });
      document.getElementById("createProjectButton").addEventListener("click", handleCreateProjectButtonClick);
      // 追加実装仕様書2.1節：空状態画面の「＋最初のプロジェクトを作成」ボタンも、
      // ヘッダーの「＋新規プロジェクト」と同じM1モーダルを開く。
      document.getElementById("createFirstProjectButton").addEventListener("click", handleCreateProjectButtonClick);
      document.getElementById("exportDataButton").addEventListener("click", handleExportDataButtonClick);
      document.getElementById("importDataButton").addEventListener("click", () => {
        document.getElementById("importFileInput").click();
      });
      document.getElementById("importFileInput").addEventListener("change", (event) => {
        handleImportFileInputChange(event.target);
      });
      document.getElementById("exportPdfButton").addEventListener("click", exportPDF);
      document.getElementById("exportExcelButton").addEventListener("click", exportExcel);
      document.getElementById("deleteProjectButton").addEventListener("click", handleDeleteProjectButtonClick);
      document.getElementById("addScheduleButton").addEventListener("click", handleAddScheduleButtonClick);
      document.getElementById("addIssueButton").addEventListener("click", handleAddIssueButtonClick);
      // マインドマップのノードドラッグ。pointerdownは各ノードへのイベント委譲、
      // pointermove/pointerupはドラッグ中にポインタがノード外へ出ても追従できるようdocument側で拾う。
      document.getElementById("mindmapPanelBody").addEventListener("pointerdown", (event) => {
        const node = event.target.closest(".mindmap-node");
        if (!node) return;
        handleMindmapNodePointerDown(event, node.dataset.issueId, node);
      });
      document.addEventListener("pointermove", handleMindmapNodePointerMove);
      document.addEventListener("pointerup", handleMindmapNodePointerUp);
      // ガントバーのドラッグによる日程変更。掴んだ場所（掴み手か本体か）でモードを決める
      // （マインドマップと同じ理由でpointermove/pointerupはdocument側で拾う）。
      document.getElementById("ganttPanelBody").addEventListener("pointerdown", (event) => {
        const barElement = event.target.closest(".gantt-bar[data-schedule-id]");
        if (!barElement) {
          // UI差分表No.42：バー・掴み手のどちらにも当たらなかった場合だけ背景ドラッグを開始する
          // （既存のバー操作とは完全に排他）。
          handleGanttBackgroundPointerDown(event);
          return;
        }
        const handleElement = event.target.closest(".gantt-bar-handle");
        const mode = handleElement ? handleElement.dataset.dragMode : "move";
        handleBarPointerDown(event, barElement.dataset.scheduleId, mode, barElement);
      });
      document.addEventListener("pointermove", handleBarPointerMove);
      document.addEventListener("pointerup", handleBarPointerUp);
      document.addEventListener("pointermove", handleGanttBackgroundPointerMove);
      document.addEventListener("pointerup", handleGanttBackgroundPointerUp);
      // ガントバー直接クリックの軽量ポップアップ（UI差分表No.75）。pointerup直後に発火する
      // clickイベントで開く。実際にドラッグした場合（wasBarPointerMovedSignificantly）は
      // 開かない。
      document.getElementById("ganttPanelBody").addEventListener("click", (event) => {
        const barElement = event.target.closest(".gantt-bar[data-schedule-id]");
        if (!barElement) return;
        if (wasBarPointerMovedSignificantly) {
          wasBarPointerMovedSignificantly = false;
          return;
        }
        openTaskPopup(barElement.dataset.scheduleId, event.clientX, event.clientY);
      });
      // ポップアップの外側をクリックしたら閉じる（別のバーをクリックした場合は、そちらの
      // ハンドラが新しい内容で開き直すため、ここでは閉じない）。
      document.addEventListener("click", (event) => {
        const popupElement = document.getElementById("taskPopup");
        if (popupElement.hidden) return;
        if (popupElement.contains(event.target)) return;
        if (event.target.closest(".gantt-bar")) return;
        closeTaskPopup();
      });
      // ポップアップ内の閉じる・投稿・削除ボタン（コメント欄はinnerHTML再構築を経るため、
      // #taskPopup自体に1回だけイベント委譲で登録する）。
      document.getElementById("taskPopup").addEventListener("click", (event) => {
        if (event.target.id === "taskPopupCloseButton") {
          closeTaskPopup();
          return;
        }
        if (event.target.id === "taskPopupPostCommentButton") {
          handlePostTaskPopupCommentButtonClick();
          return;
        }
        const deleteButton = event.target.closest('[data-action="delete-task-popup-comment"]');
        if (deleteButton) {
          const item = deleteButton.closest("[data-comment-id]");
          if (item) handleDeleteTaskPopupCommentButtonClick(item.dataset.commentId);
        }
      });
      // マインドマップの右クリックメニュー。
      document.getElementById("mindmapPanelBody").addEventListener("contextmenu", (event) => {
        const node = event.target.closest(".mindmap-node");
        if (!node) return;
        event.preventDefault();
        openMindmapContextMenu(node.dataset.issueId, event.clientX, event.clientY);
      });
      document.getElementById("mindmapContextMenu").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (button) handleMindmapContextMenuAction(button.dataset.action);
      });
      // メニューの外側をクリック、またはEscapeキーで閉じる。
      document.addEventListener("click", (event) => {
        const menuElement = document.getElementById("mindmapContextMenu");
        if (!menuElement.hidden && !menuElement.contains(event.target)) {
          closeMindmapContextMenu();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeMindmapContextMenu();
      });
      document.getElementById("closeKanbanPanelButton").addEventListener("click", () => {
        closeSlidePanel("kanbanSlidePanel");
        document.getElementById("switchToKanbanButton").classList.remove("is-active");
      });
      // カンバンの埋め込み追加フォーム・削除ボタン・完了済み一括削除ボタンは
      // kanbanPanelBodyのinnerHTMLごと再生成されるため、個々のボタンではなく
      // 親要素にイベント委譲する。
      document.getElementById("kanbanPanelBody").addEventListener("click", (event) => {
        const submitButton = event.target.closest(".kanban-add-submit-button");
        if (submitButton) {
          handleKanbanAddFormSubmit(submitButton.closest(".kanban-add-form"));
          return;
        }
        const deleteButton = event.target.closest('[data-action="delete-task"]');
        if (deleteButton) {
          const card = deleteButton.closest("[data-task-id]");
          if (card) handleDeleteTaskButtonClick(card.dataset.taskId);
          return;
        }
        const editArea = event.target.closest('[data-action="edit-task"]');
        if (editArea) {
          const card = editArea.closest("[data-task-id]");
          if (card) handleOpenTaskEditModalClick(card.dataset.taskId);
          return;
        }
        if (event.target.id === "clearDoneTasksButton") handleClearDoneTasksButtonClick();
      });
      // ドラッグ＆ドロップによる列間の移動（WBS行の並び替えと同じPointer/HTML5 Drag &
      // Drop APIの使い分け方針：カンバンも離散的な移動先＝列単位のため、こちらもHTML5
      // draggableを使う。ドロップ先はカード単体ではなく列全体＝data-column-statusを持つ
      // .kanban-columnで判定する）。
      document.getElementById("kanbanPanelBody").addEventListener("dragstart", (event) => {
        const draggedCard = event.target.closest(".kanban-card[data-task-id]");
        if (!draggedCard) return;
        draggedTaskId = draggedCard.dataset.taskId;
        event.dataTransfer.effectAllowed = "move";
        // UI差分表No.60：ドラッグ中の視覚フィードバック。マインドマップノードの
        // is-draggingクラスと同じ考え方（見た目だけの一時クラス、dragendで必ず外す）。
        draggedCard.classList.add("is-dragging");
      });
      document.getElementById("kanbanPanelBody").addEventListener("dragend", (event) => {
        const draggedCard = event.target.closest(".kanban-card[data-task-id]");
        if (draggedCard) draggedCard.classList.remove("is-dragging");
      });
      document.getElementById("kanbanPanelBody").addEventListener("dragover", (event) => {
        if (event.target.closest(".kanban-column[data-column-status]")) event.preventDefault();
      });
      document.getElementById("kanbanPanelBody").addEventListener("drop", (event) => {
        const targetColumn = event.target.closest(".kanban-column[data-column-status]");
        if (!targetColumn || !draggedTaskId) return;
        event.preventDefault();
        handleTaskDragDrop(draggedTaskId, targetColumn.dataset.columnStatus);
        draggedTaskId = null;
      });
      document.getElementById("lockToggleButton").addEventListener("click", handleLockToggleButtonClick);
      document.getElementById("todayButton").addEventListener("click", handleTodayButtonClick);
      document.getElementById("wbsPanel").addEventListener("scroll", handleWbsPanelVerticalScroll);
      document.querySelector(".gantt-scroll-area").addEventListener("scroll", handleGanttScrollAreaVerticalScroll);
      document.getElementById("toggleAllScheduleRowsButton").addEventListener("click", handleToggleAllScheduleRowsButtonClick);
      for (const granularityButton of document.querySelectorAll("[data-granularity]")) {
        granularityButton.addEventListener("click", () => handleGranularityButtonClick(granularityButton.dataset.granularity, granularityButton));
      }
      document.getElementById("toggleColumnStartDateButton").addEventListener("click", (event) => handleToggleColumnClick("startDate", event.currentTarget));
      document.getElementById("toggleColumnEndDateButton").addEventListener("click", (event) => handleToggleColumnClick("endDate", event.currentTarget));
      document.getElementById("toggleColumnStatusButton").addEventListener("click", (event) => handleToggleColumnClick("status", event.currentTarget));
      document.getElementById("switchToKanbanButton").addEventListener("click", handleSwitchToKanbanButtonClick);
      for (const outOfScopeButton of document.querySelectorAll("[data-out-of-scope-label]")) {
        outOfScopeButton.addEventListener("click", handleOutOfScopeButtonClick);
      }
      document.getElementById("editProjectButton").addEventListener("click", handleEditProjectButtonClick);
      document.getElementById("milestoneButton").addEventListener("click", openMilestoneModal);
      // モーダル外側（オーバーレイ自身）をクリックしたときだけ閉じる
      // （モーダル・ダイアログ一覧2.3節：「モーダル外側をクリックすると閉じる」）。
      document.getElementById("modalOverlay").addEventListener("click", (event) => {
        if (event.target.id === "modalOverlay") closeModal();
      });
      // WBSパネルのクリックをイベント委譲でまとめて扱う（wbsPanelの中身はrefreshGanttPanelの
      // たびに丸ごと再生成されるため、個々の行・アイコンではなく親要素にリスナーを1つだけ持たせる）。
      // ホバーアイコン（.wbs-icon-button）のクリックを先に判定し、該当すればそちらだけを
      // 処理してreturnする（アイコンは行の内側にあるため、判定を後回しにすると行クリックの
      // 編集モーダルも同時に開いてしまう＝二重発火を避けるための順序）。
      document.getElementById("wbsPanel").addEventListener("click", (event) => {
        const iconButton = event.target.closest(".wbs-icon-button");
        if (iconButton) {
          if (iconButton.disabled) return;
          const iconRow = iconButton.closest(".wbs-row[data-schedule-id]");
          if (iconRow) handleWbsRowIconClick(iconButton.dataset.action, iconRow.dataset.scheduleId);
          return;
        }
        const clickedRow = event.target.closest(".wbs-row[data-schedule-id]");
        if (clickedRow) handleWbsRowClick(clickedRow.dataset.scheduleId);
      });
      // ドラッグ＆ドロップによる並び替え（上下矢印ボタンと併用。同じ兄弟グループ内のみ有効
      // ＝handleScheduleDragDrop側でparentId一致を判定する）。
      document.getElementById("wbsPanel").addEventListener("dragstart", (event) => {
        const draggedRow = event.target.closest(".wbs-row[data-schedule-id]");
        if (!draggedRow) return;
        draggedScheduleId = draggedRow.dataset.scheduleId;
        event.dataTransfer.effectAllowed = "move";
      });
      document.getElementById("wbsPanel").addEventListener("dragover", (event) => {
        // ドロップを許可するにはdragoverでpreventDefault()が必須（ブラウザの既定動作）。
        if (event.target.closest(".wbs-row[data-schedule-id]")) event.preventDefault();
      });
      document.getElementById("wbsPanel").addEventListener("drop", (event) => {
        const targetRow = event.target.closest(".wbs-row[data-schedule-id]");
        if (!targetRow || !draggedScheduleId) return;
        event.preventDefault();
        handleScheduleDragDrop(draggedScheduleId, targetRow.dataset.scheduleId);
        draggedScheduleId = null;
      });

      // P2〜P7：右側スライドパネルの開閉配線。6パネルとも「ボタンでトグル開閉・
      // 開いた瞬間に最新データへ再描画・×ボタンで必ず閉じる」という共通の挙動のため、
      // 定義テーブル1つと共通のwire関数にまとめる（P1タスク管理は既存の専用ハンドラの
      // ままとし、ここでは触れない）。
      const SIDE_PANEL_DEFINITIONS = [
        { panelId: "snapshotSlidePanel", buttonId: "snapshotButton", closeButtonId: "closeSnapshotPanelButton", onOpen: () => refreshSnapshotPanel(currentSelectedProjectId) },
        { panelId: "quickMemoSlidePanel", buttonId: "quickMemoButton", closeButtonId: "closeQuickMemoPanelButton", onOpen: () => refreshQuickMemoPanel(currentSelectedProjectId) },
        { panelId: "memoSlidePanel", buttonId: "memoButton", closeButtonId: "closeMemoPanelButton", onOpen: () => refreshMemoPanel(currentSelectedProjectId) },
        { panelId: "commentSlidePanel", buttonId: "commentButton", closeButtonId: "closeCommentPanelButton", onOpen: () => refreshCommentPanel(currentSelectedProjectId) },
        { panelId: "changelogSlidePanel", buttonId: "changelogButton", closeButtonId: "closeChangelogPanelButton", onOpen: () => refreshChangelogPanel(currentSelectedProjectId) },
        { panelId: "mindmapSlidePanel", buttonId: "switchToMindmapButton", closeButtonId: "closeMindmapPanelButton", onOpen: () => refreshMindmapPanel(currentSelectedProjectId) },
      ];
      for (const definition of SIDE_PANEL_DEFINITIONS) {
        document.getElementById(definition.buttonId).addEventListener("click", () => {
          toggleSlidePanel(definition.panelId);
          const isOpen = document.getElementById(definition.panelId).classList.contains("is-open");
          document.getElementById(definition.buttonId).classList.toggle("is-active", isOpen);
          if (isOpen) definition.onOpen();
        });
        document.getElementById(definition.closeButtonId).addEventListener("click", () => {
          closeSlidePanel(definition.panelId);
          document.getElementById(definition.buttonId).classList.remove("is-active");
        });
      }

      // P2：スナップショットの保存・削除・復元・比較（いずれもイベント委譲。パネルはrefreshの
      // たびに再生成されるため）。
      document.getElementById("saveSnapshotButton").addEventListener("click", handleSaveSnapshotButtonClick);
      document.getElementById("snapshotPanelBody").addEventListener("click", (event) => {
        const item = event.target.closest("[data-snapshot-id]");
        if (!item) return;
        if (event.target.closest('[data-action="delete-snapshot"]')) {
          handleDeleteSnapshotButtonClick(item.dataset.snapshotId);
          return;
        }
        if (event.target.closest('[data-action="restore-snapshot"]')) {
          handleRestoreSnapshotButtonClick(item.dataset.snapshotId);
          return;
        }
        if (event.target.closest('[data-action="compare-snapshot"]')) {
          handleCompareSnapshotButtonClick(item.dataset.snapshotId);
        }
      });

      // P3：即時メモの投稿（クリック・Ctrl+Enter）・削除（イベント委譲）。
      document.getElementById("postQuickMemoButton").addEventListener("click", handlePostQuickMemoButtonClick);
      document.getElementById("clearQuickMemosButton").addEventListener("click", handleClearQuickMemosButtonClick);
      document.getElementById("quickMemoTextInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter" && event.ctrlKey) handlePostQuickMemoButtonClick();
      });
      document.getElementById("quickMemoPanelBody").addEventListener("click", (event) => {
        const deleteButton = event.target.closest('[data-action="delete-quick-memo"]');
        if (!deleteButton) return;
        const item = deleteButton.closest("[data-quick-memo-id]");
        if (item) handleDeleteQuickMemoButtonClick(item.dataset.quickMemoId);
      });

      // P4：メモの新規作成・選択・削除（一覧側）・自動保存（編集エリア側、blurで発火）。
      document.getElementById("createMemoButton").addEventListener("click", handleCreateMemoButtonClick);
      document.getElementById("memoListBody").addEventListener("click", (event) => {
        const deleteButton = event.target.closest('[data-action="delete-memo"]');
        if (deleteButton) {
          const item = deleteButton.closest("[data-memo-id]");
          if (item) handleDeleteMemoButtonClick(item.dataset.memoId);
          return;
        }
        const selectItem = event.target.closest('[data-action="select-memo"]');
        if (selectItem) handleSelectMemoButtonClick(selectItem.dataset.memoId);
      });
      // 編集エリアはrefreshMemoPanelのたびに再生成されるため、フォーカスアウトの委譲は
      // キャプチャフェーズ（blurはバブリングしないため）で親要素に持たせる。
      document.getElementById("memoEditorBody").addEventListener(
        "blur",
        (event) => {
          if (event.target.id === "memoEditorTitleInput" || event.target.id === "memoEditorBodyTextarea") {
            handleMemoEditorFieldBlur();
          }
        },
        true
      );

      // P5：コメントの投稿・削除・グループ開閉（イベント委譲。パネルは再描画のたびに
      //   作り直されるため）。
      document.getElementById("commentPanelBody").addEventListener("click", (event) => {
        if (event.target.id === "postCommentButton") {
          handlePostCommentButtonClick();
          return;
        }
        const deleteButton = event.target.closest('[data-action="delete-comment"]');
        if (deleteButton) {
          const item = deleteButton.closest("[data-comment-id]");
          if (item) handleDeleteCommentButtonClick(item.dataset.commentId);
          return;
        }
        const toggleHeading = event.target.closest('[data-action="toggle-comment-group"]');
        if (toggleHeading) handleToggleCommentGroupButtonClick(toggleHeading.dataset.scheduleId);
      });

      // P6：変更履歴のフィルタタブ・全削除ボタン・「戻す」ボタン（後者2つはイベント委譲。
      //   パネルはフィルタ切替や復元のたびに作り直されるため）。
      for (const filterButton of document.querySelectorAll("#changelogFilterTabs [data-changelog-filter]")) {
        filterButton.addEventListener("click", () => handleChangelogFilterClick(filterButton.dataset.changelogFilter, filterButton));
      }
      document.getElementById("clearChangelogButton").addEventListener("click", handleClearChangelogButtonClick);
      document.getElementById("changelogPanelBody").addEventListener("click", (event) => {
        const restoreButton = event.target.closest('[data-action="restore-log"]');
        if (!restoreButton) return;
        const item = restoreButton.closest("[data-entry-id]");
        if (item) handleRestoreFromLogButtonClick(item.dataset.entryId);
      });

      const projectList = await getAllProjects();
      await refreshProjectSelectDropdown();
      const firstProjectId = projectList.length > 0 ? projectList[0].id : null;
      document.getElementById("projectSelectDropdown").value = firstProjectId || "";
      await switchToProject(firstProjectId);
    }

    // Node.js等、windowが存在しない環境（自動テスト）でこのスクリプトを評価しても
    // 起動処理が実行されないようにするガード（この関数群を純粋関数として単体テストするため）。
    if (typeof window !== "undefined") {
      window.addEventListener("DOMContentLoaded", initializeApp);
    }
  </script>
</body>
</html>
