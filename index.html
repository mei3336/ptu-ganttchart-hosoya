<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GanttForge再現アプリ</title>
  <!-- UIデザイン仕様書1.4節「フォントファミリー：'DM Sans'（Google Fonts等からの読み込みを想定）」に
       基づきCDN経由で読み込む。ネットワーク遮断環境では読込に失敗するが、その場合はフォールバックの
       システムフォントで表示される（フォント読込の成否がアプリの動作自体には影響しない）。 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 詳細設計書1.2節「使用ライブラリ（CDN経由・元アプリと同一を踏襲）」の指定バージョンで読み込む。
       PDF出力（html2canvas/jsPDF）・Excel出力（xlsx-js-style）はこの3本のグローバルオブジェクトに
       依存する。<head>内で（defer等を付けず）同期的に読み込むことで、DOMContentLoaded時点では
       必ず読み込みが完了しているか失敗しているかが確定した状態になる
       （PDF出力側のライブラリ未読込チェックが、読込中の一瞬を誤って「失敗」と判定しないようにするため）。 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    /* ===== デザイントークン（UIデザイン仕様書1章の値をそのまま採用） ===== */
    :root {
      --color-bg-page: #F3F4F6;
      --color-white: #FFFFFF;
      --color-surface-2: #F9FAFB;
      --color-surface-3: #E5E7EB;
      --color-border: #D1D5DB;
      --color-border-dark: #9CA3AF;
      --color-primary-navy: #1E40AF;
      --color-primary-light: #EFF6FF;
      --color-accent: #2563EB;
      --color-accent-hover: #1D4ED8;
      --color-danger: #DC2626;
      --color-danger-light: #FEF2F2;
      --color-text-dark: #111827;
      --color-text-mid: #374151;
      --color-text-light: #6B7280;

      --shadow-small: 0 1px 3px rgba(0, 0, 0, .10), 0 1px 2px rgba(0, 0, 0, .06);
      --shadow-medium: 0 4px 16px rgba(0, 0, 0, .10), 0 2px 6px rgba(0, 0, 0, .06);
      --shadow-large: 0 16px 48px rgba(0, 0, 0, .14), 0 4px 12px rgba(0, 0, 0, .08);

      --radius-standard: 8px;
      --gantt-row-height: 44px;
      --gantt-header-height: 42px;
      --timeline-header-height: 82px;
      --milestone-marker-height: 20px;
      --wbs-panel-width: 520px;
      --header-primary-height: 52px;
      --header-secondary-height: 34px;
      /* 追加実装仕様書3.2節：ガント本体の高さH（ganttforge.html 1780〜1784行目で検証済み）。
         H=Math.max(行数×44px, 500px)。行数が少ない間は500px固定、行数が増えると
         「行数×44px」に切り替わって伸びていく（画面の表示領域の高さとは無関係の
         固定値であることをお手本のソースで確認済み。以前はここを画面の残り高さの
         計算式にしていたが、本書の検証結果に合わせて固定500pxへ修正する）。 */
      --gantt-body-min-height: 500px;
    }

    * {
      box-sizing: border-box;
    }

    /* 対応表No.41：WBSパネルとガント本体を独立してスクロールさせるため、bodyを縦方向の
       flexコンテナにし、<main>に残りの高さをすべて割り当てる（#lockBandの表示/非表示で
       ヘッダー群の高さが変わっても、計算式に書き起こさず自動的に追従させるため）。
       固定配置（position:fixed）のモーダル・トースト・スライドパネル等はbodyの表示方式に
       影響されないため、このレイアウト変更の影響を受けない。 */
    body {
      margin: 0;
      background: var(--color-bg-page);
      color: var(--color-text-dark);
      font-family: 'DM Sans', -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    button {
      font-family: inherit;
    }

    /* ===== ヘッダー（基本設計書2.1節：2段構成） ===== */
    /* 【設計判断：追加実装仕様書2.2節「横スクロールは実装しない」＋ユーザー指示（折り返しは
       せず、あふれたボタンはそのままでよい。ただし幅が狭まるにつれ、まずgapを詰めて
       あふれを最小限にし、それでも狭ければ「日〜3か月」「開始〜状態」の2ブロックを
       非表示にする）】
       折り返し（flex-wrap:wrap）は行わず1行のまま維持する。横スクロールバーも出さず、
       あふれた分はoverflow-x:hiddenで見えなくする（お手本にも横スクロールは無いため、
       「折り返す・省略される」のうち「省略される」を選ぶ）。 */
    .app-header-primary,
    .app-header-secondary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      overflow-x: hidden;
      padding: 0 16px;
    }

    .app-header-primary {
      height: var(--header-primary-height);
      background: var(--color-white);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-small);
    }

    .app-header-secondary {
      height: var(--header-secondary-height);
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
      font-size: 12px;
    }

    .header-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: nowrap;
    }

    /* 「表示粒度（日/週/1ヶ月/3ヶ月）」「列トグル（開始/終了/状態）」のように、
       意味のあるまとまりを1つの塊としてスクロール・折り返しさせるための入れ物。
       塊の中はgapを詰め、塊同士の間はheader-groupのgap(10px)で少し広めに取る。 */
    .button-group {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    /* 【設計判断：段階的な「詰め」処理】幅が狭まるにつれ、まずgap（ボタン同士の間隔）を
       段階的に詰めて、あふれを最大限抑える。ボタン自体の文字は縮小・省略しない
       （読めなくなるため）。.button-group本体の定義より後ろに置き、同じ詳細度の
       ルール同士でも後勝ちのCSSカスケードで上書きされるようにする。 */
    @media (max-width: 1500px) {
      .header-group {
        gap: 6px;
      }
      .button-group {
        gap: 2px;
      }
    }

    /* 【設計判断：段階的な「詰め」処理の最終段階】gapを詰めてもなお収まらない幅になったら、
       「日〜3か月」（表示粒度）「開始〜状態」（列トグル）の2ブロックを丸ごと非表示にする
       （ユーザー指示：この2ブロックは同時に隠してよく、どちらが先ということはない）。
       この2ブロックは.button-groupクラスのみで実装されているため、そのままセレクタに使える。 */
    @media (max-width: 1200px) {
      .button-group {
        display: none;
      }
    }

    .app-logo {
      font-weight: 700;
      color: var(--color-primary-navy);
      font-size: 13px;
      margin-right: 4px;
    }

    /* 「ロック」トグルON時に第1・第2ヘッダーとガントの間へ挿入する帯（基本設計書3.3節）。 */
    #lockBand {
      background: var(--color-danger-light);
      border-bottom: 2px solid var(--color-danger);
      color: var(--color-danger);
      padding: 4px 16px;
      font-size: 12px;
      font-weight: 600;
    }

    #lockBand[hidden] {
      display: none;
    }

    button.toolbar-button {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-text-mid);
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button.toolbar-button:hover:not(:disabled) {
      background: var(--color-primary-light);
      border-color: var(--color-accent);
    }

    button.toolbar-button.is-active {
      background: var(--color-accent);
      color: var(--color-white);
      border-color: var(--color-accent);
    }

    button.toolbar-button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    #createProjectButton {
      padding: 5px 12px;
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-accent);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #createProjectButton:hover {
      background: var(--color-accent-hover);
      color: var(--color-white);
    }

    select#projectSelectDropdown {
      padding: 4px 8px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-text-dark);
    }

    /* ===== メイン作業領域：WBSパネル＋ガントチャート（UIデザイン仕様書2.1節） ===== */
    #ganttPanel {
      height: 100%;
    }

    .main-workspace {
      display: flex;
      align-items: flex-start;
      height: 100%;
    }

    /* 追加実装仕様書2.1節：プロジェクト未選択時の空状態画面。.main-workspaceと同じ
       高さいっぱいに広がり、アイコン・見出し・説明文・ボタンを中央に積み重ねる。 */
    .gantt-empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }

    /* 【設計判断】.main-workspace/.gantt-empty-stateはどちらもdisplay:flexを持つため、
       JS側でhidden属性を付けるだけでは非表示にならない（属性セレクタ[hidden]よりクラス
       セレクタの方が先に評価されるわけではないが、[hidden]単体のUA既定スタイルより
       このクラスの指定の方が詳細度が高く上書きしてしまうため）。[hidden]と組み合わせた
       セレクタで明示的にdisplay:noneへ戻す。 */
    .main-workspace[hidden],
    .gantt-empty-state[hidden] {
      display: none;
    }

    .gantt-empty-state-icon {
      font-size: 64px;
      line-height: 1;
      color: var(--color-border-dark);
      margin-bottom: 8px;
    }

    .gantt-empty-state-title {
      margin: 0;
      font-size: 18px;
      color: var(--color-text-dark);
    }

    .gantt-empty-state-description {
      margin: 0;
      color: var(--color-text-light);
      font-size: 13px;
    }

    .wbs-panel {
      width: var(--wbs-panel-width);
      flex: 0 0 var(--wbs-panel-width);
      background: var(--color-white);
      border-right: 1px solid var(--color-border);
      height: 100%;
      overflow-y: auto;
    }

    /* 対応表No.41：見出し行を.wbs-panel（スクロールコンテナ）の上端に固定する。
       position:stickyはスクロール中もtop:0の位置に留まり続け、行本体だけが下を
       通り抜けるようにスクロールする（お手本のwbsBody相当：見出し固定・本体スクロール）。 */
    .wbs-header-row {
      position: sticky;
      top: 0;
      z-index: 5;
      height: var(--timeline-header-height);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 0 8px 6px;
      font-weight: 600;
      color: var(--color-primary-navy);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }

    .wbs-header-row .wbs-column-name {
      flex: 1;
    }

    .wbs-header-row .wbs-column-extra {
      width: 84px;
      flex: 0 0 84px;
      font-size: 12px;
    }

    .wbs-row {
      height: var(--gantt-row-height);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-bottom: 1.5px solid var(--color-border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wbs-row:nth-child(even) {
      background: var(--color-surface-2);
    }

    .wbs-row .wbs-column-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wbs-row .wbs-column-extra {
      width: 84px;
      flex: 0 0 84px;
      font-size: 12px;
      color: var(--color-text-mid);
    }

    /* モーダル・ダイアログ一覧「1. スケジュール行のホバー時操作アイコン一式」：
       通常はうっすら（非表示）にしておき、行にマウスを乗せたときだけ現れる。
       アイコン自体は常にDOMにあり、opacityで見た目だけを切り替える
       （クリック領域を安定させるため、display:noneにはしない）。 */
    .wbs-row-icons {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 0 0 auto;
      opacity: 0;
      transition: opacity .12s ease;
    }

    .wbs-row:hover .wbs-row-icons {
      opacity: 1;
    }

    .wbs-header-row .wbs-row-icons {
      flex: 0 0 auto;
      width: 96px;
    }

    .wbs-icon-button {
      width: 18px;
      height: 18px;
      line-height: 16px;
      padding: 0;
      border: 1px solid var(--color-border-dark);
      border-radius: 4px;
      background: var(--color-white);
      color: var(--color-text-mid);
      font-size: 11px;
      cursor: pointer;
    }

    .wbs-icon-button:hover:not(:disabled) {
      background: var(--color-primary-light);
      border-color: var(--color-accent);
    }

    .wbs-icon-button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    /* 開閉アイコンは「WBS番号とスケジュール名の間」に常時表示する（ホバー不要）。
       .wbs-row-icons（ホバーで現れる操作アイコン群）の外に置くことでopacity制御の対象外にする。 */
    .wbs-toggle-button {
      margin: 0 4px;
      vertical-align: middle;
    }

    /* WBS番号：お手本同様、太字＋強調色（UIデザイン仕様書1.1のプライマリ色）で目立たせる。 */
    .wbs-number {
      font-weight: 700;
      color: var(--color-primary-navy);
    }

    /* ドラッグ用グリップハンドル。ホバー時のみうっすら表示する（操作アイコン群と同じ方針）。
       行の左端・WBS番号よりさらに左（インデントの外側）に固定幅で置く。 */
    .wbs-drag-handle {
      flex: 0 0 14px;
      width: 14px;
      text-align: center;
      color: var(--color-text-light);
      cursor: grab;
      opacity: 0;
      transition: opacity .12s ease;
      user-select: none;
    }

    .wbs-row:hover .wbs-drag-handle {
      opacity: 1;
    }

    .wbs-drag-handle-spacer {
      flex: 0 0 14px;
      width: 14px;
    }

    .gantt-scroll-area {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      height: 100%;
      background: var(--color-white);
    }

    /* 対応表No.41：見出し行（月・日の目盛り）は縦スクロールに追従させず.gantt-scroll-area
       （スクロールコンテナ）の上端に固定する。横スクロールは.gantt-scroll-area自体が
       ヘッダー・本体をまとめて動かすため、この見出しはposition:stickyでも横方向には
       ついていく（stickyは指定した軸だけ固定し、他の軸はコンテナと一緒に動く）。 */
    .gantt-timeline-header {
      height: var(--timeline-header-height);
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }

    .gantt-month-label {
      position: absolute;
      top: 0;
      height: 40px;
      display: flex;
      align-items: center;
      padding-left: 6px;
      font-weight: 600;
      font-size: 12px;
      color: var(--color-primary-navy);
      border-right: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
    }

    .gantt-day-column-header {
      position: absolute;
      top: 40px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--color-text-light);
      border-right: 1px solid var(--color-surface-3);
    }

    .gantt-day-column-header.is-saturday {
      background: rgba(37, 99, 235, .09);
      color: var(--color-accent);
    }

    .gantt-day-column-header.is-sunday {
      background: rgba(220, 38, 38, .09);
      color: var(--color-danger);
    }

    .gantt-body {
      position: relative;
      cursor: grab;
    }

    /* UI差分表No.42：背景ドラッグ中のカーソル（地図アプリの「掴んでいる」表現）。 */
    .gantt-scroll-area.is-background-dragging,
    .gantt-scroll-area.is-background-dragging .gantt-body {
      cursor: grabbing;
    }

    .gantt-row-background {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--gantt-row-height);
      border-bottom: 1.5px solid var(--color-border);
    }

    .gantt-row-background.is-even-row {
      background: var(--color-surface-2);
    }

    .gantt-day-column-bg {
      position: absolute;
      top: 0;
      bottom: 0;
      border-right: 1px solid var(--color-surface-3);
    }

    .gantt-day-column-bg.is-saturday {
      background: rgba(37, 99, 235, .05);
    }

    .gantt-day-column-bg.is-sunday {
      background: rgba(220, 38, 38, .05);
    }

    /* 週/1ヶ月/3ヶ月表示では土日という概念が意味を持たないため、縞模様で列の区切りだけを示す。 */
    .gantt-day-column-bg.is-alt-period {
      background: var(--color-surface-3);
      opacity: .4;
    }

    /* 追加実装仕様書3.1節：日ごとの区切りを示す薄い縦線。JSがbackground-sizeに
       pixelsPerDayを指定し、この1px幅の線をその間隔で繰り返し表示する。
       クリック・ドラッグの妨げにならないよう装飾専用のレイヤーとして扱う。 */
    .gantt-day-grid-lines {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      background-image: linear-gradient(to right, var(--color-surface-3) 1px, transparent 1px);
      background-repeat: repeat-x;
      pointer-events: none;
    }

    /* バーの視覚仕様（UIデザイン仕様書3章）：親行は太め・角丸大きめで行中央、
       子（葉）行は薄めで行の65%あたりの位置。完了ステータスは不透明度を下げる。 */
    .gantt-bar {
      position: absolute;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      color: var(--color-white);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: var(--shadow-small);
      cursor: grab;
      touch-action: none;
    }

    .gantt-bar.is-parent-bar {
      border-radius: 5px;
      height: 24px;
    }

    /* 詳細設計書3.2.4：掴み手は常時表示ではなく、バーにマウスを乗せた時のみうっすら色が付く。
       葉ノード（子を持たない行）にしか付与されない（renderGanttBodyToHtml側の分岐）。 */
    .gantt-bar-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: ew-resize;
    }

    .bar-lh {
      left: 0;
    }

    .bar-rh {
      right: 0;
    }

    .gantt-bar:hover .gantt-bar-handle {
      background: rgba(0, 0, 0, .18);
    }

    /* UI差分表No.52：バーホバー時の演出（お手本：filter:brightness(.9);box-shadow強調）。 */
    .gantt-bar:hover {
      filter: brightness(.9);
      box-shadow: var(--shadow-medium);
    }

    .gantt-bar.is-bar-dragging {
      opacity: .85;
      box-shadow: var(--shadow-medium);
    }

    .gantt-bar.is-done-status {
      opacity: .55;
    }

    .gantt-milestone-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 1px dashed var(--color-border-dark);
    }

    /* 「今日」を示す縦のハイライト線。マイルストーン線と同じくtop:0;bottom:0で
       .gantt-body（親要素）の高さいっぱいに伸びる（JS側では高さを指定しない）。 */
    .gantt-today-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-accent);
      z-index: 1;
    }

    .gantt-milestone-diamond {
      position: absolute;
      top: 6px;
      width: var(--milestone-marker-height);
      height: var(--milestone-marker-height);
      background: #D97706;
      transform: translateX(-10px) rotate(45deg);
      border-radius: 2px;
    }

    /* UI差分表No.55：マイルストーンのカスタムツールチップ。ブラウザ標準title属性の代わりに
       data-tooltip属性＋CSSの::after（content:attr()）で、矢印付きの吹き出しを実装する
       （JS不要）。既定は非表示（opacity:0;visibility:hidden）にし、
       .gantt-milestone-marker:hoverでフェードインさせる。 */
    .gantt-milestone-marker::after {
      content: attr(data-tooltip);
      position: absolute;
      top: -8px;
      left: -10px;
      transform: translate(-50%, -100%);
      background: #292524;
      color: var(--color-white);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity .15s ease;
      pointer-events: none;
      z-index: 2;
    }

    .gantt-milestone-marker::before {
      content: "";
      position: absolute;
      top: -8px;
      left: -10px;
      transform: translate(-50%, -100%) translateY(100%);
      border: 4px solid transparent;
      border-top-color: #292524;
      opacity: 0;
      visibility: hidden;
      transition: opacity .15s ease;
      pointer-events: none;
      z-index: 2;
    }

    .gantt-milestone-marker:hover::after,
    .gantt-milestone-marker:hover::before {
      opacity: 1;
      visibility: visible;
    }

    /* ===== カンバン（タスク管理） ===== */
    .kanban-board {
      display: flex;
      gap: 12px;
      padding: 16px;
    }

    .kanban-column {
      flex: 1;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      padding: 8px;
    }

    .kanban-column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .kanban-column h3 {
      margin: 0;
      font-size: 13px;
      color: var(--color-text-mid);
    }

    .kanban-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      box-shadow: var(--shadow-small);
      padding: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: grab;
    }

    /* UI差分表No.60：ドラッグ中の見た目（お手本：opacity:.4;transform:scale(.96)）。 */
    .kanban-card.is-dragging {
      opacity: .4;
      transform: scale(.96);
    }

    .kanban-card-main {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    /* UI差分表No.58：優先度タグの色分けバッジ（お手本：赤/橙/青の色分け）。
       4(なし)は赤/橙/青のいずれにも当たらないため、中立色（グレー）を追加する。 */
    .priority-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--color-white);
    }

    .priority-badge.priority-1 {
      background: var(--color-danger);
    }

    .priority-badge.priority-2 {
      background: #D97706;
    }

    .priority-badge.priority-3 {
      background: var(--color-accent);
    }

    .priority-badge.priority-4 {
      background: var(--color-text-light);
    }

    /* ===== マインドマップ（issueのx,y座標を使った絶対配置） ===== */
    .mindmap-canvas {
      position: relative;
      height: 480px;
      margin: 16px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      overflow: auto;
    }

    .mindmap-edge {
      position: absolute;
      height: 1px;
      background: var(--color-border-dark);
      transform-origin: 0 0;
    }

    .mindmap-node {
      position: absolute;
      padding: 5px 16px;
      border-radius: 20px;
      color: var(--color-white);
      font-size: 12px;
      white-space: nowrap;
      box-shadow: var(--shadow-small);
      transform: translate(-50%, -50%);
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .mindmap-node.is-dragging {
      cursor: grabbing;
      opacity: .85;
      z-index: 10;
    }

    /* 折りたたみ中（子孫ノードを非表示にしている）ノードの見た目の目印。 */
    .mindmap-node.is-collapsed-node {
      border: 2px dashed var(--color-white);
    }

    /* マインドマップは他パネルよりノード配置の作業領域が必要なため、幅を広めにする。 */
    .mindmap-slide-panel {
      width: 900px;
    }

    /* 右クリックメニュー（モーダル・ダイアログ一覧P7）。位置はJSでtop/leftを指定する。 */
    .mindmap-context-menu {
      position: fixed;
      z-index: 110;
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      box-shadow: var(--shadow-medium);
      padding: 4px;
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }

    .mindmap-context-menu[hidden] {
      display: none;
    }

    .mindmap-context-menu button {
      text-align: left;
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      background: none;
      color: var(--color-text-dark);
      font-size: 12px;
      cursor: pointer;
    }

    .mindmap-context-menu button:hover {
      background: var(--color-primary-light);
    }

    .panel-add-button {
      margin: 12px 16px 0;
      padding: 6px 12px;
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-accent);
      cursor: pointer;
    }

    .panel-add-button:hover {
      background: var(--color-accent-hover);
      color: var(--color-white);
    }

    .empty-state-message {
      color: var(--color-text-light);
      padding: 16px;
    }

    /* ガント本体が0件のとき、列（背景の縞模様）はそのまま描画した上に
       メッセージだけを重ねて表示する（列自体を消さない）。 */
    .gantt-empty-overlay {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 0;
      white-space: nowrap;
    }

    /* ===== モーダル・ダイアログ一覧①：中央モーダル（UIデザイン仕様書2.3節） ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .modal-panel {
      background: var(--color-white);
      border-radius: var(--radius-standard);
      box-shadow: var(--shadow-large);
      padding: 20px;
      width: 420px;
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-panel h2 {
      margin: 0 0 16px;
      font-size: 15px;
      color: var(--color-text-dark);
    }

    .modal-field {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .modal-field label {
      font-size: 12px;
      color: var(--color-text-mid);
    }

    .modal-field input[type="text"],
    .modal-field input[type="date"],
    .modal-field select,
    .modal-field textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 13px;
    }

    .modal-field input[type="text"]:focus,
    .modal-field input[type="date"]:focus,
    .modal-field select:focus,
    .modal-field textarea:focus {
        outline: none;
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }


    .modal-color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .modal-color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .modal-color-swatch.is-selected {
      border-color: var(--color-text-dark);
    }

    /* M4：スケジュール編集モーダル内のコメント欄（既存スケジュールのみ表示） */
    .modal-comment-list {
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      margin-bottom: 8px;
    }

    .modal-comment-list .panel-list-item {
      padding: 6px 10px;
    }

    .modal-comment-post-form {
      display: flex;
      gap: 8px;
    }

    .modal-comment-post-form input {
      flex: 1;
    }

    /* M3：マイルストーン管理モーダルの行（名前＋日付＋削除ボタン）。 */
    #milestoneModalRowsContainer {
      max-height: 40vh;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .modal-milestone-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .modal-milestone-row .modal-milestone-name-input {
      flex: 1;
      min-width: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    /* M9：データ取込－差分比較モーダル。ストアごとにグループ化した一覧を持つため、
       通常のモーダル（420px）より広い専用幅にする。:has()で対象を絞り、他モーダルの
       幅には影響させない。 */
    .modal-panel:has(.import-diff-list) {
      width: 640px;
    }

    .import-diff-list {
      max-height: 50vh;
      overflow-y: auto;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      margin-bottom: 8px;
    }

    .import-diff-store-group + .import-diff-store-group {
      border-top: 1px solid var(--color-border);
    }

    .import-diff-store-group h3 {
      margin: 0;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--color-text-mid);
      background: var(--color-surface-2);
    }

    .import-diff-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .import-diff-item:hover {
      background: var(--color-surface-2);
    }

    .modal-button-primary {
      padding: 6px 14px;
      border-radius: var(--radius-standard);
      border: 1px solid var(--color-accent);
      background: var(--color-accent);
      color: var(--color-white);
      cursor: pointer;
    }

    .modal-button-secondary {
      padding: 6px 14px;
      border-radius: var(--radius-standard);
      border: 1px solid var(--color-border-dark);
      background: var(--color-white);
      color: var(--color-text-mid);
      cursor: pointer;
    }

    .wbs-row[data-schedule-id] {
      cursor: pointer;
    }

    /* ===== モーダル・ダイアログ一覧②：右側スライドパネル（UIデザイン仕様書2.2節） =====
       ガント画面（背後）を隠さず、画面右端からスライドインする。×またはヘッダーの同じ
       ボタンをもう一度押すと閉じる。パネル幅は機能ごとに異なる想定（今回はタスク管理のみ実装）。 */
    .slide-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 640px;
      max-width: 92vw;
      background: var(--color-white);
      box-shadow: var(--shadow-large);
      z-index: 90;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .2s ease;
      pointer-events: none;
    }

    /* UI差分表No.76：側面パネルの幅をドラッグで変更するハンドル。左端に薄く常設し、
       ホバー/ドラッグ中だけアクセント色を表示する。initializePanelResizeHandlesで
       全スライドパネルの先頭に動的挿入する（7パネル分HTMLへ書かない）。 */
    .panel-resize-handle {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 6px;
      cursor: ew-resize;
      z-index: 1;
      pointer-events: auto;
    }

    .panel-resize-handle:hover,
    .panel-resize-handle.is-resizing {
      background: var(--color-accent);
    }

    .slide-panel.is-open {
      transform: translateX(0);
      pointer-events: auto;
    }

    .slide-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
    }

    /* P3：即時メモパネルのように、見出しの隣に操作ボタンを1つ添えたい場合の下位ラッパー。
       .slide-panel-header自体はjustify-content:space-betweenで「見出し側／×ボタン側」の
       2箇所しか想定していないため、ここに複数要素をまとめて1つの子要素として渡す。 */
    .slide-panel-header-title-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slide-panel-header h2 {
      margin: 0;
      font-size: 15px;
      color: var(--color-text-dark);
    }

    .slide-panel-close-button {
      border: none;
      background: none;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      color: var(--color-text-mid);
    }

    .slide-panel-body {
      flex: 1;
      overflow-y: auto;
    }

    .kanban-add-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      background: var(--color-white);
      border: 1px dashed var(--color-border-dark);
      border-radius: var(--radius-standard);
    }

    .kanban-add-form input,
    .kanban-add-form select {
      padding: 4px 6px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 12px;
    }

    /* ===== P2〜P6：右側スライドパネル共通の一覧項目・入力欄スタイル ===== */
    .panel-list-item {
      padding: 8px 16px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-list-item-main {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-list-item-meta {
      color: var(--color-text-light);
      font-size: 11px;
    }

    /* UI差分表No.73：スナップショット比較結果のインライン展開領域。 */
    .snapshot-compare-result {
      margin-top: 6px;
      font-size: 12px;
    }

    .panel-list-item-actions {
      display: flex;
      gap: 4px;
      flex: 0 0 auto;
    }

    /* P3：即時メモの投稿欄（パネル下部固定） */
    .quick-memo-input-area {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid var(--color-border);
    }

    .quick-memo-input-area textarea {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }

    /* P4：メモパネルは左に一覧・右に編集エリアの2カラム構成 */
    .memo-panel-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .memo-list-column {
      flex: 0 0 auto;
      max-height: 40%;
      overflow-y: auto;
      border-bottom: 1px solid var(--color-border);
    }

    .memo-list-item {
      cursor: pointer;
    }

    .memo-list-item.is-selected {
      background: var(--color-primary-light);
    }

    .memo-editor-column {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .memo-editor-column input[type="text"] {
      padding: 9px 12px;
      border: 1.5px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
    }

    .memo-editor-column textarea {
      flex: 1;
      min-height: 240px;
      padding: 8px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }

    /* P5：コメント一覧はスケジュール単位でグルーピングする（見出しクリックで開閉） */
    .comment-group-heading {
      padding: 8px 16px 4px;
      font-weight: 600;
      color: var(--color-primary-navy);
      background: var(--color-surface-2);
      cursor: pointer;
      user-select: none;
    }

    /* UI差分表No.68：グループ見出しの折りたたみ表現。固定の下向き矢印1文字を、
       開閉状態に応じてCSSトランジションで回転させる（グリフ切り替えではなく回転アニメーション）。 */
    .cml-chevron {
      display: inline-block;
      transition: transform .15s ease;
    }

    .comment-group-heading.is-collapsed .cml-chevron {
      transform: rotate(-90deg);
    }

    /* P6：変更履歴のフィルタタブ */
    .changelog-filter-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--color-border);
    }

    .changelog-summary {
      padding: 6px 16px;
      font-size: 12px;
      color: var(--color-text-light);
      border-bottom: 1px solid var(--color-border);
    }

    .changelog-action-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--color-white);
    }

    .changelog-action-badge.is-add {
      background: var(--color-accent);
    }

    .changelog-action-badge.is-edit {
      background: #D97706;
    }

    .changelog-action-badge.is-delete {
      background: var(--color-danger);
    }

    /* UI差分表No.69：変更前後の値の色分け表示（お手本：.cl-old取り消し線・赤／.cl-new緑）。 */
    .changelog-changes-list {
      margin-top: 4px;
      font-size: 11px;
    }

    .changelog-change-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: baseline;
    }

    .changelog-field-label {
      color: var(--color-text-light);
    }

    .cl-old {
      color: var(--color-danger);
      text-decoration: line-through;
    }

    .cl-new {
      color: #16A34A;
    }

    .changelog-change-arrow {
      color: var(--color-text-light);
    }

    /* ===== 共通UI：トースト通知（UIデザイン仕様書2.4節） =====
       画面右下に固定表示し、表示時は下からスライドイン、約2.8秒で自動的にスライドアウトして消える。
       非表示時にdisplay:noneにしないのは、スライドイン/アウトのtransitionを効かせるため
       （opacity/transformだけを切り替え、要素自体は常にDOMに存在させる）。 */
    #toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      max-width: 360px;
      padding: 12px 16px;
      background: var(--color-text-dark);
      color: var(--color-white);
      border-radius: var(--radius-standard);
      box-shadow: var(--shadow-large);
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* UI差分表No.75／対応表No.17：ガントバー直接クリックの軽量ポップアップ。
       position:fixedでevent.clientX/clientYにそのまま配置する（スクロール位置の
       補正が不要になるため）。 */
    .task-popup {
      position: fixed;
      z-index: 150;
      width: 260px;
      background: var(--color-white);
      border-radius: var(--radius-standard);
      box-shadow: var(--shadow-large);
      padding: 12px;
      font-size: 12px;
    }

    .task-popup-comment-section {
      margin-top: 8px;
      border-top: 1px solid var(--color-border);
      padding-top: 8px;
    }

    .task-popup-comment-section .modal-comment-list {
      max-height: 100px;
    }

    .task-popup[hidden] {
      display: none;
    }

    .task-popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .task-popup-progress-track {
      height: 6px;
      background: var(--color-surface-3);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .task-popup-progress-fill {
      height: 100%;
      background: var(--color-accent);
    }

    .task-popup-progress-label {
      font-size: 11px;

  <!-- モーダル・ダイアログ一覧①：中央モーダルの共通の入れ物。中身はopenModal()で差し替える。 -->

    <div class="modal-panel" id="modalPanel"></div>

  <!-- 共通UI部品：トースト通知（UIデザイン仕様書2.4節）。showToast()がtextContentとshowクラスを
       差し替えるだけの単一の入れ物で、全機能から共通で使い回す。 -->

  <!-- UI差分表No.75／対応表No.17：ガントバー直接クリックの軽量ポップアップ。openScheduleModalの
       中央モーダルとは別物で、クリックしたバーの近くに表示する共通の入れ物。 -->
  <div id="taskPopup" class="task-popup" hidden></div>

  <script>
    "use strict";

    // ===== IndexedDB 定数 =====
    // DB名・バージョンは1箇所で管理する（複数箇所に散らして修正漏れが起きるのを防ぐ）。
    const DATABASE_NAME = "GanttForgeDB";
    // バージョン1：初版。全9ストアと全インデックスをこのバージョンで一括作成する。
    const DATABASE_VERSION = 1;

    // 全ストア共通の主キー。データモデル設計.md 1章の方針により、ID発行はアプリ側で行う
    // （autoIncrementは使わない）ため、keyPath は全ストアで常に "id" に固定する。
    const PRIMARY_KEY_PATH = "id";

    // ===== ストア定義 =====
    // 【この配列の意味】keyPath は全ストア共通（PRIMARY_KEY_PATH="id"）なので、
    //   ここでは「ストア名」と「そのストアに張るインデックス」だけを宣言する。
    // 【レビュー方法】この配列を データモデル設計.md 4章（インデックス設計一覧）と
    //   上から1対1で突き合わせれば、定義の過不足・値の相違を目視確認できる。
    //   indexName / keyPath / unique は 4章の表の値をそのまま写している。
    const STORE_DEFINITIONS = [
      // projects：プロジェクト選択は常に全件取得（getAll）のため、絞り込み用インデックスは不要。
      { name: "projects", indexes: [] },

      // schedules：プロジェクト切替時の一覧取得(projectId)と、
      //   階層構造での子取得・親日付の再計算(parentId)の2つで絞り込む。
      { name: "schedules", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
        { indexName: "by_parentId",  keyPath: "parentId",  unique: false },
      ] },

      // tasks：カンバン（タスク管理パネル）はプロジェクトごとに開くため projectId で絞り込む。
      { name: "tasks", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // issues：マインドマップパネルはプロジェクトごとに開くため projectId で絞り込む。
      { name: "issues", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // comments：projectId を持たず、紐づくスケジュールID(taskId)で絞り込む
      //   （所属プロジェクトは schedules.projectId 経由で辿るため重複保持しない）。
      { name: "comments", indexes: [
        { indexName: "by_taskId", keyPath: "taskId", unique: false },
      ] },

      // memos：メモ一覧はプロジェクトを切り替えると切り替わるため projectId で絞り込む。
      { name: "memos", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // quickmemos：即時メモはプロジェクト別のタイムラインのため projectId で絞り込む。
      { name: "quickmemos", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // snapshots：スナップショット一覧はプロジェクトごとに表示するため projectId で絞り込む。
      { name: "snapshots", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // changelog：変更履歴はプロジェクトごとに表示する（未選択時は projectId:"global"）ため
      //   projectId で絞り込む。
      { name: "changelog", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },
    ];

    // 【前提】storeDefinition は STORE_DEFINITIONS の1要素（name と indexes を持つ）であること。
    //   また、この関数は onupgradeneeded（アップグレード用トランザクション）内でのみ呼ぶこと。
    //   IndexedDBの仕様上、createObjectStore / createIndex はこのタイミングでしか実行できない。
    // 【処理】1ストア分の定義から、オブジェクトストアを作成し、そのストアに属する
    //   インデックスをすべて張る。
    // 【結果】db 上に storeDefinition.name のストアと、指定インデックスが作成されていることを保証する。
    function createStore(db, storeDefinition) {
      const objectStore = db.createObjectStore(storeDefinition.name, { keyPath: PRIMARY_KEY_PATH });
      for (const index of storeDefinition.indexes) {
        objectStore.createIndex(index.indexName, index.keyPath, { unique: index.unique });
      }
    }

    // 【前提】DATABASE_NAME / DATABASE_VERSION / STORE_DEFINITIONS が定義済みであること。
    // 【処理】IndexedDBを開き、必要ならスキーマ（ストア・インデックス）を作成する。
    //   indexedDB.open のイベントコールバックを Promise に橋渡しし、
    //   呼び出し側が async/await で扱えるようにする（CLAUDE.md：コールバック直書き禁止）。
    // 【結果】成功時：開いた IDBDatabase を resolve する。
    //         失敗時：発生したエラーを reject する（通知・リトライは呼び出し側の責務）。
    function openDB() {
      return new Promise((resolve, reject) => {
        const openRequest = indexedDB.open(DATABASE_NAME, DATABASE_VERSION);

        // 【処理】DBが存在しない、または既存バージョンが DATABASE_VERSION より古いときだけ呼ばれる。
        //   ここでスキーマを作成する（この中では他の非同期処理を待たない＝同期的に作成のみ行う）。
        // 【なぜ oldVersion で分岐するのか】将来バージョンを2,3と上げたとき、この下に
        //   `if (oldVersion < 2) { ... }` を追記するだけで、途中バージョンのユーザーのDBも
        //   順番に積み上げてアップグレードできる構造にするため。
        //   初版の今は「oldVersion < 1」（＝まっさらな新規作成）の分岐だけを持つ。
        openRequest.onupgradeneeded = (event) => {
          const db = event.target.result;
          const oldVersion = event.oldVersion;

          // バージョン1：全9ストアと全インデックスを作成する。
          if (oldVersion < 1) {
            for (const storeDefinition of STORE_DEFINITIONS) {
              createStore(db, storeDefinition);
            }
          }
        };

        // 【処理】DBが正常に開けたら、その IDBDatabase を返す。
        openRequest.onsuccess = (event) => {
          resolve(event.target.result);
        };

        // 【何が起きたら】DBを開けなかったとき（例：プライベートモードでIndexedDBが無効、
        //   ストレージ容量不足、ユーザーによる許可拒否など）に呼ばれる。
        // 【どう対応するか】ここではエラーを reject するだけに留める。ユーザーへの通知や
        //   リトライは呼び出し側（UI層）の責務とし、この関数は「開く」役割だけに絞る。
        openRequest.onerror = (event) => {
          reject(event.target.error);
        };

        // 【onblocked ハンドラを付けない理由】onblocked は「別タブが古いバージョンのDBを
        //   開いたままでアップグレードできない」ときに発生するが、初版はアップグレード自体が
        //   起きないため発生しない。将来バージョンを上げる際に、ここへハンドラを追加する。
      });
    }

    // ===== DB接続の共通処理 =====

    // 開いたDB接続をキャッシュする変数。操作のたびに openDB() すると接続コストがかかるため、
    // 初回だけ開いて以後は同じ接続を使い回す（初期値 null ＝まだ一度も開いていない）。
    let cachedDatabase = null;

    // 【前提】openDB() が9ストアを持つDBを開けること。
    // 【処理】初回呼び出し時だけ openDB() でDBを開いてキャッシュし、2回目以降は同じ接続を返す。
    // 【結果】開いている IDBDatabase を1つ返すことを保証する（毎回同じインスタンス）。
    async function getDB() {
      if (cachedDatabase === null) {
        cachedDatabase = await openDB();
      }
      return cachedDatabase;
    }

    // 【前提】request は store.put / getAll / delete / index.getAll 等が返した IDBRequest。
    //   transaction は、その request を発行したトランザクション（呼び出し側が保持しているものを渡す）。
    //   （indexedDB.open の要求には使わない。あちらは onupgradeneeded を挟むため openDB 側で個別に扱う）。
    // 【なぜ transaction を引数で受け取るのか】request.transaction から辿る手もあるが、
    //   index.getAll() が返す request では実装によって transaction が取れないことがある（可搬性リスク）。
    //   呼び出し側は必ず自分でトランザクションを作っているので、それを明示的に渡す方が確実で読みやすい。
    // 【処理】IndexedDBのイベントコールバックを Promise に橋渡しする。ここでの設計判断は
    //   「リクエスト成功(onsuccess)」ではなく「トランザクション完了(oncomplete)」で resolve する点。
    //   put/delete は onsuccess の時点ではまだコミット前で、コミット後に初めて保存が確定するため、
    //   commit を待ってから resolve することで「Promiseの解決＝保存済み」を保証する。
    //   取得系(getAll)も同じ仕組みでよく、結果値は onsuccess でいったん控えて oncomplete で返す。
    // 【結果】成功時：request.result を resolve。失敗時：発生したエラーを reject。
    function promisifyRequest(request, transaction) {
      return new Promise((resolve, reject) => {
        let requestResult;
        request.onsuccess = () => { requestResult = request.result; };
        // 【何が起きたら】リクエスト自体が失敗したとき（キー制約違反、値の型不正など）。
        // 【どう対応するか】エラーを reject し、通知やリトライは呼び出し側の責務とする。
        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => resolve(requestResult);
        // 【何が起きたら】トランザクションが中断(abort)されたとき（commitされず保存が無効になる）。
        // 【どう対応するか】保存が確定していないため、エラーを reject する。
        transaction.onabort = () => reject(transaction.error);
      });
    }

    // ===== projects ストアのCRUD =====

    // projects の操作対象ストア名。ストア名の打ち間違いを1箇所に閉じ込める
    // （STORE_DEFINITIONS 内の "projects" と同じ値を指す）。
    const STORE_PROJECTS = "projects";

    // 【前提】project は id を含む1件分のプロジェクトオブジェクト（id は呼び出し側で採番済み）。
    //   この関数では id 採番・入力バリデーションは行わない（1関数1責務。採番は別工程の共通関数の責務）。
    // 【処理】読み書きトランザクションで projects ストアに put する。
    //   put を使う理由：「同じidがあれば上書き、なければ新規」なので、将来のインポートや
    //   「戻す」機能でも同じ関数を再利用でき、追加と復元を1つの経路にまとめられるため。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addProject(project) {

    // ===== schedules ストアのCRUD =====

    const STORE_SCHEDULES = "schedules";

    //   （データモデル設計6章：バリデーションはフォーム送信層の責務。addProject と一貫させる）。
    // 【処理】読み書きトランザクションで schedules ストアに put する（upsert。理由は addProject と同じ）。

    // 【前提】projectId は絞り込みたいプロジェクトの id。

    // 【前提】parentId は「具体的な親スケジュールの id」であること。

    async function getChildSchedules(parentId) {

    // 【前提】scheduleId は削除したいスケジュールの id。

    //     （基本設計書 L155-157・L200 / シーケンス図集「3. 親スケジュール削除」）。
    //     これは schedules / comments / changelog にまたがるため、子孫idを先に集めてから書き込む
    //     上位操作として別に実装し、この関数はその部品として使う（データモデル設計6章：読み切ってから書く）。

    async function deleteSchedule(scheduleId) {

    // 【前提】なし（プロジェクトによる絞り込みを行わない）。
    // 【処理】schedules ストアの全件を取得する（H1データエクスポート専用。

    async function getAllSchedules() {

    // ===== tasks ストア（カンバン）のCRUD =====

    // tasks の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める

    //   addProject / addSchedule と同様、この関数は「渡された内容をそのままputする」役割に徹する）。

    // 【前提】なし（プロジェクトによる絞り込みを行わない）。
    // 【処理】tasks ストアの全件を取得する（H1データエクスポート専用。getAllSchedules と同じ理由）。
    // 【結果】タスクの配列を resolve する（0件なら空配列）。
    async function getAllTasks() {
      const db = await getDB();
      const transaction = db.transaction(STORE_TASKS, "readonly");
      const store = transaction.objectStore(STORE_TASKS);
      return promisifyRequest(store.getAll(), transaction);

    // ===== comments ストアのCRUD =====

    // comments の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の comments 定義と同じ値を指す）。
    const STORE_COMMENTS = "comments";
    const INDEX_COMMENTS_BY_TASK = "by_taskId";

    // 【前提】comment は id を含む1件分のコメントオブジェクト（id は呼び出し側で採番済み）。
    //   comments は projectId を持たない設計（taskId → schedules.projectId で辿るため。
    //   データモデル設計3.5節：正規化の観点で重複保持しない）。
    // 【処理】読み書きトランザクションで comments ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addComment(comment) {
      const db = await getDB();
      const transaction = db.transaction(STORE_COMMENTS, "readwrite");
      const store = transaction.objectStore(STORE_COMMENTS);
      return promisifyRequest(store.put(comment), transaction);
    }

    // 【前提】taskId は絞り込みたいスケジュールの id（schedules.id を指す）。
    // 【処理】by_taskId インデックスを使い、そのスケジュールに紐づくコメントを全て取得する。
    // 【結果】コメントの配列を resolve する（0件なら空配列）。
    //   ※「プロジェクト単位のコメント一覧」はこの関数だけでは作れない（comments はprojectIdを
    //     持たないため）。データモデル設計3.5節の方針どおり、呼び出し側が
    //     getSchedulesByProject でスケジュールID集合を先に取得し、その各IDについてこの関数を
    //     呼んで束ねる（複数ストアをまたぐ合成処理のため、この関数の責務には含めない）。
    async function getCommentsByTask(taskId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_COMMENTS, "readonly");
      const index = transaction.objectStore(STORE_COMMENTS).index(INDEX_COMMENTS_BY_TASK);
      return promisifyRequest(index.getAll(taskId), transaction);
    }

    // 【前提】commentId は削除したいコメントの id。
    // 【処理】comments ストアから該当1件“だけ”を削除する低レベル部品。
    //   ※スケジュール削除時にそのスケジュールへのコメントも連鎖削除する仕様（基本設計書L156）が
    //   あるが、それは deleteSchedule 側の複合削除操作からこの関数を呼ぶ形で後日実装する
    //   （データモデル設計6章：複数ストアにまたがる書き込みは読み切ってから行う方針）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteComment(commentId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_COMMENTS, "readwrite");
      const store = transaction.objectStore(STORE_COMMENTS);
      return promisifyRequest(store.delete(commentId), transaction);
    }

    // 【前提】なし（taskIdによる絞り込みを行わない）。
    // 【処理】comments ストアの全件を取得する（H1データエクスポート専用。comments は projectId を
    //   持たないため、プロジェクト単位で束ねる既存の合成処理は使えず、ストア全体を直接取得する）。
    // 【結果】コメントの配列を resolve する（0件なら空配列）。
    async function getAllComments() {

      const transaction = db.transaction(STORE_COMMENTS, "readonly");
      const store = transaction.objectStore(STORE_COMMENTS);
      return promisifyRequest(store.getAll(), transaction);
    }

    // ===== changelog ストア（変更履歴）のCRUD =====

    // changelog の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の changelog 定義と同じ値を指す）。
    const STORE_CHANGELOG = "changelog";
    const INDEX_CHANGELOG_BY_PROJECT = "by_projectId";

    // 【前提】entry は id を含む1件分の変更履歴オブジェクト（id は呼び出し側で採番済み）。
    //   action/store/changes/snapshot 等の組み立て（何がどう変わったかの判定）はここでは行わない
    //   （データモデル設計6章と同じ考え方：ログ内容の組み立ては、各CRUD操作を呼ぶ上位処理の責務。
    //   この関数は組み立て済みの entry をそのまま保存するだけの部品）。
    // 【処理】読み書きトランザクションで changelog ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addChangelogEntry(entry) {
      const db = await getDB();
      const transaction = db.transaction(STORE_CHANGELOG, "readwrite");
      const store = transaction.objectStore(STORE_CHANGELOG);
      return promisifyRequest(store.put(entry), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id（未選択時の操作は "global" という文字列）。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトの変更履歴を全て取得する
    //   （変更履歴パネルはプロジェクトごとに表示するため）。"global" も他のprojectIdと同じ扱いで、
    //   特別扱いの関数は用意しない。
    // 【結果】変更履歴の配列を resolve する（0件なら空配列）。
    async function getChangelogByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_CHANGELOG, "readonly");
      const index = transaction.objectStore(STORE_CHANGELOG).index(INDEX_CHANGELOG_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】projectId は削除対象を絞り込むプロジェクトの id。
    //   このアプリには変更履歴の「個別削除」機能はなく、「履歴の全削除」ボタンのみが存在する
    //   （詳細設計書3.6.3節`clearChangelog`）。そのためこの関数は1件削除ではなく、
    //   指定プロジェクトの変更履歴を丸ごと削除する仕様にする。
    // 【なぜ promisifyRequest を使わないのか】このヘルパーは「1トランザクションにつき
    //   transaction.oncomplete を1回だけ設定する」前提で作られている。複数件のdeleteをそのつど
    //   promisifyRequest に渡すと、同じトランザクションの oncomplete ハンドラを毎回上書きしてしまい、
    //   最後の1件以外は永久に resolve されなくなる。そのため、この関数だけは
    //   「1トランザクション・複数delete・oncompleteは1回だけ」を自分で組み立てる。
    // 【処理】1つの読み書きトランザクションの中で、対象プロジェクトの全キーを取得し、
    //   それぞれに delete を発行してから、トランザクション全体の完了を待つ。
    // 【結果】コミット完了後に resolve する（対象が0件でも正常に完了する）。
    function clearChangelogByProject(projectId) {
      return getDB().then((db) => {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_CHANGELOG, "readwrite");
          const store = transaction.objectStore(STORE_CHANGELOG);
          const index = store.index(INDEX_CHANGELOG_BY_PROJECT);
          const getKeysRequest = index.getAllKeys(projectId);

          getKeysRequest.onsuccess = () => {
            for (const key of getKeysRequest.result) {
              store.delete(key);
            }
          };
          getKeysRequest.onerror = () => reject(getKeysRequest.error);

          transaction.oncomplete = () => resolve();
          transaction.onabort = () => reject(transaction.error);
        });
      });
    }

    // ===== issues ストア（マインドマップ）のCRUD =====

    // issues の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める

    const STORE_ISSUES = "issues";
    const INDEX_ISSUES_BY_PROJECT = "by_projectId";

    // 【前提】issue は id を含む1件分のノードオブジェクト（id は呼び出し側で採番済み）。
    // 【処理】読み書きトランザクションで issues ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addIssue(issue) {
      const db = await getDB();
      const transaction = db.transaction(STORE_ISSUES, "readwrite");
      const store = transaction.objectStore(STORE_ISSUES);
      return promisifyRequest(store.put(issue), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトの全ノードを取得する
    //   （マインドマップパネルを開いたプロジェクトのノードのみ表示するため）。
    // 【結果】ノードの配列を resolve する（0件なら空配列）。親子どちらのノードも区別せず全件返す。
    //   ※「特定ノードの子だけ」が欲しい場合は、issues には parentNodeId のインデックスが無いため
    //     （データモデル設計3.4節）、この結果をアプリ層で parentNodeId 一致でフィルタする。
    async function getIssuesByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_ISSUES, "readonly");
      const index = transaction.objectStore(STORE_ISSUES).index(INDEX_ISSUES_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】issueId は削除したいノードの id。
    // 【処理】issues ストアから該当1件“だけ”を削除する低レベル部品。
    //   ※マインドマップのノード削除は、仕様上「対象ノード＋子孫ノードを再帰的に収集して削除」する
    //   （詳細設計書3.5.3節。deleteSchedule と同じ考え方）。子孫の収集・一括削除は
    //   この関数の責務に含めず、別工程の複合操作から呼び出す部品として使う。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteIssue(issueId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_ISSUES, "readwrite");
      const store = transaction.objectStore(STORE_ISSUES);
      return promisifyRequest(store.delete(issueId), transaction);
    }

    // 【前提】なし（プロジェクトによる絞り込みを行わない）。
    // 【処理】issues ストアの全件を取得する（H1データエクスポート専用。getAllSchedules と同じ理由）。
    // 【結果】ノードの配列を resolve する（0件なら空配列）。
    async function getAllIssues() {

    // ===== memos ストアのCRUD =====

    // memos の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の memos 定義と同じ値を指す）。
    const STORE_MEMOS = "memos";
    const INDEX_MEMOS_BY_PROJECT = "by_projectId";

    // 【前提】memo は id を含む1件分のメモオブジェクト（id は呼び出し側で採番済み）。
    //   createdAt/updatedAt の発行・更新はここでは行わない（他の add* 関数と同様、
    //   渡された内容をそのままputするだけ。日時の発行は自動保存処理側の責務）。
    // 【処理】読み書きトランザクションで memos ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addMemo(memo) {
      const db = await getDB();
      const transaction = db.transaction(STORE_MEMOS, "readwrite");
      const store = transaction.objectStore(STORE_MEMOS);
      return promisifyRequest(store.put(memo), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトのメモを全て取得する
    //   （メモパネルはプロジェクトごとに一覧を切り替えるため）。
    // 【結果】メモの配列を resolve する（0件なら空配列）。
    async function getMemosByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_MEMOS, "readonly");
      const index = transaction.objectStore(STORE_MEMOS).index(INDEX_MEMOS_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】memoId は削除したいメモの id。
    // 【処理】読み書きトランザクションで memos ストアから該当1件を削除する
    //   （詳細設計書3.7.2節：メモは個別削除の仕様。全削除機能は無い）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteMemo(memoId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_MEMOS, "readwrite");
      const store = transaction.objectStore(STORE_MEMOS);
      return promisifyRequest(store.delete(memoId), transaction);
    }

    // 【前提】なし（プロジェクトによる絞り込みを行わない）。
    // 【処理】memos ストアの全件を取得する（H1データエクスポート専用。getAllSchedules と同じ理由）。
    // 【結果】メモの配列を resolve する（0件なら空配列）。
    async function getAllMemos() {
      const db = await getDB();
      const transaction = db.transaction(STORE_MEMOS, "readonly");
      const store = transaction.objectStore(STORE_MEMOS);
      return promisifyRequest(store.getAll(), transaction);
    }

    // ===== quickmemos ストア（即時メモ）のCRUD =====

    // quickmemos の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の quickmemos 定義と同じ値を指す）。
    const STORE_QUICKMEMOS = "quickmemos";
    const INDEX_QUICKMEMOS_BY_PROJECT = "by_projectId";

    // 【前提】quickMemo は id を含む1件分の即時メモオブジェクト（id は呼び出し側で採番済み）。
    // 【処理】読み書きトランザクションで quickmemos ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addQuickMemo(quickMemo) {
      const db = await getDB();
      const transaction = db.transaction(STORE_QUICKMEMOS, "readwrite");
      const store = transaction.objectStore(STORE_QUICKMEMOS);
      return promisifyRequest(store.put(quickMemo), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトの即時メモを全て取得する
    //   （即時メモはプロジェクトごとの時系列タイムラインのため）。
    // 【結果】即時メモの配列を resolve する（0件なら空配列）。
    async function getQuickMemosByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_QUICKMEMOS, "readonly");
      const index = transaction.objectStore(STORE_QUICKMEMOS).index(INDEX_QUICKMEMOS_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】quickMemoId は削除したい即時メモの id。
    // 【処理】読み書きトランザクションで quickmemos ストアから該当1件を削除する
    //   （即時メモには個別削除・全削除の両方の機能がある。これは個別削除の方）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteQuickMemo(quickMemoId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_QUICKMEMOS, "readwrite");
      const store = transaction.objectStore(STORE_QUICKMEMOS);
      return promisifyRequest(store.delete(quickMemoId), transaction);
    }

    // 【前提】projectId は削除対象を絞り込むプロジェクトの id。
    //   即時メモには個別削除（deleteQuickMemo）に加えて全削除の機能もある
    //   （詳細設計書3.8.2節`clearQuickMemos`）。この関数はその全削除の方。
    // 【なぜ promisifyRequest を使わないのか】clearChangelogByProject と同じ理由：
    //   1トランザクション内で複数件のdeleteを発行するため、transaction.oncomplete の
    //   多重代入を避けるには、このヘルパーを流用せず専用のPromiseを組む必要がある。
    // 【処理】1つの読み書きトランザクションの中で、対象プロジェクトの全キーを取得し、
    //   それぞれに delete を発行してから、トランザクション全体の完了を待つ。
    // 【結果】コミット完了後に resolve する（対象が0件でも正常に完了する）。
    function clearQuickMemosByProject(projectId) {
      return getDB().then((db) => {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_QUICKMEMOS, "readwrite");
          const store = transaction.objectStore(STORE_QUICKMEMOS);
          const index = store.index(INDEX_QUICKMEMOS_BY_PROJECT);
          const getKeysRequest = index.getAllKeys(projectId);

          getKeysRequest.onsuccess = () => {
            for (const key of getKeysRequest.result) {
              store.delete(key);
            }
          };
          getKeysRequest.onerror = () => reject(getKeysRequest.error);

          transaction.oncomplete = () => resolve();
          transaction.onabort = () => reject(transaction.error);
        });
      });
    }

    // 【前提】なし（プロジェクトによる絞り込みを行わない）。
    // 【処理】quickmemos ストアの全件を取得する（H1データエクスポート専用。getAllSchedules と同じ理由）。
    // 【結果】即時メモの配列を resolve する（0件なら空配列）。
    async function getAllQuickMemos() {
      const db = await getDB();
      const transaction = db.transaction(STORE_QUICKMEMOS, "readonly");
      const store = transaction.objectStore(STORE_QUICKMEMOS);
      return promisifyRequest(store.getAll(), transaction);
    }

    // ===== snapshots ストアのCRUD =====

    // snapshots の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の snapshots 定義と同じ値を指す）。
    const STORE_SNAPSHOTS = "snapshots";
    const INDEX_SNAPSHOTS_BY_PROJECT = "by_projectId";

    // 【前提】snapshot は id を含む1件分のスナップショットオブジェクト（id は呼び出し側で採番済み）。
    //   data フィールド（{project, schedules}）はネストしたオブジェクトだが、IndexedDBの
    //   構造化複製アルゴリズムでそのまま保存できるため、ここでは特別な変換をせず丸ごとputする。
    // 【処理】読み書きトランザクションで snapshots ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addSnapshot(snapshot) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SNAPSHOTS, "readwrite");
      const store = transaction.objectStore(STORE_SNAPSHOTS);
      return promisifyRequest(store.put(snapshot), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトのスナップショットを全て取得する
    //   （スナップショット一覧はプロジェクトごとに表示するため）。
    // 【結果】スナップショットの配列を resolve する（0件なら空配列）。
    async function getSnapshotsByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SNAPSHOTS, "readonly");
      const index = transaction.objectStore(STORE_SNAPSHOTS).index(INDEX_SNAPSHOTS_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】snapshotId は削除したいスナップショットの id。
    // 【処理】読み書きトランザクションで snapshots ストアから該当1件を削除する
    //   （詳細設計書3.8.3節：スナップショットは個別削除の仕様）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    //   ※「復元」機能（現在のスケジュールを全削除→書き戻し）はここでは扱わない。
    //   変更履歴に記録しない低レベルAPIを使う特殊な複合操作のため、別工程で実装する（3.6.1節）。
    async function deleteSnapshot(snapshotId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SNAPSHOTS, "readwrite");
      const store = transaction.objectStore(STORE_SNAPSHOTS);
      return promisifyRequest(store.delete(snapshotId), transaction);
    }

    // 【前提】なし（プロジェクトによる絞り込みを行わない）。
    // 【処理】snapshots ストアの全件を取得する（H1データエクスポート専用。getAllSchedules と同じ理由）。
    // 【結果】スナップショットの配列を resolve する（0件なら空配列）。
    async function getAllSnapshots() {
      const db = await getDB();
      const transaction = db.transaction(STORE_SNAPSHOTS, "readonly");
      const store = transaction.objectStore(STORE_SNAPSHOTS);
      return promisifyRequest(store.getAll(), transaction);
    }

    // ===== 複合操作（複数ストアにまたがる処理）の共通ユーティリティ =====

    // 【前提】呼び出し元は新規レコードのidをまだ持っていないこと。
    // 【処理】タイムスタンプ＋ランダム文字列でidを生成する（データモデル設計1章の方針：
    //   autoIncrementは同一DB内でしか一意性を保証しないため、JSONインポート等で他環境発行の
    //   idと衝突しないよう、アプリ側で一意な文字列idを発行する）。
    //   これまでの各CRUD関数（addProject等）はid採番済みのオブジェクトを受け取る前提にして
    //   いたため、複合操作（連鎖削除のログ記録等）で新規レコードを作る段になって
    //   初めてid発行そのものが必要になった。そのため、ここでこの関数を追加する。
    // 【結果】十分に一意な文字列idを返す。
    function generateId() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
    }

    // 変更履歴（changelog）に記録する対象ストア（データモデル設計6章・基本設計書8.1節）。
    // 連鎖削除（deleteScheduleCascade/deleteIssueCascade/deleteProjectCascade）・
    // 追加/変更の自動記録（recordChangelogEntry）の両方が、この定数を根拠に
    // 「このストアの操作はログに残すべきか」を判断する。
    const LOGGED_STORES = ["projects", "schedules", "tasks", "issues"];

    // 【前提】beforeObject は変更前のオブジェクト（新規作成時はnull）。afterObjectは保存後の
    //   オブジェクト。fieldLabelsByKeyは{フィールド名: 表示ラベル}のマップで、比較対象を
    //   明示的に絞り込む（idや並び順など、値が変わっても「ユーザーへの変更履歴」としては
    //   意味を持たないフィールドを比較対象に含めないため）。
    // 【処理】fieldLabelsByKeyに列挙された各フィールドについて、beforeとafterの値を比較し、
    //   異なるものだけを集める。
    // 【結果】[{field, label, before, after}] の配列を返す（1件も変わっていなければ空配列）。
    function diffFields(beforeObject, afterObject, fieldLabelsByKey) {
      const changes = [];
      for (const [field, label] of Object.entries(fieldLabelsByKey)) {
        const beforeValue = beforeObject ? beforeObject[field] : undefined;
        const afterValue = afterObject[field];
        if (beforeValue !== afterValue) {
          changes.push({ field, label, before: beforeValue ?? null, after: afterValue ?? null });
        }
      }
      return changes;
    }

    // 【前提】action は "add" | "edit"。projectIdは対象が属するプロジェクトのid
    //   （store="projects"の場合はプロジェクト自身のid）。beforeItemは"edit"時のみ変更前の
    //   オブジェクト（"add"時はnull）。afterItemは保存後のオブジェクト。fieldLabelsByKeyは
    //   diffFieldsに渡す比較対象フィールドの一覧。
    // 【処理】"add"はchanges:[]で無条件に1件記録する（基本設計書8.1節：追加ログに戻すボタンは
    //   無いため差分は不要）。"edit"はdiffFieldsで実際に変わったフィールドを集め、1件も
    //   変わっていなければ記録しない（保存ボタンを押しただけで内容が同じ場合に、意味のない
    //   変更履歴が積み上がるのを防ぐ）。
    // 【結果】記録した場合はtrueを、"edit"で変更が無く記録しなかった場合はfalseを返す。
    async function recordChangelogEntry(action, projectId, store, storeLabel, itemId, itemName, beforeItem, afterItem, fieldLabelsByKey) {
      const changes = action === "edit" ? diffFields(beforeItem, afterItem, fieldLabelsByKey) : [];
      if (action === "edit" && changes.length === 0) return false;
      await addChangelogEntry({
        id: generateId(),
        projectId,
        action,
        store,
        storeLabel,
        itemId,
        itemName,
        changes,
        snapshot: afterItem,
        createdAt: new Date().toISOString(),
      });
      return true;
    }

    // 【前提】scheduleId は取得したいスケジュールの id。
    // 【処理】主キー(id)で1件を直接取得する（絞り込みではなく1件特定のため、インデックス不要）。
    //   schedules の既存CRUDには「idで1件取得」が無かったが、連鎖削除・日付再計算の複合操作で
    //   「特定のスケジュール1件の最新状態」を読む必要があるため、ここで追加する。
    // 【結果】見つかった場合はそのオブジェクトを、存在しない場合は undefined を resolve する。
    async function getScheduleById(scheduleId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SCHEDULES, "readonly");
      const store = transaction.objectStore(STORE_SCHEDULES);
      return promisifyRequest(store.get(scheduleId), transaction);
    }

    // 【設計判断：祖先日付の再計算をなぜ独立した関数にするか】
    //   基本設計書4.3節「子の開始日・終了日を変更すると、親の日付は全子の最早開始日〜最遅終了日に
    //   自動更新され、上位階層へも再帰的に伝播する」は、連鎖削除に限らず、将来スケジュールの
    //   日付編集機能（バーのドラッグ等）でも同じ処理が必要になる（詳細設計書3.2.3節
    //   syncParentDates/syncAncestorDates相当）。そのため削除処理に埋め込まず、
    //   「対象1件の日付を、その子に合わせて再計算し、必要なら親へ伝播する」という
    //   単独の責務を持つ関数として切り出す。
    //
    // 【前提】scheduleId は日付を再計算したい対象の id（削除された行の「元の親」から呼び出す想定）。
    // 【処理】対象の直下の子（by_parentIdインデックス）を取得し、日付を持つ子だけを対象に
    //   「最早開始日〜最遅終了日」を計算して対象自身に保存する。
    //   ※基本設計書4.3節「子を全て削除した場合、親の日付は再計算・リセットされない」の仕様どおり、
    //   日付を持つ子が1件も残っていない場合は何もしない（対象の日付をそのまま残す）。
    //   更新できた場合は、対象の親についても同じ処理を再帰的に行い、祖先全体へ伝播させる。
    // 【結果】更新が完了した時点で resolve する（戻り値なし）。
    async function syncAncestorDates(scheduleId) {
      const schedule = await getScheduleById(scheduleId);
      if (!schedule) return;

      const children = await getChildSchedules(scheduleId);
      const childrenWithDates = children.filter((child) => child.startDate && child.endDate);
      if (childrenWithDates.length === 0) {
        return;
      }

      const startDates = childrenWithDates.map((child) => child.startDate).sort();
      const endDates = childrenWithDates.map((child) => child.endDate).sort();
      const earliestStartDate = startDates[0];
      const latestEndDate = endDates[endDates.length - 1];
      await addSchedule({ ...schedule, startDate: earliestStartDate, endDate: latestEndDate });

      if (schedule.parentId !== null && schedule.parentId !== undefined) {
        await syncAncestorDates(schedule.parentId);
      }
    }

    // 【設計判断：スケジュールの連鎖削除】
    //   基本設計書L155-157・L200、シーケンス図集「3. 親スケジュール削除」の仕様どおり、
    //   1つの複合操作として次の3段階で実装する。
    //   1. 読み切り：getSchedulesByProjectでプロジェクト内の全件を1回だけ読み、
    //      アプリ層のツリー走査で「起点＋全子孫」のidを集める
    //      （データモデル設計6章：複数ストアにまたがる書き込みは、先に読み切ってから行う）。
    //   2. 書き込み：集めた各idについて、紐づくコメントを削除→スケジュール自体を削除→
    //      個別に削除ログ(changelog)を記録する（親・子・孫それぞれ個別にログが残る仕様＝L200）。
    //   3. 起点スケジュールの「元の親」がまだ存在するなら、syncAncestorDatesで日付を再計算する。
    //
    // 【前提】scheduleId は削除起点のスケジュール id。projectId は所属プロジェクトの id
    //   （呼び出し側は現在開いているプロジェクトを把握しているため受け取る）。
    // 【処理】上記の3段階を実行する。
    // 【結果】実際に削除されたスケジュールidの配列を resolve する（対象が存在しなければ空配列）。
    async function deleteScheduleCascade(scheduleId, projectId) {
      const allSchedules = await getSchedulesByProject(projectId);
      const scheduleById = new Map(allSchedules.map((schedule) => [schedule.id, schedule]));
      const targetSchedule = scheduleById.get(scheduleId);
      if (!targetSchedule) {
        return [];
      }

      const childSchedulesByParentId = new Map();
      for (const schedule of allSchedules) {
        if (schedule.parentId === null || schedule.parentId === undefined) continue;
        if (!childSchedulesByParentId.has(schedule.parentId)) {
          childSchedulesByParentId.set(schedule.parentId, []);
        }
        childSchedulesByParentId.get(schedule.parentId).push(schedule);
      }

      const idsToDelete = [];
      let frontier = [targetSchedule];
      while (frontier.length > 0) {
        const nextFrontier = [];
        for (const node of frontier) {
          idsToDelete.push(node.id);
          nextFrontier.push(...(childSchedulesByParentId.get(node.id) || []));
        }
        frontier = nextFrontier;
      }

      for (const id of idsToDelete) {
        const schedule = scheduleById.get(id);
        const comments = await getCommentsByTask(id);
        for (const comment of comments) {
          await deleteComment(comment.id);
        }
        await deleteSchedule(id);
        await addChangelogEntry({
          id: generateId(),
          projectId: schedule.projectId,
          action: "delete",
          store: "schedules",
          storeLabel: "スケジュール",
          itemId: schedule.id,
          itemName: schedule.name,
          changes: [],
          snapshot: schedule,
          createdAt: new Date().toISOString(),
        });
      }

      const originalParentId = targetSchedule.parentId;
      if (originalParentId !== null && originalParentId !== undefined) {
        await syncAncestorDates(originalParentId);
      }

      return idsToDelete;
    }

    // 【設計判断：マインドマップノードの連鎖削除】
    //   詳細設計書3.5.3節の仕様どおり、対象ノード＋子孫ノードを収集して削除する。
    //   deleteScheduleCascade と同じ考え方だが、issues には次の3点の違いがある：
    //   ・comments のような紐づく別ストアが無い（削除するのはissues自体のみ）
    //   ・日付の概念が無いため、祖先の再計算（syncAncestorDates相当）は不要
    //   ・parentNodeId にインデックスが無いため、子孫収集は getIssuesByProject の結果を
    //     アプリ層でツリー走査する（issues側のCRUD設計方針と同じ理由）
    //   なお issues は LOGGED_STORES に含まれるため、schedules と同様に個別の削除ログを残す。
    //   子孫id収集はcollectIssueSubtreeIds（折りたたみ機能と共通）に委譲し、ここで
    //   ツリー走査ロジックを重複させない。
    //
    // 【前提】issueId は削除起点のノード id。projectId は所属プロジェクトの id。
    // 【処理】起点＋全子孫ノードを収集し、それぞれ削除・削除ログ記録を行う。
    // 【結果】実際に削除されたノードidの配列を resolve する（対象が存在しなければ空配列）。
    async function deleteIssueCascade(issueId, projectId) {
      const allIssues = await getIssuesByProject(projectId);
      const issueById = new Map(allIssues.map((issue) => [issue.id, issue]));
      if (!issueById.has(issueId)) {
        return [];
      }

      const idsToDelete = collectIssueSubtreeIds(allIssues, issueId);

      for (const id of idsToDelete) {
        const issue = issueById.get(id);
        await deleteIssue(id);
        await addChangelogEntry({
          id: generateId(),
          projectId: issue.projectId,
          action: "delete",
          store: "issues",
          storeLabel: "マインドマップノード",
          itemId: issue.id,
          itemName: issue.title,
          changes: [],
          snapshot: issue,
          createdAt: new Date().toISOString(),
        });
      }

      return idsToDelete;
    }

    // ===== H1：データ出力（JSONエクスポート） =====
    // 【設計判断】対象は基本設計書9.1に明記された全8ストア（projects/schedules/tasks/issues/
    //   comments/memos/quickmemos/snapshots）。changelog（変更履歴）はこの一覧に含まれないため
    //   対象外とする。crud-implementation.mdの1関数1処理の方針により、
    //   「全ストアを読み切る」「ファイル名を組み立てる」「ダウンロードを実行する」を
    //   別関数に分け、ボタンのクリックハンドラがこの3つを順に呼ぶだけの構成にする。

    // 【前提】なし。
    // 【処理】8ストアそれぞれの全件取得関数（getAllXxx）を並行に呼び、1つのオブジェクトにまとめる。
    //   各getAllXxxは自分専用のトランザクションを持つ独立した読み取りのため、Promise.allで
    //   並行に走らせても「1つのトランザクション内で他の非同期処理を待つ」ことにはならない
    //   （switchToProjectの3パネル同時更新と同じ考え方）。
    // 【結果】{projects, schedules, tasks, issues, comments, memos, quickmemos, snapshots} を resolve する。
    async function collectAllStoresDataForExport() {
      const [projects, schedules, tasks, issues, comments, memos, quickmemos, snapshots] = await Promise.all([
        getAllProjects(),
        getAllSchedules(),
        getAllTasks(),
        getAllIssues(),
        getAllComments(),
        getAllMemos(),
        getAllQuickMemos(),
        getAllSnapshots(),
      ]);
      return { projects, schedules, tasks, issues, comments, memos, quickmemos, snapshots };
    }

    // 【前提】date はファイル名の日付部分に使うDateオブジェクト。
    // 【処理】YYYYMMDD形式（区切り無し）でエクスポートファイル名を組み立てる
    //   （基本設計書9.1：`GanttForge_backup_{YYYYMMDD}.json`）。
    // 【結果】組み立てたファイル名の文字列を返す。
    function buildExportBackupFileName(date) {
      const compactDateString = date.toISOString().slice(0, 10).replaceAll("-", "");
      return `GanttForge_backup_${compactDateString}.json`;
    }

    // 【前提】fileName はダウンロードさせたいファイル名。dataObject はJSONへ変換可能なオブジェクト。
    // 【処理】dataObjectをJSON文字列化してBlob化し、一時的な<a>要素を使ってブラウザにダウンロードさせる。
    //   Blob URLはダウンロードの合図（click）を出した直後にはもう不要になるため、
    //   revokeObjectURLでメモリ上のURLマッピングを解放する。
    // 【結果】ブラウザのダウンロードが実行される（戻り値なし）。
    function downloadObjectAsJsonFile(fileName, dataObject) {
      const jsonBlob = new Blob([JSON.stringify(dataObject, null, 2)], { type: "application/json" });
      const downloadUrl = URL.createObjectURL(jsonBlob);
      const downloadLinkElement = document.createElement("a");
      downloadLinkElement.href = downloadUrl;
      downloadLinkElement.download = fileName;
      downloadLinkElement.click();
      URL.revokeObjectURL(downloadUrl);
    }

    // 【前提】なし。
    // 【処理】全8ストアを読み切り、ファイル名を組み立ててJSONファイルとしてダウンロードする
    //   （基本設計書9.1／詳細設計書3.9.1 exportData相当）。
    // 【結果】ダウンロード実行後、トースト「データをエクスポートしました」を表示する。
    async function handleExportDataButtonClick() {
      const allStoresData = await collectAllStoresDataForExport();
      const fileName = buildExportBackupFileName(new Date());
      downloadObjectAsJsonFile(fileName, allStoresData);
      showToast("データをエクスポートしました");
    }

    // ===== H2：データ取込（JSONインポート＋差分適用） =====
    // 【設計判断】質問リスト_未確認事項.md Q1〜Q3の決定に従う：
    //   ・比較・適用対象はH1と同じ全8ストア（changelogは対象外）。
    //   ・変更履歴（changelog）への記録は既存のLOGGED_STORES（projects/schedules/tasks/issues）
    //     のみに限定し、comments/memos/quickmemos/snapshotsは記録しない（Q1）。
    //   ・タスク管理の「変更」ログの差分フィールドはTASK_LOGGED_FIELD_LABELS（Q2）。
    //   ・削除候補はプロジェクトによる絞り込みを行わず、DB全体で比較する（Q3）。
    //   ストアごとの分岐をgetBackupStoreDefinitions()の1箇所に集約し、H1のgetAllと揃えることで
    //   「片方のストアだけ増やし忘れる」事故を防ぐ。この関数を宣言時ではなく呼び出し時に
    //   評価するのは、PROJECT_LOGGED_FIELD_LABELS等（後方のモーダル節で定義）を参照するため
    //   （constは宣言前に参照できないが、関数本体の評価は呼び出し時まで遅延されるため問題ない）。

    // 【前提】なし。
    // 【処理】H1（エクスポート）・H2（インポート）で共通して使う「ストアの取扱い定義」を返す。
    // 【結果】8ストア分の { key, label, getAll, put, del, nameField, logged, fieldLabels } の配列を返す。
    function getBackupStoreDefinitions() {
      return [
        { key: "projects", label: "プロジェクト", getAll: getAllProjects, put: addProject, del: deleteProject, nameField: "name", logged: true, fieldLabels: PROJECT_LOGGED_FIELD_LABELS },
        { key: "schedules", label: "スケジュール", getAll: getAllSchedules, put: addSchedule, del: deleteSchedule, nameField: "name", logged: true, fieldLabels: SCHEDULE_LOGGED_FIELD_LABELS },
        { key: "tasks", label: "タスク", getAll: getAllTasks, put: addTask, del: deleteTask, nameField: "title", logged: true, fieldLabels: TASK_LOGGED_FIELD_LABELS },
        { key: "issues", label: "マインドマップノード", getAll: getAllIssues, put: addIssue, del: deleteIssue, nameField: "title", logged: true, fieldLabels: ISSUE_LOGGED_FIELD_LABELS },
        { key: "comments", label: "コメント", getAll: getAllComments, put: addComment, del: deleteComment, nameField: "text", logged: false, fieldLabels: {} },
        { key: "memos", label: "メモ", getAll: getAllMemos, put: addMemo, del: deleteMemo, nameField: "title", logged: false, fieldLabels: {} },
        { key: "quickmemos", label: "即時メモ", getAll: getAllQuickMemos, put: addQuickMemo, del: deleteQuickMemo, nameField: "text", logged: false, fieldLabels: {} },
        { key: "snapshots", label: "スナップショット", getAll: getAllSnapshots, put: addSnapshot, del: deleteSnapshot, nameField: "name", logged: false, fieldLabels: {} },
      ];
    }

    // 【前提】parsedData はJSON.parseの結果（型不明の値である可能性がある）。
    // 【処理】基本設計書9.2の検証：projects・schedulesキーの両方を配列として持つかどうかを判定する。
    // 【結果】有効な形をしていればtrue、そうでなければfalseを返す。
    function isValidImportedBackupShape(parsedData) {
      if (!parsedData || typeof parsedData !== "object") return false;
      return Array.isArray(parsedData.projects) && Array.isArray(parsedData.schedules);
    }

    // 【前提】currentRecords・importedRecordsはどちらも id を持つオブジェクトの配列
    //   （同じストアの、現在のDB内容と取込ファイル内の内容）。
    // 【処理】idをキーに3種類へ分類する：
    //   ・add：importedRecordsにあるが currentRecords に無いid
    //   ・del：currentRecordsにあるが importedRecords に無いid（Q3：プロジェクトによる絞り込み無し）
    //   ・mod：両方にあり、内容（JSON文字列化して比較）が異なるid
    //   内容が完全一致するもの（取り込んでも変化が無いもの）はどの分類にも含めない。
    // 【結果】{ add: [record...], mod: [{before, after}...], del: [record...] } を返す。
    function computeStoreDiff(currentRecords, importedRecords) {
      const currentById = new Map(currentRecords.map((record) => [record.id, record]));
      const importedById = new Map(importedRecords.map((record) => [record.id, record]));

      const add = [];
      const mod = [];
      for (const [id, importedRecord] of importedById) {
        const currentRecord = currentById.get(id);
        if (!currentRecord) {
          add.push(importedRecord);
        } else if (JSON.stringify(currentRecord) !== JSON.stringify(importedRecord)) {
          mod.push({ before: currentRecord, after: importedRecord });
        }
      }

      const del = [];
      for (const [id, currentRecord] of currentById) {
        if (!importedById.has(id)) {
          del.push(currentRecord);
        }
      }

      return { add, mod, del };
    }

    // 【前提】importedAllStoresData はisValidImportedBackupShapeで検証済みの取込データ
    //   （H1エクスポートと同じ形＝8ストア分の配列を持つオブジェクト）。
    // 【処理】getBackupStoreDefinitionsの各ストアについて、現在のDB内容（definition.getAll()）と
    //   取込データをcomputeStoreDiffで比較する。1件も差分が無いストアは結果から除く
    //   （差分比較モーダルに空のグループを表示しないため）。
    // 【結果】[{ key, label, nameField, add, mod, del }, ...]（差分のあるストアのみ）を返す。
    async function buildImportDiff(importedAllStoresData) {
      const diffByStore = [];
      for (const definition of getBackupStoreDefinitions()) {
        const currentRecords = await definition.getAll();
        const importedRecords = importedAllStoresData[definition.key] || [];
        const diff = computeStoreDiff(currentRecords, importedRecords);
        if (diff.add.length > 0 || diff.mod.length > 0 || diff.del.length > 0) {
          diffByStore.push({ key: definition.key, label: definition.label, nameField: definition.nameField, ...diff });
        }
      }
      return diffByStore;
    }

    // 【前提】storeKey/action/itemIdはどのレコードかを特定する識別子（action は "add"|"mod"|"del"）。
    //   displayNameHtmlは表示用に組み立て済みの（エスケープ済み）HTML文字列。
    // 【処理】1件分のチェックボックス付き行のHTML文字列を組み立てる
    //   （モーダル・ダイアログ一覧M9：各項目チェックボックス。既定はチェック済み＝全選択状態）。
    // 【結果】<label>要素のHTML文字列を返す。
    function renderImportDiffItemToHtml(storeKey, action, itemId, displayNameHtml) {
      const actionBadgeLabels = { add: "追加", mod: "変更", del: "削除" };
      const actionBadgeClasses = { add: "is-add", mod: "is-edit", del: "is-delete" };
      return `<label class="import-diff-item">
        <input type="checkbox" class="import-diff-checkbox" data-store-key="${storeKey}" data-action="${action}" data-item-id="${escapeHtmlText(String(itemId))}" checked>
        <span class="changelog-action-badge ${actionBadgeClasses[action]}">${actionBadgeLabels[action]}</span>
        ${displayNameHtml}
      </label>`;
    }

    // 【前提】diffByStoreはbuildImportDiffの戻り値。
    // 【処理】ストアごとに見出し（件数の内訳）と、add/mod/delそれぞれのチェックボックス付き一覧を
    //   組み立てる（モーダル・ダイアログ一覧M9：ストアごとにグループ化した変更・削除候補一覧、
    //   全選択チェックボックス）。modの表示名は、名前フィールドが変わっていれば
    //   「旧名前 → 新名前」、変わっていなければ新しい方の名前をそのまま表示する。
    //   差分が1件も無い場合は、その旨を案内するだけのモーダルにする（基本設計書9.2は
    //   差分が有る前提の記述のため、0件時の表示は本関数内で決める運用上の配慮）。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    function renderImportDiffModalToHtml(diffByStore) {
      if (diffByStore.length === 0) {
        return `<h2>データ取込－差分比較</h2>
          <p class="empty-state-message">現在のデータと取込ファイルの間に差分はありません。</p>
          <div class="modal-actions">
            <button type="button" class="modal-button-secondary" id="importDiffCancelButton">閉じる</button>
          </div>`;
      }

      const storeGroupsHtml = diffByStore
        .map((storeDiff) => {
          const addItemsHtml = storeDiff.add
            .map((record) => renderImportDiffItemToHtml(storeDiff.key, "add", record.id, escapeHtmlText(String(record[storeDiff.nameField] ?? ""))))
            .join("");
          const modItemsHtml = storeDiff.mod
            .map(({ before, after }) => {
              const beforeName = before[storeDiff.nameField];
              const afterName = after[storeDiff.nameField];
              const displayNameHtml = beforeName !== afterName
                ? `${escapeHtmlText(String(beforeName ?? ""))} → ${escapeHtmlText(String(afterName ?? ""))}`
                : escapeHtmlText(String(afterName ?? ""));
              return renderImportDiffItemToHtml(storeDiff.key, "mod", after.id, displayNameHtml);
            })
            .join("");
          const delItemsHtml = storeDiff.del
            .map((record) => renderImportDiffItemToHtml(storeDiff.key, "del", record.id, escapeHtmlText(String(record[storeDiff.nameField] ?? ""))))
            .join("");
          return `<div class="import-diff-store-group">
            <h3>${escapeHtmlText(storeDiff.label)}（追加${storeDiff.add.length}・変更${storeDiff.mod.length}・削除${storeDiff.del.length}）</h3>
            ${addItemsHtml}${modItemsHtml}${delItemsHtml}
          </div>`;
        })
        .join("");

      return `<h2>データ取込－差分比較</h2>
        <div class="modal-field">
          <label><input type="checkbox" id="importDiffSelectAllCheckbox" checked> 全選択</label>
        </div>
        <div class="import-diff-list">${storeGroupsHtml}</div>
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="importDiffCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="importDiffApplyButton">選択した変更を適用</button>
        </div>`;
    }

    // 【前提】diffByStoreはbuildImportDiffの戻り値。
    // 【処理】差分比較モーダルを開き、全選択チェックボックス・キャンセル・適用ボタンにイベントを登録する。
    // 【結果】モーダルが操作可能な状態で表示される。
    function openImportDiffModal(diffByStore) {
      openModal(renderImportDiffModalToHtml(diffByStore));

      const cancelButton = document.getElementById("importDiffCancelButton");
      cancelButton.addEventListener("click", closeModal);

      const selectAllCheckbox = document.getElementById("importDiffSelectAllCheckbox");
      if (selectAllCheckbox) {
