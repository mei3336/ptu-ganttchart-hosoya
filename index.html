      return { level1Groups, level2Groups };
    }

    // 【前提】timelineDays は buildGanttTimelineDays の戻り値。granularity は表示粒度。
    // 【処理】buildGanttTimelineHeaderGroupsで1段目・2段目の見出しグループを求め、
    //   それぞれをHTML文字列化する（UIデザイン仕様書1.3節：タイムラインヘッダー高さ82px＝
    //   1段目40px＋2段目42px相当として配分）。土日の色分けは「日」表示のときのみ意味を持つ。
    // 【結果】gantt-timeline-headerのHTML文字列を返す。
    function renderGanttTimelineHeaderToHtml(timelineDays, pixelsPerDay, granularity) {
      const { level1Groups, level2Groups } = buildGanttTimelineHeaderGroups(timelineDays, granularity);

      const level1Html = level1Groups
        .map(
          (group) =>
            `<div class="gantt-month-label" style="left:${group.startIndex * pixelsPerDay}px;width:${group.dayCount * pixelsPerDay}px">${escapeHtmlText(group.label)}</div>`
        )
        .join("");

      const level2Html = level2Groups
        .map((group) => {
          const firstDay = timelineDays[group.startIndex];
          const weekendClass = granularity === "day" ? (firstDay.isSaturday ? " is-saturday" : firstDay.isSunday ? " is-sunday" : "") : "";
          return `<div class="gantt-day-column-header${weekendClass}" style="left:${group.startIndex * pixelsPerDay}px;width:${group.dayCount * pixelsPerDay}px">${escapeHtmlText(group.label)}</div>`;
        })
        .join("");

      const totalWidthPx = timelineDays.length * pixelsPerDay;
      return `<div class="gantt-timeline-header" style="width:${totalWidthPx}px">${level1Html}${level2Html}</div>`;
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値。timelineDays は
    //   buildGanttTimelineDays の戻り値。milestones は project.milestones。todayDateString は
    //   基準日（"YYYY-MM-DD"）。呼び出し元がnew Date()から求めて渡す（純粋関数として保つため）。
    // 【処理】列の背景（「日」表示は土日の色分け、それ以外の粒度は縞模様）、行の背景、バー
    //   （親行は太め・中央配置、葉行は細め・行の65%位置、完了ステータスは半透明）、
    //   マイルストーンの縦線＋ひし形マーカー、今日を示す縦のハイライト線をすべて絶対配置の
    //   divとして組み立てる（UIデザイン仕様書3章の視覚仕様に準拠）。
    // 【設計判断：スケジュール0件でも列は必ずプロジェクト全期間ぶん描画する】
    //   以前は「0件なら本体を描画せずメッセージのみ」としていたため、列（背景の縞模様）自体が
    //   全く生成されない不具合があった。列の生成（periodColumnsHtml）と行の生成
    //   （rowBackgroundsHtml・barsHtml、0件なら単に空文字列になるだけ）を分離し、
    //   0件時は「空状態メッセージを上に重ねて表示するが、列は最後まで描画されている」形にする。
    // 【設計判断：グリッド背景（列の色帯）・マイルストーン線・今日マーカーの高さを
    //   実データ行数に縛られないようにする】
    //   これら3種類の縦の要素は、CSS側で`top:0;bottom:0`にして「親要素(.gantt-body)の
    //   実際の高さいっぱいに伸びる」設計にする（pxで高さを指定しない）。.gantt-body自体の
    //   高さを「実データ行数ぶん」と「画面の表示領域の高さ」のどちらか大きい方にすれば
    //   （後述のtotalHeightPx／CSS変数--gantt-body-min-heightのmax()）、この3種類は
    //   自動的にその高さまで届く。逆に、以前のようにこれらの要素へ個別にpx単位の高さを
    //   指定してしまうと、指定した値がCSSのtop/bottom挙動より優先されてしまい、
    //   実データ行数分の高さで頭打ちになる（今回の不具合の原因）。
    // 【結果】gantt-bodyのHTML文字列を返す。
    function renderGanttBodyToHtml(scheduleTreeRows, timelineDays, pixelsPerDay, milestones, timelineStartDateString, granularity, todayDateString) {
      const totalWidthPx = timelineDays.length * pixelsPerDay;
      const totalHeightPx = Math.max(scheduleTreeRows.length * GANTT_ROW_HEIGHT_PX, GANTT_ROW_HEIGHT_PX);

      const rowBackgroundsHtml = scheduleTreeRows
        .map((_, rowIndex) => {
          const evenClass = rowIndex % 2 === 1 ? " is-even-row" : "";
          return `<div class="gantt-row-background${evenClass}" style="top:${rowIndex * GANTT_ROW_HEIGHT_PX}px"></div>`;
        })
        .join("");

      const { level2Groups } = buildGanttTimelineHeaderGroups(timelineDays, granularity);
      const periodColumnsHtml = level2Groups
        .map((group, groupIndex) => {
          const firstDay = timelineDays[group.startIndex];
          let backgroundClass = "";
          if (granularity === "day") {
            backgroundClass = firstDay.isSaturday ? "is-saturday" : firstDay.isSunday ? "is-sunday" : "";
          } else if (groupIndex % 2 === 1) {
            backgroundClass = "is-alt-period";
          }
          if (!backgroundClass) return "";
          return `<div class="gantt-day-column-bg ${backgroundClass}" style="left:${group.startIndex * pixelsPerDay}px;width:${group.dayCount * pixelsPerDay}px"></div>`;
        })
        .join("");

      const barsHtml = scheduleTreeRows
        .map(({ schedule, hasChildren }, rowIndex) => {
          const geometry = calculateBarGeometry(schedule, timelineStartDateString, pixelsPerDay);
          if (!geometry) return "";
          const rowTopPx = rowIndex * GANTT_ROW_HEIGHT_PX;
          const barHeightPx = hasChildren ? 22 : 16;
          const barTopPx = hasChildren
            ? rowTopPx + (GANTT_ROW_HEIGHT_PX - barHeightPx) / 2
            : rowTopPx + GANTT_ROW_HEIGHT_PX * 0.65 - barHeightPx / 2;
          const doneClass = schedule.taskStatus === "done" ? " is-done-status" : "";
          const parentClass = hasChildren ? " is-parent-bar" : "";
          const showLabel = hasChildren || geometry.widthPx > 60;
          const labelText = showLabel ? `${escapeHtmlText(schedule.name)} (${geometry.durationDays}日)` : "";
          const backgroundColor = schedule.color || "#2563EB";
          return `<div class="gantt-bar${parentClass}${doneClass}" style="left:${geometry.leftPx}px;top:${barTopPx}px;width:${geometry.widthPx}px;height:${barHeightPx}px;background:${backgroundColor}">${labelText}</div>`;
        })
        .join("");

      // 【前提】マイルストーン線・今日マーカーはどちらも「left位置だけ決めて、高さは
      //   CSSのtop:0;bottom:0に任せる」ため、ここでは高さ(height)を指定しない。
      const milestoneMarkersHtml = calculateMilestoneMarkerPositions(milestones, timelineStartDateString, pixelsPerDay)
        .map(
          (marker) =>
            `<div class="gantt-milestone-marker" style="left:${marker.leftPx}px" title="${escapeHtmlText(marker.name)}"><div class="gantt-milestone-diamond"></div></div>`
        )
        .join("");

      const todayMarkerLeftPx = calculateTodayMarkerPosition(timelineDays, timelineStartDateString, pixelsPerDay, todayDateString);
      const todayMarkerHtml =
        todayMarkerLeftPx === null ? "" : `<div class="gantt-today-marker" style="left:${todayMarkerLeftPx}px" title="今日"></div>`;

      const emptyMessageHtml =
        scheduleTreeRows.length === 0 ? '<p class="empty-state-message gantt-empty-overlay">スケジュールがありません。</p>' : "";

      // 【設計判断：.gantt-bodyの高さは「実データ行数」と「画面の表示領域の高さ」の
      //   大きい方にする】CSSのmax()を使い、実データが画面より多ければ実データの高さ
      //   （＝縦スクロールが発生する）、少なければ画面の表示領域の下端まで
      //   （--gantt-body-min-height、:root定義）を採用する。
      return `<div class="gantt-body" style="width:${totalWidthPx}px;min-height:max(${totalHeightPx}px, var(--gantt-body-min-height))">${periodColumnsHtml}${rowBackgroundsHtml}${barsHtml}${milestoneMarkersHtml}${todayMarkerHtml}${emptyMessageHtml}</div>`;
    }

    // 【前提】scheduleTreeRows・timelineDays・milestonesは上記各関数の戻り値・入力と同じ。
    //   granularityは表示粒度。todayDateStringは基準日（呼び出し元がnew Date()から求めて渡す）。
    // 【処理】タイムラインヘッダーとガント本体を連結する（ガントパネル全体の組み立て窓口）。
    //   スケジュールが0件でも、ヘッダー・本体とも必ずプロジェクト全期間ぶんの列を描画する
    //   （0件用の早期returnは行わない。今回修正した不具合の要点）。
    // 【結果】ganttPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderGanttChartToHtml(scheduleTreeRows, timelineDays, pixelsPerDay, milestones, timelineStartDateString, granularity, todayDateString) {
      return (
        renderGanttTimelineHeaderToHtml(timelineDays, pixelsPerDay, granularity) +
        renderGanttBodyToHtml(scheduleTreeRows, timelineDays, pixelsPerDay, milestones, timelineStartDateString, granularity, todayDateString)
      );
    }

    // タスクのpriority（1:高〜4:なし）の日本語表示名（データモデル設計3.3節）。
    const TASK_PRIORITY_LABELS = { 1: "高", 2: "中", 3: "低", 4: "なし" };
    // タスクのstatus（backlog/doing/done）の日本語表示名。カンバン列見出しと編集モーダルの
    // ステータス選択で共有する。
    const TASK_STATUS_LABELS = { backlog: "未着手", doing: "進行中", done: "完了" };

    // 【前提】taskListForColumn はある1つのstatusに属するタスク配列。columnLabel はその列の
    //   日本語見出し。columnStatusValue はそのstatus文字列（追加フォームの送信先に使う）。
    // 【処理】1列分のカンバンカード（各カードに削除ボタンを添える。詳細設計書3.3.2：
    //   deleteTodo）と、モーダル・ダイアログ一覧P1「各列に追加フォームが直接埋め込み」の
    //   仕様どおり、タスク名・優先度・期日の埋め込み追加フォームを組み立てる
    //   （モーダルを介さない）。完了列("done")のみ、完了済み一括削除ボタンを見出し横に
    //   添える（詳細設計書3.3.2：clearDoneTodos）。
    // 【結果】renderKanbanBoardToHtml から列単位で呼び出されるHTML文字列を返す。
    function renderKanbanColumnToHtml(taskListForColumn, columnLabel, columnStatusValue) {
      const cardsHtml =
        taskListForColumn.length === 0
          ? '<p class="empty-state-message">タスクがありません。</p>'
          : taskListForColumn
              .map((task) => {
                const dueDateHtml = task.dueDate ? `<div class="panel-list-item-meta">期日：${escapeHtmlText(task.dueDate)}</div>` : "";
                return `<div class="kanban-card" data-task-id="${escapeHtmlText(task.id)}" draggable="true">
                    <div class="kanban-card-main" data-action="edit-task">
                      <div>${escapeHtmlText(task.title)}（優先度：${TASK_PRIORITY_LABELS[task.priority] || task.priority}）</div>
                      ${dueDateHtml}
                    </div>
                    <button type="button" class="wbs-icon-button" data-action="delete-task" title="削除">🗑</button>
                  </div>`;
              })
              .join("");

      const priorityOptionsHtml = Object.entries(TASK_PRIORITY_LABELS)
        .map(([value, label]) => `<option value="${value}"${value === "4" ? " selected" : ""}>${label}</option>`)
        .join("");
      const addFormHtml = `
        <div class="kanban-add-form" data-column-status="${columnStatusValue}">
          <input type="text" class="kanban-add-title-input" placeholder="タスク名">
          <select class="kanban-add-priority-select">${priorityOptionsHtml}</select>
          <input type="date" class="kanban-add-duedate-input">
          <button type="button" class="panel-add-button kanban-add-submit-button">＋ 追加</button>
        </div>
      `;
      const clearDoneButtonHtml =
        columnStatusValue === "done" ? '<button type="button" class="toolbar-button" id="clearDoneTasksButton">完了済みを一括削除</button>' : "";
      return `<div class="kanban-column" data-column-status="${columnStatusValue}">
        <div class="kanban-column-header">
          <h3>${escapeHtmlText(columnLabel)}</h3>
          ${clearDoneButtonHtml}
        </div>
        ${cardsHtml}${addFormHtml}
      </div>`;
    }

    // 【前提】taskGroupsByStatus は groupTasksByStatus の戻り値。
    // 【処理】backlog/doing/doneの3列を横に並べたカンバンボード全体のHTML文字列を組み立てる。
    // 【結果】カンバンパネルのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderKanbanBoardToHtml(taskGroupsByStatus) {
      return `<div class="kanban-board">
        ${renderKanbanColumnToHtml(taskGroupsByStatus.backlog, "未着手", "backlog")}
        ${renderKanbanColumnToHtml(taskGroupsByStatus.doing, "進行中", "doing")}
        ${renderKanbanColumnToHtml(taskGroupsByStatus.done, "完了", "done")}
      </div>`;
    }

    // 【前提】issueList は同一プロジェクト内のissue全件（折りたたみ状態に関係なく常に全件、
    //   x,y座標を持つ）。collapsedIssueIds は折りたたまれているissueidの集合。
    // 【処理】filterVisibleIssuesで実際に表示する行を絞り込んでから、issue.x/yをそのまま
    //   絶対配置の左上原点として使い、ノード（丸みを帯びたラベル）と、親子を結ぶ線
    //   （buildMindmapEdgeList・calculateEdgeGeometry。辺も絞り込み後のissueListから
    //   計算するため、隠れた子ノードへの辺は自動的に描画されない）を組み立てる。
    //   各ノードにdata-issue-idを持たせ、ドラッグ配置・右クリックメニューの対象特定に使う。
    //   子を持つノードには「▸ 」を名前の前に付け、折りたたみ中はis-collapsed-nodeクラスで
    //   見た目の目印を付ける。
    // 【結果】マインドマップキャンバスのHTML文字列を返す。
    function renderMindmapCanvasToHtml(issueList, collapsedIssueIds) {
      const visibleIssues = filterVisibleIssues(issueList, collapsedIssueIds);
      if (visibleIssues.length === 0) {
        return '<p class="empty-state-message">マインドマップノードがありません。</p>';
      }
      const edgesHtml = buildMindmapEdgeList(visibleIssues)
        .map(({ fromIssue, toIssue }) => {
          const geometry = calculateEdgeGeometry(fromIssue.x, fromIssue.y, toIssue.x, toIssue.y);
          return `<div class="mindmap-edge" style="left:${geometry.leftPx}px;top:${geometry.topPx}px;width:${geometry.widthPx}px;transform:rotate(${geometry.angleDeg}deg)"></div>`;
        })
        .join("");
      const nodesHtml = visibleIssues
        .map((issue) => {
          const backgroundColor = issue.color || MINDMAP_NODE_COLORS[0];
          const hasChildren = issueList.some((candidateChild) => candidateChild.parentNodeId === issue.id);
          const isCollapsed = collapsedIssueIds.has(issue.id);
          const collapsedClass = isCollapsed ? " is-collapsed-node" : "";
          const collapsedIndicator = hasChildren && isCollapsed ? "▸ " : "";
          return `<div class="mindmap-node${collapsedClass}" data-issue-id="${escapeHtmlText(issue.id)}" style="left:${issue.x}px;top:${issue.y}px;background:${backgroundColor}">${collapsedIndicator}${escapeHtmlText(issue.title)}</div>`;
        })
        .join("");
      return `<div class="mindmap-canvas">${edgesHtml}${nodesHtml}</div>`;
    }

    // ===== UI：DOM反映（薄い関数） =====
    // 【設計判断】以下は「HTML文字列を対応する要素のinnerHTMLへ入れるだけ」の薄い関数に留める。
    //   ロジック（何を表示するか）は上の純粋関数側に寄せ、ここでは判断を持たせない。

    function applyProjectSelectOptions(optionsHtml) {
      document.getElementById("projectSelectDropdown").innerHTML = optionsHtml;
    }

    function applyWbsPanel(bodyHtml) {
      document.getElementById("wbsPanel").innerHTML = bodyHtml;
    }

    function applyGanttPanel(bodyHtml) {
      document.getElementById("ganttPanelBody").innerHTML = bodyHtml;
    }

    function applyKanbanPanel(bodyHtml) {
      document.getElementById("kanbanPanelBody").innerHTML = bodyHtml;
    }

    function applyMindmapPanel(bodyHtml) {
      document.getElementById("mindmapPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】isLocked は現在のプロジェクトのロック状態。
    // 【処理】ロック帯の表示・スケジュール追加ボタンの活性状態・ロックボタンの選択状態・
    //   プロジェクト削除ボタンの表示有無をまとめて切り替える（基本設計書3.3節：
    //   ロック中はスケジュール追加ボタンを無効化し、プロジェクト削除ボタンは非表示にする）。
    // 【結果】画面上のロック関連の見た目が状態に一致する。
    function applyLockState(isLocked) {
      document.getElementById("lockBand").hidden = !isLocked;
      document.getElementById("addScheduleButton").disabled = isLocked;
      document.getElementById("lockToggleButton").classList.toggle("is-active", isLocked);
      document.getElementById("deleteProjectButton").hidden = isLocked;
    }

    // ===== UI：統括（データ取得→純粋関数→DOM反映のつなぎ） =====

    // 【前提】なし（常に全プロジェクトを取得する。projectsはインデックス無し＝常に全件表示の設計のため）。
    // 【処理】getAllProjectsで最新の一覧を取得し、現在選択中のprojectIdを選択状態にして<select>へ反映する。
    // 【結果】<select>の中身が最新のプロジェクト一覧に更新される。
    async function refreshProjectSelectDropdown() {
      const projectList = await getAllProjects();
      applyProjectSelectOptions(renderProjectOptionsToHtml(projectList, currentSelectedProjectId));
    }

    // 【前提】currentProjectObject・currentScheduleTreeRowsが設定済みであること。
    // 【処理】DBへ再度問い合わせず、キャッシュ済みcurrentScheduleTreeRowsと現在の折りたたみ・
    //   列表示・表示粒度の状態だけを使って、WBSパネル・ガント本体の両方を再描画する。
    //   行の折りたたみ切替のように「DBの中身は変わっていないが見た目の状態だけ変わった」
    //   場面で使う（DB再取得を伴うrefreshGanttPanelと役割を分ける）。
    // 【結果】WBS・ガント両パネルの表示が、現在のキャッシュ・状態を反映したものに更新される。
    function rerenderWbsAndGanttFromCache() {
      const visibleScheduleTreeRows = filterVisibleScheduleTreeRows(currentScheduleTreeRows, collapsedScheduleIds);
      const timelineDays = buildGanttTimelineDays(currentProjectObject.startDate, currentProjectObject.endDate);
      const pixelsPerDay = GRANULARITY_PIXELS_PER_DAY[currentGranularity];
      const todayDateString = new Date().toISOString().slice(0, 10);
      applyWbsPanel(renderWbsPanelToHtml(currentScheduleTreeRows, visibleWbsColumns, collapsedScheduleIds));
      applyGanttPanel(
        renderGanttChartToHtml(
          visibleScheduleTreeRows,
          timelineDays,
          pixelsPerDay,
          currentProjectObject.milestones,
          currentProjectObject.startDate,
          currentGranularity,
          todayDateString
        )
      );
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。currentProjectObjectが
    //   switchToProjectで設定済みであること（プロジェクトのstartDate/endDate/milestonesを使うため）。
    // 【処理】projectIdがnullなら空状態を表示し、そうでなければgetSchedulesByProjectで取得して
    //   ツリー化し（currentScheduleTreeRowsは常に「折りたたみに関係ない全件」を保持する。
    //   WBS番号の計算・兄弟位置の判定は隠れている行も含めた全体構造が必要なため）、
    //   rerenderWbsAndGanttFromCacheで両パネルを再描画する。
    // 【結果】WBS・ガント両パネルの表示が最新の状態に更新される。
    async function refreshGanttPanel(projectId) {
      if (!projectId || !currentProjectObject) {
        applyWbsPanel("");
        applyGanttPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const scheduleList = await getSchedulesByProject(projectId);
      currentScheduleTreeRows = buildScheduleTreeRows(scheduleList);
      currentTimelineStartDateString = currentProjectObject.startDate;
      rerenderWbsAndGanttFromCache();
    }

    // refreshGanttPanelと同じ考え方。対象はtasks・カンバンボード。
    async function refreshKanbanPanel(projectId) {
      if (!projectId) {
        applyKanbanPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const taskList = await getTasksByProject(projectId);
      applyKanbanPanel(renderKanbanBoardToHtml(groupTasksByStatus(taskList)));
    }

    // 【前提】taskId は削除対象のタスクのid。
    // 【処理】確認ダイアログ（詳細設計書3.3.2：deleteTodo「このタスクを削除しますか？」）の上で
    //   deleteTaskし、削除ログを記録する（schedules/issuesの個別削除と同じ方針。tasksも
    //   LOGGED_STORES対象のため）。
    // 【結果】確認OK時、対象タスクが削除されカンバンパネルが再描画される。
    async function handleDeleteTaskButtonClick(taskId) {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const task = taskList.find((candidateTask) => candidateTask.id === taskId);
      if (!task) return;
      if (!window.confirm("このタスクを削除しますか？")) return;
      await deleteTask(taskId);
      await addChangelogEntry({
        id: generateId(),
        projectId: task.projectId,
        action: "delete",
        store: "tasks",
        storeLabel: "タスク",
        itemId: task.id,
        itemName: task.title,
        changes: [],
        snapshot: task,
        createdAt: new Date().toISOString(),
      });
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // 【前提】currentSelectedProjectIdが設定済みであること。
    // 【処理】完了列(status==="done")のタスクを数え、0件なら案内のみ表示して終了する。
    //   1件以上あれば件数を明示した確認ダイアログの上で全件削除し、削除ログを個別に記録する
    //   （詳細設計書3.3.2：clearDoneTodos）。
    // 【結果】確認OK時、完了済みタスクがすべて削除されカンバンパネルが再描画される。
    async function handleClearDoneTasksButtonClick() {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const doneTasks = taskList.filter((task) => task.status === "done");
      if (doneTasks.length === 0) {
        window.alert("完了タスクがありません");
        return;
      }
      if (!window.confirm(`完了済み${doneTasks.length}件を削除しますか？`)) return;
      for (const task of doneTasks) {
        await deleteTask(task.id);
        await addChangelogEntry({
          id: generateId(),
          projectId: task.projectId,
          action: "delete",
          store: "tasks",
          storeLabel: "タスク",
          itemId: task.id,
          itemName: task.title,
          changes: [],
          snapshot: task,
          createdAt: new Date().toISOString(),
        });
      }
      window.alert("完了済みタスクを削除しました");
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // ===== P2：スナップショットパネル =====
    // 【設計判断】モーダル・ダイアログ一覧の指示どおり、今回は保存・一覧表示・削除のみを
    //   実装する。「復元」（現在のスケジュール全削除→書き戻し、変更履歴に記録しない特殊な
    //   複合操作）と「比較」は別工程とする。

    // 【前提】snapshotList は同一プロジェクト内のスナップショット全件。
    // 【処理】名前・作成日時・削除ボタンを持つ一覧のHTML文字列を組み立てる（DOMには触れない）。
    // 【結果】snapshotPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderSnapshotListToHtml(snapshotList) {
      if (snapshotList.length === 0) {
        return '<p class="empty-state-message">スナップショットがありません。</p>';
      }
      return snapshotList
        .slice()
        .sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1))
        .map(
          (snapshot) => `<div class="panel-list-item" data-snapshot-id="${escapeHtmlText(snapshot.id)}">
            <div class="panel-list-item-main">
              <div>${escapeHtmlText(snapshot.name)}</div>
              <div class="panel-list-item-meta">${escapeHtmlText(snapshot.createdAt)}</div>
            </div>
            <div class="panel-list-item-actions">
              <button type="button" class="wbs-icon-button" data-action="delete-snapshot" title="削除">🗑</button>
            </div>
          </div>`
        )
        .join("");
    }

    function applySnapshotPanel(bodyHtml) {
      document.getElementById("snapshotPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】projectIdがnullなら空状態を表示し、そうでなければgetSnapshotsByProjectで
    //   取得して一覧を再描画する。
    // 【結果】スナップショットパネルの表示が最新の状態に更新される。
    async function refreshSnapshotPanel(projectId) {
      if (!projectId) {
        applySnapshotPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const snapshotList = await getSnapshotsByProject(projectId);
      applySnapshotPanel(renderSnapshotListToHtml(snapshotList));
    }

    // 【前提】currentSelectedProjectId・currentProjectObjectが設定済みであること。
    // 【処理】名前をprompt()で受け取り（既定値：「{プロジェクト名} - {今日の日付}」、
    //   モーダル・ダイアログ一覧P2）、現在のプロジェクト情報＋スケジュール全件を
    //   dataとして保存する（データモデル設計3.8節：data={project, schedules}）。
    // 【結果】保存後、パネルを再描画する。
    async function handleSaveSnapshotButtonClick() {
      if (!currentSelectedProjectId || !currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const todayDateString = new Date().toISOString().slice(0, 10);
      const defaultName = `${currentProjectObject.name} - ${todayDateString}`;
      const snapshotName = window.prompt("スナップショット名を入力してください", defaultName);
      if (!snapshotName) return;
      await addSnapshot({
        id: generateId(),
        projectId: currentSelectedProjectId,
        name: snapshotName,
        createdAt: new Date().toISOString(),
        data: {
          project: currentProjectObject,
          schedules: currentScheduleTreeRows.map((row) => row.schedule),
        },
      });
      await refreshSnapshotPanel(currentSelectedProjectId);
    }

    // 【前提】snapshotId は削除したいスナップショットのid。
    // 【処理】確認ダイアログ（モーダル・ダイアログ一覧C7：確認ダイアログのみ、成功トースト無し）
    //   の上でdeleteSnapshotする。
    // 【結果】確認OK時、削除してパネルを再描画する。
    async function handleDeleteSnapshotButtonClick(snapshotId) {
      if (!window.confirm("このスナップショットを削除しますか？")) return;
      await deleteSnapshot(snapshotId);
      await refreshSnapshotPanel(currentSelectedProjectId);
    }

    // ===== P3：即時メモパネル =====

    // 【前提】quickMemoList は同一プロジェクト内の即時メモ全件。
    // 【処理】投稿日時の昇順（古い→新しい、チャットのタイムライン表示）に並べ、
    //   各メモに削除ボタンを持つHTML文字列を組み立てる。
    // 【結果】quickMemoPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderQuickMemoTimelineToHtml(quickMemoList) {
      if (quickMemoList.length === 0) {
        return '<p class="empty-state-message">即時メモがありません。</p>';
      }
      return quickMemoList
        .slice()
        .sort((a, b) => (a.createdAt < b.createdAt ? -1 : 1))
        .map(
          (quickMemo) => `<div class="panel-list-item" data-quick-memo-id="${escapeHtmlText(quickMemo.id)}">
            <div class="panel-list-item-main">
              <div>${escapeHtmlText(quickMemo.text)}</div>
              <div class="panel-list-item-meta">${escapeHtmlText(quickMemo.createdAt)}</div>
            </div>
            <div class="panel-list-item-actions">
              <button type="button" class="wbs-icon-button" data-action="delete-quick-memo" title="削除">🗑</button>
            </div>
          </div>`
        )
        .join("");
    }

    function applyQuickMemoPanel(bodyHtml) {
      document.getElementById("quickMemoPanelBody").innerHTML = bodyHtml;
    }

    async function refreshQuickMemoPanel(projectId) {
      if (!projectId) {
        applyQuickMemoPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const quickMemoList = await getQuickMemosByProject(projectId);
      applyQuickMemoPanel(renderQuickMemoTimelineToHtml(quickMemoList));
      // 投稿後・削除後も一覧の最新（末尾）が見えるよう、パネル下端までスクロールする。
      const panelBody = document.getElementById("quickMemoPanelBody");
      panelBody.scrollTop = panelBody.scrollHeight;
    }

    // 【前提】currentSelectedProjectIdが設定済みであること。
    // 【処理】投稿欄のテキストが空でなければaddQuickMemoで保存し、入力欄を空にする。
    // 【結果】投稿後、パネルを再描画する。
    async function handlePostQuickMemoButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const textInput = document.getElementById("quickMemoTextInput");
      const text = textInput.value.trim();
      if (!text) return;
      await addQuickMemo({ id: generateId(), projectId: currentSelectedProjectId, text, createdAt: new Date().toISOString() });
      textInput.value = "";
      await refreshQuickMemoPanel(currentSelectedProjectId);
    }

    // 【前提】quickMemoId は削除したい即時メモのid。
    // 【処理】確認ダイアログ無しで即削除する（基本設計書10.1節：即時メモの個別削除は
    //   「書き捨てメモ」という性質上、確認なしの即削除が仕様として扱われる）。
    // 【結果】削除後、パネルを再描画する。
    async function handleDeleteQuickMemoButtonClick(quickMemoId) {
      await deleteQuickMemo(quickMemoId);
      await refreshQuickMemoPanel(currentSelectedProjectId);
    }

    // ===== P4：メモパネル =====
    // 【設計判断】自動保存はデバウンス方式ではなく、入力欄からフォーカスが外れた時点
    //   （blur）で保存する簡略版にする。デバウンスタイマーの管理はコードの複雑さの割に
    //   今回のスコープでの価値が低いと判断した。Markdownプレビューも今回は実装せず、
    //   プレーンテキストのまま表示・編集する。

    // 現在エディタで開いているメモのid。未選択時はnull。
    let currentSelectedMemoId = null;

    // 【前提】memoList は同一プロジェクト内のメモ全件。selectedMemoId は現在編集中のメモid。
    // 【処理】タイトル・更新日時・削除ボタンを持つ一覧のHTML文字列を組み立てる。選択中の
    //   メモにはis-selectedクラスを付ける。
    // 【結果】memoListBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderMemoListToHtml(memoList, selectedMemoId) {
      if (memoList.length === 0) {
        return '<p class="empty-state-message">メモがありません。</p>';
      }
      const sortByOrder = (a, b) => a.order - b.order;
      return memoList
        .slice()
        .sort(sortByOrder)
        .map((memo) => {
          const selectedClass = memo.id === selectedMemoId ? " is-selected" : "";
          return `<div class="panel-list-item memo-list-item${selectedClass}" data-memo-id="${escapeHtmlText(memo.id)}" data-action="select-memo">
            <div class="panel-list-item-main">
              <div>${escapeHtmlText(memo.title)}</div>
              <div class="panel-list-item-meta">${escapeHtmlText(memo.updatedAt)}</div>
            </div>
            <div class="panel-list-item-actions">
              <button type="button" class="wbs-icon-button" data-action="delete-memo" title="削除">🗑</button>
            </div>
          </div>`;
        })
        .join("");
    }

    // 【前提】memo はnull（未選択）または選択中のメモオブジェクト。
    // 【処理】タイトル入力欄・本文テキストエリアを持つ編集エリアのHTML文字列を組み立てる。
    // 【結果】memoEditorBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderMemoEditorToHtml(memo) {
      if (!memo) {
        return '<p class="empty-state-message">左の一覧からメモを選択するか、新規作成してください。</p>';
      }
      return `
        <input type="text" id="memoEditorTitleInput" value="${escapeHtmlText(memo.title)}" placeholder="タイトル">
        <textarea id="memoEditorBodyTextarea" placeholder="本文（Markdown）">${escapeHtmlText(memo.body)}</textarea>
      `;
    }

    function applyMemoListPanel(bodyHtml) {
      document.getElementById("memoListBody").innerHTML = bodyHtml;
    }

    function applyMemoEditorPanel(bodyHtml) {
      document.getElementById("memoEditorBody").innerHTML = bodyHtml;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】getMemosByProjectで取得して一覧を再描画し、currentSelectedMemoIdが
    //   まだ存在するメモを指していれば、そのメモをエディタに再表示する
    //   （存在しなくなっていれば＝削除された場合、選択を解除する）。
    // 【結果】メモ一覧・編集エリア両方の表示が最新の状態に更新される。
    async function refreshMemoPanel(projectId) {
      if (!projectId) {
        applyMemoListPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        applyMemoEditorPanel(null);
        currentSelectedMemoId = null;
        return;
      }
      const memoList = await getMemosByProject(projectId);
      if (currentSelectedMemoId && !memoList.some((memo) => memo.id === currentSelectedMemoId)) {
        currentSelectedMemoId = null;
      }
      applyMemoListPanel(renderMemoListToHtml(memoList, currentSelectedMemoId));
      const selectedMemo = memoList.find((memo) => memo.id === currentSelectedMemoId) || null;
      applyMemoEditorPanel(renderMemoEditorToHtml(selectedMemo));
    }

    async function handleCreateMemoButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const memoList = await getMemosByProject(currentSelectedProjectId);
      const nowIsoString = new Date().toISOString();
      const newMemo = {
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: "新規メモ",
        body: "",
        order: memoList.length,
        createdAt: nowIsoString,
        updatedAt: nowIsoString,
      };
      await addMemo(newMemo);
      currentSelectedMemoId = newMemo.id;
      await refreshMemoPanel(currentSelectedProjectId);
    }

    function handleSelectMemoButtonClick(memoId) {
      currentSelectedMemoId = memoId;
      refreshMemoPanel(currentSelectedProjectId);
    }

    // 【前提】memoId は削除したいメモのid。
    // 【処理】確認ダイアログ（モーダル・ダイアログ一覧C4）の上でdeleteMemoする。
    // 【結果】確認OK時、削除してパネルを再描画する（選択解除はrefreshMemoPanel側で判定）。
    async function handleDeleteMemoButtonClick(memoId) {
      const memoList = await getMemosByProject(currentSelectedProjectId);
      const targetMemo = memoList.find((memo) => memo.id === memoId);
      if (!targetMemo) return;
      if (!window.confirm(`「${targetMemo.title || "無題"}」を削除しますか？`)) return;
      await deleteMemo(memoId);
      await refreshMemoPanel(currentSelectedProjectId);
    }

    // 【前提】currentSelectedMemoIdが設定済み（エディタにメモが表示されている）であること。
    // 【処理】タイトル・本文入力欄からフォーカスが外れた時点で読み取り、addMemoで保存する。
    // 【結果】保存後、一覧側の表示（タイトル・更新日時）を最新化する。
    async function handleMemoEditorFieldBlur() {
      if (!currentSelectedMemoId) return;
      const memoList = await getMemosByProject(currentSelectedProjectId);
      const existingMemo = memoList.find((memo) => memo.id === currentSelectedMemoId);
      if (!existingMemo) return;
      const title = document.getElementById("memoEditorTitleInput").value;
      const body = document.getElementById("memoEditorBodyTextarea").value;
      await addMemo({ ...existingMemo, title, body, updatedAt: new Date().toISOString() });
      const memoListAfterSave = await getMemosByProject(currentSelectedProjectId);
      applyMemoListPanel(renderMemoListToHtml(memoListAfterSave, currentSelectedMemoId));
    }

    // ===== P5：コメント一覧パネル =====
    // 【設計判断】commentsはprojectIdを持たないため（データモデル設計3.5節）、
    //   getSchedulesByProjectで対象スケジュールid集合を先に取得し、各idについて
    //   getCommentsByTaskで束ねる（複数ストアをまたぐ合成処理）。
    //   コメントの追加導線は本来M4（スケジュール編集モーダル）に埋め込む仕様だが、
    //   M4への埋め込みは別工程のため、今回はこのパネル内に「スケジュールを選んで投稿」する
    //   簡易フォームを暫定的に置く（スコープの妥協点）。

    // 【前提】commentGroups は [{schedule, comments}] の配列（コメントが1件以上ある
    //   スケジュールのみ）。
    // 【処理】スケジュール名を見出しに、コメント本文・投稿日時を並べたHTML文字列を組み立てる。
    // 【結果】commentPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderCommentGroupsToHtml(commentGroups) {
      if (commentGroups.length === 0) {
        return '<p class="empty-state-message">コメントがありません。</p>';
      }
      return commentGroups
        .map(({ schedule, comments }) => {
          const commentsHtml = comments
            .slice()
            .sort((a, b) => (a.createdAt < b.createdAt ? -1 : 1))
            .map(
              (comment) => `<div class="panel-list-item" data-comment-id="${escapeHtmlText(comment.id)}">
                <div class="panel-list-item-main">
                  <div>${escapeHtmlText(comment.text)}</div>
                  <div class="panel-list-item-meta">${escapeHtmlText(comment.createdAt)}</div>
                </div>
              </div>`
            )
            .join("");
          return `<div class="comment-group-heading">${escapeHtmlText(schedule.name)}</div>${commentsHtml}`;
        })
        .join("");
    }

    // 【前提】scheduleList は同一プロジェクト内のスケジュール全件。
    // 【処理】投稿先スケジュールを選ぶ<select>・テキスト欄・投稿ボタンを持つ簡易フォームの
    //   HTML文字列を組み立てる。
    // 【結果】コメント投稿フォームのHTML文字列を返す。
    function renderCommentPostFormToHtml(scheduleList) {
      const optionsHtml = scheduleList.map((schedule) => `<option value="${escapeHtmlText(schedule.id)}">${escapeHtmlText(schedule.name)}</option>`).join("");
      return `<div class="kanban-add-form" style="margin:8px 16px;">
        <select id="commentTargetScheduleSelect">${optionsHtml}</select>
        <input type="text" id="commentTextInput" placeholder="コメントを入力">
        <button type="button" class="panel-add-button" id="postCommentButton">投稿</button>
      </div>`;
    }

    function applyCommentPanel(bodyHtml) {
      document.getElementById("commentPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】getSchedulesByProjectでスケジュールid集合を取得し、各idについて
    //   getCommentsByTaskで束ねてcommentGroupsを作る。投稿フォーム＋グルーピング一覧を
    //   両方描画する。
    // 【結果】コメントパネルの表示が最新の状態に更新される。
    async function refreshCommentPanel(projectId) {
      if (!projectId) {
        applyCommentPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const scheduleList = await getSchedulesByProject(projectId);
      const commentGroups = [];
      for (const schedule of scheduleList) {
        const comments = await getCommentsByTask(schedule.id);
        if (comments.length > 0) {
          commentGroups.push({ schedule, comments });
        }
      }
      const formHtml = scheduleList.length > 0 ? renderCommentPostFormToHtml(scheduleList) : "";
      applyCommentPanel(formHtml + renderCommentGroupsToHtml(commentGroups));
    }

    // 【前提】currentSelectedProjectIdが設定済みであること。
    // 【処理】投稿フォームの選択スケジュールid・テキストを読み取り、空でなければ
    //   addCommentで保存する。
    // 【結果】投稿後、パネルを再描画する。
    async function handlePostCommentButtonClick() {
      const scheduleSelect = document.getElementById("commentTargetScheduleSelect");
      const textInput = document.getElementById("commentTextInput");
      if (!scheduleSelect || !textInput) return;
      const text = textInput.value.trim();
      if (!text) return;
      await addComment({ id: generateId(), taskId: scheduleSelect.value, text, createdAt: new Date().toISOString() });
      await refreshCommentPanel(currentSelectedProjectId);
    }

    // ===== P6：変更履歴パネル =====
    // 【設計判断】「戻す」機能（snapshotフィールドを1件書き戻す）は複合操作のため別工程とし、
    //   今回は一覧表示とフィルタタブのみを実装する。

    // 現在のフィルタ（"all" | "add" | "edit" | "delete"）。
    let currentChangelogFilter = "all";
    // フィルタ切替時にDB再取得しないためのキャッシュ。
    let currentChangelogEntries = [];

    // 【前提】changelogEntries は同一プロジェクト内の変更履歴全件。filter は
    //   "all" | "add" | "edit" | "delete"。
    // 【処理】filterが"all"以外ならactionで絞り込み、記録日時の降順（新しい順）に並べて、
    //   操作種別バッジ・対象名・記録日時のHTML文字列を組み立てる。
    // 【結果】changelogPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderChangelogEntriesToHtml(changelogEntries, filter) {
      const filteredEntries = changelogEntries
        .filter((entry) => filter === "all" || entry.action === filter)
        .slice()
        .sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1));
      if (filteredEntries.length === 0) {
        return '<p class="empty-state-message">変更履歴がありません。</p>';
      }
      const actionLabels = { add: "追加", edit: "変更", delete: "削除" };
      return filteredEntries
        .map((entry) => {
          const actionLabel = actionLabels[entry.action] || entry.action;
          return `<div class="panel-list-item">
            <div class="panel-list-item-main">
              <span class="changelog-action-badge is-${escapeHtmlText(entry.action)}">${escapeHtmlText(actionLabel)}</span>
              ${escapeHtmlText(entry.storeLabel)}「${escapeHtmlText(entry.itemName)}」
              <div class="panel-list-item-meta">${escapeHtmlText(entry.createdAt)}</div>
            </div>
          </div>`;
        })
        .join("");
    }

    function applyChangelogPanel(bodyHtml) {
      document.getElementById("changelogPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】getChangelogByProjectで取得してcurrentChangelogEntriesにキャッシュし、
    //   現在のフィルタで描画する。
    // 【結果】変更履歴パネルの表示が最新の状態に更新される。
    async function refreshChangelogPanel(projectId) {
      if (!projectId) {
        applyChangelogPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      currentChangelogEntries = await getChangelogByProject(projectId);
      applyChangelogPanel(renderChangelogEntriesToHtml(currentChangelogEntries, currentChangelogFilter));
    }

    // 【前提】filter は "all" | "add" | "edit" | "delete"。buttonElement はクリックされたボタン。
    // 【処理】フィルタを切り替え、ボタンの選択状態を更新した上で、キャッシュ済み
    //   currentChangelogEntriesを使ってパネルだけを再描画する（DB再取得は不要）。
    // 【結果】変更履歴パネルの表示が新しいフィルタの内容になる。
    function handleChangelogFilterClick(filter, buttonElement) {
      currentChangelogFilter = filter;
      for (const tabButton of document.querySelectorAll("#changelogFilterTabs .toolbar-button")) {
        tabButton.classList.toggle("is-active", tabButton === buttonElement);
      }
      applyChangelogPanel(renderChangelogEntriesToHtml(currentChangelogEntries, currentChangelogFilter));
    }

    // refreshGanttPanelと同じ考え方。対象はissues・マインドマップキャンバス。
    async function refreshMindmapPanel(projectId) {
      if (!projectId) {
        applyMindmapPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const issueList = await getIssuesByProject(projectId);
      applyMindmapPanel(renderMindmapCanvasToHtml(issueList, collapsedMindmapIssueIds));
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】現在選択中のプロジェクトを切り替え、そのプロジェクトの最新データを取得してから、
    //   3パネル（ガント・カンバン・マインドマップ）とロック状態表示をまとめて更新する。
    // 【結果】currentSelectedProjectId・currentProjectObjectが更新され、画面全体が新しい
    //   プロジェクトのものになる。
    async function switchToProject(projectId) {
      currentSelectedProjectId = projectId || null;
      if (currentSelectedProjectId) {
        const projectList = await getAllProjects();
        currentProjectObject = projectList.find((project) => project.id === currentSelectedProjectId) || null;
      } else {
        currentProjectObject = null;
      }
      applyLockState(Boolean(currentProjectObject?.locked));
      await Promise.all([
        refreshGanttPanel(currentSelectedProjectId),
        refreshKanbanPanel(currentSelectedProjectId),
        refreshMindmapPanel(currentSelectedProjectId),
      ]);
    }

    // 【前提】panelId はスライドパネル要素のid（例："kanbanSlidePanel"）。
    // 【処理】.is-openクラスの有無で開閉を反転させる（モーダル・ダイアログ一覧②：
    //   ボタンをもう一度押すと閉じる、という共通挙動）。
    // 【結果】パネルが開いていれば閉じ、閉じていれば開く。
    function toggleSlidePanel(panelId) {
      document.getElementById(panelId).classList.toggle("is-open");
    }

    // 【前提】panelId はスライドパネル要素のid。
    // 【処理】.is-openクラスを外す（×ボタンから閉じる用。開閉トグルではなく必ず閉じる）。
    // 【結果】パネルが閉じる。
    function closeSlidePanel(panelId) {
      document.getElementById(panelId).classList.remove("is-open");
    }

    // ===== UI：モーダル（モーダル・ダイアログ一覧①：中央モーダル） =====
    // 【設計判断】M1（新規プロジェクト作成）・M4（スケジュール新規作成・編集）を、
    // prompt()の連鎖から、UIデザイン仕様書2.3節に沿った中央モーダルへ作り直した。
    // モーダルの開閉・入れ物（#modalOverlay/#modalPanel）は全モーダル共通で使い回す。

    // 【前提】contentHtml はモーダルパネルに表示するHTML文字列。
    // 【処理】共通のモーダルオーバーレイにcontentHtmlを差し込んで表示する。
    // 【結果】画面中央にモーダルが表示される。
    function openModal(contentHtml) {
      document.getElementById("modalPanel").innerHTML = contentHtml;
      document.getElementById("modalOverlay").hidden = false;
    }

    // 【前提】なし。
    // 【処理】モーダルを閉じ、中身を空にする（次回開いたときに前回の入力値が残らないようにする）。
    // 【結果】モーダルが非表示になる。
    function closeModal() {
      document.getElementById("modalOverlay").hidden = true;
      document.getElementById("modalPanel").innerHTML = "";
    }

    const SCHEDULE_BAR_COLOR_PALETTE = ["#2563EB", "#0891B2", "#059669", "#D97706", "#DC2626", "#7C3AED", "#DB2777", "#EA580C", "#16A34A", "#0E7490", "#4B5563"];

    // 【前提】project はnull（新規作成モード）、または既存プロジェクトオブジェクト（編集モード）。
    // 【処理】M1/M2共通のプロジェクトモーダルのHTML文字列を組み立てる（DOMには触れない）。
    //   新規作成時は開始日・終了日の既定値を今日にする（モーダル・ダイアログ一覧M1）。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    function renderProjectModalToHtml(project) {
      const isEditMode = Boolean(project);
      const todayDateString = new Date().toISOString().slice(0, 10);
      const nameValue = isEditMode ? project.name : "";
      const startDateValue = isEditMode ? project.startDate : todayDateString;
      const endDateValue = isEditMode ? project.endDate : todayDateString;
      return `
        <h2>${isEditMode ? "プロジェクト編集" : "新規プロジェクト作成"}</h2>
        <div class="modal-field">
          <label for="projectModalNameInput">プロジェクト名</label>
          <input type="text" id="projectModalNameInput" value="${escapeHtmlText(nameValue)}">
        </div>
        <div class="modal-field">
          <label for="projectModalStartDateInput">開始日</label>
          <input type="date" id="projectModalStartDateInput" value="${escapeHtmlText(startDateValue)}">
        </div>
        <div class="modal-field">
          <label for="projectModalEndDateInput">終了日</label>
          <input type="date" id="projectModalEndDateInput" value="${escapeHtmlText(endDateValue)}">
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="projectModalCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="projectModalSaveButton">保存</button>
        </div>
      `;
    }

    // 【前提】existingProject はnull（新規作成）または既存プロジェクトオブジェクト（編集）。
    // 【処理】プロジェクトモーダルを開き、キャンセル・保存ボタンにイベントを登録する。
    // 【結果】モーダルが操作可能な状態で表示される。
    function openProjectModal(existingProject) {
      openModal(renderProjectModalToHtml(existingProject));
      document.getElementById("projectModalCancelButton").addEventListener("click", closeModal);
      document.getElementById("projectModalSaveButton").addEventListener("click", () => handleProjectModalSaveButtonClick(existingProject));
    }

    function handleCreateProjectButtonClick() {
      openProjectModal(null);
    }

    function handleEditProjectButtonClick() {
      if (!currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      openProjectModal(currentProjectObject);
    }

    // 3年後の判定はうるう年を厳密に数えず、365日×3年分の日数で近似する（実務上十分な簡略化）。
    const THREE_YEARS_IN_MILLISECONDS = 3 * 365 * MILLISECONDS_PER_DAY;

    // 【前提】input は {name, startDate, endDate}（プロジェクトモーダルの入力値）。
    // 【処理】モーダル・ダイアログ一覧A1〜A4のバリデーションを順に判定する（DOMには触れない）。
    //   ※A3はプロジェクト側が`<=`判定（終了日=開始日も拒否）で、スケジュール側（A7）の
    //   `<`判定とは非対称。これは基本設計書1.3節No.1の既知の非整合として忠実再現する。
    // 【結果】エラーがあればそのアラート文言（string）を、無ければnullを返す。
    function validateProjectModalInput(input) {
      if (!input.name) return "プロジェクト名を入力してください";
      if (!input.startDate || !input.endDate) return "日付を入力してください";
      if (input.endDate <= input.startDate) return "終了日は開始日より後にしてください";
      if (parseDateStringToUtcTimestamp(input.endDate) - parseDateStringToUtcTimestamp(input.startDate) > THREE_YEARS_IN_MILLISECONDS) {
        return "期間は最大3年です";
      }
      return null;
    }

    // 【前提】existingProject はnull（新規作成）または既存プロジェクトオブジェクト（編集）。
    // 【処理】モーダル内の入力値を読み取り、validateProjectModalInputでバリデーションし、
    //   OKならaddProjectで保存してモーダルを閉じ、画面を更新する。
    // 【結果】保存成功時はモーダルを閉じ、プロジェクト一覧・選択状態を更新する。
    async function handleProjectModalSaveButtonClick(existingProject) {
      const name = document.getElementById("projectModalNameInput").value.trim();
      const startDate = document.getElementById("projectModalStartDateInput").value;
      const endDate = document.getElementById("projectModalEndDateInput").value;

      const validationError = validateProjectModalInput({ name, startDate, endDate });
      if (validationError) {
        window.alert(validationError);
        return;
      }

      const projectToSave = existingProject
        ? { ...existingProject, name, startDate, endDate }
        : { id: generateId(), name, startDate, endDate, milestones: [], locked: false, createdAt: new Date().toISOString() };
      await addProject(projectToSave);
      closeModal();
      await refreshProjectSelectDropdown();
      document.getElementById("projectSelectDropdown").value = projectToSave.id;
      await switchToProject(projectToSave.id);
    }

    // 【前提】projectId は削除したいプロジェクトのid。project は削除前に取得済みの
    //   プロジェクトオブジェクト（変更履歴のsnapshot・itemNameに使う）。
    // 【処理】配下データ（スケジュール・タスク・issue・コメント・メモ・即時メモ・
    //   スナップショット）を先にすべて読み切ってから削除する（データモデル設計6章：
    //   複数ストアにまたがる書き込みは読み切ってから行う方針）。
    //   LOGGED_STORES対象（schedules/tasks/issues）は削除のたびに個別の変更履歴を記録し、
    //   最後にプロジェクト自体の削除ログも記録してからprojectsストアの当該行を削除する。
    //   既存の変更履歴（このプロジェクトのchangelogエントリ）は監査ログとして削除せず残す
    //   （スナップショット・変更履歴自体の削除UIは今回のスコープ外のため、消す手段が無いことと
    //   整合させる）。
    // 【結果】プロジェクトと配下データがすべて削除される。
    async function deleteProjectCascade(projectId, project) {
      const scheduleList = await getSchedulesByProject(projectId);
      const taskList = await getTasksByProject(projectId);
      const issueList = await getIssuesByProject(projectId);
      const memoList = await getMemosByProject(projectId);
      const quickMemoList = await getQuickMemosByProject(projectId);
      const snapshotList = await getSnapshotsByProject(projectId);

      for (const schedule of scheduleList) {
        const comments = await getCommentsByTask(schedule.id);
        for (const comment of comments) {
          await deleteComment(comment.id);
        }
      }
      for (const schedule of scheduleList) {
        await deleteSchedule(schedule.id);
        await addChangelogEntry({
          id: generateId(),
          projectId,
          action: "delete",
          store: "schedules",
          storeLabel: "スケジュール",
          itemId: schedule.id,
          itemName: schedule.name,
          changes: [],
          snapshot: schedule,
          createdAt: new Date().toISOString(),
        });
      }
      for (const task of taskList) {
        await deleteTask(task.id);
        await addChangelogEntry({
          id: generateId(),
          projectId,
          action: "delete",
          store: "tasks",
          storeLabel: "タスク",
          itemId: task.id,
          itemName: task.title,
          changes: [],
          snapshot: task,
          createdAt: new Date().toISOString(),
        });
      }
      for (const issue of issueList) {
        await deleteIssue(issue.id);
        await addChangelogEntry({
          id: generateId(),
          projectId,
          action: "delete",
          store: "issues",
          storeLabel: "マインドマップノード",
          itemId: issue.id,
          itemName: issue.title,
          changes: [],
          snapshot: issue,
          createdAt: new Date().toISOString(),
        });
      }
      for (const memo of memoList) {
        await deleteMemo(memo.id);
      }
      for (const quickMemo of quickMemoList) {
        await deleteQuickMemo(quickMemo.id);
      }
      for (const snapshot of snapshotList) {
        await deleteSnapshot(snapshot.id);
      }

      await addChangelogEntry({
        id: generateId(),
        projectId,
        action: "delete",
        store: "projects",
        storeLabel: "プロジェクト",
        itemId: project.id,
        itemName: project.name,
        changes: [],
        snapshot: project,
        createdAt: new Date().toISOString(),
      });
      await deleteProject(projectId);
    }

    // 【前提】currentSelectedProjectId・currentProjectObjectが設定済みであること。
    // 【処理】確認ダイアログ（モーダル・ダイアログ一覧C1：「『{プロジェクト名}』を削除しますか？
    //   （すべてのスケジュールも削除されます）」）の上でdeleteProjectCascadeする。
    //   削除後は、残っている先頭のプロジェクトを選択し直す（無ければ未選択状態にする）。
    // 【結果】確認OK時、プロジェクトと配下データが削除され、画面が更新される。
    async function handleDeleteProjectButtonClick() {
      if (!currentSelectedProjectId || !currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const confirmMessage = `「${currentProjectObject.name}」を削除しますか？（すべてのスケジュールも削除されます）`;
      if (!window.confirm(confirmMessage)) return;

      await deleteProjectCascade(currentSelectedProjectId, currentProjectObject);
      await refreshProjectSelectDropdown();
      const remainingProjectList = await getAllProjects();
      const nextProjectId = remainingProjectList.length > 0 ? remainingProjectList[0].id : null;
      document.getElementById("projectSelectDropdown").value = nextProjectId || "";
      await switchToProject(nextProjectId);
    }

    // 【前提】schedule はnull（新規作成モード）、または既存スケジュールオブジェクト（編集モード）。
    //   hasChildren は編集対象が子を持つか（子を持つ場合、開始日・終了日は自動計算のため
    //   読み取り専用にする。基本設計書4.2節）。
    // 【処理】M4（スケジュール新規作成・編集）モーダルのHTML文字列を組み立てる。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    function renderScheduleModalToHtml(schedule, hasChildren) {
      const isEditMode = Boolean(schedule);
      // カレンダー系入力の初期値は「今日」にする（ユーザー指示）。編集時は既存値をそのまま使う。
      const todayDateString = new Date().toISOString().slice(0, 10);
      const nameValue = isEditMode ? schedule.name : "";
      const startDateValue = isEditMode ? schedule.startDate : todayDateString;
      const endDateValue = isEditMode ? schedule.endDate : todayDateString;
      const assigneeValue = isEditMode ? schedule.assignee : "";
      const taskStatusValue = isEditMode ? schedule.taskStatus : "todo";
      const notesValue = isEditMode ? schedule.notes : "";
      const selectedColor = isEditMode && schedule.color ? schedule.color : SCHEDULE_BAR_COLOR_PALETTE[0];
      const dateDisabledAttribute = hasChildren ? "disabled" : "";
      const dateHintHtml = hasChildren
        ? '<p class="empty-state-message" style="padding:0;font-size:11px;">子タスクから自動計算されます</p>'
        : "";

      const statusOptionsHtml = Object.entries(SCHEDULE_STATUS_LABELS)
        .map(([value, label]) => `<option value="${value}"${value === taskStatusValue ? " selected" : ""}>${label}</option>`)
        .join("");

      const colorSwatchesHtml = SCHEDULE_BAR_COLOR_PALETTE
        .map((color) => `<div class="modal-color-swatch${color === selectedColor ? " is-selected" : ""}" data-color="${color}" style="background:${color}"></div>`)
        .join("");

      return `
        <h2>${isEditMode ? "スケジュール編集" : "スケジュール新規作成"}</h2>
        <div class="modal-field">
          <label for="scheduleModalNameInput">スケジュール名</label>
          <input type="text" id="scheduleModalNameInput" value="${escapeHtmlText(nameValue)}">
        </div>
        <div class="modal-field">
          <label for="scheduleModalStartDateInput">開始日</label>
          <input type="date" id="scheduleModalStartDateInput" value="${escapeHtmlText(startDateValue)}" ${dateDisabledAttribute}>
          ${dateHintHtml}
        </div>
        <div class="modal-field">
          <label for="scheduleModalEndDateInput">終了日</label>
          <input type="date" id="scheduleModalEndDateInput" value="${escapeHtmlText(endDateValue)}" ${dateDisabledAttribute}>
        </div>
        <div class="modal-field">
          <label for="scheduleModalAssigneeInput">担当者</label>
          <input type="text" id="scheduleModalAssigneeInput" value="${escapeHtmlText(assigneeValue)}">
        </div>
        <div class="modal-field">
          <label for="scheduleModalStatusSelect">ステータス</label>
          <select id="scheduleModalStatusSelect">${statusOptionsHtml}</select>
        </div>
        <div class="modal-field">
          <label>カラー</label>
          <div class="modal-color-palette" id="scheduleModalColorPalette">${colorSwatchesHtml}</div>
        </div>
        <div class="modal-field">
          <label for="scheduleModalNotesTextarea">メモ</label>
          <textarea id="scheduleModalNotesTextarea" rows="3">${escapeHtmlText(notesValue)}</textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="scheduleModalCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="scheduleModalSaveButton">保存</button>
        </div>
      `;
    }

    // 【前提】existingSchedule はnull（新規作成）または既存スケジュールオブジェクト（編集）。
    //   presetParentId は新規作成時にあらかじめ決めておく親id（ルート作成ならnull、
    //   子スケジュール追加ボタンから開く場合はそのスケジュールのid）。編集時は使わない。
    // 【処理】スケジュールモーダルを開き、キャンセル・保存・カラーパレットの選択にイベントを登録する。
    // 【結果】モーダルが操作可能な状態で表示される。
    function openScheduleModal(existingSchedule, hasChildren, presetParentId) {
      openModal(renderScheduleModalToHtml(existingSchedule, hasChildren));
      document.getElementById("scheduleModalCancelButton").addEventListener("click", closeModal);
      document.getElementById("scheduleModalSaveButton").addEventListener("click", () => handleScheduleModalSaveButtonClick(existingSchedule, presetParentId));
      for (const swatch of document.querySelectorAll(".modal-color-swatch")) {
        swatch.addEventListener("click", () => {
          for (const otherSwatch of document.querySelectorAll(".modal-color-swatch")) {
            otherSwatch.classList.remove("is-selected");
          }
          swatch.classList.add("is-selected");
        });
      }
    }

    function handleAddScheduleButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      openScheduleModal(null, false, null);
    }

    // 【前提】parentScheduleId は子を追加したい親スケジュールのid（currentScheduleTreeRowsに
    //   含まれること）。呼び出し元（WBS行の＋ボタン）は、depthLevelが
    //   MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN未満の行にしかこのボタンを出さないため、
    //   通常はここに到達する時点で3階層制約は満たされている。
    // 【処理】親をpresetParentIdとして固定した新規作成モーダルを開く（基本設計書4.1節：
    //   親→子→孫の3階層まで作成可能）。
    // 【結果】子スケジュール作成モーダルが表示される。
    function handleAddChildScheduleButtonClick(parentScheduleId) {
      const parentRow = currentScheduleTreeRows.find((row) => row.schedule.id === parentScheduleId);
      if (!parentRow || parentRow.depthLevel >= MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN) {
        window.alert("これ以上深い階層のスケジュールは作成できません（親→子→孫の3階層まで）。");
        return;
      }
      openScheduleModal(null, false, parentScheduleId);
    }

    // 【前提】scheduleId は編集したいスケジュールの id（currentScheduleTreeRowsに含まれること）。
    // 【処理】WBSパネルの行クリックから呼ばれ、該当スケジュールの編集モーダルを開く
    //   （モーダル・ダイアログ一覧M4：ガント上の行クリックで編集）。
    // 【結果】編集モーダルが表示される。
    function handleWbsRowClick(scheduleId) {
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!targetRow) return;
      openScheduleModal(targetRow.schedule, targetRow.hasChildren, null);
    }

    // 【前提】input は {name, startDate, endDate, hasChildren}（スケジュールモーダルの入力値）。
    //   子を持つ行は開始日・終了日が自動計算のため、日付のバリデーション自体を行わない。
    // 【処理】モーダル・ダイアログ一覧A5〜A7のバリデーションを順に判定する（DOMには触れない）。
    // 【結果】エラーがあればそのアラート文言（string）を、無ければnullを返す。
    function validateScheduleModalInput(input) {
      if (!input.name) return "スケジュールを入力してください";
      if (input.hasChildren) return null;
      if (!input.startDate || !input.endDate) return "日付を入力してください";
      if (input.endDate < input.startDate) return "終了日は開始日以降にしてください";
      return null;
    }

    // 【前提】existingSchedule はnull（新規作成）または既存スケジュールオブジェクト（編集）。
    //   presetParentId は新規作成時の親id（ルート作成ならnull、子スケジュール追加なら
    //   そのスケジュールのid）。existingSchedule有り（編集）の場合は無視する
    //   （編集では親を変更する機能を持たせないため）。
    // 【処理】モーダル内の入力値を読み取り、validateScheduleModalInputでバリデーションし、
    //   OKならaddScheduleで保存する。子を持つ行は開始日・終了日を既存値のまま維持する
    //   （手入力欄は読み取り専用にしているため）。
    //   新規作成後、親を持つ場合はsyncAncestorDatesで祖先の日付を再計算する
    //   （子を追加すると親の期間が変わりうるため。基本設計書4.3節）。
    // 【結果】保存成功時はモーダルを閉じ、ガントパネルを更新する。
    async function handleScheduleModalSaveButtonClick(existingSchedule, presetParentId) {
      const name = document.getElementById("scheduleModalNameInput").value.trim();
      const assignee = document.getElementById("scheduleModalAssigneeInput").value.trim();
      const taskStatus = document.getElementById("scheduleModalStatusSelect").value;
      const notes = document.getElementById("scheduleModalNotesTextarea").value;
      const selectedSwatch = document.querySelector(".modal-color-swatch.is-selected");
      const color = selectedSwatch ? selectedSwatch.dataset.color : SCHEDULE_BAR_COLOR_PALETTE[0];

      const existingRow = existingSchedule ? currentScheduleTreeRows.find((row) => row.schedule.id === existingSchedule.id) : null;
      const hasChildren = Boolean(existingRow?.hasChildren);

      let startDate = existingSchedule ? existingSchedule.startDate : "";
      let endDate = existingSchedule ? existingSchedule.endDate : "";
      if (!hasChildren) {
        startDate = document.getElementById("scheduleModalStartDateInput").value;
        endDate = document.getElementById("scheduleModalEndDateInput").value;
      }

      const validationError = validateScheduleModalInput({ name, startDate, endDate, hasChildren });
      if (validationError) {
        window.alert(validationError);
        return;
      }

      const scheduleToSave = existingSchedule
        ? { ...existingSchedule, name, startDate, endDate, assignee, taskStatus, notes, color }
        : {
            id: generateId(),
            projectId: currentSelectedProjectId,
            parentId: presetParentId ?? null,
            name,
            startDate,
            endDate,
            assignee,
            taskStatus,
            notes,
            color,
            order: currentScheduleTreeRows.length,
          };
      await addSchedule(scheduleToSave);
      if (scheduleToSave.parentId !== null && scheduleToSave.parentId !== undefined) {
        await syncAncestorDates(scheduleToSave.parentId);
      }
      closeModal();
      await refreshGanttPanel(currentSelectedProjectId);
    }

    // 【前提】scheduleId は移動したいスケジュールのid。direction は "up" | "down"。
    //   呼び出し元（WBS行の上下矢印）は、兄弟内の先頭で"up"・末尾で"down"のボタンを
    //   無効化しているため、通常はここに到達する時点で境界チェックは満たされている。
    // 【処理】同じ親を持つ兄弟同士（parentIdが一致するスケジュール）をorder順に並べ、
    //   指定方向の隣接する兄弟とorder値を入れ替えて保存する（基本設計書4.1節：
    //   「並び替えは同一階層内でのみ可能」を、parentId一致という条件でそのまま満たす）。
    // 【結果】隣接する2件のorderが入れ替わり、ガントパネルが再描画される。
    async function handleMoveScheduleOrderClick(scheduleId, direction) {
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!targetRow) return;

      const siblingSchedules = currentScheduleTreeRows
        .filter((row) => row.schedule.parentId === targetRow.schedule.parentId)
        .map((row) => row.schedule)
        .sort((a, b) => a.order - b.order);
      const currentIndex = siblingSchedules.findIndex((schedule) => schedule.id === scheduleId);
      const swapIndex = direction === "up" ? currentIndex - 1 : currentIndex + 1;
      if (swapIndex < 0 || swapIndex >= siblingSchedules.length) return;

      const currentSchedule = siblingSchedules[currentIndex];
      const swapSchedule = siblingSchedules[swapIndex];
      const currentOrder = currentSchedule.order;
      await addSchedule({ ...currentSchedule, order: swapSchedule.order });
      await addSchedule({ ...swapSchedule, order: currentOrder });
      await refreshGanttPanel(currentSelectedProjectId);
    }

    // 【前提】draggedId は掴んで動かしたスケジュールのid。targetId はドロップ先の行のid。
    //   同じidの場合、または親（parentId）が異なる場合（基本設計書4.1節「並び替えは同一階層
    //   内でのみ可能」）は何もしない。
    // 【処理】ドラッグ対象と同じ兄弟グループ内で、ドロップ先の位置へドラッグ対象を移動し、
    //   兄弟全員のorderを0番から振り直して保存する（クリックでの上下移動は隣接swapで済むが、
    //   ドラッグは任意の位置へ一気に移動できるため、隣接swapでは対応できず全員の振り直しが必要）。
    // 【結果】兄弟内の並び順が変わり、ガントパネルが再描画される。
    async function handleScheduleDragDrop(draggedId, targetId) {
      if (draggedId === targetId) return;
      const draggedRow = currentScheduleTreeRows.find((row) => row.schedule.id === draggedId);
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === targetId);
      if (!draggedRow || !targetRow) return;
      if (draggedRow.schedule.parentId !== targetRow.schedule.parentId) return;

      const siblingSchedules = currentScheduleTreeRows
        .filter((row) => row.schedule.parentId === draggedRow.schedule.parentId)
        .map((row) => row.schedule)
        .sort((a, b) => a.order - b.order);
      const fromIndex = siblingSchedules.findIndex((schedule) => schedule.id === draggedId);
      const toIndex = siblingSchedules.findIndex((schedule) => schedule.id === targetId);
      const [movedSchedule] = siblingSchedules.splice(fromIndex, 1);
      siblingSchedules.splice(toIndex, 0, movedSchedule);

      for (let index = 0; index < siblingSchedules.length; index++) {
        await addSchedule({ ...siblingSchedules[index], order: index });
      }
      await refreshGanttPanel(currentSelectedProjectId);
    }

    // 【前提】scheduleId は削除したいスケジュールのid。
    // 【処理】子の有無でC2（子なし）／C3（子あり・サブタスクごと削除）の確認文言を切り替えて
    //   confirm()し、OKならdeleteScheduleCascadeで削除する（連鎖削除・コメント削除・
    //   変更履歴記録・祖先日付再計算は既存の複合操作にすべて任せる）。
    // 【結果】確認OK時、対象と子孫が削除されガントパネルが再描画される。キャンセル時は何もしない。
    async function handleDeleteScheduleButtonClick(scheduleId) {
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!targetRow) return;
      const confirmMessage = targetRow.hasChildren
        ? `「${targetRow.schedule.name}」とそのサブタスクをすべて削除しますか？`
        : `「${targetRow.schedule.name}」を削除しますか？`;
      if (!window.confirm(confirmMessage)) return;
      await deleteScheduleCascade(scheduleId, currentSelectedProjectId);
      await refreshGanttPanel(currentSelectedProjectId);
    }

    // 【前提】action は "toggle-collapse" | "move-up" | "move-down" | "add-child" | "edit" | "delete"。
    //   scheduleId はアイコンが乗っていたWBS行のスケジュールid。
    // 【処理】WBS行のホバーアイコン共通のディスパッチャー。開閉トグルはDB再取得不要のため
    //   rerenderWbsAndGanttFromCacheのみ、それ以外は各専用ハンドラへ委譲する。
    // 【結果】actionに応じた処理が実行される。
    async function handleWbsRowIconClick(action, scheduleId) {
      if (action === "toggle-collapse") {
        if (collapsedScheduleIds.has(scheduleId)) {
          collapsedScheduleIds.delete(scheduleId);
        } else {
          collapsedScheduleIds.add(scheduleId);
        }
        rerenderWbsAndGanttFromCache();
        return;
      }
      if (action === "move-up") {
        await handleMoveScheduleOrderClick(scheduleId, "up");
        return;
      }
      if (action === "move-down") {
        await handleMoveScheduleOrderClick(scheduleId, "down");
        return;
      }
      if (action === "add-child") {
        handleAddChildScheduleButtonClick(scheduleId);
        return;
      }
      if (action === "edit") {
        handleWbsRowClick(scheduleId);
        return;
      }
      if (action === "delete") {
        await handleDeleteScheduleButtonClick(scheduleId);
        return;
      }
    }

    // ===== UI：その他のイベントハンドラ =====
    // 【設計判断】issuesの追加は今回スコープの手前でprompt()ベースの最小限のまま据え置く
    //   （マインドマップのスライドパネル化自体を今回は見送っているため）。

    // 【前提】formElement は「.kanban-add-form」要素（data-column-status属性でstatus値を持つ）。
    // 【処理】埋め込みフォームの入力値を読み取り、タスク名が空でなければaddTaskで保存する
    //   （モーダル・ダイアログ一覧P1：モーダルを介さずその場で追加）。
    // 【結果】保存後、カンバンパネルを再描画する（入力欄は再描画により自動的に空になる）。
    async function handleKanbanAddFormSubmit(formElement) {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const title = formElement.querySelector(".kanban-add-title-input").value.trim();
      if (!title) {
        window.alert("タスク名を入力してください");
        return;
      }
      const priority = Number(formElement.querySelector(".kanban-add-priority-select").value);
      const dueDate = formElement.querySelector(".kanban-add-duedate-input").value;
      const columnStatus = formElement.dataset.columnStatus;
      await addTask({
        id: generateId(),
        projectId: currentSelectedProjectId,
        title,
        status: columnStatus,
        done: columnStatus === "done",
        doneAt: columnStatus === "done" ? new Date().toISOString() : null,
        priority,
        dueDate,
        description: "",
        order: 0,
      });
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // 【前提】task は編集対象の既存タスクオブジェクト。
    // 【処理】タイトル・ステータス・優先度・期日・メモ（詳細）の入力欄を持つモーダルの
    //   HTML文字列を組み立てる（詳細設計書3.3.2：saveTodoEdit相当。作成後は一切編集
    //   できなかった従来の制約を解消する。新規作成は列埋め込みフォームで行うため、
    //   このモーダルは編集専用で新規作成モードを持たない）。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    function renderTaskModalToHtml(task) {
      const statusOptionsHtml = Object.entries(TASK_STATUS_LABELS)
        .map(([value, label]) => `<option value="${value}"${value === task.status ? " selected" : ""}>${label}</option>`)
        .join("");
      const priorityOptionsHtml = Object.entries(TASK_PRIORITY_LABELS)
        .map(([value, label]) => `<option value="${value}"${Number(value) === task.priority ? " selected" : ""}>${label}</option>`)
        .join("");
      return `
        <h2>タスク編集</h2>
        <div class="modal-field">
          <label for="taskModalTitleInput">タスク名</label>
          <input type="text" id="taskModalTitleInput" value="${escapeHtmlText(task.title)}">
        </div>
        <div class="modal-field">
          <label for="taskModalStatusSelect">ステータス</label>
          <select id="taskModalStatusSelect">${statusOptionsHtml}</select>
        </div>
        <div class="modal-field">
          <label for="taskModalPrioritySelect">優先度</label>
          <select id="taskModalPrioritySelect">${priorityOptionsHtml}</select>
        </div>
        <div class="modal-field">
          <label for="taskModalDueDateInput">期日</label>
          <input type="date" id="taskModalDueDateInput" value="${escapeHtmlText(task.dueDate || "")}">
        </div>
        <div class="modal-field">
          <label for="taskModalDescriptionTextarea">メモ（詳細）</label>
          <textarea id="taskModalDescriptionTextarea" rows="4">${escapeHtmlText(task.description || "")}</textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="taskModalCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="taskModalSaveButton">保存</button>
        </div>
      `;
    }

    // 【前提】task は編集対象の既存タスクオブジェクト。
    // 【処理】タスク編集モーダルを開き、キャンセル・保存にイベントを登録する。
    // 【結果】モーダルが操作可能な状態で表示される。
    function openTaskEditModal(task) {
      openModal(renderTaskModalToHtml(task));
      document.getElementById("taskModalCancelButton").addEventListener("click", closeModal);
      document.getElementById("taskModalSaveButton").addEventListener("click", () => handleTaskModalSaveButtonClick(task));
    }

    // 【前提】existingTask は編集開始時点のタスクオブジェクト。
    // 【処理】モーダル内の入力値を読み取り、タイトルが空でなければaddTaskで上書き保存する。
    //   ステータスを"done"に変更した場合はdoneAtを現在時刻にし、"done"以外に変更した場合は
    //   done/doneAtをリセットする（列埋め込みフォームでの新規作成時と同じ不変条件を維持する。
    //   すでに"done"だった場合はdoneAtの上書きをせず、最初に完了した時刻を保持する）。
    // 【結果】保存成功時はモーダルを閉じ、カンバンパネルを更新する。
    async function handleTaskModalSaveButtonClick(existingTask) {
      const title = document.getElementById("taskModalTitleInput").value.trim();
      if (!title) {
        window.alert("タスク名を入力してください");
        return;
      }
      const status = document.getElementById("taskModalStatusSelect").value;
      const priority = Number(document.getElementById("taskModalPrioritySelect").value);
      const dueDate = document.getElementById("taskModalDueDateInput").value;
      const description = document.getElementById("taskModalDescriptionTextarea").value;
      const taskToSave = {
        ...existingTask,
        title,
        status,
        priority,
        dueDate,
        description,
        done: status === "done",
        doneAt: status === "done" ? (existingTask.status === "done" ? existingTask.doneAt : new Date().toISOString()) : null,
      };
      await addTask(taskToSave);
      closeModal();
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // 【前提】taskId はクリックされたカードのタスクid。
    // 【処理】最新のタスク一覧から対象を探し、編集モーダルを開く。
    // 【結果】編集モーダルが表示される。
    async function handleOpenTaskEditModalClick(taskId) {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const task = taskList.find((candidateTask) => candidateTask.id === taskId);
      if (!task) return;
      openTaskEditModal(task);
    }

    // 【前提】taskId は移動対象のタスクid。targetColumnStatus はドロップ先の列status
    //   （"backlog"|"doing"|"done"）。
    // 【処理】対象タスクのstatusをtargetColumnStatusに更新する（詳細設計書3.3.3：
    //   dropTodoCard。基本設計書1.3節に明記されている既知の非整合どおり、タスクのstatusは
    //   スケジュールのtaskStatusとは独立した別概念のため、他ストアとの連動は行わない）。
    //   ステータスを"done"に変更した場合のみdoneAtを現在時刻にする（編集モーダル保存時と
    //   同じ不変条件を維持する）。
    // 【結果】ステータスが実際に変わっていれば保存してカンバンパネルを再描画する。同じ列への
    //   ドロップ等、変わっていなければ何もしない。
    async function handleTaskDragDrop(taskId, targetColumnStatus) {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const task = taskList.find((candidateTask) => candidateTask.id === taskId);
      if (!task || task.status === targetColumnStatus) return;
      await addTask({
        ...task,
        status: targetColumnStatus,
        done: targetColumnStatus === "done",
        doneAt: targetColumnStatus === "done" ? new Date().toISOString() : null,
      });
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    async function handleAddIssueButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const issueTitle = window.prompt("ノードのタイトルを入力してください");
      if (!issueTitle) return;
      // 新規ノードが重ならないよう、ある程度ばらけた座標に配置する
      // （初期配置のみランダム。配置後はドラッグで自由に動かせる＝下記の一連のハンドラ）。
      const randomX = Math.round(80 + Math.random() * 320);
      const randomY = Math.round(60 + Math.random() * 300);
      const colorIndex = Math.floor(Math.random() * MINDMAP_NODE_COLORS.length);
      await addIssue({
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: issueTitle,
        parentNodeId: null,
        x: randomX,
        y: randomY,
        color: MINDMAP_NODE_COLORS[colorIndex],
        order: 0,
      });
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // ===== マインドマップ：ノードのドラッグ配置 =====
    // 【設計判断】ノードの自由な2次元配置の変更は、HTML5のdraggable属性（discreteな
    //   ドロップ先を前提とするAPIで、WBS行の並び替えのような「入れ替え」向き）ではなく、
    //   pointerdown/pointermove/pointerupで座標を直接計算する方式にする。
    //   ドラッグ中は見た目（left/top）だけを更新し、DBへの保存はpointerup時の1回だけ行う
    //   （ドラッグ中に毎回addIssueするのは書き込み回数・再描画の面で無駄なため）。

    // ドラッグ中のノードのissueId。ドラッグしていない時はnull。
    let draggedMindmapIssueId = null;
    let mindmapDragStartPointerX = 0;
    let mindmapDragStartPointerY = 0;
    let mindmapDragStartNodeX = 0;
    let mindmapDragStartNodeY = 0;
    // これ未満の移動量は「クリック」とみなし、座標の保存を行わない（誤操作での無駄な書き込み防止）。
    const MINDMAP_DRAG_THRESHOLD_PX = 3;

    // 【前提】event はmindmap-node要素上でのpointerdownイベント。issueId はそのノードのid。
    //   nodeElement はイベントが発生した実際のDOM要素。
    // 【処理】ドラッグ開始時点のポインタ座標・ノード座標を記録する（以降のpointermoveで
    //   差分計算するための基準点）。
    // 【結果】ドラッグ状態が開始される（実際の座標更新はpointermoveハンドラが行う）。
    function handleMindmapNodePointerDown(event, issueId, nodeElement) {
      draggedMindmapIssueId = issueId;
      mindmapDragStartPointerX = event.clientX;
      mindmapDragStartPointerY = event.clientY;
      mindmapDragStartNodeX = parseFloat(nodeElement.style.left) || 0;
      mindmapDragStartNodeY = parseFloat(nodeElement.style.top) || 0;
      nodeElement.classList.add("is-dragging");
      nodeElement.setPointerCapture(event.pointerId);
    }

    // 【前提】draggedMindmapIssueIdが設定済み（ドラッグ中）であること。
    // 【処理】ポインタの移動量ぶん、ドラッグ中ノードのleft/topスタイルを直接書き換える。
    //   DBへの保存はしない（見た目だけをポインタに追従させる）。
    // 【結果】ノードが視覚的にポインタへ追従する。
    function handleMindmapNodePointerMove(event) {
      if (!draggedMindmapIssueId) return;
      const nodeElement = document.querySelector(`.mindmap-node[data-issue-id="${draggedMindmapIssueId}"]`);
      if (!nodeElement) return;
      const deltaX = event.clientX - mindmapDragStartPointerX;
      const deltaY = event.clientY - mindmapDragStartPointerY;
      nodeElement.style.left = `${mindmapDragStartNodeX + deltaX}px`;
      nodeElement.style.top = `${mindmapDragStartNodeY + deltaY}px`;
    }

    // 【前提】ドラッグ中であること。
    // 【処理】移動量がMINDMAP_DRAG_THRESHOLD_PX未満なら「クリック」とみなし何もしない。
    //   それ以上動いていれば、最終的なleft/topをissueのx/yとしてaddIssueで保存する
    //   （辺の再描画はrefreshMindmapPanelに任せる）。
    // 【結果】ノードの新しい座標がDBに保存され、パネルが再描画される。
    async function handleMindmapNodePointerUp(event) {
      if (!draggedMindmapIssueId) return;
      const issueId = draggedMindmapIssueId;
      draggedMindmapIssueId = null;
      const nodeElement = document.querySelector(`.mindmap-node[data-issue-id="${issueId}"]`);
      if (!nodeElement) return;
      nodeElement.classList.remove("is-dragging");

      const deltaX = event.clientX - mindmapDragStartPointerX;
      const deltaY = event.clientY - mindmapDragStartPointerY;
      if (Math.abs(deltaX) < MINDMAP_DRAG_THRESHOLD_PX && Math.abs(deltaY) < MINDMAP_DRAG_THRESHOLD_PX) {
        return;
      }

      const newX = Math.round(mindmapDragStartNodeX + deltaX);
      const newY = Math.round(mindmapDragStartNodeY + deltaY);
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const existingIssue = issueList.find((issue) => issue.id === issueId);
      if (!existingIssue) return;
      await addIssue({ ...existingIssue, x: newX, y: newY });
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // ===== マインドマップ：右クリックメニュー =====
    // 【設計判断】メニューはDOM上に1つだけ常設し（#mindmapContextMenu）、開くたびに
    //   表示位置（クリック位置）とcurrentContextMenuIssueId（対象ノード）を差し替える。
    //   モーダルと同じ「入れ物を使い回す」設計に揃えている。

    // 現在メニューが開いている対象ノードのissueId。閉じている間はnull。
    let currentContextMenuIssueId = null;

    // 【前提】issueId は右クリックされたノードのid。clientX/clientY はイベント発生位置。
    // 【処理】メニューを対象ノードのidと紐づけて、クリックされた座標に表示する。
    // 【結果】右クリックメニューが画面上に表示される。
    function openMindmapContextMenu(issueId, clientX, clientY) {
      currentContextMenuIssueId = issueId;
      const menuElement = document.getElementById("mindmapContextMenu");
      menuElement.style.left = `${clientX}px`;
      menuElement.style.top = `${clientY}px`;
      menuElement.hidden = false;
    }

    // 【前提】なし。
    // 【処理】メニューを非表示にし、対象ノードの紐づけを解除する。
    // 【結果】右クリックメニューが閉じる。
    function closeMindmapContextMenu() {
      currentContextMenuIssueId = null;
      document.getElementById("mindmapContextMenu").hidden = true;
    }

    // 【前提】issueId は名前を変更したいノードのid。
    // 【処理】prompt()で新しい名前を受け取り、空でなければaddIssueで保存する
    //   （モーダル・ダイアログ一覧P7：右クリックメニュー「名前を変更」に対応）。
    // 【結果】保存後、パネルを再描画する。
    async function handleRenameIssueButtonClick(issueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const existingIssue = issueList.find((issue) => issue.id === issueId);
      if (!existingIssue) return;
      const newTitle = window.prompt("新しいノード名を入力してください", existingIssue.title);
      if (!newTitle) return;
      await addIssue({ ...existingIssue, title: newTitle });
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】parentIssueId は子ノードを追加したい親ノードのid。
    // 【処理】parentNodeIdをparentIssueIdに固定した新規ノードを、親の近くの座標に作成する
    //   （モーダル・ダイアログ一覧P7：右クリックメニュー「子ノード追加」に対応）。
    // 【結果】保存後、パネルを再描画する。
    async function handleAddChildIssueButtonClick(parentIssueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const parentIssue = issueList.find((issue) => issue.id === parentIssueId);
      if (!parentIssue) return;
      const childTitle = window.prompt("子ノードのタイトルを入力してください");
      if (!childTitle) return;
      const colorIndex = Math.floor(Math.random() * MINDMAP_NODE_COLORS.length);
      await addIssue({
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: childTitle,
        parentNodeId: parentIssueId,
        x: parentIssue.x + 120,
        y: parentIssue.y + 60,
        color: MINDMAP_NODE_COLORS[colorIndex],
        order: 0,
      });
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】siblingIssueId は兄弟ノードを追加したい基準ノードのid。
    // 【処理】siblingIssueIdと同じparentNodeIdを持つ新規ノードを、基準ノードの近くの座標に
    //   作成する（モーダル・ダイアログ一覧P7：右クリックメニュー「兄弟ノード追加」に対応）。
    //   基準ノードがルート（parentNodeId:null）の場合は、新規ノードもルートとして作る。
    // 【結果】保存後、パネルを再描画する。
    async function handleAddSiblingIssueButtonClick(siblingIssueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      const siblingIssue = issueList.find((issue) => issue.id === siblingIssueId);
      if (!siblingIssue) return;
      const newTitle = window.prompt("兄弟ノードのタイトルを入力してください");
      if (!newTitle) return;
      const colorIndex = Math.floor(Math.random() * MINDMAP_NODE_COLORS.length);
      await addIssue({
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: newTitle,
        parentNodeId: siblingIssue.parentNodeId,
        x: siblingIssue.x,
        y: siblingIssue.y + 80,
        color: MINDMAP_NODE_COLORS[colorIndex],
        order: 0,
      });
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】action は右クリックメニューのdata-action値（"rename"|"add-child"|"add-sibling"|
    //   "toggle-collapse"|"delete"）。currentContextMenuIssueIdがメニューを開いた時点の
    //   対象ノードを保持している。
    // 【処理】メニューを閉じてから、actionに応じた処理へ委譲する。
    // 【結果】選択した操作が実行される。
    async function handleMindmapContextMenuAction(action) {
      const issueId = currentContextMenuIssueId;
      closeMindmapContextMenu();
      if (!issueId) return;
      if (action === "rename") {
        await handleRenameIssueButtonClick(issueId);
      } else if (action === "add-child") {
        await handleAddChildIssueButtonClick(issueId);
      } else if (action === "add-sibling") {
        await handleAddSiblingIssueButtonClick(issueId);
      } else if (action === "toggle-collapse") {
        handleToggleIssueCollapseButtonClick(issueId);
      } else if (action === "delete") {
        await handleDeleteIssueButtonClick(issueId);
      }
    }

    // 【前提】issueId は削除起点のノードid。
    // 【処理】削除対象件数（起点＋子孫）をcollectIssueSubtreeIdsで数え、詳細設計書3.5.3節の
    //   仕様どおり3件を超える場合のみconfirm()で確認する（3件以下は誤操作しても
    //   取り返しがつく範囲とみなし、即削除する）。
    // 【結果】確認OK、または3件以下ならdeleteIssueCascadeで削除しパネルを再描画する。
    //   キャンセル時は何もしない。
    async function handleDeleteIssueButtonClick(issueId) {
      const issueList = await getIssuesByProject(currentSelectedProjectId);
      if (!issueList.some((issue) => issue.id === issueId)) return;
      const subtreeIds = collectIssueSubtreeIds(issueList, issueId);
      if (subtreeIds.length > 3) {
        const confirmMessage = `このノードと子孫ノード計${subtreeIds.length}件を削除しますか？`;
        if (!window.confirm(confirmMessage)) return;
      }
      await deleteIssueCascade(issueId, currentSelectedProjectId);
      await refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】issueId は開閉を切り替えたいノードのid。
    // 【処理】collapsedMindmapIssueIdsへの追加/削除だけを行い、パネルを再描画する
    //   （折りたたみ状態はDB非保存の画面上だけの一時状態。collapsedScheduleIdsと同じ設計）。
    // 【結果】対象ノードの子孫が表示/非表示になる。
    function handleToggleIssueCollapseButtonClick(issueId) {
      if (collapsedMindmapIssueIds.has(issueId)) {
        collapsedMindmapIssueIds.delete(issueId);
      } else {
        collapsedMindmapIssueIds.add(issueId);
      }
      refreshMindmapPanel(currentSelectedProjectId);
    }

    // 【前提】currentProjectObjectが設定済み（プロジェクト選択済み）であること。
    // 【処理】現在のプロジェクトのlockedを反転させて保存し、画面のロック表示を更新する
    //   （基本設計書3.3節：ロックONで薄赤帯表示・スケジュール追加ボタン無効化）。
    // 【結果】ロック状態がDBに保存され、画面にも反映される。
    async function handleLockToggleButtonClick() {
      if (!currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const updatedProject = { ...currentProjectObject, locked: !currentProjectObject.locked };
      await addProject(updatedProject);
      currentProjectObject = updatedProject;
      applyLockState(updatedProject.locked);
    }

    // 【前提】currentTimelineStartDateStringが設定済み（ガントパネルが1度は描画済み）であること。
    // 【処理】今日の日付がタイムライン先頭から何日目かを計算し、その位置が見えるよう
    //   ガントのスクロール領域を横スクロールする（基本設計書2.2節「今日」ボタンの仕様）。
    // 【結果】ガントチャートが今日の日付付近までスクロールされる。
    function handleTodayButtonClick() {
      if (!currentTimelineStartDateString) return;
      const todayDateString = new Date().toISOString().slice(0, 10);
      const dayOffset = calculateDayOffsetFromTimelineStart(todayDateString, currentTimelineStartDateString);
      const pixelsPerDay = GRANULARITY_PIXELS_PER_DAY[currentGranularity];
      document.querySelector(".gantt-scroll-area").scrollLeft = Math.max(dayOffset * pixelsPerDay - 100, 0);
    }
