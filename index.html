    //   1件ずつ保存する際に必ずrecordChangelogEntryも呼ぶため全件がログに残るが、復元は
    //   意図的にこの経路を通らない。これはお手本アプリの仕様として確認された非対称であり、
    //   「統一されていないバグ」ではなく「そのまま再現すべき仕様」として扱う。
    //   実現方法：addSchedule/deleteSchedule/addProjectはそもそも内部でchangelogへ書き込まない
    //   （書き込むかどうかは呼び出し側がrecordChangelogEntryを呼ぶか次第）。そのため
    //   「ログを経由しない一括書き換え」のための専用の低レベル関数やフラグ引数は不要で、
    //   この関数が既存のadd/delete関数をそのまま呼び、recordChangelogEntryを呼ばないだけで
    //   実現できる。
    //
    // 【前提】snapshot は復元対象のスナップショットオブジェクト（snapshot.data = {project, schedules}）。
    // 【処理】snapshot.projectIdの現在のschedules全件を削除し、snapshot.data.schedulesの内容を
    //   そのまま書き戻す（idはスナップショット時点のものを維持）。続けて、対象projectの
    //   startDate/endDate/milestonesのみをスナップショット時点の値に書き戻す（locked/createdAt等
    //   復元対象外のフィールドは現状を維持する）。
    //   【対象ストア外への影響（対応しない）】comments等、削除されるscheduleに紐づく他ストアの
    //   データはこの関数では一切触れない（対象ストアはschedules/projects/snapshotsのみと
    //   指定されているため）。孤立したコメントが残る可能性があるが、変更履歴の「戻す」機能に
    //   ある既知の非整合と同種のものとして今回は対応しない。
    // 【結果】DBが復元後の状態になる（画面更新・トースト表示は呼び出し側の責務）。
    async function restoreSnapshot(snapshot) {
      const currentSchedules = await getSchedulesByProject(snapshot.projectId);
      for (const schedule of currentSchedules) {
        await deleteSchedule(schedule.id);
      }
      for (const schedule of snapshot.data.schedules) {
        await addSchedule(schedule);
      }

      const projectList = await getAllProjects();
      const project = projectList.find((candidateProject) => candidateProject.id === snapshot.projectId);
      if (project) {
        await addProject({
          ...project,
          startDate: snapshot.data.project.startDate,
          endDate: snapshot.data.project.endDate,
          milestones: snapshot.data.project.milestones,
        });
      }
    }

    // 【前提】snapshotId は復元したいスナップショットのid。
    // 【処理】対象スナップショットを取得し、確認ダイアログの上でrestoreSnapshotする。
    // 【結果】確認OK時、DBが復元され、switchToProjectで画面一式（ガント・カンバン・
    //   マインドマップ・ロック状態）を再取得・再描画し、トースト「「{名前}」に復元しました」を
    //   表示する。キャンセル時は何もしない。
    async function handleRestoreSnapshotButtonClick(snapshotId) {
      const snapshotList = await getSnapshotsByProject(currentSelectedProjectId);
      const snapshot = snapshotList.find((candidateSnapshot) => candidateSnapshot.id === snapshotId);
      if (!snapshot) return;
      if (!window.confirm(`「${snapshot.name}」の状態に復元しますか？\n現在のスケジュールデータは上書きされます。`)) return;

      await restoreSnapshot(snapshot);
      await switchToProject(snapshot.projectId);
      await refreshSnapshotPanel(snapshot.projectId);
      showToast(`「${snapshot.name}」に復元しました`);
    }

    // 【前提】snapshotId は比較したいスナップショットのid。
    // 【処理】expandedSnapshotCompareIdsへの追加/削除だけをトグルする（基本設計書の指定どおり、
    //   もう一度押すと閉じる）。新たに展開する場合のみcompareSnapshotを計算してキャッシュに
    //   保持し、閉じる場合はキャッシュを破棄する（次に開いたときは最新のDB状態で再計算する）。
    // 【結果】パネルが再描画され、対象スナップショットの比較結果が表示/非表示になる。
    async function handleCompareSnapshotButtonClick(snapshotId) {
      if (expandedSnapshotCompareIds.has(snapshotId)) {
        expandedSnapshotCompareIds.delete(snapshotId);
        snapshotCompareResultsById.delete(snapshotId);
      } else {
        const snapshotList = await getSnapshotsByProject(currentSelectedProjectId);
        const snapshot = snapshotList.find((candidateSnapshot) => candidateSnapshot.id === snapshotId);
        if (!snapshot) return;
        const diffResult = await compareSnapshot(snapshot);
        expandedSnapshotCompareIds.add(snapshotId);
        snapshotCompareResultsById.set(snapshotId, diffResult);
      }
      await refreshSnapshotPanel(currentSelectedProjectId);
    }

    // ===== P3：即時メモパネル =====

    // 【前提】quickMemoList は同一プロジェクト内の即時メモ全件。
    // 【処理】投稿日時の昇順（古い→新しい、チャットのタイムライン表示）に並べ、
    //   各メモに削除ボタンを持つHTML文字列を組み立てる。
    // 【結果】quickMemoPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderQuickMemoTimelineToHtml(quickMemoList) {
      if (quickMemoList.length === 0) {
        return '<p class="empty-state-message">即時メモがありません。</p>';
      }
      return quickMemoList
        .slice()
        .sort((a, b) => (a.createdAt < b.createdAt ? -1 : 1))
        .map(
          (quickMemo) => `<div class="panel-list-item" data-quick-memo-id="${escapeHtmlText(quickMemo.id)}">
            <div class="panel-list-item-main">
              <div>${escapeHtmlText(quickMemo.text)}</div>
              <div class="panel-list-item-meta">${escapeHtmlText(quickMemo.createdAt)}</div>
            </div>
            <div class="panel-list-item-actions">
              <button type="button" class="wbs-icon-button" data-action="delete-quick-memo" title="削除">🗑</button>
            </div>
          </div>`
        )
        .join("");
    }

    function applyQuickMemoPanel(bodyHtml) {
      document.getElementById("quickMemoPanelBody").innerHTML = bodyHtml;
    }

    async function refreshQuickMemoPanel(projectId) {
      if (!projectId) {
        applyQuickMemoPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const quickMemoList = await getQuickMemosByProject(projectId);
      applyQuickMemoPanel(renderQuickMemoTimelineToHtml(quickMemoList));
      // 投稿後・削除後も一覧の最新（末尾）が見えるよう、パネル下端までスクロールする。
      const panelBody = document.getElementById("quickMemoPanelBody");
      panelBody.scrollTop = panelBody.scrollHeight;
    }

    // 【前提】currentSelectedProjectIdが設定済みであること。
    // 【処理】投稿欄のテキストが空でなければaddQuickMemoで保存し、入力欄を空にする。
    // 【結果】投稿後、パネルを再描画する。
    async function handlePostQuickMemoButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const textInput = document.getElementById("quickMemoTextInput");
      const text = textInput.value.trim();
      if (!text) return;
      await addQuickMemo({ id: generateId(), projectId: currentSelectedProjectId, text, createdAt: new Date().toISOString() });
      textInput.value = "";
      await refreshQuickMemoPanel(currentSelectedProjectId);
    }

    // 【前提】quickMemoId は削除したい即時メモのid。
    // 【処理】確認ダイアログ無しで即削除する（基本設計書10.1節：即時メモの個別削除は
    //   「書き捨てメモ」という性質上、確認なしの即削除が仕様として扱われる）。
    // 【結果】削除後、パネルを再描画する。
    async function handleDeleteQuickMemoButtonClick(quickMemoId) {
      await deleteQuickMemo(quickMemoId);
      await refreshQuickMemoPanel(currentSelectedProjectId);
    }

    // 【前提】currentSelectedProjectIdが設定済みであること。
    // 【処理】0件なら案内のみ表示して終了する。1件以上あれば件数を明示した確認ダイアログの上で
    //   clearQuickMemosByProjectする（詳細設計書3.8.2 clearQuickMemos相当。DB側の関数
    //   clearQuickMemosByProjectは既に実装済みだったが、呼び出すUIボタンが無かったため追加する）。
    // 【結果】確認OK時、このプロジェクトの即時メモがすべて削除され、パネルが再描画される。
    //   トースト「即時メモを削除しました」を表示する。0件の場合はトースト「メモがありません」。
    async function handleClearQuickMemosButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const quickMemoList = await getQuickMemosByProject(currentSelectedProjectId);
      if (quickMemoList.length === 0) {
        showToast("メモがありません");
        return;
      }
      if (!window.confirm(`${quickMemoList.length}件のメモを全て削除しますか？`)) return;
      await clearQuickMemosByProject(currentSelectedProjectId);
      await refreshQuickMemoPanel(currentSelectedProjectId);
      showToast("即時メモを削除しました");
    }

    // ===== P4：メモパネル =====
    // 【設計判断】自動保存はデバウンス方式ではなく、入力欄からフォーカスが外れた時点
    //   （blur）で保存する簡略版にする。デバウンスタイマーの管理はコードの複雑さの割に
    //   今回のスコープでの価値が低いと判断した。Markdownプレビューも今回は実装せず、
    //   プレーンテキストのまま表示・編集する。

    // 現在エディタで開いているメモのid。未選択時はnull。
    let currentSelectedMemoId = null;

    // 【前提】memoList は同一プロジェクト内のメモ全件。selectedMemoId は現在編集中のメモid。
    // 【処理】タイトル・更新日時・削除ボタンを持つ一覧のHTML文字列を組み立てる。選択中の
    //   メモにはis-selectedクラスを付ける。
    // 【結果】memoListBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderMemoListToHtml(memoList, selectedMemoId) {
      if (memoList.length === 0) {
        return '<p class="empty-state-message">メモがありません。</p>';
      }
      const sortByOrder = (a, b) => a.order - b.order;
      return memoList
        .slice()
        .sort(sortByOrder)
        .map((memo) => {
          const selectedClass = memo.id === selectedMemoId ? " is-selected" : "";
          return `<div class="panel-list-item memo-list-item${selectedClass}" data-memo-id="${escapeHtmlText(memo.id)}" data-action="select-memo">
            <div class="panel-list-item-main">
              <div>${escapeHtmlText(memo.title)}</div>
              <div class="panel-list-item-meta">${escapeHtmlText(memo.updatedAt)}</div>
            </div>
            <div class="panel-list-item-actions">
              <button type="button" class="wbs-icon-button" data-action="delete-memo" title="削除">🗑</button>
            </div>
          </div>`;
        })
        .join("");
    }

    // 【前提】memo はnull（未選択）または選択中のメモオブジェクト。
    // 【処理】タイトル入力欄・本文テキストエリアを持つ編集エリアのHTML文字列を組み立てる。
    // 【結果】memoEditorBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderMemoEditorToHtml(memo) {
      if (!memo) {
        return '<p class="empty-state-message">左の一覧からメモを選択するか、新規作成してください。</p>';
      }
      return `
        <input type="text" id="memoEditorTitleInput" value="${escapeHtmlText(memo.title)}" placeholder="タイトル">
        <textarea id="memoEditorBodyTextarea" placeholder="本文（Markdown）">${escapeHtmlText(memo.body)}</textarea>
      `;
    }

    function applyMemoListPanel(bodyHtml) {
      document.getElementById("memoListBody").innerHTML = bodyHtml;
    }

    function applyMemoEditorPanel(bodyHtml) {
      document.getElementById("memoEditorBody").innerHTML = bodyHtml;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】getMemosByProjectで取得して一覧を再描画し、currentSelectedMemoIdが
    //   まだ存在するメモを指していれば、そのメモをエディタに再表示する
    //   （存在しなくなっていれば＝削除された場合、選択を解除する）。
    // 【結果】メモ一覧・編集エリア両方の表示が最新の状態に更新される。
    async function refreshMemoPanel(projectId) {
      if (!projectId) {
        applyMemoListPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        applyMemoEditorPanel(null);
        currentSelectedMemoId = null;
        return;
      }
      const memoList = await getMemosByProject(projectId);
      if (currentSelectedMemoId && !memoList.some((memo) => memo.id === currentSelectedMemoId)) {
        currentSelectedMemoId = null;
      }
      applyMemoListPanel(renderMemoListToHtml(memoList, currentSelectedMemoId));
      const selectedMemo = memoList.find((memo) => memo.id === currentSelectedMemoId) || null;
      applyMemoEditorPanel(renderMemoEditorToHtml(selectedMemo));
    }

    async function handleCreateMemoButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const memoList = await getMemosByProject(currentSelectedProjectId);
      const nowIsoString = new Date().toISOString();
      const newMemo = {
        id: generateId(),
        projectId: currentSelectedProjectId,
        title: "新規メモ",
        body: "",
        order: memoList.length,
        createdAt: nowIsoString,
        updatedAt: nowIsoString,
      };
      await addMemo(newMemo);
      currentSelectedMemoId = newMemo.id;
      await refreshMemoPanel(currentSelectedProjectId);
    }

    function handleSelectMemoButtonClick(memoId) {
      currentSelectedMemoId = memoId;
      refreshMemoPanel(currentSelectedProjectId);
    }

    // 【前提】memoId は削除したいメモのid。
    // 【処理】確認ダイアログ（モーダル・ダイアログ一覧C4）の上でdeleteMemoする。
    // 【結果】確認OK時、削除してパネルを再描画し（選択解除はrefreshMemoPanel側で判定）、
    //   トースト「メモを削除しました」を表示する（詳細設計書3.7.2）。
    async function handleDeleteMemoButtonClick(memoId) {
      const memoList = await getMemosByProject(currentSelectedProjectId);
      const targetMemo = memoList.find((memo) => memo.id === memoId);
      if (!targetMemo) return;
      if (!window.confirm(`「${targetMemo.title || "無題"}」を削除しますか？`)) return;
      await deleteMemo(memoId);
      await refreshMemoPanel(currentSelectedProjectId);
      showToast("メモを削除しました");
    }

    // 【前提】currentSelectedMemoIdが設定済み（エディタにメモが表示されている）であること。
    // 【処理】タイトル・本文入力欄からフォーカスが外れた時点で読み取り、addMemoで保存する。
    // 【結果】保存後、一覧側の表示（タイトル・更新日時）を最新化する。
    async function handleMemoEditorFieldBlur() {
      if (!currentSelectedMemoId) return;
      const memoList = await getMemosByProject(currentSelectedProjectId);
      const existingMemo = memoList.find((memo) => memo.id === currentSelectedMemoId);
      if (!existingMemo) return;
      const title = document.getElementById("memoEditorTitleInput").value;
      const body = document.getElementById("memoEditorBodyTextarea").value;
      await addMemo({ ...existingMemo, title, body, updatedAt: new Date().toISOString() });
      const memoListAfterSave = await getMemosByProject(currentSelectedProjectId);
      applyMemoListPanel(renderMemoListToHtml(memoListAfterSave, currentSelectedMemoId));
    }

    // ===== P5：コメント一覧パネル =====
    // 【設計判断】commentsはprojectIdを持たないため（データモデル設計3.5節）、
    //   getSchedulesByProjectで対象スケジュールid集合を先に取得し、各idについて
    //   getCommentsByTaskで束ねる（複数ストアをまたぐ合成処理）。
    //   コメントの追加導線は本来M4（スケジュール編集モーダル）に埋め込む仕様だが、
    //   M4への埋め込みは別工程のため、今回はこのパネル内に「スケジュールを選んで投稿」する
    //   簡易フォームを暫定的に置く（スコープの妥協点）。

    // 【前提】commentGroups は [{schedule, comments}] の配列（コメントが1件以上ある
    //   スケジュールのみ）。collapsedScheduleIds は見出しクリックで折りたたまれている
    //   スケジュールidの集合。
    // 【処理】スケジュール名を見出しに、コメント本文・投稿日時・削除ボタンを並べたHTML文字列を
    //   組み立てる。折りたたまれているグループはコメント本文一覧を省略し、見出しにis-collapsed
    //   クラスを付ける（UI差分表No.68：グリフ切り替えではなく、固定の矢印1文字をCSSで
    //   回転させて開閉状態を示す。中身は非表示だが件数はグルーピング自体には影響しない）。
    // 【結果】commentPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderCommentGroupsToHtml(commentGroups, collapsedScheduleIds) {
      if (commentGroups.length === 0) {
        return '<p class="empty-state-message">コメントがありません。</p>';
      }
      return commentGroups
        .map(({ schedule, comments }) => {
          const isGroupCollapsed = collapsedScheduleIds.has(schedule.id);
          const commentsHtml = isGroupCollapsed
            ? ""
            : comments
                .slice()
                .sort((a, b) => (a.createdAt < b.createdAt ? -1 : 1))
                .map(
                  (comment) => `<div class="panel-list-item" data-comment-id="${escapeHtmlText(comment.id)}">
                <div class="panel-list-item-main">
                  <div>${escapeHtmlText(comment.text)}</div>
                  <div class="panel-list-item-meta">${escapeHtmlText(comment.createdAt)}</div>
                </div>
                <div class="panel-list-item-actions">
                  <button type="button" class="wbs-icon-button" data-action="delete-comment" title="削除">🗑</button>
                </div>
              </div>`
                )
                .join("");
          const collapsedHeadingClass = isGroupCollapsed ? " is-collapsed" : "";
          return `<div class="comment-group-heading${collapsedHeadingClass}" data-action="toggle-comment-group" data-schedule-id="${escapeHtmlText(schedule.id)}"><span class="cml-chevron">▾</span> ${escapeHtmlText(schedule.name)}</div>${commentsHtml}`;
        })
        .join("");
    }

    // 【前提】scheduleList は同一プロジェクト内のスケジュール全件。
    // 【処理】投稿先スケジュールを選ぶ<select>・テキスト欄・投稿ボタンを持つ簡易フォームの
    //   HTML文字列を組み立てる。
    // 【結果】コメント投稿フォームのHTML文字列を返す。
    function renderCommentPostFormToHtml(scheduleList) {
      const optionsHtml = scheduleList.map((schedule) => `<option value="${escapeHtmlText(schedule.id)}">${escapeHtmlText(schedule.name)}</option>`).join("");
      return `<div class="kanban-add-form" style="margin:8px 16px;">
        <select id="commentTargetScheduleSelect">${optionsHtml}</select>
        <input type="text" id="commentTextInput" placeholder="コメントを入力">
        <button type="button" class="panel-add-button" id="postCommentButton">投稿</button>
      </div>`;
    }

    function applyCommentPanel(bodyHtml) {
      document.getElementById("commentPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】getSchedulesByProjectでスケジュールid集合を取得し、各idについて
    //   getCommentsByTaskで束ねてcommentGroupsを作る。投稿フォーム＋グルーピング一覧を
    //   両方描画する。
    // 【結果】コメントパネルの表示が最新の状態に更新される。
    async function refreshCommentPanel(projectId) {
      if (!projectId) {
        applyCommentPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const scheduleList = await getSchedulesByProject(projectId);
      const commentGroups = [];
      for (const schedule of scheduleList) {
        const comments = await getCommentsByTask(schedule.id);
        if (comments.length > 0) {
          commentGroups.push({ schedule, comments });
        }
      }
      const formHtml = scheduleList.length > 0 ? renderCommentPostFormToHtml(scheduleList) : "";
      applyCommentPanel(formHtml + renderCommentGroupsToHtml(commentGroups, collapsedCommentGroupScheduleIds));
    }

    // 【前提】scheduleId は見出しをクリックされたスケジュールのid。
    // 【処理】collapsedCommentGroupScheduleIdsへの追加/削除だけを行い、パネルを再描画する
    //   （折りたたみ状態はDB非保存の画面上だけの一時状態。collapsedScheduleIdsと同じ設計）。
    // 【結果】対象グループのコメント本文一覧が表示/非表示になる。
    function handleToggleCommentGroupButtonClick(scheduleId) {
      if (collapsedCommentGroupScheduleIds.has(scheduleId)) {
        collapsedCommentGroupScheduleIds.delete(scheduleId);
      } else {
        collapsedCommentGroupScheduleIds.add(scheduleId);
      }
      refreshCommentPanel(currentSelectedProjectId);
    }

    // 【前提】commentId は削除したいコメントのid。
    // 【処理】即時メモの個別削除と同じ方針（確認なし即削除）でdeleteCommentする。
    // 【結果】削除後、パネルを再描画する。
    async function handleDeleteCommentButtonClick(commentId) {
      await deleteComment(commentId);
      await refreshCommentPanel(currentSelectedProjectId);
    }

    // 【前提】currentSelectedProjectIdが設定済みであること。
    // 【処理】投稿フォームの選択スケジュールid・テキストを読み取り、空でなければ
    //   addCommentで保存する。
    // 【結果】投稿後、パネルを再描画する。
    async function handlePostCommentButtonClick() {
      const scheduleSelect = document.getElementById("commentTargetScheduleSelect");
      const textInput = document.getElementById("commentTextInput");
      if (!scheduleSelect || !textInput) return;
      const text = textInput.value.trim();
      if (!text) return;
      await addComment({ id: generateId(), taskId: scheduleSelect.value, text, createdAt: new Date().toISOString() });
      await refreshCommentPanel(currentSelectedProjectId);
    }

    // ===== P6：変更履歴パネル =====

    // 現在のフィルタ（"all" | "add" | "edit" | "delete"）。
    let currentChangelogFilter = "all";
    // フィルタ切替時にDB再取得しないためのキャッシュ。
    let currentChangelogEntries = [];

    // 【前提】changes は1件分の変更履歴エントリが持つentry.changes（{field,label,before,after}の
    //   配列。diffFieldsの戻り値と同じ形）。
    // 【処理】UI差分表No.69：フィールドごとに「ラベル：旧値（取り消し線・赤）→新値（緑）」の
    //   行を組み立てる（お手本の.cl-old/.cl-new相当）。
    // 【結果】変更が無ければ空文字列、あれば一覧のHTML文字列を返す。
    function renderChangelogChangesToHtml(changes) {
      if (!changes || changes.length === 0) return "";
      const rowsHtml = changes
        .map(
          (change) => `<div class="changelog-change-row">
            <span class="changelog-field-label">${escapeHtmlText(change.label)}：</span>
            <span class="cl-old">${escapeHtmlText(String(change.before ?? ""))}</span>
            <span class="changelog-change-arrow">→</span>
            <span class="cl-new">${escapeHtmlText(String(change.after ?? ""))}</span>
          </div>`
        )
        .join("");
      return `<div class="changelog-changes-list">${rowsHtml}</div>`;
    }

    // 【前提】changelogEntries は同一プロジェクト内の変更履歴全件。filter は
    //   "all" | "add" | "edit" | "delete"。
    // 【処理】filterが"all"以外ならactionで絞り込み、記録日時の降順（新しい順）に並べて、
    //   操作種別バッジ・対象名・記録日時のHTML文字列を組み立てる。削除ログのみ「戻す」
    //   ボタンを添える（基本設計書8.1節：削除ログのみ戻すボタンあり）。「変更」ログは
    //   renderChangelogChangesToHtmlでフィールドごとの新旧値も表示する（UI差分表No.69）。
    // 【結果】changelogPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderChangelogEntriesToHtml(changelogEntries, filter) {
      const filteredEntries = changelogEntries
        .filter((entry) => filter === "all" || entry.action === filter)
        .slice()
        .sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1));
      if (filteredEntries.length === 0) {
        return '<p class="empty-state-message">変更履歴がありません。</p>';
      }
      const actionLabels = { add: "追加", edit: "変更", delete: "削除" };
      return filteredEntries
        .map((entry) => {
          const actionLabel = actionLabels[entry.action] || entry.action;
          const restoreButtonHtml = entry.action === "delete"
            ? `<button type="button" class="panel-add-button" data-action="restore-log">戻す</button>`
            : "";
          return `<div class="panel-list-item" data-entry-id="${escapeHtmlText(entry.id)}">
            <div class="panel-list-item-main">
              <span class="changelog-action-badge is-${escapeHtmlText(entry.action)}">${escapeHtmlText(actionLabel)}</span>
              ${escapeHtmlText(entry.storeLabel)}「${escapeHtmlText(entry.itemName)}」
              <div class="panel-list-item-meta">${escapeHtmlText(entry.createdAt)}</div>
              ${renderChangelogChangesToHtml(entry.changes)}
            </div>
            <div class="panel-list-item-actions">${restoreButtonHtml}</div>
          </div>`;
        })
        .join("");
    }

    function applyChangelogPanel(bodyHtml) {
      document.getElementById("changelogPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】changelogEntries は同一プロジェクト内の変更履歴全件（フィルタで絞り込む前）。
    // 【処理】action別の件数を数える（基本設計書8.1節：フィルタ下に全件数の内訳を表示する）。
    //   フィルタタブの選択状態に関わらず、常に全件での内訳を示す。
    // 【結果】「全{n}件（追加{n}・変更{n}・削除{n}）」の文字列を返す。
    function renderChangelogSummaryToHtml(changelogEntries) {
      const addCount = changelogEntries.filter((entry) => entry.action === "add").length;
      const editCount = changelogEntries.filter((entry) => entry.action === "edit").length;
      const deleteCount = changelogEntries.filter((entry) => entry.action === "delete").length;
      return `全${changelogEntries.length}件（追加${addCount}・変更${editCount}・削除${deleteCount}）`;
    }

    function applyChangelogSummary(summaryText) {
      document.getElementById("changelogSummary").textContent = summaryText;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】getChangelogByProjectで取得してcurrentChangelogEntriesにキャッシュし、
    //   現在のフィルタで一覧を、フィルタに関わらず全件の内訳をサマリーとして描画する。
    // 【結果】変更履歴パネルの表示が最新の状態に更新される。
    async function refreshChangelogPanel(projectId) {
      if (!projectId) {
        applyChangelogSummary("");
        applyChangelogPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      currentChangelogEntries = await getChangelogByProject(projectId);
      applyChangelogSummary(renderChangelogSummaryToHtml(currentChangelogEntries));
      applyChangelogPanel(renderChangelogEntriesToHtml(currentChangelogEntries, currentChangelogFilter));
    }

    // 【前提】currentSelectedProjectId・currentChangelogEntriesが設定済みであること。
    // 【処理】0件なら案内のみ表示して終了する。1件以上あれば件数を明示した確認ダイアログの上で
    //   clearChangelogByProjectする（詳細設計書3.6.3）。
    // 【結果】確認OK時、このプロジェクトの変更履歴がすべて削除され、パネルが再描画される。
    async function handleClearChangelogButtonClick() {
      if (currentChangelogEntries.length === 0) {
        showToast("履歴がありません");
        return;
      }
      if (!window.confirm(`${currentChangelogEntries.length}件の変更履歴を削除しますか？`)) return;
      await clearChangelogByProject(currentSelectedProjectId);
      showToast("変更履歴を削除しました");
      await refreshChangelogPanel(currentSelectedProjectId);
    }

    // 【前提】filter は "all" | "add" | "edit" | "delete"。buttonElement はクリックされたボタン。
    // 【処理】フィルタを切り替え、ボタンの選択状態を更新した上で、キャッシュ済み
    //   currentChangelogEntriesを使ってパネルだけを再描画する（DB再取得は不要）。
    // 【結果】変更履歴パネルの表示が新しいフィルタの内容になる。
    function handleChangelogFilterClick(filter, buttonElement) {
      currentChangelogFilter = filter;
      for (const tabButton of document.querySelectorAll("#changelogFilterTabs [data-changelog-filter]")) {
        tabButton.classList.toggle("is-active", tabButton === buttonElement);
      }
      applyChangelogPanel(renderChangelogEntriesToHtml(currentChangelogEntries, currentChangelogFilter));
    }

    // 【前提】entryId は「戻す」を押された変更履歴エントリのid（currentChangelogEntriesに
    //   含まれること。削除ログのみボタンが表示されるため、通常はaction==="delete"）。
    // 【処理】確認の上、entry.snapshot（削除直前の全フィールドのコピー）をentry.storeに
    //   応じたadd*関数でそのまま書き戻す（データモデル設計6章：snapshotは削除時点の
    //   完全なコピーのため、putし直せば元の状態に戻る）。復元操作自体は新たな変更履歴として
    //   記録しない（「戻す」を繰り返すたびにログが増え続けるのを防ぐため）。この単純な
    //   書き戻しには限界があり、連鎖削除で一緒に消えた子スケジュール・コメント等の
    //   関連データまでは復元しない（単一レコードの復元に留まる、既知の非整合）。
    // 【結果】snapshotが無ければ案内のみ表示し何もしない。復元後は対象パネルと
    //   変更履歴パネルを再描画する。
    async function handleRestoreFromLogButtonClick(entryId) {
      const entry = currentChangelogEntries.find((changelogEntry) => changelogEntry.id === entryId);
      if (!entry) return;
      if (!entry.snapshot) {
        showToast("復元データがありません");
        return;
      }
      if (!window.confirm(`「${entry.itemName}」（${entry.storeLabel}）をこの時点の状態に戻しますか？`)) return;

      if (entry.store === "projects") {
        await addProject(entry.snapshot);
        await refreshProjectSelectDropdown();
      } else if (entry.store === "schedules") {
        await addSchedule(entry.snapshot);
        await refreshGanttPanel(currentSelectedProjectId);
      } else if (entry.store === "tasks") {
        await addTask(entry.snapshot);
        await refreshKanbanPanel(currentSelectedProjectId);
      } else if (entry.store === "issues") {
        await addIssue(entry.snapshot);
        await refreshMindmapPanel(currentSelectedProjectId);
      }
      showToast(`「${entry.itemName}」を復元しました`);
      await refreshChangelogPanel(currentSelectedProjectId);
    }

    // refreshGanttPanelと同じ考え方。対象はissues・マインドマップキャンバス。
    async function refreshMindmapPanel(projectId) {
      if (!projectId) {
        applyMindmapPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const issueList = await getIssuesByProject(projectId);
      applyMindmapPanel(renderMindmapCanvasToHtml(issueList, collapsedMindmapIssueIds));
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】現在選択中のプロジェクトを切り替え、そのプロジェクトの最新データを取得してから、
    //   3パネル（ガント・カンバン・マインドマップ）とロック状態表示をまとめて更新する。
    // 【結果】currentSelectedProjectId・currentProjectObjectが更新され、画面全体が新しい
    //   プロジェクトのものになる。
    async function switchToProject(projectId) {
      currentSelectedProjectId = projectId || null;
      if (currentSelectedProjectId) {
        const projectList = await getAllProjects();
        currentProjectObject = projectList.find((project) => project.id === currentSelectedProjectId) || null;
      } else {
        currentProjectObject = null;
      }
      applyLockState(Boolean(currentProjectObject?.locked));
      applyReportButtonAvailability(Boolean(currentSelectedProjectId));
      await Promise.all([
        refreshGanttPanel(currentSelectedProjectId),
        refreshKanbanPanel(currentSelectedProjectId),
        refreshMindmapPanel(currentSelectedProjectId),
      ]);
    }

    // 【前提】panelId はスライドパネル要素のid（例："kanbanSlidePanel"）。
    // 【処理】.is-openクラスの有無で開閉を反転させる（モーダル・ダイアログ一覧②：
    //   ボタンをもう一度押すと閉じる、という共通挙動）。
    // 【結果】パネルが開いていれば閉じ、閉じていれば開く。
    function toggleSlidePanel(panelId) {
      document.getElementById(panelId).classList.toggle("is-open");
    }

    // 【前提】panelId はスライドパネル要素のid。
    // 【処理】.is-openクラスを外す（×ボタンから閉じる用。開閉トグルではなく必ず閉じる）。
    // 【結果】パネルが閉じる。
    function closeSlidePanel(panelId) {
      document.getElementById(panelId).classList.remove("is-open");
    }

    // ===== サイドパネルのリサイズハンドル（UI差分表No.76） =====
    // 【設計判断】7つのスライドパネル（P1〜P6＋マインドマップ）はすべて.slide-panel共通CSSで
    //   幅640px固定になっている（UI差分表8-3備考）。7箇所のHTMLへ同じハンドルを書く代わりに、
    //   初期化時に全.slide-panelの先頭へ動的挿入する。ドラッグ処理はマインドマップノードの
    //   pointerdown/pointermove/pointerupと同じパターン。

    // これ未満の幅にはできない（UIデザイン仕様書：メモパネル同種の記述「最小280px」を
    // 全パネル共通の下限として採用）。
    const PANEL_RESIZE_MIN_WIDTH_PX = 280;

    // リサイズ中のパネル要素。ドラッグしていない時はnull。
    let resizingPanelElement = null;
    let panelResizeStartPointerX = 0;
    let panelResizeStartWidthPx = 0;

    // 【前提】なし（DOMContentLoaded後に1度だけ呼ぶ）。
    // 【処理】すべての.slide-panelの先頭に.panel-resize-handleを1つ挿入する。
    // 【結果】各パネルの左端にリサイズハンドルが表示される。
    function initializePanelResizeHandles() {
      for (const panelElement of document.querySelectorAll(".slide-panel")) {
        const handleElement = document.createElement("div");
        handleElement.className = "panel-resize-handle";
        panelElement.prepend(handleElement);
      }
    }

    // 【前提】event は.panel-resize-handle上でのpointerdownイベント。
    // 【処理】対象パネルとドラッグ開始時点のポインタ座標・パネル幅を記録する。
    // 【結果】リサイズ状態が開始される（実際の幅変更はpointermoveハンドラが行う）。
    function handlePanelResizePointerDown(event) {
      const handleElement = event.target.closest(".panel-resize-handle");
      if (!handleElement) return;
      resizingPanelElement = handleElement.closest(".slide-panel");
      if (!resizingPanelElement) return;
      panelResizeStartPointerX = event.clientX;
      panelResizeStartWidthPx = resizingPanelElement.getBoundingClientRect().width;
      handleElement.classList.add("is-resizing");
      handleElement.setPointerCapture(event.pointerId);
    }

    // 【前提】resizingPanelElementが設定済み（リサイズ中）であること。
    // 【処理】ポインタの移動量ぶん幅を変更する。パネルは画面右端に固定（right:0）のため、
    //   左端のハンドルを左へ引くほど幅が増える（移動量の符号を反転させて加算）。
    //   下限PANEL_RESIZE_MIN_WIDTH_PX・上限92vw（既存のmax-widthと同じ）でクランプする。
    // 【結果】パネルの見た目の幅がポインタに追従する。
    function handlePanelResizePointerMove(event) {
      if (!resizingPanelElement) return;
      const deltaX = event.clientX - panelResizeStartPointerX;
      const newWidthPx = panelResizeStartWidthPx - deltaX;
      const maxWidthPx = window.innerWidth * 0.92;
      const clampedWidthPx = Math.min(Math.max(newWidthPx, PANEL_RESIZE_MIN_WIDTH_PX), maxWidthPx);
      resizingPanelElement.style.width = `${clampedWidthPx}px`;
    }

    // 【前提】なし。
    // 【処理】リサイズ中のハンドルからis-resizingクラスを外し、状態をリセットする。
    // 【結果】ドラッグが終了する（幅はその時点の値のまま維持される。DB保存はしない＝
    //   画面上だけの一時状態。collapsedScheduleIds等と同じ設計判断）。
    function handlePanelResizePointerUp() {
      if (!resizingPanelElement) return;
      resizingPanelElement.querySelector(".panel-resize-handle.is-resizing")?.classList.remove("is-resizing");
      resizingPanelElement = null;
    }

    // ===== 共通UI：トースト通知（UIデザイン仕様書2.4節） =====

    // トーストを消すタイマーのID。連続してshowToastを呼んだとき、前回のタイマーを
    // clearTimeoutでリセットし「最後の呼び出しから一定時間後に消える」を保証するために保持する
    // （初期値null＝まだ一度も表示していない）。
    let toastHideTimeoutId = null;

    // トーストが表示され続ける時間（ミリ秒）。UIデザイン仕様書2.4節「約2.8秒で自動的に消える」。
    const TOAST_VISIBLE_DURATION_MS = 2800;

    // 【前提】message は画面右下に表示したい通知文。
    // 【処理】#toast要素にmessageを差し込み、showクラスを付けてCSSトランジションで表示する。
    //   すでに表示中のトーストがある場合は、そのタイマーをclearTimeoutで打ち切ってから
    //   新しいタイマーを仕掛け直す（連続呼び出し時に、古いタイマーで消えてしまわないようにするため）。
    // 【結果】TOAST_VISIBLE_DURATION_MS後にshowクラスが外れ、トーストが消える（戻り値なし）。
    function showToast(message) {
      const toastElement = document.getElementById("toast");
      toastElement.textContent = message;
      toastElement.classList.add("show");
      if (toastHideTimeoutId !== null) {
        clearTimeout(toastHideTimeoutId);
      }
      toastHideTimeoutId = setTimeout(() => {
        toastElement.classList.remove("show");
      }, TOAST_VISIBLE_DURATION_MS);
    }

    // ===== UI：モーダル（モーダル・ダイアログ一覧①：中央モーダル） =====
    // 【設計判断】M1（新規プロジェクト作成）・M4（スケジュール新規作成・編集）を、
    // prompt()の連鎖から、UIデザイン仕様書2.3節に沿った中央モーダルへ作り直した。
    // モーダルの開閉・入れ物（#modalOverlay/#modalPanel）は全モーダル共通で使い回す。

    // 【前提】contentHtml はモーダルパネルに表示するHTML文字列。
    // 【処理】共通のモーダルオーバーレイにcontentHtmlを差し込んで表示する。
    // 【結果】画面中央にモーダルが表示される。
    function openModal(contentHtml) {
      document.getElementById("modalPanel").innerHTML = contentHtml;
      document.getElementById("modalOverlay").hidden = false;
    }

    // 【前提】なし。
    // 【処理】モーダルを閉じ、中身を空にする（次回開いたときに前回の入力値が残らないようにする）。
    // 【結果】モーダルが非表示になる。
    function closeModal() {
      document.getElementById("modalOverlay").hidden = true;
      document.getElementById("modalPanel").innerHTML = "";
    }

    const SCHEDULE_BAR_COLOR_PALETTE = ["#2563EB", "#0891B2", "#059669", "#D97706", "#DC2626", "#7C3AED", "#DB2777", "#EA580C", "#16A34A", "#0E7490", "#4B5563"];

    // 【前提】project はnull（新規作成モード）、または既存プロジェクトオブジェクト（編集モード）。
    // 【処理】M1/M2共通のプロジェクトモーダルのHTML文字列を組み立てる（DOMには触れない）。
    //   新規作成時は開始日・終了日の既定値を今日,1年後にする（モーダル・ダイアログ一覧M1）。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    function renderProjectModalToHtml(project) {
      const isEditMode = Boolean(project);
      const todayDateString = new Date().toISOString().slice(0, 10);
      const oneYearLaterDate = new Date();
            oneYearLaterDate.setFullYear(oneYearLaterDate.getFullYear() + 1);
      const oneYearLaterDateString = oneYearLaterDate.toISOString().slice(0, 10);
      const nameValue = isEditMode ? project.name : "";
      const startDateValue = isEditMode ? project.startDate : todayDateString;
      const endDateValue = isEditMode ? project.endDate : oneYearLaterDateString;
      return `
        <h2>${isEditMode ? "プロジェクト編集" : "新規プロジェクト作成"}</h2>
        <div class="modal-field">
          <label for="projectModalNameInput">プロジェクト名</label>
          <input type="text" id="projectModalNameInput" value="${escapeHtmlText(nameValue)}">
        </div>
        <div class="modal-field">
          <label for="projectModalStartDateInput">開始日</label>
          <input type="date" id="projectModalStartDateInput" value="${escapeHtmlText(startDateValue)}">
        </div>
        <div class="modal-field">
          <label for="projectModalEndDateInput">終了日</label>
          <input type="date" id="projectModalEndDateInput" value="${escapeHtmlText(endDateValue)}">
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="projectModalCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="projectModalSaveButton">保存</button>
        </div>
      `;
    }

    // 【前提】existingProject はnull（新規作成）または既存プロジェクトオブジェクト（編集）。
    // 【処理】プロジェクトモーダルを開き、キャンセル・保存ボタンにイベントを登録する。
    // 【結果】モーダルが操作可能な状態で表示される。
    function openProjectModal(existingProject) {
      openModal(renderProjectModalToHtml(existingProject));
      document.getElementById("projectModalCancelButton").addEventListener("click", closeModal);
      document.getElementById("projectModalSaveButton").addEventListener("click", () => handleProjectModalSaveButtonClick(existingProject));
    }

    function handleCreateProjectButtonClick() {
      openProjectModal(null);
    }

    function handleEditProjectButtonClick() {
      if (!currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      openProjectModal(currentProjectObject);
    }

    // ===== M3：マイルストーン管理モーダル =====
    // 【設計判断】名前・日付の行を保存ボタンを押すまでDBに反映しない「作業用コピー」
    //   （milestoneModalDraftRows）を持つ。行の追加・削除のたびに#milestoneModalRowsContainerの
    //   innerHTMLを丸ごと再構築するため、削除ボタン（動的に増減する要素）はイベント委譲で
    //   拾う。再構築の直前には必ずsyncMilestoneModalDraftRowsFromDomでDOM上の現在値を
    //   作業用コピーへ書き戻す（他の行への入力中の変更を、行追加・削除で消さないため）。

    // 現在開いているマイルストーン管理モーダルの作業用コピー（{name, date}の配列）。
    let milestoneModalDraftRows = [];

    // 【前提】draftRows は milestoneModalDraftRows と同じ形の配列。
    // 【処理】1行分＝名前入力・日付入力・削除ボタンのHTML文字列を、行インデックス付きで組み立てる
    //   （基本設計書2.2節：「マイルストーン名」「日付」の入力行、行ごとに×削除ボタン）。
    // 【結果】#milestoneModalRowsContainerの中身にそのまま入れられるHTML文字列を返す。
    function renderMilestoneModalRowsToHtml(draftRows) {
      return draftRows
        .map(
          (row, index) => `<div class="modal-milestone-row" data-row-index="${index}">
            <input type="text" class="modal-milestone-name-input" placeholder="マイルストーン名" value="${escapeHtmlText(row.name)}">
            <input type="date" class="modal-milestone-date-input" value="${escapeHtmlText(row.date)}" required>
            <button type="button" class="wbs-icon-button" data-action="remove-milestone-row" title="削除">×</button>
          </div>`
        )
        .join("");
    }

    // 【前提】draftRows は milestoneModalDraftRows と同じ形の配列。
    // 【処理】M3モーダル全体（行一覧＋行追加ボタン＋キャンセル／保存）のHTML文字列を組み立てる
    //   （モーダル・ダイアログ一覧M3）。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    function renderMilestoneModalToHtml(draftRows) {
      return `
        <h2>マイルストーン管理</h2>
        <div id="milestoneModalRowsContainer">${renderMilestoneModalRowsToHtml(draftRows)}</div>
        <button type="button" class="panel-add-button" id="addMilestoneRowButton">＋マイルストーンを追加</button>
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="milestoneModalCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="milestoneModalSaveButton">保存</button>
        </div>
      `;
    }

    // 【前提】なし。
    // 【処理】現在表示されている各行のDOM入力値を読み取り、milestoneModalDraftRowsへ書き戻す。
    //   行の追加・削除でHTMLを再構築する前に必ず呼ぶことで、未保存の入力を失わないようにする。
    // 【結果】milestoneModalDraftRowsが画面表示と同じ内容になる。
    function syncMilestoneModalDraftRowsFromDom() {
      const rowElements = document.querySelectorAll("#milestoneModalRowsContainer .modal-milestone-row");
      milestoneModalDraftRows = Array.from(rowElements).map((rowElement) => ({
        name: rowElement.querySelector(".modal-milestone-name-input").value,
        date: rowElement.querySelector(".modal-milestone-date-input").value,
      }));
    }

    // 【前提】milestoneModalDraftRowsが最新であること（呼び出し前にsync済み）。
    // 【処理】#milestoneModalRowsContainerの中身をmilestoneModalDraftRowsの内容で再構築する。
    // 【結果】行一覧の表示が作業用コピーと一致する。
    function rerenderMilestoneModalRows() {
      document.getElementById("milestoneModalRowsContainer").innerHTML = renderMilestoneModalRowsToHtml(milestoneModalDraftRows);
    }

    // 【前提】なし。
    // 【処理】現在の入力値をsyncしたうえで、末尾に空行（{name:"",date:""}）を追加して再描画する
    //   （基本設計書2.2節：「＋マイルストーンを追加」で行を追加）。
    // 【結果】行一覧に空行が1行増える。
    function handleAddMilestoneRowButtonClick() {
      syncMilestoneModalDraftRowsFromDom();
      milestoneModalDraftRows.push({ name: "", date: "" });
      rerenderMilestoneModalRows();
    }

    // 【前提】rowIndex は削除対象行の、現在の表示順でのインデックス。
    // 【処理】現在の入力値をsyncしたうえで、指定インデックスの行を取り除いて再描画する。
    // 【結果】行一覧から指定行が消える。
    function handleRemoveMilestoneRowButtonClick(rowIndex) {
      syncMilestoneModalDraftRowsFromDom();
      milestoneModalDraftRows.splice(rowIndex, 1);
      rerenderMilestoneModalRows();
    }

    // 【前提】currentProjectObjectが設定済み（プロジェクト選択済み）であること。
    // 【処理】現在の入力値をDOMから読み取り、project.milestonesを丸ごと置き換えてaddProjectで
    //   保存する（詳細設計書3.11.1：1回の保存で複数行の追加・削除をまとめて反映。差分ではなく
    //   丸ごと置換）。名前が空の行があってもエラーにはしない（同節エラーバリエーション：
    //   保存自体は成功し、該当行はガントチャート上に表示されないだけ）。
    //   milestonesはPROJECT_LOGGED_FIELD_LABELSの対象外のため、この保存では変更履歴は
    //   記録されない（詳細設計書3.11.1に変更履歴への言及が無いことに合わせる）。
    // 【結果】保存後、モーダルを閉じてガントパネルを再描画し、
    //   トースト「マイルストーンを保存しました」を表示する。
    async function handleMilestoneModalSaveButtonClick() {
      syncMilestoneModalDraftRowsFromDom();
      const updatedProject = {
        ...currentProjectObject,
        milestones: milestoneModalDraftRows.map((row) => ({ name: row.name, date: row.date })),
      };
      await addProject(updatedProject);
      currentProjectObject = updatedProject;
      closeModal();
      await refreshGanttPanel(currentSelectedProjectId);
      showToast("マイルストーンを保存しました");
    }

    // 【前提】currentProjectObjectが設定済み（プロジェクト選択済み）であること
    //   （マイルストーンボタン自体が未選択時・ロック中はdisabledのため、通常はここに
    //   到達する時点で選択済み）。
    // 【処理】現在のproject.milestonesを作業用コピーへ複製してモーダルを開き、
    //   行追加・削除（イベント委譲）・キャンセル・保存にイベントを登録する。
    // 【結果】マイルストーン管理モーダルが操作可能な状態で表示される。
    function openMilestoneModal() {
      if (!currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      milestoneModalDraftRows = currentProjectObject.milestones.map((milestone) => ({ ...milestone }));
      openModal(renderMilestoneModalToHtml(milestoneModalDraftRows));
      document.getElementById("milestoneModalCancelButton").addEventListener("click", closeModal);
      document.getElementById("addMilestoneRowButton").addEventListener("click", handleAddMilestoneRowButtonClick);
      document.getElementById("milestoneModalSaveButton").addEventListener("click", handleMilestoneModalSaveButtonClick);
      document.getElementById("milestoneModalRowsContainer").addEventListener("click", (event) => {
        const removeButton = event.target.closest('[data-action="remove-milestone-row"]');
        if (!removeButton) return;
        const rowElement = removeButton.closest(".modal-milestone-row");
        handleRemoveMilestoneRowButtonClick(Number(rowElement.dataset.rowIndex));
      });
    }

    // 3年後の判定はうるう年を厳密に数えず、365日×3年分の日数で近似する（実務上十分な簡略化）。
    const THREE_YEARS_IN_MILLISECONDS = 3 * 365 * MILLISECONDS_PER_DAY;

    // 【前提】input は {name, startDate, endDate}（プロジェクトモーダルの入力値）。
    // 【処理】モーダル・ダイアログ一覧A1〜A4のバリデーションを順に判定する（DOMには触れない）。
    //   ※A3はプロジェクト側が`<=`判定（終了日=開始日も拒否）で、スケジュール側（A7）の
    //   `<`判定とは非対称。これは基本設計書1.3節No.1の既知の非整合として忠実再現する。
    // 【結果】エラーがあればそのアラート文言（string）を、無ければnullを返す。
    function validateProjectModalInput(input) {
      if (!input.name) return "プロジェクト名を入力してください";
      if (!input.startDate || !input.endDate) return "日付を入力してください";
      if (input.endDate <= input.startDate) return "終了日は開始日より後にしてください";
      if (parseDateStringToUtcTimestamp(input.endDate) - parseDateStringToUtcTimestamp(input.startDate) > THREE_YEARS_IN_MILLISECONDS) {
        return "期間は最大3年です";
      }
      return null;
    }

    // 変更履歴（changelog）に記録するプロジェクトの対象フィールド（データモデル設計6章）。
    // milestones/locked/createdAtはこのモーダルから編集できないため対象外。
    const PROJECT_LOGGED_FIELD_LABELS = { name: "名前", startDate: "開始日", endDate: "終了日" };

    // 【前提】existingProject はnull（新規作成）または既存プロジェクトオブジェクト（編集）。
    // 【処理】モーダル内の入力値を読み取り、validateProjectModalInputでバリデーションし、
    //   OKならaddProjectで保存してモーダルを閉じ、画面を更新する。保存後、追加/変更の
    //   変更履歴をrecordChangelogEntryで記録する（詳細設計書3.6.1：LOGGED_STORES対象は
    //   保存のたびに自動記録）。
    // 【結果】保存成功時はモーダルを閉じ、プロジェクト一覧・選択状態を更新し、
    //   トースト「プロジェクトを保存しました」を表示する（詳細設計書3.1.1 step8）。
    async function handleProjectModalSaveButtonClick(existingProject) {
      const name = document.getElementById("projectModalNameInput").value.trim();
      const startDate = document.getElementById("projectModalStartDateInput").value;
      const endDate = document.getElementById("projectModalEndDateInput").value;

      const validationError = validateProjectModalInput({ name, startDate, endDate });
      if (validationError) {
        window.alert(validationError);
        return;
      }

      const projectToSave = existingProject
        ? { ...existingProject, name, startDate, endDate }
        : { id: generateId(), name, startDate, endDate, milestones: [], locked: false, createdAt: new Date().toISOString() };
      await addProject(projectToSave);
      await recordChangelogEntry(
        existingProject ? "edit" : "add",
        projectToSave.id,
        "projects",
        "プロジェクト",
        projectToSave.id,
        projectToSave.name,
        existingProject,
        projectToSave,
        PROJECT_LOGGED_FIELD_LABELS
      );
      closeModal();
      await refreshProjectSelectDropdown();
      document.getElementById("projectSelectDropdown").value = projectToSave.id;
      await switchToProject(projectToSave.id);
      showToast("プロジェクトを保存しました");
    }

    // 【前提】projectId は削除したいプロジェクトのid。project は削除前に取得済みの
    //   プロジェクトオブジェクト（変更履歴のsnapshot・itemNameに使う）。
    // 【処理】配下データ（スケジュール・タスク・issue・コメント・メモ・即時メモ・
    //   スナップショット）を先にすべて読み切ってから削除する（データモデル設計6章：
    //   複数ストアにまたがる書き込みは読み切ってから行う方針）。
    //   LOGGED_STORES対象（schedules/tasks/issues）は削除のたびに個別の変更履歴を記録し、
    //   最後にプロジェクト自体の削除ログも記録してからprojectsストアの当該行を削除する。
    //   既存の変更履歴（このプロジェクトのchangelogエントリ）は監査ログとして削除せず残す
    //   （スナップショット・変更履歴自体の削除UIは今回のスコープ外のため、消す手段が無いことと
    //   整合させる）。
    // 【結果】プロジェクトと配下データがすべて削除される。
    async function deleteProjectCascade(projectId, project) {
      const scheduleList = await getSchedulesByProject(projectId);
      const taskList = await getTasksByProject(projectId);
      const issueList = await getIssuesByProject(projectId);
      const memoList = await getMemosByProject(projectId);
      const quickMemoList = await getQuickMemosByProject(projectId);
      const snapshotList = await getSnapshotsByProject(projectId);

      for (const schedule of scheduleList) {
        const comments = await getCommentsByTask(schedule.id);
        for (const comment of comments) {
          await deleteComment(comment.id);
        }
      }
      for (const schedule of scheduleList) {
        await deleteSchedule(schedule.id);
        await addChangelogEntry({
          id: generateId(),
          projectId,
          action: "delete",
          store: "schedules",
          storeLabel: "スケジュール",
          itemId: schedule.id,
          itemName: schedule.name,
          changes: [],
          snapshot: schedule,
          createdAt: new Date().toISOString(),
        });
      }
      for (const task of taskList) {
        await deleteTask(task.id);
        await addChangelogEntry({
          id: generateId(),
          projectId,
          action: "delete",
          store: "tasks",
          storeLabel: "タスク",
          itemId: task.id,
          itemName: task.title,
          changes: [],
          snapshot: task,
          createdAt: new Date().toISOString(),
        });
      }
      for (const issue of issueList) {
        await deleteIssue(issue.id);
        await addChangelogEntry({
          id: generateId(),
          projectId,
          action: "delete",
          store: "issues",
          storeLabel: "マインドマップノード",
          itemId: issue.id,
          itemName: issue.title,
          changes: [],
          snapshot: issue,
          createdAt: new Date().toISOString(),
        });
      }
      for (const memo of memoList) {
        await deleteMemo(memo.id);
      }
      for (const quickMemo of quickMemoList) {
        await deleteQuickMemo(quickMemo.id);
      }
      for (const snapshot of snapshotList) {
        await deleteSnapshot(snapshot.id);
      }

      await addChangelogEntry({
        id: generateId(),
        projectId,
        action: "delete",
        store: "projects",
        storeLabel: "プロジェクト",
        itemId: project.id,
        itemName: project.name,
        changes: [],
        snapshot: project,
        createdAt: new Date().toISOString(),
      });
      await deleteProject(projectId);
    }

    // 【前提】currentSelectedProjectId・currentProjectObjectが設定済みであること。
    // 【処理】確認ダイアログ（モーダル・ダイアログ一覧C1：「『{プロジェクト名}』を削除しますか？
    //   （すべてのスケジュールも削除されます）」）の上でdeleteProjectCascadeする。
    //   削除後は、残っている先頭のプロジェクトを選択し直す（無ければ未選択状態にする）。
    // 【結果】確認OK時、プロジェクトと配下データが削除され、画面が更新される。
    //   トースト「プロジェクトを削除しました」を表示する（詳細設計書3.1.2 step4）。
    async function handleDeleteProjectButtonClick() {
      if (!currentSelectedProjectId || !currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const confirmMessage = `「${currentProjectObject.name}」を削除しますか？（すべてのスケジュールも削除されます）`;
      if (!window.confirm(confirmMessage)) return;

      await deleteProjectCascade(currentSelectedProjectId, currentProjectObject);
      await refreshProjectSelectDropdown();
      const remainingProjectList = await getAllProjects();
      const nextProjectId = remainingProjectList.length > 0 ? remainingProjectList[0].id : null;
      document.getElementById("projectSelectDropdown").value = nextProjectId || "";
      await switchToProject(nextProjectId);
      showToast("プロジェクトを削除しました");
    }

    // 【前提】schedule はnull（新規作成モード）、または既存スケジュールオブジェクト（編集モード）。
    //   hasChildren は編集対象が子を持つか（子を持つ場合、開始日・終了日は自動計算のため
    //   読み取り専用にする。基本設計書4.2節）。
    // 【処理】M4（スケジュール新規作成・編集）モーダルのHTML文字列を組み立てる。
    // 【結果】モーダルパネルにそのまま入れられるHTML文字列を返す。
    // 【前提】comments は対象スケジュールに紐づくコメント全件（無ければ空配列）。
    // 【処理】投稿日時の昇順（古い順）に並べ、各コメントに削除ボタンを添えた一覧と、
    //   末尾に投稿フォームを組み立てる（モーダル・ダイアログ一覧M4：コメントは
    //   既存スケジュールの編集モーダル内に埋め込む仕様）。
    // 【結果】コメント欄のHTML文字列を返す。
    function renderModalCommentSectionToHtml(comments) {
      const sortedComments = comments.slice().sort((a, b) => (a.createdAt < b.createdAt ? -1 : 1));
      const commentListHtml = sortedComments.length > 0
        ? sortedComments
            .map(
              (comment) => `<div class="panel-list-item" data-comment-id="${escapeHtmlText(comment.id)}">
                <div class="panel-list-item-main">
                  <div>${escapeHtmlText(comment.text)}</div>
                  <div class="panel-list-item-meta">${escapeHtmlText(comment.createdAt)}</div>
                </div>
                <div class="panel-list-item-actions">
                  <button type="button" class="wbs-icon-button" data-action="delete-modal-comment" title="削除">🗑</button>
                </div>
              </div>`
            )
            .join("")
        : '<p class="empty-state-message">コメントはまだありません。</p>';
      return `
        <div class="modal-field">
          <label>コメント</label>
          <div class="modal-comment-list">${commentListHtml}</div>
          <div class="modal-comment-post-form">
            <input type="text" id="scheduleModalCommentTextInput" placeholder="コメントを入力">
            <button type="button" class="panel-add-button" id="scheduleModalPostCommentButton">投稿</button>
          </div>
        </div>
      `;
    }

    function renderScheduleModalToHtml(schedule, hasChildren, comments) {
      const isEditMode = Boolean(schedule);
      // カレンダー系入力の初期値は「今日」にする（ユーザー指示）。編集時は既存値をそのまま使う。
      const todayDateString = new Date().toISOString().slice(0, 10);
      const nameValue = isEditMode ? schedule.name : "";
      const startDateValue = isEditMode ? schedule.startDate : todayDateString;
      const endDateValue = isEditMode ? schedule.endDate : todayDateString;
      const assigneeValue = isEditMode ? schedule.assignee : "";
      const taskStatusValue = isEditMode ? schedule.taskStatus : "todo";
      const notesValue = isEditMode ? schedule.notes : "";
      const selectedColor = isEditMode && schedule.color ? schedule.color : SCHEDULE_BAR_COLOR_PALETTE[0];
      const dateDisabledAttribute = hasChildren ? "disabled" : "";
      const dateHintHtml = hasChildren
        ? '<p class="empty-state-message" style="padding:0;font-size:11px;">子タスクから自動計算されます</p>'
        : "";

      const statusOptionsHtml = Object.entries(SCHEDULE_STATUS_LABELS)
        .map(([value, label]) => `<option value="${value}"${value === taskStatusValue ? " selected" : ""}>${label}</option>`)
        .join("");

      const colorSwatchesHtml = SCHEDULE_BAR_COLOR_PALETTE
        .map((color) => `<div class="modal-color-swatch${color === selectedColor ? " is-selected" : ""}" data-color="${color}" style="background:${color}"></div>`)
        .join("");

      return `
        <h2>${isEditMode ? "スケジュール編集" : "スケジュール新規作成"}</h2>
        <div class="modal-field">
          <label for="scheduleModalNameInput">スケジュール名</label>
          <input type="text" id="scheduleModalNameInput" value="${escapeHtmlText(nameValue)}">
        </div>
        <div class="modal-field">
          <label for="scheduleModalStartDateInput">開始日</label>
          <input type="date" id="scheduleModalStartDateInput" value="${escapeHtmlText(startDateValue)}" ${dateDisabledAttribute}>
          ${dateHintHtml}
        </div>
        <div class="modal-field">
          <label for="scheduleModalEndDateInput">終了日</label>
          <input type="date" id="scheduleModalEndDateInput" value="${escapeHtmlText(endDateValue)}" ${dateDisabledAttribute}>
        </div>
        <div class="modal-field">
          <label for="scheduleModalAssigneeInput">担当者</label>
          <input type="text" id="scheduleModalAssigneeInput" value="${escapeHtmlText(assigneeValue)}">
        </div>
        <div class="modal-field">
          <label for="scheduleModalStatusSelect">ステータス</label>
          <select id="scheduleModalStatusSelect">${statusOptionsHtml}</select>
        </div>
        <div class="modal-field">
          <label>カラー</label>
          <div class="modal-color-palette" id="scheduleModalColorPalette">${colorSwatchesHtml}</div>
        </div>
        <div class="modal-field">
          <label for="scheduleModalNotesTextarea">メモ</label>
          <textarea id="scheduleModalNotesTextarea" rows="3">${escapeHtmlText(notesValue)}</textarea>
        </div>
        ${isEditMode ? renderModalCommentSectionToHtml(comments) : ""}
        <div class="modal-actions">
          <button type="button" class="modal-button-secondary" id="scheduleModalCancelButton">キャンセル</button>
          <button type="button" class="modal-button-primary" id="scheduleModalSaveButton">保存</button>
        </div>
      `;
    }

    // 【前提】existingSchedule はnull（新規作成）または既存スケジュールオブジェクト（編集）。
    //   presetParentId は新規作成時にあらかじめ決めておく親id（ルート作成ならnull、
    //   子スケジュール追加ボタンから開く場合はそのスケジュールのid）。編集時は使わない。
    // 【処理】既存スケジュールの場合のみgetCommentsByTaskでコメントを取得してから
    //   モーダルを開き、キャンセル・保存・カラーパレット・コメント投稿/削除の
    //   イベントを登録する（コメント欄はモーダルの再描画のたびに新しいDOM要素になるため、
    //   カラースワッチと同じく直接addEventListenerしてよい＝二重登録の心配はない）。
    // 【結果】モーダルが操作可能な状態で表示される。
    async function openScheduleModal(existingSchedule, hasChildren, presetParentId) {
      const comments = existingSchedule ? await getCommentsByTask(existingSchedule.id) : [];
      openModal(renderScheduleModalToHtml(existingSchedule, hasChildren, comments));
      document.getElementById("scheduleModalCancelButton").addEventListener("click", closeModal);
      document.getElementById("scheduleModalSaveButton").addEventListener("click", () => handleScheduleModalSaveButtonClick(existingSchedule, presetParentId));
      for (const swatch of document.querySelectorAll(".modal-color-swatch")) {
        swatch.addEventListener("click", () => {
          for (const otherSwatch of document.querySelectorAll(".modal-color-swatch")) {
            otherSwatch.classList.remove("is-selected");
          }
          swatch.classList.add("is-selected");
        });
      }
      if (existingSchedule) {
        document.getElementById("scheduleModalPostCommentButton").addEventListener("click", () => handlePostModalCommentButtonClick(existingSchedule, hasChildren));
        for (const deleteButton of document.querySelectorAll('[data-action="delete-modal-comment"]')) {
          const commentId = deleteButton.closest("[data-comment-id]").dataset.commentId;
          deleteButton.addEventListener("click", () => handleDeleteModalCommentButtonClick(commentId, existingSchedule, hasChildren));
        }
      }
    }

    // 【前提】schedule は編集中のスケジュール（コメント欄はこの場合のみ表示される）。
    //   hasChildren はそのスケジュールが子を持つか（モーダル再描画時に必要な情報）。
    // 【処理】コメント入力欄のテキストを読み取り、空でなければaddCommentで保存する。
    // 【結果】投稿後、同じ編集モーダルを再度開き直して最新のコメント一覧を表示する。
    async function handlePostModalCommentButtonClick(schedule, hasChildren) {
      const textInput = document.getElementById("scheduleModalCommentTextInput");
      if (!textInput) return;
      const text = textInput.value.trim();
      if (!text) return;
      await addComment({ id: generateId(), taskId: schedule.id, text, createdAt: new Date().toISOString() });
      await openScheduleModal(schedule, hasChildren, null);
    }

    // 【前提】commentId は削除したいコメントのid。schedule・hasChildrenはモーダル再描画用。
    // 【処理】即時メモの個別削除と同じ方針（確認なし即削除）でdeleteCommentする。
    // 【結果】削除後、同じ編集モーダルを再度開き直す。
    async function handleDeleteModalCommentButtonClick(commentId, schedule, hasChildren) {
      await deleteComment(commentId);
      await openScheduleModal(schedule, hasChildren, null);
    }

    function handleAddScheduleButtonClick() {
      if (!currentSelectedProjectId) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      openScheduleModal(null, false, null);
    }

    // 【前提】parentScheduleId は子を追加したい親スケジュールのid（currentScheduleTreeRowsに
    //   含まれること）。呼び出し元（WBS行の＋ボタン）は、depthLevelが
    //   MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN未満の行にしかこのボタンを出さないため、
    //   通常はここに到達する時点で3階層制約は満たされている。
    // 【処理】親をpresetParentIdとして固定した新規作成モーダルを開く（基本設計書4.1節：
    //   親→子→孫の3階層まで作成可能）。
    // 【結果】子スケジュール作成モーダルが表示される。
    function handleAddChildScheduleButtonClick(parentScheduleId) {
      const parentRow = currentScheduleTreeRows.find((row) => row.schedule.id === parentScheduleId);
      if (!parentRow || parentRow.depthLevel >= MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN) {
        window.alert("これ以上深い階層のスケジュールは作成できません（親→子→孫の3階層まで）。");
        return;
      }
      openScheduleModal(null, false, parentScheduleId);
    }

    // 【前提】scheduleId は編集したいスケジュールの id（currentScheduleTreeRowsに含まれること）。
    // 【処理】WBSパネルの行クリックから呼ばれ、該当スケジュールの編集モーダルを開く
    //   （モーダル・ダイアログ一覧M4：ガント上の行クリックで編集）。
    // 【結果】編集モーダルが表示される。
    function handleWbsRowClick(scheduleId) {
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!targetRow) return;
      openScheduleModal(targetRow.schedule, targetRow.hasChildren, null);
    }

    // 【前提】input は {name, startDate, endDate, hasChildren}（スケジュールモーダルの入力値）。
    //   子を持つ行は開始日・終了日が自動計算のため、日付のバリデーション自体を行わない。
    // 【処理】モーダル・ダイアログ一覧A5〜A7のバリデーションを順に判定する（DOMには触れない）。
    // 【結果】エラーがあればそのアラート文言（string）を、無ければnullを返す。
    function validateScheduleModalInput(input) {
      if (!input.name) return "スケジュールを入力してください";
      if (input.hasChildren) return null;
      if (!input.startDate || !input.endDate) return "日付を入力してください";
      if (input.endDate < input.startDate) return "終了日は開始日以降にしてください";
      return null;
    }

    // 変更履歴（changelog）に記録するスケジュールの対象フィールド（データモデル設計6章）。
    // projectId/parentId/orderはユーザーが直接編集する値ではないため対象外。
    const SCHEDULE_LOGGED_FIELD_LABELS = {
      name: "名前",
      startDate: "開始日",
      endDate: "終了日",
      assignee: "担当者",
      taskStatus: "ステータス",
      notes: "メモ",
      color: "カラー",
    };

    // 【前提】existingSchedule はnull（新規作成）または既存スケジュールオブジェクト（編集）。
    //   presetParentId は新規作成時の親id（ルート作成ならnull、子スケジュール追加なら
    //   そのスケジュールのid）。existingSchedule有り（編集）の場合は無視する
    //   （編集では親を変更する機能を持たせないため）。
    // 【処理】モーダル内の入力値を読み取り、validateScheduleModalInputでバリデーションし、
    //   OKならaddScheduleで保存する。子を持つ行は開始日・終了日を既存値のまま維持する
    //   （手入力欄は読み取り専用にしているため）。
    //   新規作成後、親を持つ場合はsyncAncestorDatesで祖先の日付を再計算する
    //   （子を追加すると親の期間が変わりうるため。基本設計書4.3節）。保存後、追加/変更の
    //   変更履歴をrecordChangelogEntryで記録する（詳細設計書3.6.1）。なおsyncAncestorDates
    //   による祖先スケジュールの日付再計算自体は、子の追加/編集操作の副作用であり独立した
    //   ユーザー操作ではないため、別途ログは残さない（記録するとノイズになるため）。
    //   ロック中は保存させない（詳細設計書3.1.3：個別関数側でもisLocked相当のチェックを持つ
    //   方針。「＋スケジュール追加」ボタン自体の無効化だけでは、既存行クリックでの編集を防げないため）。
    // 【結果】保存成功時はモーダルを閉じ、ガントパネルを更新し、トースト「保存しました」を
    //   表示する（詳細設計書3.2.1 step5）。ロック中はトースト「ロック中のため編集できません」を
    //   表示して保存しない。
    async function handleScheduleModalSaveButtonClick(existingSchedule, presetParentId) {
      if (currentProjectObject?.locked) {
        showToast("ロック中のため編集できません");
        return;
      }
      const name = document.getElementById("scheduleModalNameInput").value.trim();
      const assignee = document.getElementById("scheduleModalAssigneeInput").value.trim();
      const taskStatus = document.getElementById("scheduleModalStatusSelect").value;
      const notes = document.getElementById("scheduleModalNotesTextarea").value;
      const selectedSwatch = document.querySelector(".modal-color-swatch.is-selected");
      const color = selectedSwatch ? selectedSwatch.dataset.color : SCHEDULE_BAR_COLOR_PALETTE[0];

      const existingRow = existingSchedule ? currentScheduleTreeRows.find((row) => row.schedule.id === existingSchedule.id) : null;
      const hasChildren = Boolean(existingRow?.hasChildren);

      let startDate = existingSchedule ? existingSchedule.startDate : "";
      let endDate = existingSchedule ? existingSchedule.endDate : "";
      if (!hasChildren) {
        startDate = document.getElementById("scheduleModalStartDateInput").value;
        endDate = document.getElementById("scheduleModalEndDateInput").value;
      }

      const validationError = validateScheduleModalInput({ name, startDate, endDate, hasChildren });
      if (validationError) {
        window.alert(validationError);
        return;
      }

      const scheduleToSave = existingSchedule
        ? { ...existingSchedule, name, startDate, endDate, assignee, taskStatus, notes, color }
        : {
            id: generateId(),
            projectId: currentSelectedProjectId,
            parentId: presetParentId ?? null,
            name,
            startDate,
            endDate,
            assignee,
            taskStatus,
            notes,
            color,
            order: currentScheduleTreeRows.length,
          };
      await addSchedule(scheduleToSave);
      await recordChangelogEntry(
        existingSchedule ? "edit" : "add",
        scheduleToSave.projectId,
        "schedules",
        "スケジュール",
        scheduleToSave.id,
        scheduleToSave.name,
        existingSchedule,
        scheduleToSave,
        SCHEDULE_LOGGED_FIELD_LABELS
      );
      if (scheduleToSave.parentId !== null && scheduleToSave.parentId !== undefined) {
        await syncAncestorDates(scheduleToSave.parentId);
      }
      closeModal();
      await refreshGanttPanel(currentSelectedProjectId);
      showToast("保存しました");
    }

    // 【前提】scheduleId は移動したいスケジュールのid。direction は "up" | "down"。
    //   呼び出し元（WBS行の上下矢印）は、兄弟内の先頭で"up"・末尾で"down"のボタンを
    //   無効化しているため、通常はここに到達する時点で境界チェックは満たされている。
    // 【処理】同じ親を持つ兄弟同士（parentIdが一致するスケジュール）をorder順に並べ、
    //   指定方向の隣接する兄弟とorder値を入れ替えて保存する（基本設計書4.1節：
    //   「並び替えは同一階層内でのみ可能」を、parentId一致という条件でそのまま満たす）。
    // 【結果】隣接する2件のorderが入れ替わり、ガントパネルが再描画され、
    //   トースト「並び順を変更しました」を表示する（詳細設計書3.2.4）。
    //   ロック中は何もしない（トースト「ロック中のため編集できません」）。
    async function handleMoveScheduleOrderClick(scheduleId, direction) {
      if (currentProjectObject?.locked) {
        showToast("ロック中のため編集できません");
        return;
      }
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!targetRow) return;

      const siblingSchedules = currentScheduleTreeRows
        .filter((row) => row.schedule.parentId === targetRow.schedule.parentId)
        .map((row) => row.schedule)
        .sort((a, b) => a.order - b.order);
      const currentIndex = siblingSchedules.findIndex((schedule) => schedule.id === scheduleId);
      const swapIndex = direction === "up" ? currentIndex - 1 : currentIndex + 1;
      if (swapIndex < 0 || swapIndex >= siblingSchedules.length) return;

      const currentSchedule = siblingSchedules[currentIndex];
      const swapSchedule = siblingSchedules[swapIndex];
      const currentOrder = currentSchedule.order;
      await addSchedule({ ...currentSchedule, order: swapSchedule.order });
      await addSchedule({ ...swapSchedule, order: currentOrder });
      await refreshGanttPanel(currentSelectedProjectId);
      showToast("並び順を変更しました");
    }

    // 【前提】draggedId は掴んで動かしたスケジュールのid。targetId はドロップ先の行のid。
    //   同じidの場合、または親（parentId）が異なる場合（基本設計書4.1節「並び替えは同一階層
    //   内でのみ可能」）は何もしない。
    // 【処理】ドラッグ対象と同じ兄弟グループ内で、ドロップ先の位置へドラッグ対象を移動し、
    //   兄弟全員のorderを0番から振り直して保存する（クリックでの上下移動は隣接swapで済むが、
    //   ドラッグは任意の位置へ一気に移動できるため、隣接swapでは対応できず全員の振り直しが必要）。
    // 【結果】兄弟内の並び順が変わり、ガントパネルが再描画され、
    //   トースト「並び順を変更しました」を表示する（詳細設計書3.2.4）。
    //   ロック中は何もしない（トースト「ロック中のため編集できません」）。
    async function handleScheduleDragDrop(draggedId, targetId) {
      if (draggedId === targetId) return;
      if (currentProjectObject?.locked) {
        showToast("ロック中のため編集できません");
        return;
      }
      const draggedRow = currentScheduleTreeRows.find((row) => row.schedule.id === draggedId);
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === targetId);
      if (!draggedRow || !targetRow) return;
      if (draggedRow.schedule.parentId !== targetRow.schedule.parentId) return;

      const siblingSchedules = currentScheduleTreeRows
        .filter((row) => row.schedule.parentId === draggedRow.schedule.parentId)
        .map((row) => row.schedule)
        .sort((a, b) => a.order - b.order);
      const fromIndex = siblingSchedules.findIndex((schedule) => schedule.id === draggedId);
      const toIndex = siblingSchedules.findIndex((schedule) => schedule.id === targetId);
      const [movedSchedule] = siblingSchedules.splice(fromIndex, 1);
      siblingSchedules.splice(toIndex, 0, movedSchedule);

      for (let index = 0; index < siblingSchedules.length; index++) {
        await addSchedule({ ...siblingSchedules[index], order: index });
      }
      await refreshGanttPanel(currentSelectedProjectId);
      showToast("並び順を変更しました");
    }

    // ===== ガントバーのドラッグによる日程変更（詳細設計書3.2.4） =====
    // 【設計判断】マインドマップノードのドラッグ（pointerdown/pointermove/pointerup、
    //   handleMindmapNodePointerDown等）と同じ実装パターンを使う。ドラッグ中は見た目
    //   （left/width）だけを更新し、DBへの保存はpointerup時の1回だけ行う。
    //   3モード（詳細設計書3.2.4）：
    //   ・move：バー本体をつかんだ場合。開始日・終了日を同じ日数だけ平行移動（期間不変）。
    //   ・resize-start：左端の掴み手（bar-lh）をつかんだ場合。開始日のみ変更。
    //   ・resize：右端の掴み手（bar-rh）をつかんだ場合。終了日のみ変更。
    //   掴み手は葉ノード（子を持たない行）にしか無いため、親行（子を持つ行）は常にmoveのみになる。
    //   【設計判断：親行をmoveした場合の子孫の扱い】親の日付は子から自動算出される仕様
    //   （3.2.3・syncAncestorDates）のため、親バーだけを動かしても次に子が変わった瞬間に
    //   syncAncestorDatesで元へ戻ってしまい操作が意味を持たない。詳細設計書はこの点を明記
    //   していないが、データの整合性を保つため、親行をmoveした場合は配下の子孫スケジュールも
    //   同じ日数だけ平行移動する（さらに上の祖先の日付はsyncAncestorDatesで再計算する）。

    // ドラッグ中のスケジュールid・モード。ドラッグしていない時はnull。
    let draggedBarScheduleId = null;
    let draggedBarMode = null; // "move" | "resize-start" | "resize"
    let barDragStartPointerX = 0;
    let barDragStartStartDate = "";
    let barDragStartEndDate = "";
    let barDragPixelsPerDay = 0;
    // これ未満の移動量は「クリック」とみなす（MINDMAP_DRAG_THRESHOLD_PXと同じ考え方）。
    // pointerup直後に発火するclickイベントで、実際にドラッグした場合だけタスクポップアップを
    // 開かせないようにするため、handleBarPointerUpが移動量を判定してこの変数に記録する。
    const BAR_CLICK_VS_DRAG_THRESHOLD_PX = 3;
    let wasBarPointerMovedSignificantly = false;

    // 【前提】rootScheduleId は起点スケジュールのid。allSchedules は同一プロジェクト内の
    //   全スケジュール。
    // 【処理】parentIdをたどり、rootScheduleIdの子孫（子・孫）を幅優先で収集する
    //   （deleteScheduleCascadeと同じ考え方。root自身は含めない）。
    // 【結果】子孫スケジュールオブジェクトの配列を返す（子孫がなければ空配列）。
    function collectScheduleDescendants(rootScheduleId, allSchedules) {
      const childSchedulesByParentId = new Map();
      for (const schedule of allSchedules) {
        if (schedule.parentId === null || schedule.parentId === undefined) continue;
        if (!childSchedulesByParentId.has(schedule.parentId)) {
          childSchedulesByParentId.set(schedule.parentId, []);
        }
        childSchedulesByParentId.get(schedule.parentId).push(schedule);
      }
      const descendants = [];
      let frontier = childSchedulesByParentId.get(rootScheduleId) || [];
      while (frontier.length > 0) {
        descendants.push(...frontier);
        const nextFrontier = [];
        for (const node of frontier) {
          nextFrontier.push(...(childSchedulesByParentId.get(node.id) || []));
        }
        frontier = nextFrontier;
      }
      return descendants;
    }

    // 【前提】event はガントバー（.gantt-bar）またはその掴み手（.gantt-bar-handle）上での
    //   pointerdownイベント。scheduleId はそのバーが表すスケジュールid。mode は
    //   "move"|"resize-start"|"resize"。barElement は実際にポインタを捕捉する要素（.gantt-bar
    //   自身。掴み手が対象でも、見た目の更新はバー本体に対して行うため）。
    // 【処理】ロック中は開始しない（詳細設計書3.1.3：個別関数側でのロックチェック）。
    //   それ以外は、ドラッグ開始時点のポインタ座標・対象スケジュールの開始日・終了日・
    //   現在の表示粒度のpixelsPerDayを記録する（以降のpointermoveで差分計算するための基準点）。
    // 【結果】ドラッグ状態が開始される（実際の見た目更新はpointermoveハンドラが行う）。
    function handleBarPointerDown(event, scheduleId, mode, barElement) {
      if (currentProjectObject?.locked) {
        showToast("ロック中のため編集できません");
        return;
      }
      const scheduleRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!scheduleRow) return;
      draggedBarScheduleId = scheduleId;
      draggedBarMode = mode;
      barDragStartPointerX = event.clientX;
      barDragStartStartDate = scheduleRow.schedule.startDate;
      barDragStartEndDate = scheduleRow.schedule.endDate;
      barDragPixelsPerDay = GRANULARITY_PIXELS_PER_DAY[currentGranularity];
      barElement.classList.add("is-bar-dragging");
      barElement.setPointerCapture(event.pointerId);
      event.stopPropagation();
    }

    // 【前提】draggedBarScheduleIdが設定済み（ドラッグ中）であること。
    // 【処理】ポインタの移動量を「移動日数」に変換し（barDragPixelsPerDayで割って四捨五入）、
    //   calculateDraggedBarDatesでモードに応じた新しい開始日・終了日（クランプ済み）を求め、
    //   バーの見た目（left/width）だけを更新する。DBへの保存はしない。
    // 【結果】バーの見た目がポインタの位置に追従する。
    function handleBarPointerMove(event) {
      if (!draggedBarScheduleId) return;
      const barElement = document.querySelector(`.gantt-bar[data-schedule-id="${draggedBarScheduleId}"]`);
      if (!barElement) return;

      const deltaDays = Math.round((event.clientX - barDragStartPointerX) / barDragPixelsPerDay);
      const { startDate, endDate } = calculateDraggedBarDates(
        draggedBarMode,
        barDragStartStartDate,
        barDragStartEndDate,
        deltaDays,
        currentProjectObject.startDate,
        currentProjectObject.endDate
      );
      const geometry = calculateBarGeometry({ startDate, endDate }, currentTimelineStartDateString, barDragPixelsPerDay);
      if (!geometry) return;
      barElement.style.left = `${geometry.leftPx}px`;
      barElement.style.width = `${geometry.widthPx}px`;
    }

    // 【前提】ドラッグ中であること。
    // 【処理】最終的な開始日・終了日を確定し、ドラッグ開始時点と変わっていなければ
    //   （＝実質クリックだった場合）何も保存せず見た目だけ元に戻す。変わっていれば
    //   addScheduleで保存する。対象が親行（子を持つ行）の場合は、実際に確定した開始日の
    //   移動量ぶん、配下の子孫スケジュールも平行移動して保存する（本セクション冒頭の設計判断）。
    //   親（parentId）を持つ場合はsyncAncestorDatesで祖先の日付を再計算する（3.2.3）。
    // 【結果】DBが更新され、ガントパネルが再描画される。実際に日付が変わった場合のみ
    //   トースト「スケジュールを更新しました」を表示する（詳細設計書3.2.4）。
    async function handleBarPointerUp(event) {
      if (!draggedBarScheduleId) return;
      const scheduleId = draggedBarScheduleId;
      const mode = draggedBarMode;
      draggedBarScheduleId = null;
      draggedBarMode = null;
      wasBarPointerMovedSignificantly =
        Math.abs(event.clientX - barDragStartPointerX) >= BAR_CLICK_VS_DRAG_THRESHOLD_PX;

      const barElement = document.querySelector(`.gantt-bar[data-schedule-id="${scheduleId}"]`);
      if (barElement) barElement.classList.remove("is-bar-dragging");

      const scheduleRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!scheduleRow) return;

      const deltaDays = Math.round((event.clientX - barDragStartPointerX) / barDragPixelsPerDay);
      const { startDate, endDate } = calculateDraggedBarDates(
        mode,
        barDragStartStartDate,
        barDragStartEndDate,
        deltaDays,
        currentProjectObject.startDate,
        currentProjectObject.endDate
      );

      if (startDate === barDragStartStartDate && endDate === barDragStartEndDate) {
        await refreshGanttPanel(currentSelectedProjectId);
        return;
      }

      const updatedSchedule = { ...scheduleRow.schedule, startDate, endDate };
      await addSchedule(updatedSchedule);

      if (scheduleRow.hasChildren && mode === "move") {
        const actualStartDeltaDays = Math.round(
          (parseDateStringToUtcTimestamp(startDate) - parseDateStringToUtcTimestamp(barDragStartStartDate)) / MILLISECONDS_PER_DAY
        );
        const allSchedules = currentScheduleTreeRows.map((row) => row.schedule);
        const descendants = collectScheduleDescendants(scheduleId, allSchedules);
        for (const descendant of descendants) {
          await addSchedule({
            ...descendant,
            startDate: shiftDateStringByDays(descendant.startDate, actualStartDeltaDays),
            endDate: shiftDateStringByDays(descendant.endDate, actualStartDeltaDays),
          });
        }
      }

      if (updatedSchedule.parentId !== null && updatedSchedule.parentId !== undefined) {
        await syncAncestorDates(updatedSchedule.parentId);
      }

      await refreshGanttPanel(currentSelectedProjectId);
      showToast("スケジュールを更新しました");
    }

    // ===== ガントバー直接クリックの軽量ポップアップ（UI差分表No.75／対応表No.17） =====
    // 【設計判断】既存のopenScheduleModal（中央モーダル・フォーム編集）とは別物。クリックした
    //   バーの近くに表示する読み取り専用の簡易ポップアップで、名前・進捗・メモを確認できる。
    //   #taskPopupという共通の入れ物1つを使い回す（#toast/#modalOverlayと同じ設計）。
    //   進捗率の算出根拠：対応表No.17の抜粋にはdur（日数）はあるが%の算出式が現れておらず、
    //   データモデルにも数値の進捗フィールドが無い。ここではステータス
    //   （未着手0%／進行中50%／完了100%）から簡易に算出する（要判断事項として明示）。
    const PROGRESS_PERCENT_BY_SCHEDULE_STATUS = { todo: 0, inprogress: 50, done: 100 };

    // 【前提】comments は対象スケジュールに紐づくコメント全件（無ければ空配列）。
    // 【処理】投稿日時の昇順に並べ、削除ボタン付きの一覧＋投稿フォームのHTML文字列を組み立てる
    //   （renderModalCommentSectionToHtmlと同じ考え方。taskPopupは編集モーダルと同時に
    //   開いている可能性があるため、id・data-actionをモーダル側とは別にして重複を避ける）。
    // 【結果】ポップアップのコメント欄に入れられるHTML文字列を返す。
    function renderTaskPopupCommentSectionToHtml(comments) {
      const sortedComments = comments.slice().sort((a, b) => (a.createdAt < b.createdAt ? -1 : 1));
      const commentListHtml = sortedComments.length > 0
        ? sortedComments
            .map(
              (comment) => `<div class="panel-list-item" data-comment-id="${escapeHtmlText(comment.id)}">
                <div class="panel-list-item-main">
                  <div>${escapeHtmlText(comment.text)}</div>
                  <div class="panel-list-item-meta">${escapeHtmlText(comment.createdAt)}</div>
                </div>
                <div class="panel-list-item-actions">
                  <button type="button" class="wbs-icon-button" data-action="delete-task-popup-comment" title="削除">🗑</button>
                </div>
              </div>`
            )
            .join("")
        : '<p class="empty-state-message">コメントはまだありません。</p>';
      return `
        <div class="task-popup-comment-section">
          <div class="modal-comment-list">${commentListHtml}</div>
          <div class="modal-comment-post-form">
            <input type="text" id="taskPopupCommentTextInput" placeholder="コメントを入力">
            <button type="button" class="panel-add-button" id="taskPopupPostCommentButton">投稿</button>
          </div>
        </div>
      `;
    }

    // 【前提】schedule は表示対象のスケジュールオブジェクト。comments はそのスケジュールに
    //   紐づくコメント全件。
    // 【処理】名前・進捗バー・メモ（読み取り専用）＋埋め込みコメント欄のHTML文字列を組み立てる。
    // 【結果】#taskPopupのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderTaskPopupToHtml(schedule, comments) {
      const progressPercent = PROGRESS_PERCENT_BY_SCHEDULE_STATUS[schedule.taskStatus] ?? 0;
      const notesText = schedule.notes ? escapeHtmlText(schedule.notes) : "（メモはありません）";
      return `
        <div class="task-popup-header">
          <strong>${escapeHtmlText(schedule.name)}</strong>
          <button type="button" class="slide-panel-close-button" id="taskPopupCloseButton">×</button>
        </div>
        <div class="task-popup-progress-track"><div class="task-popup-progress-fill" style="width:${progressPercent}%"></div></div>
        <div class="task-popup-progress-label">進捗：${progressPercent}%</div>
        <div class="task-popup-notes">${notesText}</div>
        ${renderTaskPopupCommentSectionToHtml(comments)}
      `;
    }

    // 【前提】なし。
    // 【処理】#taskPopupを非表示にし、中身を空にする（closeModalと同じ考え方）。
    // 【結果】ポップアップが非表示になる。
    function closeTaskPopup() {
      const popupElement = document.getElementById("taskPopup");
      popupElement.hidden = true;
      popupElement.innerHTML = "";
    }

    // 【前提】scheduleId はポップアップ表示対象のスケジュールid。clientX/clientY はクリック位置
    //   （position:fixedでそのまま使えるビューポート座標）。
    // 【処理】対象スケジュールの内容・コメントでポップアップを組み立てて表示位置を設定する。
    //   投稿・削除ボタンはinnerHTML再構築を経ても動くよう、#taskPopup自体へのイベント委譲で
    //   拾う（initializeApp側で1回だけ登録）。
    // 【結果】ポップアップがクリック位置の近くに表示される。
    async function openTaskPopup(scheduleId, clientX, clientY) {
      const scheduleRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!scheduleRow) return;
      const comments = await getCommentsByTask(scheduleId);
      const popupElement = document.getElementById("taskPopup");
      popupElement.innerHTML = renderTaskPopupToHtml(scheduleRow.schedule, comments);
      popupElement.style.left = `${clientX}px`;
      popupElement.style.top = `${clientY}px`;
      popupElement.dataset.scheduleId = scheduleId;
      popupElement.hidden = false;
    }

    // 【前提】#taskPopupが表示中で、dataset.scheduleIdに対象スケジュールidが入っていること。
    // 【処理】現在のコメント欄のテキストが空でなければaddCommentで保存し、コメント欄だけを
    //   最新の内容で再構築する（ポップアップ全体は再構築しない＝進捗・メモ欄はそのまま）。
    // 【結果】投稿後、コメント一覧が更新される。
    async function handlePostTaskPopupCommentButtonClick() {
      const popupElement = document.getElementById("taskPopup");
      const scheduleId = popupElement.dataset.scheduleId;
      const textInput = document.getElementById("taskPopupCommentTextInput");
      if (!scheduleId || !textInput) return;
      const text = textInput.value.trim();
      if (!text) return;
      await addComment({ id: generateId(), taskId: scheduleId, text, createdAt: new Date().toISOString() });
      await refreshTaskPopupCommentSection(scheduleId);
    }

    // 【前提】commentId は削除したいコメントのid。#taskPopupのdataset.scheduleIdが設定済み。
    // 【処理】即時メモの個別削除と同じ方針（確認なし即削除）でdeleteCommentし、
    //   コメント欄だけを再構築する。
    // 【結果】削除後、コメント一覧が更新される。
    async function handleDeleteTaskPopupCommentButtonClick(commentId) {
      const popupElement = document.getElementById("taskPopup");
      const scheduleId = popupElement.dataset.scheduleId;
      await deleteComment(commentId);
      await refreshTaskPopupCommentSection(scheduleId);
    }

    // 【前提】scheduleId は表示中のポップアップが対象にしているスケジュールid。
    // 【処理】最新のコメント一覧を取得し、#taskPopup内のコメント欄部分だけを差し替える。
    // 【結果】コメント一覧の表示が最新の状態になる（進捗・メモ欄は再構築されない）。
    async function refreshTaskPopupCommentSection(scheduleId) {
      const comments = await getCommentsByTask(scheduleId);
      const sectionElement = document.querySelector("#taskPopup .task-popup-comment-section");
      if (sectionElement) sectionElement.outerHTML = renderTaskPopupCommentSectionToHtml(comments);
    }

    // 【前提】scheduleId は削除したいスケジュールのid。
    // 【処理】子の有無でC2（子なし）／C3（子あり・サブタスクごと削除）の確認文言を切り替えて
    //   confirm()し、OKならdeleteScheduleCascadeで削除する（連鎖削除・コメント削除・
    //   変更履歴記録・祖先日付再計算は既存の複合操作にすべて任せる）。
    // 【結果】確認OK時、対象と子孫が削除されガントパネルが再描画され、トースト「削除しました」を
    //   表示する（詳細設計書3.2.2 step4）。キャンセル時は何もしない。
    //   ロック中は確認ダイアログより前に中断する（トースト「ロック中のため編集できません」）。
    async function handleDeleteScheduleButtonClick(scheduleId) {
      if (currentProjectObject?.locked) {
        showToast("ロック中のため編集できません");
        return;
      }
      const targetRow = currentScheduleTreeRows.find((row) => row.schedule.id === scheduleId);
      if (!targetRow) return;
      const confirmMessage = targetRow.hasChildren
        ? `「${targetRow.schedule.name}」とそのサブタスクをすべて削除しますか？`
        : `「${targetRow.schedule.name}」を削除しますか？`;
      if (!window.confirm(confirmMessage)) return;
      await deleteScheduleCascade(scheduleId, currentSelectedProjectId);
      await refreshGanttPanel(currentSelectedProjectId);
      showToast("削除しました");
    }

    // 【前提】currentScheduleTreeRows・collapsedScheduleIdsが設定済みであること。
    // 【処理】areAllParentRowsCollapsedで「親行が現在すべて折りたたまれているか」を判定し、
    //   trueならcollapsedScheduleIdsを空にする（全展開）、falseなら子を持つ全スケジュールを
    //   collapsedScheduleIdsへ追加する（全折りたたみ）。対応表No.39のお手本と同じ判定方式
    //   （個々の行の実際の開閉状態を毎回チェックする。ボタン自身の状態フラグは持たない）。
    //   ラベルの更新はrerenderWbsAndGanttFromCache側が毎回行うため、ここでは行わない。
    // 【結果】WBS・ガント両パネルが再描画され、ボタンのラベルも最新の状態に更新される。
    function handleToggleAllScheduleRowsButtonClick() {
      if (areAllParentRowsCollapsed(currentScheduleTreeRows, collapsedScheduleIds)) {
        collapsedScheduleIds.clear();
      } else {
        for (const row of currentScheduleTreeRows) {
          if (row.hasChildren) collapsedScheduleIds.add(row.schedule.id);
        }
      }
      rerenderWbsAndGanttFromCache();
    }

    // 【前提】action は "toggle-collapse" | "move-up" | "move-down" | "add-child" | "edit" | "delete"。
    //   scheduleId はアイコンが乗っていたWBS行のスケジュールid。
    // 【処理】WBS行のホバーアイコン共通のディスパッチャー。開閉トグルはDB再取得不要のため
    //   rerenderWbsAndGanttFromCacheのみ、それ以外は各専用ハンドラへ委譲する。
    // 【結果】actionに応じた処理が実行される。
    async function handleWbsRowIconClick(action, scheduleId) {
      if (action === "toggle-collapse") {
        if (collapsedScheduleIds.has(scheduleId)) {
          collapsedScheduleIds.delete(scheduleId);
        } else {
          collapsedScheduleIds.add(scheduleId);
        }
