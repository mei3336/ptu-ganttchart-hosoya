        selectAllCheckbox.addEventListener("change", () => {
          for (const checkbox of document.querySelectorAll(".import-diff-checkbox")) {
            checkbox.checked = selectAllCheckbox.checked;
          }
        });
      }

      const applyButton = document.getElementById("importDiffApplyButton");
      if (applyButton) {
        applyButton.addEventListener("click", () => handleApplyImportButtonClick(diffByStore));
      }
    }

    // 【前提】storeDefinitionはgetBackupStoreDefinitionsの1要素。actionは"add"|"mod"|"del"。
    //   primaryRecordは適用対象そのもの（add/modは取込データ側のレコード、delは削除対象＝
    //   現在のDB側のレコード）。beforeRecordForDiffはmod時のみ使う変更前レコード（他はnull）。
    // 【処理】通常のupsert(put)／削除(del)関数を1件だけ呼ぶ。ストアがLOGGED_STORES対象
    //   （projects/schedules/tasks/issues）の場合のみ、recordChangelogEntryで変更履歴を記録する
    //   （質問リスト_未確認事項.md Q1）。projectIdは、projectsストアではレコード自身のidを、
    //   他ストアではレコードのprojectIdを使う（handleProjectModalSaveButtonClickと同じ扱い）。
    // 【結果】1件の適用（put/delete、必要なら変更履歴の記録）が完了した時点で resolve する。
    async function applyOneImportItem(storeDefinition, action, primaryRecord, beforeRecordForDiff) {
      if (action === "del") {
        await storeDefinition.del(primaryRecord.id);
      } else {
        await storeDefinition.put(primaryRecord);
      }

      if (!storeDefinition.logged) return;

      const projectId = storeDefinition.key === "projects" ? primaryRecord.id : primaryRecord.projectId;
      const changelogAction = action === "add" ? "add" : action === "mod" ? "edit" : "delete";
      await recordChangelogEntry(
        changelogAction,
        projectId,
        storeDefinition.key,
        storeDefinition.label,
        primaryRecord.id,
        primaryRecord[storeDefinition.nameField],
        beforeRecordForDiff ?? null,
        primaryRecord,
        storeDefinition.fieldLabels
      );
    }

    // 【前提】diffByStoreは、開いている差分比較モーダルが表示している内容そのもの
    //   （buildImportDiffの戻り値。チェック状態はモーダルのDOM側が持つ）。
    // 【処理】チェック済みのチェックボックスを集め、0件ならアラートで案内して終了する
    //   （詳細設計書3.9.3エラーバリエーション1）。1件以上ならconfirmで最終確認し
    //   （エラーバリエーション2）、OKならチェック済みの項目だけを1件ずつapplyOneImportItemで適用する。
    // 【結果】適用後はモーダルを閉じ、プロジェクト一覧・現在の画面を再読込し、
    //   トースト「取込完了: 新規{n}件 / 変更{n}件 / 削除{n}件」を表示する。
    async function handleApplyImportButtonClick(diffByStore) {
      const checkedCheckboxes = Array.from(document.querySelectorAll(".import-diff-checkbox:checked"));
      if (checkedCheckboxes.length === 0) {
        window.alert("適用する項目を選択してください");
        return;
      }
      if (!window.confirm(`${checkedCheckboxes.length}件の変更を適用しますか？`)) return;

      const storeDefinitionsByKey = new Map(getBackupStoreDefinitions().map((definition) => [definition.key, definition]));
      const diffByStoreKey = new Map(diffByStore.map((storeDiff) => [storeDiff.key, storeDiff]));

      let addedCount = 0;
      let modifiedCount = 0;
      let deletedCount = 0;

      for (const checkbox of checkedCheckboxes) {
        const storeDefinition = storeDefinitionsByKey.get(checkbox.dataset.storeKey);
        const storeDiff = diffByStoreKey.get(checkbox.dataset.storeKey);
        const itemId = checkbox.dataset.itemId;

        if (checkbox.dataset.action === "add") {
          const record = storeDiff.add.find((item) => String(item.id) === itemId);
          await applyOneImportItem(storeDefinition, "add", record, null);
          addedCount++;
        } else if (checkbox.dataset.action === "mod") {
          const pair = storeDiff.mod.find((item) => String(item.after.id) === itemId);
          await applyOneImportItem(storeDefinition, "mod", pair.after, pair.before);
          modifiedCount++;
        } else if (checkbox.dataset.action === "del") {
          const record = storeDiff.del.find((item) => String(item.id) === itemId);
          await applyOneImportItem(storeDefinition, "del", record, null);
          deletedCount++;
        }
      }

      closeModal();
      await refreshProjectSelectDropdown();
      const remainingProjectList = await getAllProjects();
      const stillExists = remainingProjectList.some((project) => project.id === currentSelectedProjectId);
      const nextProjectId = stillExists ? currentSelectedProjectId : (remainingProjectList[0]?.id || null);
      document.getElementById("projectSelectDropdown").value = nextProjectId || "";
      await switchToProject(nextProjectId);
      showToast(`取込完了: 新規${addedCount}件 / 変更${modifiedCount}件 / 削除${deletedCount}件`);
    }

    // 【前提】fileInputElement は<input type="file">要素で、files[0]に選択されたJSONファイルを持つこと。
    // 【処理】ファイルをテキストとして読み込みJSON.parseする。パース失敗、または
    //   projects/schedulesキーが無い場合は「無効なファイルです。GanttForgeのエクスポートファイルを
    //   選択してください。」をalertで表示しconsole.errorに詳細を出す（基本設計書9.2）。
    //   検証OKなら現在のDB内容との差分を算出し、差分比較モーダルを開く。
    //   ファイル選択欄は最後に必ず空にする（<input type="file">は同じファイルを選び直しても
    //   changeイベントが発火しない仕様のため、次回選択のために毎回リセットする）。
    // 【結果】検証NG時は何も変更せず終了する。OK時は差分比較モーダルを開く。
    async function handleImportFileInputChange(fileInputElement) {
      const selectedFile = fileInputElement.files[0];
      fileInputElement.value = "";
      if (!selectedFile) return;

      let importedData;
      try {
        const fileText = await selectedFile.text();
        importedData = JSON.parse(fileText);
      } catch (error) {
        console.error(error);
        window.alert("無効なファイルです。GanttForgeのエクスポートファイルを選択してください。");
        return;
      }

      if (!isValidImportedBackupShape(importedData)) {
        console.error("インポートファイルにprojects/schedulesキーがありません", importedData);
        window.alert("無効なファイルです。GanttForgeのエクスポートファイルを選択してください。");
        return;
      }

      const diffByStore = await buildImportDiff(importedData);
      openImportDiffModal(diffByStore);
    }

    // 【前提】projectName はファイル名に使うプロジェクト名（未選択時はnull/undefinedを許容）。
    //   extension は拡張子（ドット無し。例："pdf"/"xlsx"）。H3・H4で共通のファイル名規則を使う。
    // 【処理】`GanttForge_{プロジェクト名}_{YYYYMMDD}.{拡張子}` の形でファイル名を組み立てる。
    //   プロジェクト名が無い場合は「無題」を使う。
    // 【結果】組み立てたファイル名の文字列を返す。
    function buildReportFileName(projectName, extension) {
      const compactDateString = new Date().toISOString().slice(0, 10).replaceAll("-", "");
      return `GanttForge_${projectName || "無題"}_${compactDateString}.${extension}`;
    }

    // 【前提】date は出力日時にしたいDateオブジェクト。H3(PDF)・H4(Excel)で共通の表記
    //   （基本設計書9.3・9.4：「出力日時：YYYY/M/D H:mm:ss」）に使う。
    // 【処理】YYYY/M/D H:mm:ss形式の文字列を組み立てる（月日は0埋めせず、時分秒のみ0埋めする）。
    // 【結果】組み立てた文字列を返す。
    function formatDateToOutputTimestampString(date) {
      const padToTwoDigits = (value) => String(value).padStart(2, "0");
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()} ${padToTwoDigits(date.getHours())}:${padToTwoDigits(date.getMinutes())}:${padToTwoDigits(date.getSeconds())}`;
    }

    // ===== H3：PDF出力（exportPDF） =====
    // 【設計判断】crud-implementation.md対象外（DB操作を伴わない）。基本設計書9.3・詳細設計書
    //   3.10.2に従い、以下の方針で実装する：
    //   ・キャプチャ対象は#wbsPanel（左：スケジュール一覧）と#ganttPanelBody（右：ガントチャート）。
    //     #ganttPanelBodyは.gantt-scroll-area（overflow-x:auto）の中身のため、素朴に
    //     html2canvasへ渡すと画面に見えている範囲だけしかキャプチャされない。html2canvasの
    //     width/height/windowWidth/windowHeightオプションに要素自身のscrollWidth/scrollHeight
    //     （スクロール位置に関わらず全内容の実サイズを表す）を明示することで、スクロールで隠れて
    //     いる最終日までの全体を1枚の画像として取得する（「最終日ギリギリに収まる可変サイズ」の
    //     実装方法）。
    //   ・タイトル・出力日時は、DOMへの一時挿入ではなくCanvas 2Dコンテキストで直接描画する
    //     （キャプチャ後の画像に上乗せする方が、一時的なDOM変更を必要とせず確実なため）。
    //   ・PDFのページサイズは、この合成後Canvasのピクセルサイズにそのまま合わせる
    //     （unit:"px"のカスタムformatを使う。A4等の固定サイズは使わない）。

    // 詳細設計書3.10.2：「PDF生成中...」表示後、50ms待機してからキャプチャ処理へ進む。
    const PDF_CAPTURE_START_DELAY_MS = 50;

    // 合成後Canvas上部に確保する、タイトル・出力日時を描くヘッダー帯の高さ（ピクセル）。
    const PDF_HEADER_HEIGHT_PX = 60;

    // 【前提】なし。
    // 【処理】html2canvas・jsPDFのグローバルオブジェクトが両方読み込まれているかを判定する
    //   （詳細設計書3.10.2）。
    // 【結果】両方読み込まれていればtrue、そうでなければfalseを返す。
    function arePdfLibrariesLoaded() {
      return typeof window.html2canvas !== "undefined" && typeof window.jspdf !== "undefined" && typeof window.jspdf.jsPDF !== "undefined";
    }

    // 【前提】targetElement はキャプチャしたいDOM要素。overflow-x:autoな親を持つ場合でも、
    //   要素自身のscrollWidth/scrollHeightは（親のスクロール位置に関わらず）全内容の実サイズを表す。
    // 【処理】html2canvasに、要素の実サイズ（scrollWidth/scrollHeight）をwidth/height/
    //   windowWidth/windowHeightとして明示的に渡し、画面に見えている範囲だけでなく全内容を
    //   キャプチャさせる。
    // 【結果】キャプチャ結果のCanvas要素を resolve する。
    function captureElementFullContentToCanvas(targetElement) {
      return window.html2canvas(targetElement, {
        width: targetElement.scrollWidth,
        height: targetElement.scrollHeight,
        windowWidth: targetElement.scrollWidth,
        windowHeight: targetElement.scrollHeight,
      });
    }

    // 【前提】wbsCanvas・ganttCanvasはそれぞれcaptureElementFullContentToCanvasで取得したCanvas。
    //   titleText・timestampTextはヘッダー帯に描く文字列。
    // 【処理】上部にタイトル・出力日時を描くヘッダー帯を確保した1枚のCanvasを新規に作り、
    //   その下にwbsCanvasを左、ganttCanvasを右に並べて描画する（基本設計書9.3：
    //   「左側：スケジュール一覧／右側：ガントチャート」「右上に出力日時等の情報欄」）。
    // 【結果】合成済みのCanvas要素を返す。
    function composeGanttPdfCanvas(wbsCanvas, ganttCanvas, titleText, timestampText) {
      const composedCanvas = document.createElement("canvas");
      composedCanvas.width = wbsCanvas.width + ganttCanvas.width;
      composedCanvas.height = PDF_HEADER_HEIGHT_PX + Math.max(wbsCanvas.height, ganttCanvas.height);

      const context = composedCanvas.getContext("2d");
      context.fillStyle = "#FFFFFF";
      context.fillRect(0, 0, composedCanvas.width, composedCanvas.height);

      context.fillStyle = "#111827";
      context.font = "bold 24px sans-serif";
      context.textBaseline = "middle";
      context.fillText(titleText, 16, PDF_HEADER_HEIGHT_PX / 2);

      context.font = "14px sans-serif";
      context.textAlign = "right";
      context.fillText(timestampText, composedCanvas.width - 16, PDF_HEADER_HEIGHT_PX / 2);
      context.textAlign = "left";

      context.drawImage(wbsCanvas, 0, PDF_HEADER_HEIGHT_PX);
      context.drawImage(ganttCanvas, wbsCanvas.width, PDF_HEADER_HEIGHT_PX);

      return composedCanvas;
    }

    // 【前提】なし（currentSelectedProjectId・currentProjectObjectが選択済みであること。
    //   未選択時はexportPdfButton自体がdisabledのため、この関数は呼ばれない想定）。
    // 【処理】ライブラリの読込確認→トースト表示→50ms待機→WBS+ガントをキャプチャ→合成→
    //   カスタムページサイズのPDFを生成→ダウンロードする（詳細設計書3.10.2）。
    // 【結果】成功時はトースト「PDFを保存しました」、ライブラリ未読込時は
    //   「PDFライブラリの読み込みに失敗しました。」、生成中の例外時は「PDF生成に失敗しました」
    //   （console.errorにも詳細を出す）を表示する。
    async function exportPDF() {
      if (!arePdfLibrariesLoaded()) {
        showToast("PDFライブラリの読み込みに失敗しました。");
        return;
      }

      showToast("PDF生成中...");
      await new Promise((resolve) => setTimeout(resolve, PDF_CAPTURE_START_DELAY_MS));

      try {
        const wbsCanvas = await captureElementFullContentToCanvas(document.getElementById("wbsPanel"));
        const ganttCanvas = await captureElementFullContentToCanvas(document.getElementById("ganttPanelBody"));
        const titleText = `${currentProjectObject?.name || ""} — ガントチャート`;
        const timestampText = `出力日時：${formatDateToOutputTimestampString(new Date())}`;
        const composedCanvas = composeGanttPdfCanvas(wbsCanvas, ganttCanvas, titleText, timestampText);

        const pdfDocument = new window.jspdf.jsPDF({
          orientation: composedCanvas.width >= composedCanvas.height ? "landscape" : "portrait",
          unit: "px",
          format: [composedCanvas.width, composedCanvas.height],
        });
        pdfDocument.addImage(composedCanvas, "PNG", 0, 0, composedCanvas.width, composedCanvas.height);
        pdfDocument.save(buildReportFileName(currentProjectObject?.name, "pdf"));

        showToast("PDFを保存しました");
      } catch (error) {
        console.error(error);
        showToast("PDF生成に失敗しました");
      }
    }

    // ===== UI：状態・純粋関数（DOM非依存） =====
    // 【設計判断】このセクションの関数は「データ配列を受け取り、データ/文字列を返す」だけの
    //   純粋関数と、実際にDOMへ反映する薄い関数に分ける。前者はdocumentに一切触れないため、
    //   ブラウザが無い環境（Node.js等）でも配列を渡すだけで動作を検証できる。
    //
    // 【今回のスコープ（UIデザイン仕様書・基本設計書2章に基づくメイン画面の忠実再現）】
    //   実装：2段ヘッダー、WBSパネル(520px)＋ガントチャート本体（日付軸・バー・
    //   マイルストーンマーカー・親子バーの視覚差・完了時の不透明度・土日の背景色）、
    //   カンバン、マインドマップ（issueのx,y座標を使った絶対配置＋親子を結ぶ線）。
    //   静的表示のみ：バーのドラッグリサイズ、カンバンのドラッグ&ドロップ、
    //   マインドマップのノードドラッグは実装しない。
    //   別工程：サイドパネル一式（コメント/メモ/即時メモ/スナップショット/変更履歴）、
    //   モーダル（マイルストーン管理／プロジェクト編集）、インポート/エクスポート、
    //   表示粒度（週/月）切替、全て開く・閉じるの実際の開閉状態管理。
    //   これらの未実装ボタンは視覚的には配置し、クリック時は
    //   handleOutOfScopeButtonClickで「スコープ外」である旨を明示する。

    // 現在選択中のプロジェクトのid。未選択時はnull。
    let currentSelectedProjectId = null;
    // 現在選択中のプロジェクトの最新データ（startDate/endDate/locked/milestones参照用）。
    let currentProjectObject = null;
    // 列トグル（開始/終了/状態）を再描画する際、DBへ再度問い合わせずに済むようキャッシュする。
    let currentScheduleTreeRows = [];
    // 「今日」ボタンでのスクロール位置計算に使う、現在表示中タイムラインの先頭日。
    let currentTimelineStartDateString = null;
    // WBSパネルの追加列（開始/終了/状態）の表示状態。基本設計書2.2節の固定順（開始→終了→状態）で
    // 右側から列を追加する仕様のため、この順序のままレンダリングする。
    const visibleWbsColumns = { startDate: false, endDate: false, status: false };
    // 折りたたまれているスケジュールidの集合。DBには保存しない画面上だけの一時状態
    // （プロジェクト切替・再読み込みでリセットされてよい表示上の状態のため）。
    const collapsedScheduleIds = new Set();
    // 折りたたまれているマインドマップのissueidの集合。collapsedScheduleIdsと同じ理由で
    // DB非保存の画面上だけの一時状態にする。
    const collapsedMindmapIssueIds = new Set();
    // P5コメントパネルで折りたたまれているスケジュールidの集合。collapsedScheduleIdsと
    // 同じ理由でDB非保存の画面上だけの一時状態にする。
    const collapsedCommentGroupScheduleIds = new Set();
    // ドラッグ操作中のスケジュールid。ドラッグ開始時に設定し、ドロップ処理後にnullへ戻す。
    let draggedScheduleId = null;
    // ドラッグ操作中のタスクid（カンバンのカード）。draggedScheduleIdと同じ理由・同じ寿命。
    let draggedTaskId = null;

    // taskStatus（"todo"|"inprogress"|"done"）の日本語表示名（データモデル設計3.2節）。
    const SCHEDULE_STATUS_LABELS = { todo: "未着手", inprogress: "進行中", done: "完了" };

    // ガント1日あたりの描画幅（px）。表示粒度（日/週/1ヶ月/3ヶ月）ごとに、全体の横幅が
    // 極端に長大化しないよう、粒度が粗くなるほど1日あたりの幅を狭くする。
    const GRANULARITY_PIXELS_PER_DAY = { day: 32, week: 6, month: 2.2, quarter: 0.9 };
    // 現在選択中の表示粒度（"day" | "week" | "month" | "quarter"）。
    let currentGranularity = "day";
    // ガント1行の高さ（px）。CSS変数 --gantt-row-height と同じ値を保つこと（JS側で絶対配置の
    // 計算に使うため、CSSだけでなくJS定数としても持つ）。
    const GANTT_ROW_HEIGHT_PX = 44;
    const MILLISECONDS_PER_DAY = 24 * 60 * 60 * 1000;
    // マインドマップノードの固定カラーパレット（UIデザイン仕様書1.5節・9色）。
    const MINDMAP_NODE_COLORS = ["#2563EB", "#7C3AED", "#0891B2", "#059669", "#D97706", "#DC2626", "#DB2777", "#EA580C", "#4B5563"];

    // 【前提】rawText はユーザー入力を含みうる未エスケープの文字列（null/undefinedの可能性あり）。
    // 【処理】HTML特殊文字（& < > " '）を実体参照に置き換え、意図しないタグ・属性の注入を防ぐ。
    // 【結果】そのままHTML文字列に埋め込んでよいエスケープ済み文字列を返す。
    function escapeHtmlText(rawText) {
      return String(rawText ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // 基本設計書4.1節：親→子→孫の3階層まで（ひ孫＝孫の子は作成不可）。depthLevelは0始まりのため、
    // 「これ以上子を追加できない最大depthLevel」は2（孫）。子追加ボタンの無効化判定に使う。
    const MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN = 2;

    // 【前提】scheduleList は同一プロジェクト内のスケジュール全件（親子関係はparentIdで表現）。
    // 【処理】親→子の順にたどり、各行がツリー上で何階層目か（depthLevel、ルートは0）、
    //   子を1件でも持つか（hasChildren）、兄弟内の位置（siblingIndex・siblingCount）を付与する。
    //   同じ親を持つ兄弟同士はorderの昇順に揃える。
    //   hasChildrenは、ガントのバー描画で「親行の太いバー」と「葉（子なし）行の細いバー」を
    //   区別するために必要（UIデザイン仕様書3章）。
    //   siblingIndex/siblingCountは、上下矢印の並び替えが「同一階層（同じ親を持つ兄弟グループ）
    //   内でのみ可能」「先頭行では上矢印、末尾行では下矢印を無効化」という基本設計書4.1節の
    //   仕様を判定するために必要。
    // 【結果】ガントチャートの行として上から順に描画できる配列
    //   {schedule, depthLevel, hasChildren, siblingIndex, siblingCount}[] を返す。
    function buildScheduleTreeRows(scheduleList) {
      const childSchedulesByParentId = new Map();
      const rootSchedules = [];
      for (const schedule of scheduleList) {
        if (schedule.parentId === null || schedule.parentId === undefined) {
          rootSchedules.push(schedule);
          continue;
        }
        if (!childSchedulesByParentId.has(schedule.parentId)) {
          childSchedulesByParentId.set(schedule.parentId, []);
        }
        childSchedulesByParentId.get(schedule.parentId).push(schedule);
      }

      const sortByOrder = (a, b) => a.order - b.order;
      rootSchedules.sort(sortByOrder);
      for (const childSchedules of childSchedulesByParentId.values()) {
        childSchedules.sort(sortByOrder);
      }

      const scheduleTreeRows = [];
      function appendScheduleAndDescendants(schedule, depthLevel, siblingIndex, siblingCount) {
        const childSchedules = childSchedulesByParentId.get(schedule.id) || [];
        scheduleTreeRows.push({
          schedule,
          depthLevel,
          hasChildren: childSchedules.length > 0,
          siblingIndex,
          siblingCount,
        });
        childSchedules.forEach((childSchedule, childIndex) => {
          appendScheduleAndDescendants(childSchedule, depthLevel + 1, childIndex, childSchedules.length);
        });
      }
      rootSchedules.forEach((rootSchedule, rootIndex) => {
        appendScheduleAndDescendants(rootSchedule, 0, rootIndex, rootSchedules.length);
      });
      return scheduleTreeRows;
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値（深さ優先順）。
    // 【処理】各行のWBS番号（例：1, 1.1, 1.1.1, 1.2, 2, 2.1）を計算する。
    //   深さごとにカウンタを持ち、ある深さの行が現れるたびにそのカウンタを+1し、
    //   それより深い階層のカウンタは（兄弟が変われば無効になるため）切り捨てる。
    //   深さ優先順（親→その子孫全部→次の兄弟）で辿ることが前提のアルゴリズム。
    // 【結果】スケジュールid→WBS番号文字列 のMapを返す。
    function calculateWbsNumbers(scheduleTreeRows) {
      const counters = [];
      const wbsNumberByScheduleId = new Map();
      for (const { schedule, depthLevel } of scheduleTreeRows) {
        counters[depthLevel] = (counters[depthLevel] || 0) + 1;
        counters.length = depthLevel + 1;
        wbsNumberByScheduleId.set(schedule.id, counters.join("."));
      }
      return wbsNumberByScheduleId;
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値。collapsedScheduleIds は
    //   折りたたまれているスケジュールidの集合（Set）。
    // 【処理】折りたたまれた行の子孫を、深さ優先順の性質を使って除外する（折りたたまれた行
    //   自身より深いdepthLevelが続く間はスキップし、同じか浅いdepthLevelに戻ったら解除する）。
    // 【結果】実際に画面へ表示すべき行だけの配列を返す（WBS番号は事前に計算済みのものを使う
    //   前提のため、この関数はdepthLevel/hasChildren等をそのまま維持する）。
    function filterVisibleScheduleTreeRows(scheduleTreeRows, collapsedScheduleIds) {
      const visibleRows = [];
      let collapsedAncestorDepth = null;
      for (const row of scheduleTreeRows) {
        if (collapsedAncestorDepth !== null) {
          if (row.depthLevel > collapsedAncestorDepth) continue;
          collapsedAncestorDepth = null;
        }
        visibleRows.push(row);
        if (collapsedScheduleIds.has(row.schedule.id)) {
          collapsedAncestorDepth = row.depthLevel;
        }
      }
      return visibleRows;
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値。collapsedScheduleIds は
    //   折りたたまれているスケジュールidの集合（Set）。
    // 【処理】子を持つ行（親行）だけを抽出し、1件以上存在し、かつ全件がcollapsedScheduleIdsに
    //   含まれているかを判定する（対応表No.39のお手本ロジック：
    //   `parents.length>0&&parents.every(t=>S.collapsed.has(t.id))`と同じ判定）。
    //   親行が1件も無い場合はfalseを返す（＝「全て開く」表示にする）。
    // 【結果】親行がすべて折りたたまれていればtrue、そうでなければfalseを返す。
    function areAllParentRowsCollapsed(scheduleTreeRows, collapsedScheduleIds) {
      const parentRows = scheduleTreeRows.filter((row) => row.hasChildren);
      return parentRows.length > 0 && parentRows.every((row) => collapsedScheduleIds.has(row.schedule.id));
    }

    // 【前提】taskList は同一プロジェクト内のタスク全件。
    // 【処理】status（"backlog"|"doing"|"done"）で3列に振り分け、各列内はorderの昇順に揃える。
    // 【結果】カンバンの3列分のタスク配列 {backlog, doing, done} を返す。
    function groupTasksByStatus(taskList) {
      const sortByOrder = (a, b) => a.order - b.order;
      return {
        backlog: taskList.filter((task) => task.status === "backlog").sort(sortByOrder),
        doing: taskList.filter((task) => task.status === "doing").sort(sortByOrder),
        done: taskList.filter((task) => task.status === "done").sort(sortByOrder),
      };
    }

    // 【前提】dateString は "YYYY-MM-DD" 形式の文字列であること。
    // 【処理】ローカルタイムゾーンによるずれを避けるため、常にUTC基準のタイムスタンプとして解釈する。
    // 【結果】その日付のUTC深夜0時のミリ秒タイムスタンプを返す。
    function parseDateStringToUtcTimestamp(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return Date.UTC(year, month - 1, day);
    }

    // 【前提】startDateString <= endDateString（"YYYY-MM-DD"形式）であること。
    //   プロジェクトのendDateがstartDateより前という既知の非整合（基本設計書1.3節No.1相当の
    //   プロジェクト側バリデーション無し仕様）の場合でも、最低1日分は描画できるようにする。
    // 【処理】startからendまでの日数分、各日の情報（日付文字列・年月・曜日・週末か）を列挙する。
    // 【結果】タイムライン列として左から順に描画できる配列を返す。
    function buildGanttTimelineDays(startDateString, endDateString) {
      const startTimestamp = parseDateStringToUtcTimestamp(startDateString);
      const endTimestamp = parseDateStringToUtcTimestamp(endDateString);
      const totalDayCount = Math.max(Math.round((endTimestamp - startTimestamp) / MILLISECONDS_PER_DAY) + 1, 1);

      const timelineDays = [];
      for (let dayOffset = 0; dayOffset < totalDayCount; dayOffset++) {
        const currentDate = new Date(startTimestamp + dayOffset * MILLISECONDS_PER_DAY);
        const dayOfWeek = currentDate.getUTCDay();
        timelineDays.push({
          year: currentDate.getUTCFullYear(),
          month: currentDate.getUTCMonth() + 1,
          dayOfMonth: currentDate.getUTCDate(),
          isSaturday: dayOfWeek === 6,
          isSunday: dayOfWeek === 0,
        });
      }
      return timelineDays;
    }

    // 【前提】targetDateString/timelineStartDateStringは"YYYY-MM-DD"。
    // 【処理】タイムライン先頭日から対象日までの経過日数を計算する。
    // 【結果】経過日数（整数）。範囲外の日付なら負の値、またはタイムラインを超える大きな値になる。
    function calculateDayOffsetFromTimelineStart(targetDateString, timelineStartDateString) {
      const targetTimestamp = parseDateStringToUtcTimestamp(targetDateString);
      const startTimestamp = parseDateStringToUtcTimestamp(timelineStartDateString);
      return Math.round((targetTimestamp - startTimestamp) / MILLISECONDS_PER_DAY);
    }

    // ===== H4：Excel出力（exportExcel） =====
    // 【設計判断】crud-implementation.md対象外（DB操作を伴わない）。基本設計書9.4・詳細設計書
    //   3.10.1に従う。日付列・サマリーの期間はいずれもプロジェクト自体のstartDate/endDateを
    //   根拠にする（質問リスト_未確認事項.md Q4：配下スケジュールの実効範囲は使わない。
    //   シート1とシート2で期間の基準が食い違わないよう、両シートともプロジェクト期間で統一する）。
    //   「日付列は稼働している日にセルの色が付く」（基本設計書9.4、推測との注記あり）は、
    //   そのスケジュール自身のcolorフィールド（ガントバーの色と同じ値）でセルを塗ることで再現する。
    //   【H3との非対称について】PDF出力（exportPDF）にはhtml2canvas/jsPDFの読込確認があるが、
    //   この関数にはxlsx-js-styleの読込確認を意図的に追加しない（基本設計書1.3の既知の非整合
    //   事項と同じ扱い。詳細設計書3.10.1：元アプリの実装漏れと推測される非対称をそのまま再現する）。

    // シート1固定列（No/WBS/スケジュール/階層/開始日/終了日/期間/担当者/ステータス）の見出し。
    // 日付列（1日1列）はこの9列の右側に続く（基本設計書9.4）。
    const EXCEL_FIXED_COLUMN_HEADERS = ["No", "WBS", "スケジュール", "階層", "開始日", "終了日", "期間", "担当者", "ステータス"];
    const EXCEL_FIXED_COLUMN_COUNT = EXCEL_FIXED_COLUMN_HEADERS.length;

    // depthLevel（0:親, 1:子, 2:孫）を基本設計書9.4の表記「親」「子」等に変換する対応表。
    const EXCEL_SCHEDULE_DEPTH_LABELS = ["親", "子", "孫"];

    const EXCEL_THIN_BORDER_ALL_SIDES = {
      top: { style: "thin", color: { rgb: "D1D5DB" } },
      bottom: { style: "thin", color: { rgb: "D1D5DB" } },
      left: { style: "thin", color: { rgb: "D1D5DB" } },
      right: { style: "thin", color: { rgb: "D1D5DB" } },
    };
    const EXCEL_TITLE_STYLE = { font: { bold: true, sz: 14 } };
    const EXCEL_MONTH_HEADER_STYLE = { font: { bold: true, sz: 11 }, fill: { fgColor: { rgb: "E5E7EB" } }, alignment: { horizontal: "center" } };
    const EXCEL_HEADER_STYLE = { font: { bold: true, sz: 10 }, fill: { fgColor: { rgb: "F3F4F6" } }, alignment: { horizontal: "center" }, border: EXCEL_THIN_BORDER_ALL_SIDES };
    const EXCEL_BODY_STYLE = { font: { sz: 10 }, border: EXCEL_THIN_BORDER_ALL_SIDES };

    // 【前提】scheduleTreeRows は currentScheduleTreeRows（buildScheduleTreeRowsの戻り値）。
    // 【処理】Excel出力に必要な列（No・WBS番号・階層ラベル・期間(日数)）を1行ずつ付与する。
    // 【結果】[{no, wbsNumber, schedule, depthLevel, depthLabel, durationDays}, ...]（表示順は
    //   ツリーの深さ優先順のまま）を返す。
    function flattenScheduleTreeRowsForExcel(scheduleTreeRows) {
      const wbsNumberByScheduleId = calculateWbsNumbers(scheduleTreeRows);
      return scheduleTreeRows.map((row, index) => {
        const durationDays = Math.round(
          (parseDateStringToUtcTimestamp(row.schedule.endDate) - parseDateStringToUtcTimestamp(row.schedule.startDate)) / MILLISECONDS_PER_DAY
        ) + 1;
        return {
          no: index + 1,
          wbsNumber: wbsNumberByScheduleId.get(row.schedule.id),
          schedule: row.schedule,
          depthLevel: row.depthLevel,
          depthLabel: EXCEL_SCHEDULE_DEPTH_LABELS[row.depthLevel] || "孫",
          durationDays,
        };
      });
    }

    // 【前提】timelineDaysはbuildGanttTimelineDaysの戻り値（日付順で連続している）。
    // 【処理】連続する同一年月の日を1つのグループにまとめる（基本設計書9.4：1行目の
    //   月単位見出し・結合セル）。
    // 【結果】[{yearMonthLabel, startDayIndex, dayCount}, ...]（startDayIndexはtimelineDays内の
    //   0始まりの位置）を返す。
    function calculateExcelMonthGroups(timelineDays) {
      const monthGroups = [];
      timelineDays.forEach((day, dayIndex) => {
        const yearMonthLabel = `${day.year}年${day.month}月`;
        const lastGroup = monthGroups[monthGroups.length - 1];
        if (lastGroup && lastGroup.yearMonthLabel === yearMonthLabel) {
          lastGroup.dayCount++;
        } else {
          monthGroups.push({ yearMonthLabel, startDayIndex: dayIndex, dayCount: 1 });
        }
      });
      return monthGroups;
    }

    // 【前提】hexColorWithHash は"#RRGGBB"形式の文字列（スケジュールのcolorフィールド）。
    //   値が無い場合はガントバーの既定色（SCHEDULE_BAR_COLOR_PALETTEの先頭色）を使う。
    // 【処理】先頭の"#"を取り除く（xlsx-js-styleのfill.fgColor.rgbは"#"無しの6桁表記を
    //   期待するため）。
    // 【結果】"#"無しの6桁16進数文字列を返す。
    function stripHashFromHexColor(hexColorWithHash) {
      return (hexColorWithHash || SCHEDULE_BAR_COLOR_PALETTE[0]).replace("#", "").toUpperCase();
    }

    // 【前提】project は出力対象プロジェクト。flattenedRowsはflattenScheduleTreeRowsForExcelの
    //   戻り値。timelineDaysはproject.startDate〜endDateの全日（buildGanttTimelineDaysの戻り値）。
    //   generatedAtは出力日時にするDateオブジェクト。
    // 【処理】基本設計書9.4の構成（1行目：タイトル＋月見出し、2行目：列見出し、3行目以降：
    //   スケジュール行、その後：合計行、末尾：出力日時）でシート1のワークシートを組み立てる。
    //   日付列は、そのスケジュールの稼働期間に含まれる日だけ、schedule.colorでセルを塗る。
    // 【結果】xlsx-js-styleのワークシートオブジェクトを返す。
    function buildGanttSheet(project, flattenedRows, timelineDays, generatedAt) {
      const monthGroups = calculateExcelMonthGroups(timelineDays);
      const totalColumnCount = EXCEL_FIXED_COLUMN_COUNT + timelineDays.length;
      const worksheet = {};
      const merges = [];

      const setCell = (rowIndex, colIndex, value, style) => {
        const cellRef = XLSX.utils.encode_cell({ r: rowIndex, c: colIndex });
        worksheet[cellRef] = { v: value, t: typeof value === "number" ? "n" : "s", s: style };
      };

      setCell(0, 0, `${project.name} — ガントチャート`, EXCEL_TITLE_STYLE);
      merges.push({ s: { r: 0, c: 0 }, e: { r: 0, c: EXCEL_FIXED_COLUMN_COUNT - 1 } });
      for (const monthGroup of monthGroups) {
        const startColumnIndex = EXCEL_FIXED_COLUMN_COUNT + monthGroup.startDayIndex;
        const endColumnIndex = startColumnIndex + monthGroup.dayCount - 1;
        setCell(0, startColumnIndex, monthGroup.yearMonthLabel, EXCEL_MONTH_HEADER_STYLE);
        if (endColumnIndex > startColumnIndex) {
          merges.push({ s: { r: 0, c: startColumnIndex }, e: { r: 0, c: endColumnIndex } });
        }
      }

      EXCEL_FIXED_COLUMN_HEADERS.forEach((header, columnIndex) => setCell(1, columnIndex, header, EXCEL_HEADER_STYLE));
      timelineDays.forEach((day, dayIndex) => setCell(1, EXCEL_FIXED_COLUMN_COUNT + dayIndex, day.dayOfMonth, EXCEL_HEADER_STYLE));

      flattenedRows.forEach((row, rowOffset) => {
        const rowIndex = 2 + rowOffset;
        setCell(rowIndex, 0, row.no, EXCEL_BODY_STYLE);
        setCell(rowIndex, 1, row.wbsNumber, EXCEL_BODY_STYLE);
        setCell(rowIndex, 2, row.schedule.name, EXCEL_BODY_STYLE);
        setCell(rowIndex, 3, row.depthLabel, EXCEL_BODY_STYLE);
        setCell(rowIndex, 4, row.schedule.startDate, EXCEL_BODY_STYLE);
        setCell(rowIndex, 5, row.schedule.endDate, EXCEL_BODY_STYLE);
        setCell(rowIndex, 6, row.durationDays, EXCEL_BODY_STYLE);
        setCell(rowIndex, 7, row.schedule.assignee || "", EXCEL_BODY_STYLE);
        setCell(rowIndex, 8, SCHEDULE_STATUS_LABELS[row.schedule.taskStatus] || row.schedule.taskStatus, EXCEL_BODY_STYLE);

        const activeDayFillStyle = { fill: { fgColor: { rgb: stripHashFromHexColor(row.schedule.color) } } };
        timelineDays.forEach((day, dayIndex) => {
          const dayDateString = `${day.year}-${String(day.month).padStart(2, "0")}-${String(day.dayOfMonth).padStart(2, "0")}`;
          const isActiveDay = dayDateString >= row.schedule.startDate && dayDateString <= row.schedule.endDate;
          if (isActiveDay) {
            setCell(rowIndex, EXCEL_FIXED_COLUMN_COUNT + dayIndex, "", activeDayFillStyle);
          }
        });
      });

      const totalRowIndex = 2 + flattenedRows.length;
      const rootDurationTotal = flattenedRows.filter((row) => row.depthLevel === 0).reduce((sum, row) => sum + row.durationDays, 0);
      setCell(totalRowIndex, 0, "合計（ルート期間合計）", EXCEL_BODY_STYLE);
      setCell(totalRowIndex, 6, rootDurationTotal, EXCEL_BODY_STYLE);
      merges.push({ s: { r: totalRowIndex, c: 0 }, e: { r: totalRowIndex, c: 5 } });

      const timestampRowIndex = totalRowIndex + 1;
      setCell(timestampRowIndex, 0, `出力日時：${formatDateToOutputTimestampString(generatedAt)}`, EXCEL_BODY_STYLE);

      worksheet["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: timestampRowIndex, c: totalColumnCount - 1 } });
      worksheet["!merges"] = merges;
      worksheet["!cols"] = EXCEL_FIXED_COLUMN_HEADERS.map(() => ({ wch: 12 })).concat(timelineDays.map(() => ({ wch: 3 })));
      return worksheet;
    }

    // 【前提】projectは出力対象プロジェクト。flattenedRowsはflattenScheduleTreeRowsForExcelの
    //   戻り値（総タスク数の算出に使う。基本設計書1.2用語対応表：元アプリの「タスク」＝本アプリの
    //   「スケジュール」）。generatedAtは出力日時にするDateオブジェクト。
    // 【処理】プロジェクト名・開始日・終了日・表示期間・総タスク数・出力日時を並べた
    //   シート2のワークシートを組み立てる（基本設計書9.4。質問リスト_未確認事項.md Q4：
    //   終了日・表示期間はプロジェクト自体のstartDate/endDateを根拠にする）。
    // 【結果】xlsx-js-styleのワークシートオブジェクトを返す。
    function buildSummarySheet(project, flattenedRows, generatedAt) {
      const displayDurationDays = Math.round(
        (parseDateStringToUtcTimestamp(project.endDate) - parseDateStringToUtcTimestamp(project.startDate)) / MILLISECONDS_PER_DAY
      ) + 1;
      const summaryRows = [
        ["プロジェクト名", project.name],
        ["開始日", project.startDate],
        ["終了日", project.endDate],
        ["表示期間", `${displayDurationDays}日`],
        ["総タスク数", `${flattenedRows.length}件`],
        [],
        [`出力日時：${formatDateToOutputTimestampString(generatedAt)}`],
      ];
      const worksheet = XLSX.utils.aoa_to_sheet(summaryRows);
      worksheet["!cols"] = [{ wch: 14 }, { wch: 30 }];
      return worksheet;
    }

    // 【前提】currentProjectObjectが選択済みであること（未選択時はexportExcelButton自体が
    //   disabledのため、この関数は呼ばれない想定）。
    // 【処理】現在のスケジュール一覧をフラット化し、シート1（ガントチャート）・シート2（サマリー）の
    //   2シート構成のワークブックを作ってダウンロードする（詳細設計書3.10.1 exportExcel相当）。
    // 【結果】完了後、トースト「Excelファイルを保存しました」を表示する。
    async function exportExcel() {
      const project = currentProjectObject;
      const flattenedRows = flattenScheduleTreeRowsForExcel(currentScheduleTreeRows);
      const timelineDays = buildGanttTimelineDays(project.startDate, project.endDate);
      const generatedAt = new Date();

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, buildGanttSheet(project, flattenedRows, timelineDays, generatedAt), "ガントチャート");
      XLSX.utils.book_append_sheet(workbook, buildSummarySheet(project, flattenedRows, generatedAt), "サマリー");
      XLSX.writeFile(workbook, buildReportFileName(project.name, "xlsx"));

      showToast("Excelファイルを保存しました");
    }

    // 【前提】timelineDays は buildGanttTimelineDays の戻り値。timelineStartDateString は
    //   タイムライン先頭日。todayDateString は基準日（"YYYY-MM-DD"）。呼び出し元（refreshGanttPanel）が
    //   `new Date()`から求めて渡す。この関数自体はnew Date()を呼ばない（固定値を渡してテストできる
    //   ようにするため。純粋関数として保つ設計判断）。
    // 【処理】基準日がタイムライン表示範囲内にあるかを判定し、範囲内ならx座標(px)を計算する。
    // 【結果】範囲内ならleftPx（数値）、範囲外（表示中のプロジェクト期間の外）ならnullを返す。
    function calculateTodayMarkerPosition(timelineDays, timelineStartDateString, pixelsPerDay, todayDateString) {
      const dayOffset = calculateDayOffsetFromTimelineStart(todayDateString, timelineStartDateString);
      if (dayOffset < 0 || dayOffset >= timelineDays.length) {
        return null;
      }
      return dayOffset * pixelsPerDay;
    }

    // 【前提】schedule.startDate/endDateのどちらかが未設定の場合、バーは描画できない
    //   （データモデル設計3.2節：両方とも必須ではないフィールドのため）。
    // 【処理】タイムライン先頭日・1日あたりのピクセル幅から、バーのleft/widthをpx単位で計算する。
    // 【結果】{leftPx, widthPx, durationDays} を返す。日付が無い場合はnullを返す。
    function calculateBarGeometry(schedule, timelineStartDateString, pixelsPerDay) {
      if (!schedule.startDate || !schedule.endDate) {
        return null;
      }
      const dayOffsetStart = calculateDayOffsetFromTimelineStart(schedule.startDate, timelineStartDateString);
      const dayOffsetEnd = calculateDayOffsetFromTimelineStart(schedule.endDate, timelineStartDateString);
      const durationDays = Math.max(dayOffsetEnd - dayOffsetStart + 1, 1);
      return { leftPx: dayOffsetStart * pixelsPerDay, widthPx: durationDays * pixelsPerDay, durationDays };
    }

    // 【前提】dateString は"YYYY-MM-DD"形式。days は加算したい日数（負値可）。
    // 【処理】UTC基準のタイムスタンプへ変換して日数を加算し、"YYYY-MM-DD"形式へ戻す。
    // 【結果】計算後の日付文字列を返す。
    function shiftDateStringByDays(dateString, days) {
      const shiftedTimestamp = parseDateStringToUtcTimestamp(dateString) + days * MILLISECONDS_PER_DAY;
      return new Date(shiftedTimestamp).toISOString().slice(0, 10);
    }

    // 【前提】mode は"move"|"resize-start"|"resize"。originalStartDate/originalEndDateは
    //   ドラッグ開始時点の日付。deltaDaysはポインタ移動量から換算した日数（負値可）。
    //   projectStartDate/projectEndDateはクランプ範囲（プロジェクトの期間）。
    // 【処理】詳細設計書3.2.4「境界値の丸め処理（実機確認済み・アラート無し）」をそのまま
    //   実装する：
    //   ・move：開始日・終了日を同じ日数だけ平行移動（期間不変）。新開始日がプロジェクト開始日
    //     より前になる場合は、期間を保ったままプロジェクト開始日にスナップ。新終了日が
    //     プロジェクト終了日を超える場合はプロジェクト終了日でカット（2つの判定は独立で、
    //     どちらも通知は出さず黙ってクランプする）。
    //   ・resize-start：開始日のみ移動。新開始日が終了日を超える場合は終了日と同日にクランプ。
    //     プロジェクト開始日より前にはできない。
    //   ・resize：終了日のみ移動。新終了日が開始日を下回る場合は開始日と同日にクランプ。
    //     プロジェクト終了日を超えることはできない。
    // 【結果】クランプ済みの{startDate, endDate}を返す。
    function calculateDraggedBarDates(mode, originalStartDate, originalEndDate, deltaDays, projectStartDate, projectEndDate) {
      if (mode === "move") {
        let newStartDate = shiftDateStringByDays(originalStartDate, deltaDays);
        let newEndDate = shiftDateStringByDays(originalEndDate, deltaDays);
        if (newStartDate < projectStartDate) {
          const durationDays = Math.round(
            (parseDateStringToUtcTimestamp(originalEndDate) - parseDateStringToUtcTimestamp(originalStartDate)) / MILLISECONDS_PER_DAY
          );
          newStartDate = projectStartDate;
          newEndDate = shiftDateStringByDays(newStartDate, durationDays);
        }
        if (newEndDate > projectEndDate) {
          newEndDate = projectEndDate;
        }
        return { startDate: newStartDate, endDate: newEndDate };
      }

      if (mode === "resize-start") {
        let newStartDate = shiftDateStringByDays(originalStartDate, deltaDays);
        if (newStartDate > originalEndDate) newStartDate = originalEndDate;
        if (newStartDate < projectStartDate) newStartDate = projectStartDate;
        return { startDate: newStartDate, endDate: originalEndDate };
      }

      let newEndDate = shiftDateStringByDays(originalEndDate, deltaDays);
      if (newEndDate < originalStartDate) newEndDate = originalStartDate;
      if (newEndDate > projectEndDate) newEndDate = projectEndDate;
      return { startDate: originalStartDate, endDate: newEndDate };
    }

    // 【前提】milestones は project.milestones（{name, date}の配列）。
    // 【処理】名前・日付の両方を持つマイルストーンについて、タイムライン上のx座標（px）を
    //   計算する（詳細設計書3.11.1エラーバリエーション：名前が空の行は保存自体は成功するが
    //   ガントチャート上には表示されない仕様のため、name不在の行を除外する）。
    // 【結果】{leftPx, name}[] を返す。
    function calculateMilestoneMarkerPositions(milestones, timelineStartDateString, pixelsPerDay) {
      return milestones
        .filter((milestone) => Boolean(milestone.date) && Boolean(milestone.name))
        .map((milestone) => ({
          leftPx: calculateDayOffsetFromTimelineStart(milestone.date, timelineStartDateString) * pixelsPerDay,
          name: milestone.name,
        }));
    }

    // 【前提】issueList は同一プロジェクト内のissue全件。rootIssueId は起点ノードのid。
    // 【処理】parentNodeIdをたどり、rootIssueId自身を含む子孫issueのidを幅優先で収集する
    //   （issuesにはparentNodeIdのインデックスが無いため、getIssuesByProjectで読み切った
    //   全件をアプリ層で辿る。deleteIssueCascade・折りたたみ機能の両方で使う共通ロジック）。
    // 【結果】[rootIssueId, ...子孫id...] の配列を返す。
    function collectIssueSubtreeIds(issueList, rootIssueId) {
      const childIssuesByParentNodeId = new Map();
      for (const issue of issueList) {
        if (issue.parentNodeId === null || issue.parentNodeId === undefined) continue;
        if (!childIssuesByParentNodeId.has(issue.parentNodeId)) {
          childIssuesByParentNodeId.set(issue.parentNodeId, []);
        }
        childIssuesByParentNodeId.get(issue.parentNodeId).push(issue);
      }

      const collectedIds = [];
      let frontier = [rootIssueId];
      while (frontier.length > 0) {
        const nextFrontier = [];
        for (const id of frontier) {
          collectedIds.push(id);
          const childIssues = childIssuesByParentNodeId.get(id) || [];
          nextFrontier.push(...childIssues.map((childIssue) => childIssue.id));
        }
        frontier = nextFrontier;
      }
      return collectedIds;
    }

    // 【前提】issueList は同一プロジェクト内のissue全件。collapsedIssueIds は
    //   折りたたまれているissueidの集合（Set）。
    // 【処理】折りたたまれた各ノードについて、collectIssueSubtreeIdsで子孫id（自身は除く）を
    //   集めて非表示集合にまとめ、issueListからそれらを除外する。
    // 【結果】実際に画面へ表示すべきissueだけの配列を返す。
    function filterVisibleIssues(issueList, collapsedIssueIds) {
      if (collapsedIssueIds.size === 0) return issueList;
      const hiddenIssueIds = new Set();
      for (const collapsedIssueId of collapsedIssueIds) {
        for (const descendantId of collectIssueSubtreeIds(issueList, collapsedIssueId)) {
          if (descendantId !== collapsedIssueId) {
            hiddenIssueIds.add(descendantId);
          }
        }
      }
      return issueList.filter((issue) => !hiddenIssueIds.has(issue.id));
    }

    // 【前提】issueList は同一プロジェクト内のissue全件（親子関係はparentNodeIdで表現）。
    // 【処理】parentNodeIdが実在する行同士を「親→子」のペアとして列挙する
    //   （マインドマップの線描画はx,y座標を結ぶ形のため、depthLevelではなくペア単位で扱う）。
    // 【結果】{fromIssue, toIssue}[] を返す。
    function buildMindmapEdgeList(issueList) {
      const issueById = new Map(issueList.map((issue) => [issue.id, issue]));
      const edges = [];
      for (const issue of issueList) {
        if (issue.parentNodeId === null || issue.parentNodeId === undefined) continue;
        const parentIssue = issueById.get(issue.parentNodeId);
        if (parentIssue) {
          edges.push({ fromIssue: parentIssue, toIssue: issue });
        }
      }
      return edges;
    }

    // 【前提】2点の座標(fromX,fromY)→(toX,toY)。
    // 【処理】2点間を結ぶ「幅lengthPx・高さ1pxの線」をCSSのtransform:rotateで描画するための
    //   left/top/width/角度を計算する（線の要素自体はfrom側を起点に、toの向きへ回転させる）。
    // 【結果】{leftPx, topPx, widthPx, angleDeg} を返す。
    function calculateEdgeGeometry(fromX, fromY, toX, toY) {
      const deltaX = toX - fromX;
      const deltaY = toY - fromY;
      const lengthPx = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      const angleDeg = (Math.atan2(deltaY, deltaX) * 180) / Math.PI;
      return { leftPx: fromX, topPx: fromY, widthPx: lengthPx, angleDeg };
    }

    // 【前提】projectList はプロジェクト全件。selectedProjectId は現在<select>に選ばせたいid。
    // 【処理】<option>タグのHTML文字列を組み立てる（DOMには触れない）。
    // 【結果】<select>のinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderProjectOptionsToHtml(projectList, selectedProjectId) {
      if (projectList.length === 0) {
        return '<option value="">(プロジェクトがありません)</option>';
      }
      return projectList
        .map((project) => {
          const isSelectedAttribute = project.id === selectedProjectId ? " selected" : "";
          return `<option value="${escapeHtmlText(project.id)}"${isSelectedAttribute}>${escapeHtmlText(project.name)}</option>`;
        })
        .join("");
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値（折りたたみ状態に関係なく
    //   常に全件）。visibleColumns は {startDate, endDate, status} の表示可否
    //   （基本設計書2.2節の固定順で右側から列を追加）。collapsedScheduleIds は折りたたまれている
    //   スケジュールidの集合。
    // 【処理】WBSパネル（ドラッグハンドル＋番号＋開閉＋スケジュール名列＋トグルされた追加列＋
    //   操作アイコン）のHTML文字列を組み立てる。WBS番号はcalculateWbsNumbersで全件から計算し
    //   （折りたたみで隠れていても採番自体は変わらないようにするため）、実際に描画する行は
    //   filterVisibleScheduleTreeRowsで絞り込む。
    //
    //   1行のレイアウト（左→右）：
    //   [ドラッグハンドル・ホバー時のみ] [開閉アイコン・子を持つ行のみ・常時表示]
    //   [WBS番号（太字・強調色）＋スケジュール名] [開始/終了/状態の追加列]
    //   [操作アイコン群（↑↓✎＋🗑）・ホバー時のみ]
    //
    //   開閉アイコンだけは「常時表示」（基本設計書4.1節に記載のある機能のため、ホバー無しでも
    //   操作できるようにする）。それ以外（ドラッグハンドル・操作アイコン群）はモーダル・
    //   ダイアログ一覧「1.」の指示どおりホバー時のみうっすら表示する。
    // 【結果】wbsPanel要素のinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderWbsPanelToHtml(scheduleTreeRows, visibleColumns, collapsedScheduleIds) {
      const headerExtraColumnsHtml = [
        visibleColumns.startDate ? '<div class="wbs-column-extra">開始日</div>' : "",
        visibleColumns.endDate ? '<div class="wbs-column-extra">終了日</div>' : "",
        visibleColumns.status ? '<div class="wbs-column-extra">状態</div>' : "",
      ].join("");
      const headerHtml = `<div class="wbs-header-row"><span class="wbs-drag-handle-spacer"></span><div class="wbs-column-name">スケジュール名</div>${headerExtraColumnsHtml}<div class="wbs-row-icons"></div></div>`;

      if (scheduleTreeRows.length === 0) {
        return headerHtml + '<p class="empty-state-message">スケジュールがありません。</p>';
      }

      const wbsNumberByScheduleId = calculateWbsNumbers(scheduleTreeRows);
      const visibleRows = filterVisibleScheduleTreeRows(scheduleTreeRows, collapsedScheduleIds);

      const rowsHtml = visibleRows
        .map(({ schedule, depthLevel, hasChildren, siblingIndex, siblingCount }) => {
          const wbsNumber = wbsNumberByScheduleId.get(schedule.id);
          const indentedName =
            "　".repeat(depthLevel) +
            `<span class="wbs-number">${escapeHtmlText(wbsNumber)}</span>`;
          const statusLabel = SCHEDULE_STATUS_LABELS[schedule.taskStatus] || schedule.taskStatus;
          const extraColumnsHtml = [
            visibleColumns.startDate ? `<div class="wbs-column-extra">${escapeHtmlText(schedule.startDate)}</div>` : "",
            visibleColumns.endDate ? `<div class="wbs-column-extra">${escapeHtmlText(schedule.endDate)}</div>` : "",
            visibleColumns.status ? `<div class="wbs-column-extra">${escapeHtmlText(statusLabel)}</div>` : "",
          ].join("");

          // 開閉アイコンは「WBS番号とスケジュール名の間」に常時表示する（ホバー不要）。
          // 子を持たない行はアイコン自体を出さない（スペーサーも置かない）。
          const isCollapsed = collapsedScheduleIds.has(schedule.id);
          const toggleButtonHtml = hasChildren
            ? `<button type="button" class="wbs-icon-button wbs-toggle-button" data-action="toggle-collapse" title="開閉">${isCollapsed ? "＋" : "－"}</button>`
            : "";

          const isFirstInGroup = siblingIndex === 0;
          const isLastInGroup = siblingIndex === siblingCount - 1;
          const canAddChild = depthLevel < MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN;
          // 操作アイコン群は行の右端（追加列のさらに右）に、上／下／編集／子追加／削除の順で表示する。
          const iconsHtml = `<div class="wbs-row-icons">
            <button type="button" class="wbs-icon-button" data-action="move-up" ${isFirstInGroup ? "disabled" : ""} title="上へ移動">↑</button>
            <button type="button" class="wbs-icon-button" data-action="move-down" ${isLastInGroup ? "disabled" : ""} title="下へ移動">↓</button>
            <button type="button" class="wbs-icon-button" data-action="edit" title="編集">✎</button>
            <button type="button" class="wbs-icon-button" data-action="add-child" ${canAddChild ? "" : "disabled"} title="子スケジュール追加">＋</button>
            <button type="button" class="wbs-icon-button" data-action="delete" title="削除">🗑</button>
          </div>`;

          return `<div class="wbs-row" draggable="true" data-schedule-id="${escapeHtmlText(schedule.id)}"><span class="wbs-drag-handle" title="ドラッグして並び替え">⋮⋮</span><div class="wbs-column-name">${indentedName}${toggleButtonHtml} ${escapeHtmlText(schedule.name)}</div>${extraColumnsHtml}${iconsHtml}</div>`;
        })
        .join("");
      return headerHtml + rowsHtml;
    }

    // 【前提】month は1〜12の整数。
    // 【処理】月から四半期番号（1〜4）を求める（Q1=1-3月, Q2=4-6月, Q3=7-9月, Q4=10-12月）。
    // 【結果】四半期番号を返す。
    function calculateQuarterNumber(month) {
      return Math.ceil(month / 3);
    }

    // 【設計判断：なぜtimelineDaysは常に「日」単位のままなのか】
    //   表示粒度（日/週/1ヶ月/3ヶ月）が変わっても、buildGanttTimelineDaysが返す「プロジェクト
    //   全期間ぶんの日単位配列」自体は作り直さない。粒度ごとの見出し・列幅は、この日単位配列を
    //   「どうグルーピングするか」だけを変えて表現する。こうすることで、
    //   ①スケジュール件数に関係なくプロジェクト全期間の列が必ず生成される（今回の不具合の根本原因は
    //   　0件時に本体の描画自体を早期returnでスキップしていたこと。グルーピング元を「常に完全な
    //   　日単位配列」に統一し、行の有無と列の生成を分離することで解消する）、
    //   ②粒度切替のたびに日付計算をやり直さずに済む、という2つの利点がある。
    //
    // 【前提】timelineDays は buildGanttTimelineDays の戻り値（必ずプロジェクト全期間ぶん）。
    //   granularity は "day" | "week" | "month" | "quarter"。
    // 【処理】1段目（大分類の見出し）・2段目（詳細列の見出し）を、指定した粒度でグルーピングする。
    //   - day：2段目=1日ごと（日付）／1段目=同年月をまとめた「年月」
    //   - week：2段目=7日ごと（先頭日の月/日）／1段目=先頭日が属する「年月」
    //   - month：2段目=暦月ごと（月）／1段目=同じ（年,四半期）をまとめた「年 Q数」
    //   - quarter：2段目=暦四半期ごと（Q数（開始月-終了月月））／1段目=同じ年をまとめた「年」
    //   いずれの粒度でも、timelineDaysの全区間を漏れなくグループ化する（途中で打ち切らない）。
    // 【結果】{ level1Groups, level2Groups } を返す。各グループは
    //   { label, startIndex, dayCount } を持ち、startIndex/dayCountはtimelineDays配列上の
    //   位置・日数（px座標の計算にそのまま使える）。
    function buildGanttTimelineHeaderGroups(timelineDays, granularity) {
      const level2Groups = [];

      if (granularity === "day") {
        timelineDays.forEach((day, index) => {
          level2Groups.push({
            label: String(day.dayOfMonth),
            startIndex: index,
            dayCount: 1,
            level1Key: `${day.year}-${day.month}`,
            level1Label: `${day.year}年${day.month}月`,
          });
        });
      } else if (granularity === "week") {
        for (let startIndex = 0; startIndex < timelineDays.length; startIndex += 7) {
          const dayCount = Math.min(7, timelineDays.length - startIndex);
          const firstDay = timelineDays[startIndex];
          level2Groups.push({
            label: `${firstDay.month}/${firstDay.dayOfMonth}`,
            startIndex,
            dayCount,
            level1Key: `${firstDay.year}-${firstDay.month}`,
            level1Label: `${firstDay.year}年${firstDay.month}月`,
          });
        }
      } else if (granularity === "month") {
        let groupStartIndex = 0;
        for (let index = 1; index <= timelineDays.length; index++) {
          const isBoundary =
            index === timelineDays.length ||
            timelineDays[index].year !== timelineDays[groupStartIndex].year ||
            timelineDays[index].month !== timelineDays[groupStartIndex].month;
          if (!isBoundary) continue;
          const { year, month } = timelineDays[groupStartIndex];
          const quarter = calculateQuarterNumber(month);
          level2Groups.push({
            label: `${month}月`,
            startIndex: groupStartIndex,
            dayCount: index - groupStartIndex,
            level1Key: `${year}-Q${quarter}`,
            level1Label: `${year}年 Q${quarter}`,
          });
          groupStartIndex = index;
        }
      } else if (granularity === "quarter") {
        let groupStartIndex = 0;
        for (let index = 1; index <= timelineDays.length; index++) {
          const currentQuarter = calculateQuarterNumber(timelineDays[groupStartIndex].month);
          const isBoundary =
            index === timelineDays.length ||
            timelineDays[index].year !== timelineDays[groupStartIndex].year ||
            calculateQuarterNumber(timelineDays[index].month) !== currentQuarter;
          if (!isBoundary) continue;
          const { year } = timelineDays[groupStartIndex];
          const quarterStartMonth = (currentQuarter - 1) * 3 + 1;
          const quarterEndMonth = quarterStartMonth + 2;
          level2Groups.push({
            label: `Q${currentQuarter}（${quarterStartMonth}-${quarterEndMonth}月）`,
            startIndex: groupStartIndex,
            dayCount: index - groupStartIndex,
            level1Key: `${year}`,
            level1Label: `${year}年`,
          });
          groupStartIndex = index;
        }
      }

      // 1段目は、連続するlevel2Groupsのうちlevel1Keyが同じものをまとめて1つの見出しにする。
      const level1Groups = [];
      for (const level2Group of level2Groups) {
        const lastLevel1Group = level1Groups[level1Groups.length - 1];
        if (lastLevel1Group && lastLevel1Group.level1Key === level2Group.level1Key) {
          lastLevel1Group.dayCount += level2Group.dayCount;
        } else {
          level1Groups.push({
            label: level2Group.level1Label,
            level1Key: level2Group.level1Key,
            startIndex: level2Group.startIndex,
            dayCount: level2Group.dayCount,
          });
        }
      }

      return { level1Groups, level2Groups };
    }

    // 【前提】timelineDays は buildGanttTimelineDays の戻り値。granularity は表示粒度。
    // 【処理】buildGanttTimelineHeaderGroupsで1段目・2段目の見出しグループを求め、
    //   それぞれをHTML文字列化する（UIデザイン仕様書1.3節：タイムラインヘッダー高さ82px＝
    //   1段目40px＋2段目42px相当として配分）。土日の色分けは「日」表示のときのみ意味を持つ。
    // 【結果】gantt-timeline-headerのHTML文字列を返す。
    function renderGanttTimelineHeaderToHtml(timelineDays, pixelsPerDay, granularity) {
      const { level1Groups, level2Groups } = buildGanttTimelineHeaderGroups(timelineDays, granularity);

      const level1Html = level1Groups
        .map(
          (group) =>
            `<div class="gantt-month-label" style="left:${group.startIndex * pixelsPerDay}px;width:${group.dayCount * pixelsPerDay}px">${escapeHtmlText(group.label)}</div>`
        )
        .join("");

      const level2Html = level2Groups
        .map((group) => {
          const firstDay = timelineDays[group.startIndex];
          const weekendClass = granularity === "day" ? (firstDay.isSaturday ? " is-saturday" : firstDay.isSunday ? " is-sunday" : "") : "";
          return `<div class="gantt-day-column-header${weekendClass}" style="left:${group.startIndex * pixelsPerDay}px;width:${group.dayCount * pixelsPerDay}px">${escapeHtmlText(group.label)}</div>`;
        })
        .join("");

      const totalWidthPx = timelineDays.length * pixelsPerDay;
      return `<div class="gantt-timeline-header" style="width:${totalWidthPx}px">${level1Html}${level2Html}</div>`;
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値。timelineDays は
    //   buildGanttTimelineDays の戻り値。milestones は project.milestones。todayDateString は
    //   基準日（"YYYY-MM-DD"）。呼び出し元がnew Date()から求めて渡す（純粋関数として保つため）。
    // 【処理】列の背景（「日」表示は土日の色分け、それ以外の粒度は縞模様）、行の背景、バー
    //   （親行は太め・中央配置、葉行は細め・行の65%位置、完了ステータスは半透明）、
    //   マイルストーンの縦線＋ひし形マーカー、今日を示す縦のハイライト線をすべて絶対配置の
    //   divとして組み立てる（UIデザイン仕様書3章の視覚仕様に準拠）。
    // 【設計判断：スケジュール0件でも列は必ずプロジェクト全期間ぶん描画する】
    //   以前は「0件なら本体を描画せずメッセージのみ」としていたため、列（背景の縞模様）自体が
    //   全く生成されない不具合があった。列の生成（periodColumnsHtml）と行の生成
    //   （rowBackgroundsHtml・barsHtml、0件なら単に空文字列になるだけ）を分離し、
    //   0件時は「空状態メッセージを上に重ねて表示するが、列は最後まで描画されている」形にする。
    // 【設計判断：グリッド背景（列の色帯）・マイルストーン線・今日マーカーの高さを
    //   実データ行数に縛られないようにする】
    //   これら3種類の縦の要素は、CSS側で`top:0;bottom:0`にして「親要素(.gantt-body)の
    //   実際の高さいっぱいに伸びる」設計にする（pxで高さを指定しない）。.gantt-body自体の
    //   高さを「実データ行数ぶん」と「画面の表示領域の高さ」のどちらか大きい方にすれば
    //   （後述のtotalHeightPx／CSS変数--gantt-body-min-heightのmax()）、この3種類は
    //   自動的にその高さまで届く。逆に、以前のようにこれらの要素へ個別にpx単位の高さを
    //   指定してしまうと、指定した値がCSSのtop/bottom挙動より優先されてしまい、
    //   実データ行数分の高さで頭打ちになる（今回の不具合の原因）。
    // 【結果】gantt-bodyのHTML文字列を返す。
    function renderGanttBodyToHtml(scheduleTreeRows, timelineDays, pixelsPerDay, milestones, timelineStartDateString, granularity, todayDateString) {
      const totalWidthPx = timelineDays.length * pixelsPerDay;
      const totalHeightPx = Math.max(scheduleTreeRows.length * GANTT_ROW_HEIGHT_PX, GANTT_ROW_HEIGHT_PX);

      const rowBackgroundsHtml = scheduleTreeRows
        .map((_, rowIndex) => {
          const evenClass = rowIndex % 2 === 1 ? " is-even-row" : "";
          return `<div class="gantt-row-background${evenClass}" style="top:${rowIndex * GANTT_ROW_HEIGHT_PX}px"></div>`;
        })
        .join("");

      const { level2Groups } = buildGanttTimelineHeaderGroups(timelineDays, granularity);
      const periodColumnsHtml = level2Groups
        .map((group, groupIndex) => {
          const firstDay = timelineDays[group.startIndex];
          let backgroundClass = "";
          if (granularity === "day") {
            backgroundClass = firstDay.isSaturday ? "is-saturday" : firstDay.isSunday ? "is-sunday" : "";
          } else if (groupIndex % 2 === 1) {
            backgroundClass = "is-alt-period";
          }
          if (!backgroundClass) return "";
          return `<div class="gantt-day-column-bg ${backgroundClass}" style="left:${group.startIndex * pixelsPerDay}px;width:${group.dayCount * pixelsPerDay}px"></div>`;
        })
        .join("");

      // 追加実装仕様書3.1節：日ごとの区切りを示す薄い縦線。土日・祝日は上のperiodColumnsHtml
      // （背景色）で別途表現するため、ここでは平日部分も含めた全ての日境界に線を引く。
      // 【設計判断】日数ぶんのdivを1つずつ生成せず、repeating-linear-gradientで
      // pixelsPerDayごとに1pxの縦線が繰り返される背景画像として1つのdivにまとめる
      // （行数×日数のDOM要素が増えるのを避けるため）。「日」表示以外の粒度では1列が
      // 複数日をまとめた列になり日境界の概念自体が薄れるため、この線は「日」表示の
      // ときだけ描画する（背景色の土日判定と同じ条件分岐）。
      const dayGridLinesHtml =
        granularity === "day"
          ? `<div class="gantt-day-grid-lines" style="width:${totalWidthPx}px;background-size:${pixelsPerDay}px 100%"></div>`
          : "";

      const barsHtml = scheduleTreeRows
        .map(({ schedule, hasChildren }, rowIndex) => {
          const geometry = calculateBarGeometry(schedule, timelineStartDateString, pixelsPerDay);
          if (!geometry) return "";
          const rowTopPx = rowIndex * GANTT_ROW_HEIGHT_PX;
          const barHeightPx = hasChildren ? 22 : 16;
          const barTopPx = hasChildren
            ? rowTopPx + (GANTT_ROW_HEIGHT_PX - barHeightPx) / 2
            : rowTopPx + GANTT_ROW_HEIGHT_PX * 0.65 - barHeightPx / 2;
          const doneClass = schedule.taskStatus === "done" ? " is-done-status" : "";
          const parentClass = hasChildren ? " is-parent-bar" : "";
          const showLabel = hasChildren || geometry.widthPx > 60;
          const labelText = showLabel ? `${escapeHtmlText(schedule.name)} (${geometry.durationDays}日)` : "";
          const backgroundColor = schedule.color || "#2563EB";
          // 【設計判断】掴み手（bar-lh/bar-rh）は子を持たない行（葉ノード）にしか付与しない
          // （詳細設計書3.2.4：親行は移動のみ可能でリサイズ不可。親の日付は子から自動算出される
          // ため、意図的にリサイズ不可としている）。
          const resizeHandlesHtml = hasChildren
            ? ""
            : `<div class="gantt-bar-handle bar-lh" data-drag-mode="resize-start"></div><div class="gantt-bar-handle bar-rh" data-drag-mode="resize"></div>`;
          return `<div class="gantt-bar${parentClass}${doneClass}" data-schedule-id="${escapeHtmlText(schedule.id)}" style="left:${geometry.leftPx}px;top:${barTopPx}px;width:${geometry.widthPx}px;height:${barHeightPx}px;background:${backgroundColor}">${labelText}${resizeHandlesHtml}</div>`;
        })
        .join("");

      // 【前提】マイルストーン線・今日マーカーはどちらも「left位置だけ決めて、高さは
      //   CSSのtop:0;bottom:0に任せる」ため、ここでは高さ(height)を指定しない。
      const milestoneMarkersHtml = calculateMilestoneMarkerPositions(milestones, timelineStartDateString, pixelsPerDay)
        .map(
          (marker) =>
            `<div class="gantt-milestone-marker" style="left:${marker.leftPx}px" data-tooltip="${escapeHtmlText(marker.name)}"><div class="gantt-milestone-diamond"></div></div>`
        )
        .join("");

      const todayMarkerLeftPx = calculateTodayMarkerPosition(timelineDays, timelineStartDateString, pixelsPerDay, todayDateString);
      const todayMarkerHtml =
        todayMarkerLeftPx === null ? "" : `<div class="gantt-today-marker" style="left:${todayMarkerLeftPx}px" title="今日"></div>`;

      const emptyMessageHtml =
        scheduleTreeRows.length === 0 ? '<p class="empty-state-message gantt-empty-overlay">スケジュールがありません。</p>' : "";

      // 【設計判断：.gantt-bodyの高さは「実データ行数」と「画面の表示領域の高さ」の
      //   大きい方にする】CSSのmax()を使い、実データが画面より多ければ実データの高さ
      //   （＝縦スクロールが発生する）、少なければ画面の表示領域の下端まで
      //   （--gantt-body-min-height、:root定義）を採用する。
      return `<div class="gantt-body" style="width:${totalWidthPx}px;min-height:max(${totalHeightPx}px, var(--gantt-body-min-height))">${periodColumnsHtml}${rowBackgroundsHtml}${dayGridLinesHtml}${barsHtml}${milestoneMarkersHtml}${todayMarkerHtml}${emptyMessageHtml}</div>`;
    }

    // 【前提】scheduleTreeRows・timelineDays・milestonesは上記各関数の戻り値・入力と同じ。
    //   granularityは表示粒度。todayDateStringは基準日（呼び出し元がnew Date()から求めて渡す）。
    // 【処理】タイムラインヘッダーとガント本体を連結する（ガントパネル全体の組み立て窓口）。
    //   スケジュールが0件でも、ヘッダー・本体とも必ずプロジェクト全期間ぶんの列を描画する
    //   （0件用の早期returnは行わない。今回修正した不具合の要点）。
    // 【結果】ganttPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderGanttChartToHtml(scheduleTreeRows, timelineDays, pixelsPerDay, milestones, timelineStartDateString, granularity, todayDateString) {
      return (
        renderGanttTimelineHeaderToHtml(timelineDays, pixelsPerDay, granularity) +
        renderGanttBodyToHtml(scheduleTreeRows, timelineDays, pixelsPerDay, milestones, timelineStartDateString, granularity, todayDateString)
      );
    }

    // タスクのpriority（1:高〜4:なし）の日本語表示名（データモデル設計3.3節）。
    const TASK_PRIORITY_LABELS = { 1: "高", 2: "中", 3: "低", 4: "なし" };
    // タスクのstatus（backlog/doing/done）の日本語表示名。カンバン列見出しと編集モーダルの
    // ステータス選択で共有する。
    const TASK_STATUS_LABELS = { backlog: "未着手", doing: "進行中", done: "完了" };

    // 【前提】taskListForColumn はある1つのstatusに属するタスク配列。columnLabel はその列の
    //   日本語見出し。columnStatusValue はそのstatus文字列（追加フォームの送信先に使う）。
    // 【処理】1列分のカンバンカード（各カードに削除ボタンを添える。詳細設計書3.3.2：
    //   deleteTodo）と、モーダル・ダイアログ一覧P1「各列に追加フォームが直接埋め込み」の
    //   仕様どおり、タスク名・優先度・期日の埋め込み追加フォームを組み立てる
    //   （モーダルを介さない）。完了列("done")のみ、完了済み一括削除ボタンを見出し横に
    //   添える（詳細設計書3.3.2：clearDoneTodos）。
    // 【結果】renderKanbanBoardToHtml から列単位で呼び出されるHTML文字列を返す。
    function renderKanbanColumnToHtml(taskListForColumn, columnLabel, columnStatusValue) {
      const cardsHtml =
        taskListForColumn.length === 0
          ? '<p class="empty-state-message">タスクがありません。</p>'
          : taskListForColumn
              .map((task) => {
                const dueDateHtml = task.dueDate ? `<div class="panel-list-item-meta">期日：${escapeHtmlText(task.dueDate)}</div>` : "";
                const priorityLabel = TASK_PRIORITY_LABELS[task.priority] || task.priority;
                const priorityBadgeHtml = `<span class="priority-badge priority-${escapeHtmlText(String(task.priority))}">${escapeHtmlText(priorityLabel)}</span>`;
                return `<div class="kanban-card" data-task-id="${escapeHtmlText(task.id)}" draggable="true">
                    <div class="kanban-card-main" data-action="edit-task">
                      <div>${escapeHtmlText(task.title)} ${priorityBadgeHtml}</div>
                      ${dueDateHtml}
                    </div>
                    <button type="button" class="wbs-icon-button" data-action="delete-task" title="削除">🗑</button>
                  </div>`;
              })
              .join("");

      const priorityOptionsHtml = Object.entries(TASK_PRIORITY_LABELS)
        .map(([value, label]) => `<option value="${value}"${value === "4" ? " selected" : ""}>${label}</option>`)
        .join("");
      const addFormHtml = `
        <div class="kanban-add-form" data-column-status="${columnStatusValue}">
          <input type="text" class="kanban-add-title-input" placeholder="タスク名">
          <select class="kanban-add-priority-select">${priorityOptionsHtml}</select>
          <input type="date" class="kanban-add-duedate-input">
          <button type="button" class="panel-add-button kanban-add-submit-button">＋ 追加</button>
        </div>
      `;
      const clearDoneButtonHtml =
        columnStatusValue === "done" ? '<button type="button" class="toolbar-button" id="clearDoneTasksButton">完了済みを一括削除</button>' : "";
      return `<div class="kanban-column" data-column-status="${columnStatusValue}">
        <div class="kanban-column-header">
          <h3>${escapeHtmlText(columnLabel)}</h3>
          ${clearDoneButtonHtml}
        </div>
        ${cardsHtml}${addFormHtml}
      </div>`;
    }

    // 【前提】taskGroupsByStatus は groupTasksByStatus の戻り値。
    // 【処理】backlog/doing/doneの3列を横に並べたカンバンボード全体のHTML文字列を組み立てる。
    // 【結果】カンバンパネルのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderKanbanBoardToHtml(taskGroupsByStatus) {
      return `<div class="kanban-board">
        ${renderKanbanColumnToHtml(taskGroupsByStatus.backlog, "未着手", "backlog")}
        ${renderKanbanColumnToHtml(taskGroupsByStatus.doing, "進行中", "doing")}
        ${renderKanbanColumnToHtml(taskGroupsByStatus.done, "完了", "done")}
      </div>`;
    }

    // 【前提】issueList は同一プロジェクト内のissue全件（折りたたみ状態に関係なく常に全件、
    //   x,y座標を持つ）。collapsedIssueIds は折りたたまれているissueidの集合。
    // 【処理】filterVisibleIssuesで実際に表示する行を絞り込んでから、issue.x/yをそのまま
    //   絶対配置の左上原点として使い、ノード（丸みを帯びたラベル）と、親子を結ぶ線
    //   （buildMindmapEdgeList・calculateEdgeGeometry。辺も絞り込み後のissueListから
    //   計算するため、隠れた子ノードへの辺は自動的に描画されない）を組み立てる。
    //   各ノードにdata-issue-idを持たせ、ドラッグ配置・右クリックメニューの対象特定に使う。
    //   子を持つノードには「▸ 」を名前の前に付け、折りたたみ中はis-collapsed-nodeクラスで
    //   見た目の目印を付ける。
    // 【結果】マインドマップキャンバスのHTML文字列を返す。
    function renderMindmapCanvasToHtml(issueList, collapsedIssueIds) {
      const visibleIssues = filterVisibleIssues(issueList, collapsedIssueIds);
      if (visibleIssues.length === 0) {
        return '<p class="empty-state-message">マインドマップノードがありません。</p>';
      }
      const edgesHtml = buildMindmapEdgeList(visibleIssues)
        .map(({ fromIssue, toIssue }) => {
          const geometry = calculateEdgeGeometry(fromIssue.x, fromIssue.y, toIssue.x, toIssue.y);
          return `<div class="mindmap-edge" style="left:${geometry.leftPx}px;top:${geometry.topPx}px;width:${geometry.widthPx}px;transform:rotate(${geometry.angleDeg}deg)"></div>`;
        })
        .join("");
      const nodesHtml = visibleIssues
        .map((issue) => {
          const backgroundColor = issue.color || MINDMAP_NODE_COLORS[0];
          const hasChildren = issueList.some((candidateChild) => candidateChild.parentNodeId === issue.id);
          const isCollapsed = collapsedIssueIds.has(issue.id);
          const collapsedClass = isCollapsed ? " is-collapsed-node" : "";
          const collapsedIndicator = hasChildren && isCollapsed ? "▸ " : "";
          return `<div class="mindmap-node${collapsedClass}" data-issue-id="${escapeHtmlText(issue.id)}" style="left:${issue.x}px;top:${issue.y}px;background:${backgroundColor}">${collapsedIndicator}${escapeHtmlText(issue.title)}</div>`;
        })
        .join("");
      return `<div class="mindmap-canvas">${edgesHtml}${nodesHtml}</div>`;
    }

    // ===== UI：DOM反映（薄い関数） =====
    // 【設計判断】以下は「HTML文字列を対応する要素のinnerHTMLへ入れるだけ」の薄い関数に留める。
    //   ロジック（何を表示するか）は上の純粋関数側に寄せ、ここでは判断を持たせない。

    function applyProjectSelectOptions(optionsHtml) {
      document.getElementById("projectSelectDropdown").innerHTML = optionsHtml;
    }

    function applyWbsPanel(bodyHtml) {
      document.getElementById("wbsPanel").innerHTML = bodyHtml;
    }

    function applyGanttPanel(bodyHtml) {
      document.getElementById("ganttPanelBody").innerHTML = bodyHtml;
    }

    function applyKanbanPanel(bodyHtml) {
      document.getElementById("kanbanPanelBody").innerHTML = bodyHtml;
    }

    function applyMindmapPanel(bodyHtml) {
      document.getElementById("mindmapPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】isLocked は現在のプロジェクトのロック状態。
    // 【処理】ロック帯の表示・スケジュール追加／マイルストーンボタンの活性状態・
    //   ロックボタンの選択状態・プロジェクト削除ボタンの表示有無をまとめて切り替える
    //   （基本設計書3.3節：ロック中は「スケジュール追加」「マイルストーン」ボタンが
    //   淡色化・無効化され、プロジェクト削除ボタンは非表示になる）。
    // 【結果】画面上のロック関連の見た目が状態に一致する。
    function applyLockState(isLocked) {
      document.getElementById("lockBand").hidden = !isLocked;
      document.getElementById("addScheduleButton").disabled = isLocked;
      document.getElementById("milestoneButton").disabled = isLocked;
      document.getElementById("lockToggleButton").classList.toggle("is-active", isLocked);
      document.getElementById("deleteProjectButton").hidden = isLocked;
    }

    // 【前提】hasSelectedProject は現在プロジェクトが選択されているか。
    // 【処理】PDF出力・Excel出力ボタンのdisabledを切り替える（基本設計書2.1：
    //   「PDF出力・Excel出力：プロジェクト未選択時は使用不可（活性制御が必要）」）。
    // 【結果】選択されていればdisabledを外し、されていなければdisabledにする。
    function applyReportButtonAvailability(hasSelectedProject) {
      document.getElementById("exportPdfButton").disabled = !hasSelectedProject;
      document.getElementById("exportExcelButton").disabled = !hasSelectedProject;
    }

    // ===== UI：統括（データ取得→純粋関数→DOM反映のつなぎ） =====

    // 【前提】なし（常に全プロジェクトを取得する。projectsはインデックス無し＝常に全件表示の設計のため）。
    // 【処理】getAllProjectsで最新の一覧を取得し、現在選択中のprojectIdを選択状態にして<select>へ反映する。
    // 【結果】<select>の中身が最新のプロジェクト一覧に更新される。
    async function refreshProjectSelectDropdown() {
      const projectList = await getAllProjects();
      applyProjectSelectOptions(renderProjectOptionsToHtml(projectList, currentSelectedProjectId));
    }

    // 【前提】currentProjectObject・currentScheduleTreeRowsが設定済みであること。
    // 【処理】DBへ再度問い合わせず、キャッシュ済みcurrentScheduleTreeRowsと現在の折りたたみ・
    //   列表示・表示粒度の状態だけを使って、WBSパネル・ガント本体の両方を再描画する。
    //   行の折りたたみ切替のように「DBの中身は変わっていないが見た目の状態だけ変わった」
    //   場面で使う（DB再取得を伴うrefreshGanttPanelと役割を分ける）。
    //   「全て開く／全て閉じる」ボタンのラベルも、毎回areAllParentRowsCollapsedで判定し直して
    //   更新する（対応表No.39：クリック時だけでなく画面描画のたびに実際の状態を見るお手本の
    //   方式に合わせる。個別行を手動開閉した場合でもラベルと実際の状態が食い違わないようにする
    //   ため）。
    // 【結果】WBS・ガント両パネルの表示と、全て開く/閉じるボタンのラベルが、現在のキャッシュ・
    //   状態を反映したものに更新される。
    function rerenderWbsAndGanttFromCache() {
      const visibleScheduleTreeRows = filterVisibleScheduleTreeRows(currentScheduleTreeRows, collapsedScheduleIds);
      const timelineDays = buildGanttTimelineDays(currentProjectObject.startDate, currentProjectObject.endDate);
      const pixelsPerDay = GRANULARITY_PIXELS_PER_DAY[currentGranularity];
      const todayDateString = new Date().toISOString().slice(0, 10);
      applyWbsPanel(renderWbsPanelToHtml(currentScheduleTreeRows, visibleWbsColumns, collapsedScheduleIds));
      applyGanttPanel(
        renderGanttChartToHtml(
          visibleScheduleTreeRows,
          timelineDays,
          pixelsPerDay,
          currentProjectObject.milestones,
          currentProjectObject.startDate,
          currentGranularity,
          todayDateString
        )
      );
      document.getElementById("toggleAllScheduleRowsButton").textContent = areAllParentRowsCollapsed(
        currentScheduleTreeRows,
        collapsedScheduleIds
      )
        ? "全て開く"
        : "全て閉じる";
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。currentProjectObjectが
    //   switchToProjectで設定済みであること（プロジェクトのstartDate/endDate/milestonesを使うため）。
    // 【処理】projectIdがnullなら空状態を表示し、そうでなければgetSchedulesByProjectで取得して
    //   ツリー化し（currentScheduleTreeRowsは常に「折りたたみに関係ない全件」を保持する。
    //   WBS番号の計算・兄弟位置の判定は隠れている行も含めた全体構造が必要なため）、
    //   rerenderWbsAndGanttFromCacheで両パネルを再描画する。
    // 【結果】WBS・ガント両パネルの表示が最新の状態に更新される。
    async function refreshGanttPanel(projectId) {
      // 追加実装仕様書2.1節：プロジェクト未選択時は、ガント本体エリア（WBSパネル＋
      // タイムライン部分）全体を専用の空状態画面に置き換える（ヘッダー2段は表示したまま）。
      applyGanttEmptyStateVisibility(!projectId || !currentProjectObject);
      if (!projectId || !currentProjectObject) {
        applyWbsPanel("");
        applyGanttPanel("");
        return;
      }
      const scheduleList = await getSchedulesByProject(projectId);
      currentScheduleTreeRows = buildScheduleTreeRows(scheduleList);
      currentTimelineStartDateString = currentProjectObject.startDate;
      rerenderWbsAndGanttFromCache();
    }

    // 【前提】なし。
    // 【処理】プロジェクト未選択時の空状態画面（#ganttEmptyState）と、通常のWBS＋ガント表示
    //   （.main-workspace）のどちらを表示するかを切り替える。
    // 【結果】isEmptyがtrueなら空状態画面を表示し通常表示を隠す。falseならその逆。
    function applyGanttEmptyStateVisibility(isEmpty) {
      document.getElementById("ganttEmptyState").hidden = !isEmpty;
      document.querySelector(".main-workspace").hidden = isEmpty;
    }

    // refreshGanttPanelと同じ考え方。対象はtasks・カンバンボード。
    async function refreshKanbanPanel(projectId) {
      if (!projectId) {
        applyKanbanPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const taskList = await getTasksByProject(projectId);
      applyKanbanPanel(renderKanbanBoardToHtml(groupTasksByStatus(taskList)));
    }

    // 【前提】taskId は削除対象のタスクのid。
    // 【処理】確認ダイアログ（詳細設計書3.3.2：deleteTodo「このタスクを削除しますか？」）の上で
    //   deleteTaskし、削除ログを記録する（schedules/issuesの個別削除と同じ方針。tasksも
    //   LOGGED_STORES対象のため）。
    // 【結果】確認OK時、対象タスクが削除されカンバンパネルが再描画される。
    async function handleDeleteTaskButtonClick(taskId) {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const task = taskList.find((candidateTask) => candidateTask.id === taskId);
      if (!task) return;
      if (!window.confirm("このタスクを削除しますか？")) return;
      await deleteTask(taskId);
      await addChangelogEntry({
        id: generateId(),
        projectId: task.projectId,
        action: "delete",
        store: "tasks",
        storeLabel: "タスク",
        itemId: task.id,
        itemName: task.title,
        changes: [],
        snapshot: task,
        createdAt: new Date().toISOString(),
      });
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // 【前提】currentSelectedProjectIdが設定済みであること。
    // 【処理】完了列(status==="done")のタスクを数え、0件なら案内のみ表示して終了する。
    //   1件以上あれば件数を明示した確認ダイアログの上で全件削除し、削除ログを個別に記録する
    //   （詳細設計書3.3.2：clearDoneTodos）。
    // 【結果】確認OK時、完了済みタスクがすべて削除されカンバンパネルが再描画される。
    async function handleClearDoneTasksButtonClick() {
      const taskList = await getTasksByProject(currentSelectedProjectId);
      const doneTasks = taskList.filter((task) => task.status === "done");
      if (doneTasks.length === 0) {
        showToast("完了タスクがありません");
        return;
      }
      if (!window.confirm(`完了済み${doneTasks.length}件を削除しますか？`)) return;
      for (const task of doneTasks) {
        await deleteTask(task.id);
        await addChangelogEntry({
          id: generateId(),
          projectId: task.projectId,
          action: "delete",
          store: "tasks",
          storeLabel: "タスク",
          itemId: task.id,
          itemName: task.title,
          changes: [],
          snapshot: task,
          createdAt: new Date().toISOString(),
        });
      }
      showToast("完了タスクを削除しました");
      await refreshKanbanPanel(currentSelectedProjectId);
    }

    // ===== P2：スナップショットパネル =====
    // 【設計判断】保存・一覧表示・削除に加え、復元（restoreSnapshot）と比較（compareSnapshot）を
    //   実装する。復元は「現在のschedules全削除→書き戻し、projectの日付・マイルストーンも
    //   書き戻す、変更履歴に記録しない」特殊な一括書き換え専用の処理（お手本の既知の非対称
    //   仕様。詳細はrestoreSnapshot直前のコメントを参照）。

    // 比較結果を表示中（展開中）のスナップショットidの集合。collapsedScheduleIdsと同じ理由で
    // DB非保存の画面上だけの一時状態にする（複数件を同時に展開できる）。
    const expandedSnapshotCompareIds = new Set();
    // 展開中スナップショットの比較結果キャッシュ（snapshotId→compareSnapshotの戻り値）。
    // compareSnapshotはDB読み取りを伴う非同期処理のため、開くたびに計算し直すのではなく
    // 展開中だけ保持し、閉じたら破棄する（次回開いたときは最新のDB状態で再計算するため）。
    const snapshotCompareResultsById = new Map();

    // 変更履歴（changelog）が対象にするSCHEDULE_LOGGED_FIELD_LABELSとは対象フィールドが異なる
    // ため、専用の定数として別に定義する（parentIdを含む・orderを含まない）。
    // parentIdを含める理由：スナップショット時点と親子関係が変わっていることも「変更」として
    // 検出したいため。orderを含めない理由：並び順だけが変わった場合を「変更」として誤検出
    // したくないため（ユーザー指定の比較対象フィールドに合わせる）。
    const SNAPSHOT_COMPARE_FIELD_LABELS = {
      name: "名前",
      startDate: "開始日",
      endDate: "終了日",
      taskStatus: "ステータス",
      assignee: "担当者",
      notes: "メモ",
      color: "カラー",
      parentId: "親スケジュール",
    };

    // 【前提】snapshot は比較対象のスナップショットオブジェクト（snapshot.data.schedulesを持つ）。
    // 【処理】snapshot.projectIdの現在のschedules全件を取得し、idをキーにスナップショット側と
    //   突き合わせる。追加＝現在にあってスナップショットに無いもの、削除＝スナップショットに
    //   あって現在に無いもの、変更＝両方にありSNAPSHOT_COMPARE_FIELD_LABELSのいずれかの値が
    //   異なるもの（diffFieldsの結果が1件以上ある場合のみ。orderだけの違いを変更扱いしない
    //   ための判定）。
    // 【結果】{ add: [schedule...], mod: [{before, after, changes}...], del: [schedule...] } を返す。
    async function compareSnapshot(snapshot) {
      const currentSchedules = await getSchedulesByProject(snapshot.projectId);
      const currentById = new Map(currentSchedules.map((schedule) => [schedule.id, schedule]));
      const snapshotById = new Map(snapshot.data.schedules.map((schedule) => [schedule.id, schedule]));

      const add = currentSchedules.filter((schedule) => !snapshotById.has(schedule.id));
      const del = snapshot.data.schedules.filter((schedule) => !currentById.has(schedule.id));

      const mod = [];
      for (const [scheduleId, snapshotSchedule] of snapshotById) {
        const currentSchedule = currentById.get(scheduleId);
        if (!currentSchedule) continue;
        const changes = diffFields(snapshotSchedule, currentSchedule, SNAPSHOT_COMPARE_FIELD_LABELS);
        if (changes.length > 0) {
          mod.push({ before: snapshotSchedule, after: currentSchedule, changes });
        }
      }
      return { add, mod, del };
    }

    // 【前提】diffResult はcompareSnapshotの戻り値。
    // 【処理】追加/変更/削除を分類して一覧表示するHTML文字列を組み立てる（変更行の新旧値表示は
    //   変更履歴と同じ.cl-old/.cl-new/.changelog-changes-listを再利用し、見た目の役割が同じ
    //   ものに新規クラスを増やさない）。3種とも0件なら「差分なし」を表示する。
    // 【結果】比較結果表示欄に入れられるHTML文字列を返す。
    function renderSnapshotCompareResultToHtml(diffResult) {
      if (diffResult.add.length === 0 && diffResult.mod.length === 0 && diffResult.del.length === 0) {
        return '<p class="empty-state-message">差分なしです。</p>';
      }
      const addRowsHtml = diffResult.add
        .map(
          (schedule) => `<div class="panel-list-item">
            <span class="changelog-action-badge is-add">追加</span> ${escapeHtmlText(schedule.name)}
          </div>`
        )
        .join("");
      const delRowsHtml = diffResult.del
        .map(
          (schedule) => `<div class="panel-list-item">
            <span class="changelog-action-badge is-delete">削除</span> ${escapeHtmlText(schedule.name)}
          </div>`
        )
        .join("");
      const modRowsHtml = diffResult.mod
        .map(({ after, changes }) => {
          const changesHtml = changes
            .map(
              (change) => `<div class="changelog-change-row">
                <span class="changelog-field-label">${escapeHtmlText(change.label)}：</span>
                <span class="cl-old">${escapeHtmlText(String(change.before ?? ""))}</span>
                <span class="changelog-change-arrow">→</span>
                <span class="cl-new">${escapeHtmlText(String(change.after ?? ""))}</span>
              </div>`
            )
            .join("");
          return `<div class="panel-list-item">
            <div class="panel-list-item-main">
              <span class="changelog-action-badge is-edit">変更</span> ${escapeHtmlText(after.name)}
              <div class="changelog-changes-list">${changesHtml}</div>
            </div>
          </div>`;
        })
        .join("");
      return `<div class="snapshot-compare-result">${addRowsHtml}${modRowsHtml}${delRowsHtml}</div>`;
    }

    // 【前提】snapshotList は同一プロジェクト内のスナップショット全件。expandedSnapshotCompareIds は
    //   比較結果を展開中のスナップショットidの集合。snapshotCompareResultsById は展開中の
    //   比較結果キャッシュ（snapshotId→compareSnapshotの戻り値）。
    // 【処理】名前・作成日時・削除/復元/比較ボタンを持つ一覧のHTML文字列を組み立てる（DOMには
    //   触れない）。展開中のスナップショットは、直下に比較結果をインライン表示する。
    // 【結果】snapshotPanelBodyのinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderSnapshotListToHtml(snapshotList, expandedSnapshotCompareIds, snapshotCompareResultsById) {
      if (snapshotList.length === 0) {
        return '<p class="empty-state-message">スナップショットがありません。</p>';
      }
      return snapshotList
        .slice()
        .sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1))
        .map((snapshot) => {
          const isExpanded = expandedSnapshotCompareIds.has(snapshot.id);
          const compareResultHtml = isExpanded && snapshotCompareResultsById.has(snapshot.id)
            ? renderSnapshotCompareResultToHtml(snapshotCompareResultsById.get(snapshot.id))
            : "";
          return `<div class="panel-list-item" data-snapshot-id="${escapeHtmlText(snapshot.id)}">
            <div class="panel-list-item-main">
              <div>${escapeHtmlText(snapshot.name)}</div>
              <div class="panel-list-item-meta">${escapeHtmlText(snapshot.createdAt)}</div>
              ${compareResultHtml}
            </div>
            <div class="panel-list-item-actions">
              <button type="button" class="panel-add-button" data-action="restore-snapshot">この状態に復元</button>
              <button type="button" class="panel-add-button" data-action="compare-snapshot">現在と比較</button>
              <button type="button" class="wbs-icon-button" data-action="delete-snapshot" title="削除">🗑</button>
            </div>
          </div>`;
        })
        .join("");
    }

    function applySnapshotPanel(bodyHtml) {
      document.getElementById("snapshotPanelBody").innerHTML = bodyHtml;
    }

    // 【前提】projectId はnull、または実在するプロジェクトのid。
    // 【処理】projectIdがnullなら空状態を表示し、そうでなければgetSnapshotsByProjectで
    //   取得して一覧を再描画する。
    // 【結果】スナップショットパネルの表示が最新の状態に更新される。
    async function refreshSnapshotPanel(projectId) {
      if (!projectId) {
        applySnapshotPanel('<p class="empty-state-message">プロジェクトを選択してください。</p>');
        return;
      }
      const snapshotList = await getSnapshotsByProject(projectId);
      applySnapshotPanel(renderSnapshotListToHtml(snapshotList, expandedSnapshotCompareIds, snapshotCompareResultsById));
    }

    // 【前提】currentSelectedProjectId・currentProjectObjectが設定済みであること。
    // 【処理】名前をprompt()で受け取り（既定値：「{プロジェクト名} - {今日の日付}」、
    //   モーダル・ダイアログ一覧P2）、現在のプロジェクト情報＋スケジュール全件を
    //   dataとして保存する（データモデル設計3.8節：data={project, schedules}）。
    // 【結果】保存後、パネルを再描画し、トースト「スナップショットを保存しました」を
    //   表示する（詳細設計書3.8.3）。
    async function handleSaveSnapshotButtonClick() {
      if (!currentSelectedProjectId || !currentProjectObject) {
        window.alert("先にプロジェクトを選択してください。");
        return;
      }
      const todayDateString = new Date().toISOString().slice(0, 10);
      const defaultName = `${currentProjectObject.name} - ${todayDateString}`;
      const snapshotName = window.prompt("スナップショット名を入力してください", defaultName);
      if (!snapshotName) return;
      await addSnapshot({
        id: generateId(),
        projectId: currentSelectedProjectId,
        name: snapshotName,
        createdAt: new Date().toISOString(),
        data: {
          project: currentProjectObject,
          schedules: currentScheduleTreeRows.map((row) => row.schedule),
        },
      });
      await refreshSnapshotPanel(currentSelectedProjectId);
      showToast("スナップショットを保存しました");
    }

    // 【前提】snapshotId は削除したいスナップショットのid。
    // 【処理】確認ダイアログ（モーダル・ダイアログ一覧C7：確認ダイアログのみ、成功トースト無し）
    //   の上でdeleteSnapshotする。
    // 【結果】確認OK時、削除してパネルを再描画する。
    async function handleDeleteSnapshotButtonClick(snapshotId) {
      if (!window.confirm("このスナップショットを削除しますか？")) return;
      await deleteSnapshot(snapshotId);
      await refreshSnapshotPanel(currentSelectedProjectId);
    }

    // 【既知の非対称仕様・意図的に忠実再現（改善しない）】
    //   通常のスケジュール追加・編集・削除は、保存の直後にrecordChangelogEntry/
    //   addChangelogEntryを呼ぶことで変更履歴（changelog）に自動的に記録される
    //   （例：handleScheduleModalSaveButtonClick、deleteScheduleCascade）。
    //   一方この関数は、現在のschedulesを全削除してスナップショット時点の内容を丸ごと
    //   書き戻す一括処理だが、changelogには一切記録しない。データ取込（applyOneImportItem）は
