<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GanttForge再現アプリ</title>
  <!-- UIデザイン仕様書1.4節「フォントファミリー：'DM Sans'（Google Fonts等からの読み込みを想定）」に
       基づきCDN経由で読み込む。ネットワーク遮断環境では読込に失敗するが、その場合はフォールバックの
       システムフォントで表示される（フォント読込の成否がアプリの動作自体には影響しない）。 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== デザイントークン（UIデザイン仕様書1章の値をそのまま採用） ===== */
    :root {
      --color-bg-page: #F3F4F6;
      --color-white: #FFFFFF;
      --color-surface-2: #F9FAFB;
      --color-surface-3: #E5E7EB;
      --color-border: #D1D5DB;
      --color-border-dark: #9CA3AF;
      --color-primary-navy: #1E40AF;
      --color-primary-light: #EFF6FF;
      --color-accent: #2563EB;
      --color-accent-hover: #1D4ED8;
      --color-danger: #DC2626;
      --color-danger-light: #FEF2F2;
      --color-text-dark: #111827;
      --color-text-mid: #374151;
      --color-text-light: #6B7280;

      --shadow-small: 0 1px 3px rgba(0, 0, 0, .10), 0 1px 2px rgba(0, 0, 0, .06);
      --shadow-medium: 0 4px 16px rgba(0, 0, 0, .10), 0 2px 6px rgba(0, 0, 0, .06);
      --shadow-large: 0 16px 48px rgba(0, 0, 0, .14), 0 4px 12px rgba(0, 0, 0, .08);

      --radius-standard: 8px;
      --gantt-row-height: 44px;
      --gantt-header-height: 42px;
      --timeline-header-height: 82px;
      --milestone-marker-height: 20px;
      --wbs-panel-width: 520px;
      --header-primary-height: 52px;
      --header-secondary-height: 34px;
      /* ガント本体の最低の高さ（グリッド背景・今日マーカーが画面の表示領域の下端まで
         届くようにするため）。第1・第2ヘッダーとタイムラインヘッダーの高さを画面の高さ
         から差し引いた残りとする。ロック帯（表示時のみ現れる）の高さはCSSだけでは
         動的に計算できないため考慮していない（表示中は本体の下端がその分だけ画面外に
         はみ出す可能性があるが、機能的な問題ではないため許容する）。 */
      --gantt-body-min-height: calc(100vh - var(--header-primary-height) - var(--header-secondary-height) - var(--timeline-header-height));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--color-bg-page);
      color: var(--color-text-dark);
      font-family: 'DM Sans', -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
      font-size: 13px;
    }

    button {
      font-family: inherit;
    }

    /* ===== ヘッダー（基本設計書2.1節：2段構成） ===== */
    /* 【設計判断：ヘッダーは折り返さず、あふれたら行全体を横スクロールする】
       画面幅が狭くなるとボタンが個別に折り返されて2段ヘッダーが何段にも積み重なる不具合と、
       あふれたボタンが右端で見えなくなる不具合の両方を、同じ仕組みで解消する。
       flex-wrap:nowrapで折り返しを禁止した上でoverflow-x:autoにすると、あふれた分は
       消えも折り返しもせず、ヘッダー行だけが横スクロール可能になる（ページ全体は
       スクロールしない。UIデザイン仕様書のレイアウトを保つため）。
       子要素側にflex-shrink:0を持たせないと、スクロールの前にボタンが押し潰されて
       文字が読めなくなる（flexboxの既定挙動＝縮小優先）ため、併せて指定する。 */
    .app-header-primary,
    .app-header-secondary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      overflow-x: auto;
      overflow-y: hidden;
      flex-wrap: nowrap;
    }

    .app-header-primary {
      height: var(--header-primary-height);
      background: var(--color-white);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-small);
    }

    .app-header-secondary {
      height: var(--header-secondary-height);
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
      font-size: 12px;
    }

    .header-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: nowrap;
    }

    /* 「表示粒度（日/週/1ヶ月/3ヶ月）」「列トグル（開始/終了/状態）」のように、
       意味のあるまとまりを1つの塊としてスクロール・折り返しさせるための入れ物。
       塊の中はgapを詰め、塊同士の間はheader-groupのgap(10px)で少し広めに取る。 */
    .button-group {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .app-logo {
      font-weight: 700;
      color: var(--color-accent);
      font-size: 15px;
      margin-right: 4px;
    }

    /* 「ロック」トグルON時に第1・第2ヘッダーとガントの間へ挿入する帯（基本設計書3.3節）。 */
    #lockBand {
      background: var(--color-danger-light);
      border-bottom: 2px solid var(--color-danger);
      color: var(--color-danger);
      padding: 4px 16px;
      font-size: 12px;
      font-weight: 600;
    }

    #lockBand[hidden] {
      display: none;
    }

    button.toolbar-button {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-text-mid);
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button.toolbar-button:hover:not(:disabled) {
      background: var(--color-primary-light);
      border-color: var(--color-accent);
    }

    button.toolbar-button.is-active {
      background: var(--color-accent);
      color: var(--color-white);
      border-color: var(--color-accent);
    }

    button.toolbar-button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    #createProjectButton {
      padding: 5px 12px;
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-accent);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #createProjectButton:hover {
      background: var(--color-accent-hover);
      color: var(--color-white);
    }

    select#projectSelectDropdown {
      padding: 4px 8px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-text-dark);
    }

    /* ===== メイン作業領域：WBSパネル＋ガントチャート（UIデザイン仕様書2.1節） ===== */
    .main-workspace {
      display: flex;
      align-items: flex-start;
    }

    .wbs-panel {
      width: var(--wbs-panel-width);
      flex: 0 0 var(--wbs-panel-width);
      background: var(--color-white);
      border-right: 1px solid var(--color-border);
    }

    .wbs-header-row {
      height: var(--timeline-header-height);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 0 8px 6px;
      font-weight: 600;
      color: var(--color-primary-navy);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }

    .wbs-header-row .wbs-column-name {
      flex: 1;
    }

    .wbs-header-row .wbs-column-extra {
      width: 84px;
      flex: 0 0 84px;
      font-size: 12px;
    }

    .wbs-row {
      height: var(--gantt-row-height);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wbs-row:nth-child(even) {
      background: var(--color-surface-2);
    }

    .wbs-row .wbs-column-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wbs-row .wbs-column-extra {
      width: 84px;
      flex: 0 0 84px;
      font-size: 12px;
      color: var(--color-text-mid);
    }

    /* モーダル・ダイアログ一覧「1. スケジュール行のホバー時操作アイコン一式」：
       通常はうっすら（非表示）にしておき、行にマウスを乗せたときだけ現れる。
       アイコン自体は常にDOMにあり、opacityで見た目だけを切り替える
       （クリック領域を安定させるため、display:noneにはしない）。 */
    .wbs-row-icons {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 0 0 auto;
      opacity: 0;
      transition: opacity .12s ease;
    }

    .wbs-row:hover .wbs-row-icons {
      opacity: 1;
    }

    .wbs-header-row .wbs-row-icons {
      flex: 0 0 auto;
      width: 96px;
    }

    .wbs-icon-button {
      width: 18px;
      height: 18px;
      line-height: 16px;
      padding: 0;
      border: 1px solid var(--color-border-dark);
      border-radius: 4px;
      background: var(--color-white);
      color: var(--color-text-mid);
      font-size: 11px;
      cursor: pointer;
    }

    .wbs-icon-button:hover:not(:disabled) {
      background: var(--color-primary-light);
      border-color: var(--color-accent);
    }

    .wbs-icon-button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    /* 開閉アイコンは「WBS番号とスケジュール名の間」に常時表示する（ホバー不要）。
       .wbs-row-icons（ホバーで現れる操作アイコン群）の外に置くことでopacity制御の対象外にする。 */
    .wbs-toggle-button {
      margin: 0 4px;
      vertical-align: middle;
    }

    /* WBS番号：お手本同様、太字＋強調色（UIデザイン仕様書1.1のプライマリ色）で目立たせる。 */
    .wbs-number {
      font-weight: 700;
      color: var(--color-primary-navy);
    }

    /* ドラッグ用グリップハンドル。ホバー時のみうっすら表示する（操作アイコン群と同じ方針）。
       行の左端・WBS番号よりさらに左（インデントの外側）に固定幅で置く。 */
    .wbs-drag-handle {
      flex: 0 0 14px;
      width: 14px;
      text-align: center;
      color: var(--color-text-light);
      cursor: grab;
      opacity: 0;
      transition: opacity .12s ease;
      user-select: none;
    }

    .wbs-row:hover .wbs-drag-handle {
      opacity: 1;
    }

    .wbs-drag-handle-spacer {
      flex: 0 0 14px;
      width: 14px;
    }

    .gantt-scroll-area {
      flex: 1;
      overflow-x: auto;
      background: var(--color-white);
    }

    .gantt-timeline-header {
      height: var(--timeline-header-height);
      position: relative;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }

    .gantt-month-label {
      position: absolute;
      top: 0;
      height: 40px;
      display: flex;
      align-items: center;
      padding-left: 6px;
      font-weight: 600;
      font-size: 12px;
      color: var(--color-primary-navy);
      border-right: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
    }

    .gantt-day-column-header {
      position: absolute;
      top: 40px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--color-text-light);
      border-right: 1px solid var(--color-surface-3);
    }

    .gantt-day-column-header.is-saturday {
      background: rgba(37, 99, 235, .08);
      color: var(--color-accent);
    }

    .gantt-day-column-header.is-sunday {
      background: rgba(220, 38, 38, .08);
      color: var(--color-danger);
    }

    .gantt-body {
      position: relative;
    }

    .gantt-row-background {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--gantt-row-height);
      border-bottom: 1px solid var(--color-border);
    }

    .gantt-row-background.is-even-row {
      background: var(--color-surface-2);
    }

    .gantt-day-column-bg {
      position: absolute;
      top: 0;
      bottom: 0;
      border-right: 1px solid var(--color-surface-3);
    }

    .gantt-day-column-bg.is-saturday {
      background: rgba(37, 99, 235, .05);
    }

    .gantt-day-column-bg.is-sunday {
      background: rgba(220, 38, 38, .05);
    }

    /* 週/1ヶ月/3ヶ月表示では土日という概念が意味を持たないため、縞模様で列の区切りだけを示す。 */
    .gantt-day-column-bg.is-alt-period {
      background: var(--color-surface-3);
      opacity: .4;
    }

    /* バーの視覚仕様（UIデザイン仕様書3章）：親行は太め・角丸大きめで行中央、
       子（葉）行は薄めで行の65%あたりの位置。完了ステータスは不透明度を下げる。 */
    .gantt-bar {
      position: absolute;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      color: var(--color-white);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: var(--shadow-small);
    }

    .gantt-bar.is-parent-bar {
      border-radius: 8px;
    }

    .gantt-bar.is-done-status {
      opacity: .55;
    }

    .gantt-milestone-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 1px dashed var(--color-border-dark);
    }

    /* 「今日」を示す縦のハイライト線。マイルストーン線と同じくtop:0;bottom:0で
       .gantt-body（親要素）の高さいっぱいに伸びる（JS側では高さを指定しない）。 */
    .gantt-today-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-danger);
      z-index: 1;
    }

    .gantt-milestone-diamond {
      position: absolute;
      top: 6px;
      width: var(--milestone-marker-height);
      height: var(--milestone-marker-height);
      background: var(--color-danger);
      transform: translateX(-10px) rotate(45deg);
      border-radius: 2px;
    }

    /* ===== カンバン（タスク管理） ===== */
    .kanban-board {
      display: flex;
      gap: 12px;
      padding: 16px;
    }

    .kanban-column {
      flex: 1;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      padding: 8px;
    }

    .kanban-column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .kanban-column h3 {
      margin: 0;
      font-size: 13px;
      color: var(--color-text-mid);
    }

    .kanban-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      box-shadow: var(--shadow-small);
      padding: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: grab;
    }

    .kanban-card-main {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    /* ===== マインドマップ（issueのx,y座標を使った絶対配置） ===== */
    .mindmap-canvas {
      position: relative;
      height: 480px;
      margin: 16px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      overflow: auto;
    }

    .mindmap-edge {
      position: absolute;
      height: 1px;
      background: var(--color-border-dark);
      transform-origin: 0 0;
    }

    .mindmap-node {
      position: absolute;
      padding: 6px 12px;
      border-radius: 16px;
      color: var(--color-white);
      font-size: 12px;
      white-space: nowrap;
      box-shadow: var(--shadow-small);
      transform: translate(-50%, -50%);
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .mindmap-node.is-dragging {
      cursor: grabbing;
      opacity: .85;
      z-index: 10;
    }

    /* 折りたたみ中（子孫ノードを非表示にしている）ノードの見た目の目印。 */
    .mindmap-node.is-collapsed-node {
      border: 2px dashed var(--color-white);
    }

    /* マインドマップは他パネルよりノード配置の作業領域が必要なため、幅を広めにする。 */
    .mindmap-slide-panel {
      width: 900px;
    }

    /* 右クリックメニュー（モーダル・ダイアログ一覧P7）。位置はJSでtop/leftを指定する。 */
    .mindmap-context-menu {
      position: fixed;
      z-index: 110;
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-standard);
      box-shadow: var(--shadow-medium);
      padding: 4px;
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }

    .mindmap-context-menu[hidden] {
      display: none;
    }

    .mindmap-context-menu button {
      text-align: left;
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      background: none;
      color: var(--color-text-dark);
      font-size: 12px;
      cursor: pointer;
    }

    .mindmap-context-menu button:hover {
      background: var(--color-primary-light);
    }

    .panel-add-button {
      margin: 12px 16px 0;
      padding: 6px 12px;
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-standard);
      background: var(--color-white);
      color: var(--color-accent);
      cursor: pointer;
    }

    .panel-add-button:hover {
      background: var(--color-accent-hover);
      color: var(--color-white);
    }

    .empty-state-message {
      color: var(--color-text-light);
      padding: 16px;
    }

    /* ガント本体が0件のとき、列（背景の縞模様）はそのまま描画した上に
       メッセージだけを重ねて表示する（列自体を消さない）。 */
    .gantt-empty-overlay {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 0;
      white-space: nowrap;
    }

    /* ===== モーダル・ダイアログ一覧①：中央モーダル（UIデザイン仕様書2.3節） ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .modal-panel {
      background: var(--color-white);
      border-radius: var(--radius-standard);
      box-shadow: var(--shadow-large);
      padding: 20px;
      width: 420px;
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-panel h2 {
      margin: 0 0 16px;
      font-size: 15px;
      color: var(--color-text-dark);
    }

    .modal-field {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .modal-field label {
      font-size: 12px;
      color: var(--color-text-mid);
    }

    .modal-field input[type="text"],
    .modal-field input[type="date"],
    .modal-field select,
    .modal-field textarea {
      padding: 6px 8px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 13px;
    }

    .modal-color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .modal-color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .modal-color-swatch.is-selected {
      border-color: var(--color-text-dark);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .modal-button-primary {
      padding: 6px 14px;
      border-radius: var(--radius-standard);
      border: 1px solid var(--color-accent);
      background: var(--color-accent);
      color: var(--color-white);
      cursor: pointer;
    }

    .modal-button-secondary {
      padding: 6px 14px;
      border-radius: var(--radius-standard);
      border: 1px solid var(--color-border-dark);
      background: var(--color-white);
      color: var(--color-text-mid);
      cursor: pointer;
    }

    .wbs-row[data-schedule-id] {
      cursor: pointer;
    }

    /* ===== モーダル・ダイアログ一覧②：右側スライドパネル（UIデザイン仕様書2.2節） =====
       ガント画面（背後）を隠さず、画面右端からスライドインする。×またはヘッダーの同じ
       ボタンをもう一度押すと閉じる。パネル幅は機能ごとに異なる想定（今回はタスク管理のみ実装）。 */
    .slide-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 640px;
      max-width: 92vw;
      background: var(--color-white);
      box-shadow: var(--shadow-large);
      z-index: 90;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .2s ease;
      pointer-events: none;
    }

    .slide-panel.is-open {
      transform: translateX(0);
      pointer-events: auto;
    }

    .slide-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
    }

    .slide-panel-header h2 {
      margin: 0;
      font-size: 15px;
      color: var(--color-text-dark);
    }

    .slide-panel-close-button {
      border: none;
      background: none;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      color: var(--color-text-mid);
    }

    .slide-panel-body {
      flex: 1;
      overflow-y: auto;
    }

    .kanban-add-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      background: var(--color-white);
      border: 1px dashed var(--color-border-dark);
      border-radius: var(--radius-standard);
    }

    .kanban-add-form input,
    .kanban-add-form select {
      padding: 4px 6px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 12px;
    }

    /* ===== P2〜P6：右側スライドパネル共通の一覧項目・入力欄スタイル ===== */
    .panel-list-item {
      padding: 8px 16px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-list-item-main {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-list-item-meta {
      color: var(--color-text-light);
      font-size: 11px;
    }

    .panel-list-item-actions {
      display: flex;
      gap: 4px;
      flex: 0 0 auto;
    }

    /* P3：即時メモの投稿欄（パネル下部固定） */
    .quick-memo-input-area {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid var(--color-border);
    }

    .quick-memo-input-area textarea {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }

    /* P4：メモパネルは左に一覧・右に編集エリアの2カラム構成 */
    .memo-panel-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .memo-list-column {
      flex: 0 0 auto;
      max-height: 40%;

      border-bottom: 1px solid var(--color-border);
    }

      cursor: pointer;

    .memo-list-item.is-selected {

    .memo-editor-column {

    }

    .memo-editor-column textarea {
      flex: 1;
      min-height: 240px;
      padding: 8px;
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-standard);
      font-family: inherit;

    /* P5：コメント一覧はスケジュール単位でグルーピングする */

      color: var(--color-primary-navy);

    /* P6：変更履歴のフィルタタブ */

  <!-- マインドマップの右クリックメニュー。位置はJSで動的にtop/leftを指定する。 -->

  </div>

  <!-- モーダル・ダイアログ一覧①：中央モーダルの共通の入れ物。中身はopenModal()で差し替える。 -->
  <div id="modalOverlay" class="modal-overlay" hidden>
    <div class="modal-panel" id="modalPanel"></div>
  </div>

  <script>
    "use strict";

    // ===== IndexedDB 定数 =====
    // DB名・バージョンは1箇所で管理する（複数箇所に散らして修正漏れが起きるのを防ぐ）。
    const DATABASE_NAME = "GanttForgeDB";
    // バージョン1：初版。全9ストアと全インデックスをこのバージョンで一括作成する。
    const DATABASE_VERSION = 1;

    // 全ストア共通の主キー。データモデル設計.md 1章の方針により、ID発行はアプリ側で行う
    // （autoIncrementは使わない）ため、keyPath は全ストアで常に "id" に固定する。
    const PRIMARY_KEY_PATH = "id";

    // ===== ストア定義 =====
    // 【この配列の意味】keyPath は全ストア共通（PRIMARY_KEY_PATH="id"）なので、
    //   ここでは「ストア名」と「そのストアに張るインデックス」だけを宣言する。
    // 【レビュー方法】この配列を データモデル設計.md 4章（インデックス設計一覧）と
    //   上から1対1で突き合わせれば、定義の過不足・値の相違を目視確認できる。
    //   indexName / keyPath / unique は 4章の表の値をそのまま写している。
    const STORE_DEFINITIONS = [
      // projects：プロジェクト選択は常に全件取得（getAll）のため、絞り込み用インデックスは不要。
      { name: "projects", indexes: [] },

      // schedules：プロジェクト切替時の一覧取得(projectId)と、
      //   階層構造での子取得・親日付の再計算(parentId)の2つで絞り込む。
      { name: "schedules", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
        { indexName: "by_parentId",  keyPath: "parentId",  unique: false },
      ] },

      // tasks：カンバン（タスク管理パネル）はプロジェクトごとに開くため projectId で絞り込む。
      { name: "tasks", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // issues：マインドマップパネルはプロジェクトごとに開くため projectId で絞り込む。
      { name: "issues", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // comments：projectId を持たず、紐づくスケジュールID(taskId)で絞り込む
      //   （所属プロジェクトは schedules.projectId 経由で辿るため重複保持しない）。
      { name: "comments", indexes: [
        { indexName: "by_taskId", keyPath: "taskId", unique: false },
      ] },

      // memos：メモ一覧はプロジェクトを切り替えると切り替わるため projectId で絞り込む。
      { name: "memos", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // quickmemos：即時メモはプロジェクト別のタイムラインのため projectId で絞り込む。
      { name: "quickmemos", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // snapshots：スナップショット一覧はプロジェクトごとに表示するため projectId で絞り込む。
      { name: "snapshots", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },

      // changelog：変更履歴はプロジェクトごとに表示する（未選択時は projectId:"global"）ため
      //   projectId で絞り込む。
      { name: "changelog", indexes: [
        { indexName: "by_projectId", keyPath: "projectId", unique: false },
      ] },
    ];

    // 【前提】storeDefinition は STORE_DEFINITIONS の1要素（name と indexes を持つ）であること。
    //   また、この関数は onupgradeneeded（アップグレード用トランザクション）内でのみ呼ぶこと。
    //   IndexedDBの仕様上、createObjectStore / createIndex はこのタイミングでしか実行できない。
    // 【処理】1ストア分の定義から、オブジェクトストアを作成し、そのストアに属する
    //   インデックスをすべて張る。
    // 【結果】db 上に storeDefinition.name のストアと、指定インデックスが作成されていることを保証する。
    function createStore(db, storeDefinition) {
      const objectStore = db.createObjectStore(storeDefinition.name, { keyPath: PRIMARY_KEY_PATH });
      for (const index of storeDefinition.indexes) {
        objectStore.createIndex(index.indexName, index.keyPath, { unique: index.unique });
      }
    }

    // 【前提】DATABASE_NAME / DATABASE_VERSION / STORE_DEFINITIONS が定義済みであること。
    // 【処理】IndexedDBを開き、必要ならスキーマ（ストア・インデックス）を作成する。
    //   indexedDB.open のイベントコールバックを Promise に橋渡しし、
    //   呼び出し側が async/await で扱えるようにする（CLAUDE.md：コールバック直書き禁止）。
    // 【結果】成功時：開いた IDBDatabase を resolve する。
    //         失敗時：発生したエラーを reject する（通知・リトライは呼び出し側の責務）。
    function openDB() {
      return new Promise((resolve, reject) => {
        const openRequest = indexedDB.open(DATABASE_NAME, DATABASE_VERSION);

        // 【処理】DBが存在しない、または既存バージョンが DATABASE_VERSION より古いときだけ呼ばれる。
        //   ここでスキーマを作成する（この中では他の非同期処理を待たない＝同期的に作成のみ行う）。
        // 【なぜ oldVersion で分岐するのか】将来バージョンを2,3と上げたとき、この下に
        //   `if (oldVersion < 2) { ... }` を追記するだけで、途中バージョンのユーザーのDBも
        //   順番に積み上げてアップグレードできる構造にするため。
        //   初版の今は「oldVersion < 1」（＝まっさらな新規作成）の分岐だけを持つ。
        openRequest.onupgradeneeded = (event) => {
          const db = event.target.result;
          const oldVersion = event.oldVersion;

          // バージョン1：全9ストアと全インデックスを作成する。
          if (oldVersion < 1) {
            for (const storeDefinition of STORE_DEFINITIONS) {
              createStore(db, storeDefinition);
            }
          }
        };

        // 【処理】DBが正常に開けたら、その IDBDatabase を返す。
        openRequest.onsuccess = (event) => {
          resolve(event.target.result);
        };

        // 【何が起きたら】DBを開けなかったとき（例：プライベートモードでIndexedDBが無効、
        //   ストレージ容量不足、ユーザーによる許可拒否など）に呼ばれる。
        // 【どう対応するか】ここではエラーを reject するだけに留める。ユーザーへの通知や
        //   リトライは呼び出し側（UI層）の責務とし、この関数は「開く」役割だけに絞る。
        openRequest.onerror = (event) => {
          reject(event.target.error);
        };

        // 【onblocked ハンドラを付けない理由】onblocked は「別タブが古いバージョンのDBを
        //   開いたままでアップグレードできない」ときに発生するが、初版はアップグレード自体が
        //   起きないため発生しない。将来バージョンを上げる際に、ここへハンドラを追加する。
      });
    }

    // ===== DB接続の共通処理 =====

    // 開いたDB接続をキャッシュする変数。操作のたびに openDB() すると接続コストがかかるため、
    // 初回だけ開いて以後は同じ接続を使い回す（初期値 null ＝まだ一度も開いていない）。
    let cachedDatabase = null;

    // 【前提】openDB() が9ストアを持つDBを開けること。
    // 【処理】初回呼び出し時だけ openDB() でDBを開いてキャッシュし、2回目以降は同じ接続を返す。
    // 【結果】開いている IDBDatabase を1つ返すことを保証する（毎回同じインスタンス）。
    async function getDB() {
      if (cachedDatabase === null) {
        cachedDatabase = await openDB();
      }
      return cachedDatabase;
    }

    // 【前提】request は store.put / getAll / delete / index.getAll 等が返した IDBRequest。
    //   transaction は、その request を発行したトランザクション（呼び出し側が保持しているものを渡す）。
    //   （indexedDB.open の要求には使わない。あちらは onupgradeneeded を挟むため openDB 側で個別に扱う）。
    // 【なぜ transaction を引数で受け取るのか】request.transaction から辿る手もあるが、
    //   index.getAll() が返す request では実装によって transaction が取れないことがある（可搬性リスク）。
    //   呼び出し側は必ず自分でトランザクションを作っているので、それを明示的に渡す方が確実で読みやすい。
    // 【処理】IndexedDBのイベントコールバックを Promise に橋渡しする。ここでの設計判断は
    //   「リクエスト成功(onsuccess)」ではなく「トランザクション完了(oncomplete)」で resolve する点。
    //   put/delete は onsuccess の時点ではまだコミット前で、コミット後に初めて保存が確定するため、
    //   commit を待ってから resolve することで「Promiseの解決＝保存済み」を保証する。
    //   取得系(getAll)も同じ仕組みでよく、結果値は onsuccess でいったん控えて oncomplete で返す。
    // 【結果】成功時：request.result を resolve。失敗時：発生したエラーを reject。
    function promisifyRequest(request, transaction) {
      return new Promise((resolve, reject) => {
        let requestResult;
        request.onsuccess = () => { requestResult = request.result; };
        // 【何が起きたら】リクエスト自体が失敗したとき（キー制約違反、値の型不正など）。
        // 【どう対応するか】エラーを reject し、通知やリトライは呼び出し側の責務とする。
        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => resolve(requestResult);
        // 【何が起きたら】トランザクションが中断(abort)されたとき（commitされず保存が無効になる）。
        // 【どう対応するか】保存が確定していないため、エラーを reject する。
        transaction.onabort = () => reject(transaction.error);
      });
    }

    // ===== projects ストアのCRUD =====

    // projects の操作対象ストア名。ストア名の打ち間違いを1箇所に閉じ込める
    // （STORE_DEFINITIONS 内の "projects" と同じ値を指す）。
    const STORE_PROJECTS = "projects";

    // 【前提】project は id を含む1件分のプロジェクトオブジェクト（id は呼び出し側で採番済み）。
    //   この関数では id 採番・入力バリデーションは行わない（1関数1責務。採番は別工程の共通関数の責務）。
    // 【処理】読み書きトランザクションで projects ストアに put する。
    //   put を使う理由：「同じidがあれば上書き、なければ新規」なので、将来のインポートや
    //   「戻す」機能でも同じ関数を再利用でき、追加と復元を1つの経路にまとめられるため。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addProject(project) {
      const db = await getDB();
      const transaction = db.transaction(STORE_PROJECTS, "readwrite");
      const store = transaction.objectStore(STORE_PROJECTS);
      return promisifyRequest(store.put(project), transaction);
    }

    // 【前提】projects ストアが存在すること。
    // 【処理】読み取りトランザクションで全プロジェクトを取得する。
    //   projects はインデックスを持たない設計（データモデル設計3.1節）のため、絞り込みではなく
    //   常に getAll で全件を取る（プロジェクト選択ドロップダウンは常に全件表示するため）。
    // 【結果】プロジェクトの配列を resolve する（0件なら空配列）。
    async function getAllProjects() {
      const db = await getDB();
      const transaction = db.transaction(STORE_PROJECTS, "readonly");
      const store = transaction.objectStore(STORE_PROJECTS);
      return promisifyRequest(store.getAll(), transaction);
    }

    // 【前提】projectId は削除したいプロジェクトの id。
    // 【処理】読み書きトランザクションで projects ストアから該当1件を削除する。
    //   ※配下データ（schedules 等）の連鎖削除はここでは行わない（別工程。データモデル設計6章の方針）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_PROJECTS, "readwrite");
      const store = transaction.objectStore(STORE_PROJECTS);
      return promisifyRequest(store.delete(projectId), transaction);
    }

    // ===== schedules ストアのCRUD =====

    // schedules の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の schedules 定義と同じ値を指す）。
    const STORE_SCHEDULES = "schedules";
    const INDEX_SCHEDULES_BY_PROJECT = "by_projectId";
    const INDEX_SCHEDULES_BY_PARENT = "by_parentId";

    // 【前提】schedule は id を含む1件分のスケジュールオブジェクト（id は呼び出し側で採番済み）。
    //   日付の整合（endDate < startDate はエラー）などのバリデーションはここでは行わない
    //   （データモデル設計6章：バリデーションはフォーム送信層の責務。addProject と一貫させる）。
    // 【処理】読み書きトランザクションで schedules ストアに put する（upsert。理由は addProject と同じ）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addSchedule(schedule) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SCHEDULES, "readwrite");
      const store = transaction.objectStore(STORE_SCHEDULES);
      return promisifyRequest(store.put(schedule), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトに属するスケジュールを全て取得する
    //   （プロジェクト切替のたびに一覧を取り直すため）。
    // 【結果】スケジュールの配列を resolve する（0件なら空配列）。ルート行・子行の区別はせず全行を返す。
    //   ※「ルート行だけ欲しい」場合は、この結果をアプリ層で parentId === null で絞る。
    //     ルート行は parentId が null のため by_parentId インデックスには載らず、インデックスでは取れないため。
    async function getSchedulesByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SCHEDULES, "readonly");
      const index = transaction.objectStore(STORE_SCHEDULES).index(INDEX_SCHEDULES_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】parentId は「具体的な親スケジュールの id」であること。
    //   null / undefined を渡してはいけない：getAll に null を渡すと「キー指定なし＝全件」と解釈され、
    //   インデックス上の全子行が返ってしまう（ルート行だけが返るわけではない）。呼び出し側で保証する。
    // 【処理】by_parentId インデックスを使い、その親の直下の子スケジュールを全て取得する
    //   （階層表示や、子の日付から親の期間を再計算する処理の入力として使う）。
    // 【結果】子スケジュールの配列を resolve する（子がなければ空配列）。
    //   ※ルート行（parentId: null）はこのインデックスに載らないため、この関数では取得できない。
    //     ルート行はプロジェクト単位で取ってアプリ層で絞る（getSchedulesByProject のコメント参照）。
    async function getChildSchedules(parentId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SCHEDULES, "readonly");
      const index = transaction.objectStore(STORE_SCHEDULES).index(INDEX_SCHEDULES_BY_PARENT);
      return promisifyRequest(index.getAll(parentId), transaction);
    }

    // 【前提】scheduleId は削除したいスケジュールの id。
    // 【処理】schedules ストアから該当1件“だけ”を削除する低レベル部品。
    //   ※アプリの「スケジュール削除」操作は、仕様上この1件では終わらない：
    //     親を消すと子・孫も再帰削除し、紐づくコメントも削除し、祖先の日付を再計算する
    //     （基本設計書 L155-157・L200 / シーケンス図集「3. 親スケジュール削除」）。
    //     これは schedules / comments / changelog にまたがるため、子孫idを先に集めてから書き込む
    //     上位操作として別に実装し、この関数はその部品として使う（データモデル設計6章：読み切ってから書く）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteSchedule(scheduleId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SCHEDULES, "readwrite");
      const store = transaction.objectStore(STORE_SCHEDULES);
      return promisifyRequest(store.delete(scheduleId), transaction);
    }

    // ===== tasks ストア（カンバン）のCRUD =====

    // tasks の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の tasks 定義と同じ値を指す）。
    const STORE_TASKS = "tasks";
    const INDEX_TASKS_BY_PROJECT = "by_projectId";

    // 【前提】task は id を含む1件分のタスクオブジェクト（id は呼び出し側で採番済み）。
    //   done（完了フラグ）と status（カンバン列）の同期は、ここでは検証・補正しない
    //   （データモデル設計6章：整合性チェックは保存前のアプリケーション層＝フォーム送信処理の責務。
    //   addProject / addSchedule と同様、この関数は「渡された内容をそのままputする」役割に徹する）。
    // 【処理】読み書きトランザクションで tasks ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addTask(task) {
      const db = await getDB();
      const transaction = db.transaction(STORE_TASKS, "readwrite");
      const store = transaction.objectStore(STORE_TASKS);
      return promisifyRequest(store.put(task), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトに属するタスクを全て取得する
    //   （タスク管理パネル＝カンバンはプロジェクトごとに開くため）。
    // 【結果】タスクの配列を resolve する（0件なら空配列）。カンバン列ごとの振り分けは呼び出し側の責務。
    async function getTasksByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_TASKS, "readonly");
      const index = transaction.objectStore(STORE_TASKS).index(INDEX_TASKS_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】taskId は削除したいタスクの id。
    // 【処理】読み書きトランザクションで tasks ストアから該当1件を削除する。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteTask(taskId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_TASKS, "readwrite");
      const store = transaction.objectStore(STORE_TASKS);
      return promisifyRequest(store.delete(taskId), transaction);
    }

    // ===== comments ストアのCRUD =====

    // comments の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の comments 定義と同じ値を指す）。
    const STORE_COMMENTS = "comments";
    const INDEX_COMMENTS_BY_TASK = "by_taskId";

    // 【前提】comment は id を含む1件分のコメントオブジェクト（id は呼び出し側で採番済み）。
    //   comments は projectId を持たない設計（taskId → schedules.projectId で辿るため。
    //   データモデル設計3.5節：正規化の観点で重複保持しない）。
    // 【処理】読み書きトランザクションで comments ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addComment(comment) {
      const db = await getDB();
      const transaction = db.transaction(STORE_COMMENTS, "readwrite");
      const store = transaction.objectStore(STORE_COMMENTS);
      return promisifyRequest(store.put(comment), transaction);
    }

    // 【前提】taskId は絞り込みたいスケジュールの id（schedules.id を指す）。
    // 【処理】by_taskId インデックスを使い、そのスケジュールに紐づくコメントを全て取得する。
    // 【結果】コメントの配列を resolve する（0件なら空配列）。
    //   ※「プロジェクト単位のコメント一覧」はこの関数だけでは作れない（comments はprojectIdを
    //     持たないため）。データモデル設計3.5節の方針どおり、呼び出し側が
    //     getSchedulesByProject でスケジュールID集合を先に取得し、その各IDについてこの関数を
    //     呼んで束ねる（複数ストアをまたぐ合成処理のため、この関数の責務には含めない）。
    async function getCommentsByTask(taskId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_COMMENTS, "readonly");
      const index = transaction.objectStore(STORE_COMMENTS).index(INDEX_COMMENTS_BY_TASK);
      return promisifyRequest(index.getAll(taskId), transaction);
    }

    // 【前提】commentId は削除したいコメントの id。
    // 【処理】comments ストアから該当1件“だけ”を削除する低レベル部品。
    //   ※スケジュール削除時にそのスケジュールへのコメントも連鎖削除する仕様（基本設計書L156）が
    //   あるが、それは deleteSchedule 側の複合削除操作からこの関数を呼ぶ形で後日実装する
    //   （データモデル設計6章：複数ストアにまたがる書き込みは読み切ってから行う方針）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteComment(commentId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_COMMENTS, "readwrite");
      const store = transaction.objectStore(STORE_COMMENTS);
      return promisifyRequest(store.delete(commentId), transaction);
    }

    // ===== changelog ストア（変更履歴）のCRUD =====

    // changelog の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の changelog 定義と同じ値を指す）。
    const STORE_CHANGELOG = "changelog";
    const INDEX_CHANGELOG_BY_PROJECT = "by_projectId";

    // 【前提】entry は id を含む1件分の変更履歴オブジェクト（id は呼び出し側で採番済み）。
    //   action/store/changes/snapshot 等の組み立て（何がどう変わったかの判定）はここでは行わない
    //   （データモデル設計6章と同じ考え方：ログ内容の組み立ては、各CRUD操作を呼ぶ上位処理の責務。
    //   この関数は組み立て済みの entry をそのまま保存するだけの部品）。
    // 【処理】読み書きトランザクションで changelog ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addChangelogEntry(entry) {
      const db = await getDB();
      const transaction = db.transaction(STORE_CHANGELOG, "readwrite");
      const store = transaction.objectStore(STORE_CHANGELOG);
      return promisifyRequest(store.put(entry), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id（未選択時の操作は "global" という文字列）。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトの変更履歴を全て取得する
    //   （変更履歴パネルはプロジェクトごとに表示するため）。"global" も他のprojectIdと同じ扱いで、
    //   特別扱いの関数は用意しない。
    // 【結果】変更履歴の配列を resolve する（0件なら空配列）。
    async function getChangelogByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_CHANGELOG, "readonly");
      const index = transaction.objectStore(STORE_CHANGELOG).index(INDEX_CHANGELOG_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】projectId は削除対象を絞り込むプロジェクトの id。
    //   このアプリには変更履歴の「個別削除」機能はなく、「履歴の全削除」ボタンのみが存在する
    //   （詳細設計書3.6.3節`clearChangelog`）。そのためこの関数は1件削除ではなく、
    //   指定プロジェクトの変更履歴を丸ごと削除する仕様にする。
    // 【なぜ promisifyRequest を使わないのか】このヘルパーは「1トランザクションにつき
    //   transaction.oncomplete を1回だけ設定する」前提で作られている。複数件のdeleteをそのつど
    //   promisifyRequest に渡すと、同じトランザクションの oncomplete ハンドラを毎回上書きしてしまい、
    //   最後の1件以外は永久に resolve されなくなる。そのため、この関数だけは
    //   「1トランザクション・複数delete・oncompleteは1回だけ」を自分で組み立てる。
    // 【処理】1つの読み書きトランザクションの中で、対象プロジェクトの全キーを取得し、
    //   それぞれに delete を発行してから、トランザクション全体の完了を待つ。
    // 【結果】コミット完了後に resolve する（対象が0件でも正常に完了する）。
    function clearChangelogByProject(projectId) {
      return getDB().then((db) => {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_CHANGELOG, "readwrite");
          const store = transaction.objectStore(STORE_CHANGELOG);
          const index = store.index(INDEX_CHANGELOG_BY_PROJECT);
          const getKeysRequest = index.getAllKeys(projectId);

          getKeysRequest.onsuccess = () => {
            for (const key of getKeysRequest.result) {
              store.delete(key);
            }
          };
          getKeysRequest.onerror = () => reject(getKeysRequest.error);

          transaction.oncomplete = () => resolve();
          transaction.onabort = () => reject(transaction.error);
        });
      });
    }

    // ===== issues ストア（マインドマップ）のCRUD =====

    // issues の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の issues 定義と同じ値を指す）。
    const STORE_ISSUES = "issues";
    const INDEX_ISSUES_BY_PROJECT = "by_projectId";

    // 【前提】issue は id を含む1件分のノードオブジェクト（id は呼び出し側で採番済み）。
    // 【処理】読み書きトランザクションで issues ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addIssue(issue) {
      const db = await getDB();
      const transaction = db.transaction(STORE_ISSUES, "readwrite");
      const store = transaction.objectStore(STORE_ISSUES);
      return promisifyRequest(store.put(issue), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトの全ノードを取得する
    //   （マインドマップパネルを開いたプロジェクトのノードのみ表示するため）。
    // 【結果】ノードの配列を resolve する（0件なら空配列）。親子どちらのノードも区別せず全件返す。
    //   ※「特定ノードの子だけ」が欲しい場合は、issues には parentNodeId のインデックスが無いため
    //     （データモデル設計3.4節）、この結果をアプリ層で parentNodeId 一致でフィルタする。
    async function getIssuesByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_ISSUES, "readonly");
      const index = transaction.objectStore(STORE_ISSUES).index(INDEX_ISSUES_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】issueId は削除したいノードの id。
    // 【処理】issues ストアから該当1件“だけ”を削除する低レベル部品。
    //   ※マインドマップのノード削除は、仕様上「対象ノード＋子孫ノードを再帰的に収集して削除」する
    //   （詳細設計書3.5.3節。deleteSchedule と同じ考え方）。子孫の収集・一括削除は
    //   この関数の責務に含めず、別工程の複合操作から呼び出す部品として使う。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteIssue(issueId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_ISSUES, "readwrite");
      const store = transaction.objectStore(STORE_ISSUES);
      return promisifyRequest(store.delete(issueId), transaction);
    }

    // ===== memos ストアのCRUD =====

    // memos の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の memos 定義と同じ値を指す）。
    const STORE_MEMOS = "memos";
    const INDEX_MEMOS_BY_PROJECT = "by_projectId";

    // 【前提】memo は id を含む1件分のメモオブジェクト（id は呼び出し側で採番済み）。
    //   createdAt/updatedAt の発行・更新はここでは行わない（他の add* 関数と同様、
    //   渡された内容をそのままputするだけ。日時の発行は自動保存処理側の責務）。
    // 【処理】読み書きトランザクションで memos ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addMemo(memo) {
      const db = await getDB();
      const transaction = db.transaction(STORE_MEMOS, "readwrite");
      const store = transaction.objectStore(STORE_MEMOS);
      return promisifyRequest(store.put(memo), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトのメモを全て取得する
    //   （メモパネルはプロジェクトごとに一覧を切り替えるため）。
    // 【結果】メモの配列を resolve する（0件なら空配列）。
    async function getMemosByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_MEMOS, "readonly");
      const index = transaction.objectStore(STORE_MEMOS).index(INDEX_MEMOS_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】memoId は削除したいメモの id。
    // 【処理】読み書きトランザクションで memos ストアから該当1件を削除する
    //   （詳細設計書3.7.2節：メモは個別削除の仕様。全削除機能は無い）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteMemo(memoId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_MEMOS, "readwrite");
      const store = transaction.objectStore(STORE_MEMOS);
      return promisifyRequest(store.delete(memoId), transaction);
    }

    // ===== quickmemos ストア（即時メモ）のCRUD =====

    // quickmemos の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の quickmemos 定義と同じ値を指す）。
    const STORE_QUICKMEMOS = "quickmemos";
    const INDEX_QUICKMEMOS_BY_PROJECT = "by_projectId";

    // 【前提】quickMemo は id を含む1件分の即時メモオブジェクト（id は呼び出し側で採番済み）。
    // 【処理】読み書きトランザクションで quickmemos ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addQuickMemo(quickMemo) {
      const db = await getDB();
      const transaction = db.transaction(STORE_QUICKMEMOS, "readwrite");
      const store = transaction.objectStore(STORE_QUICKMEMOS);
      return promisifyRequest(store.put(quickMemo), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトの即時メモを全て取得する
    //   （即時メモはプロジェクトごとの時系列タイムラインのため）。
    // 【結果】即時メモの配列を resolve する（0件なら空配列）。
    async function getQuickMemosByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_QUICKMEMOS, "readonly");
      const index = transaction.objectStore(STORE_QUICKMEMOS).index(INDEX_QUICKMEMOS_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】quickMemoId は削除したい即時メモの id。
    // 【処理】読み書きトランザクションで quickmemos ストアから該当1件を削除する
    //   （即時メモには個別削除・全削除の両方の機能がある。これは個別削除の方）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    async function deleteQuickMemo(quickMemoId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_QUICKMEMOS, "readwrite");
      const store = transaction.objectStore(STORE_QUICKMEMOS);
      return promisifyRequest(store.delete(quickMemoId), transaction);
    }

    // 【前提】projectId は削除対象を絞り込むプロジェクトの id。
    //   即時メモには個別削除（deleteQuickMemo）に加えて全削除の機能もある
    //   （詳細設計書3.8.2節`clearQuickMemos`）。この関数はその全削除の方。
    // 【なぜ promisifyRequest を使わないのか】clearChangelogByProject と同じ理由：
    //   1トランザクション内で複数件のdeleteを発行するため、transaction.oncomplete の
    //   多重代入を避けるには、このヘルパーを流用せず専用のPromiseを組む必要がある。
    // 【処理】1つの読み書きトランザクションの中で、対象プロジェクトの全キーを取得し、
    //   それぞれに delete を発行してから、トランザクション全体の完了を待つ。
    // 【結果】コミット完了後に resolve する（対象が0件でも正常に完了する）。
    function clearQuickMemosByProject(projectId) {
      return getDB().then((db) => {
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_QUICKMEMOS, "readwrite");
          const store = transaction.objectStore(STORE_QUICKMEMOS);
          const index = store.index(INDEX_QUICKMEMOS_BY_PROJECT);
          const getKeysRequest = index.getAllKeys(projectId);

          getKeysRequest.onsuccess = () => {
            for (const key of getKeysRequest.result) {
              store.delete(key);
            }
          };
          getKeysRequest.onerror = () => reject(getKeysRequest.error);

          transaction.oncomplete = () => resolve();
          transaction.onabort = () => reject(transaction.error);
        });
      });
    }

    // ===== snapshots ストアのCRUD =====

    // snapshots の操作対象ストア名・インデックス名。名前の打ち間違いを1箇所に閉じ込める
    // （いずれも STORE_DEFINITIONS の snapshots 定義と同じ値を指す）。
    const STORE_SNAPSHOTS = "snapshots";
    const INDEX_SNAPSHOTS_BY_PROJECT = "by_projectId";

    // 【前提】snapshot は id を含む1件分のスナップショットオブジェクト（id は呼び出し側で採番済み）。
    //   data フィールド（{project, schedules}）はネストしたオブジェクトだが、IndexedDBの
    //   構造化複製アルゴリズムでそのまま保存できるため、ここでは特別な変換をせず丸ごとputする。
    // 【処理】読み書きトランザクションで snapshots ストアに put する（upsert）。
    // 【結果】コミット完了後に resolve する（＝保存が確定したことを保証）。
    async function addSnapshot(snapshot) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SNAPSHOTS, "readwrite");
      const store = transaction.objectStore(STORE_SNAPSHOTS);
      return promisifyRequest(store.put(snapshot), transaction);
    }

    // 【前提】projectId は絞り込みたいプロジェクトの id。
    // 【処理】by_projectId インデックスを使い、そのプロジェクトのスナップショットを全て取得する
    //   （スナップショット一覧はプロジェクトごとに表示するため）。
    // 【結果】スナップショットの配列を resolve する（0件なら空配列）。
    async function getSnapshotsByProject(projectId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SNAPSHOTS, "readonly");
      const index = transaction.objectStore(STORE_SNAPSHOTS).index(INDEX_SNAPSHOTS_BY_PROJECT);
      return promisifyRequest(index.getAll(projectId), transaction);
    }

    // 【前提】snapshotId は削除したいスナップショットの id。
    // 【処理】読み書きトランザクションで snapshots ストアから該当1件を削除する
    //   （詳細設計書3.8.3節：スナップショットは個別削除の仕様）。
    // 【結果】コミット完了後に resolve する（対象が存在しなくても delete はエラーにならない＝冪等）。
    //   ※「復元」機能（現在のスケジュールを全削除→書き戻し）はここでは扱わない。
    //   変更履歴に記録しない低レベルAPIを使う特殊な複合操作のため、別工程で実装する（3.6.1節）。
    async function deleteSnapshot(snapshotId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SNAPSHOTS, "readwrite");
      const store = transaction.objectStore(STORE_SNAPSHOTS);
      return promisifyRequest(store.delete(snapshotId), transaction);
    }

    // ===== 複合操作（複数ストアにまたがる処理）の共通ユーティリティ =====

    // 【前提】呼び出し元は新規レコードのidをまだ持っていないこと。
    // 【処理】タイムスタンプ＋ランダム文字列でidを生成する（データモデル設計1章の方針：
    //   autoIncrementは同一DB内でしか一意性を保証しないため、JSONインポート等で他環境発行の
    //   idと衝突しないよう、アプリ側で一意な文字列idを発行する）。
    //   これまでの各CRUD関数（addProject等）はid採番済みのオブジェクトを受け取る前提にして
    //   いたため、複合操作（連鎖削除のログ記録等）で新規レコードを作る段になって
    //   初めてid発行そのものが必要になった。そのため、ここでこの関数を追加する。
    // 【結果】十分に一意な文字列idを返す。
    function generateId() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
    }

    // 変更履歴（changelog）に記録する対象ストア（データモデル設計6章・基本設計書8.1節）。
    // 「保存/削除のたびに自動でログを記録する仕組み（writeLog相当）」自体はまだ実装しておらず
    // 別工程とするが、この定数は「連鎖削除がどのストアの操作をログに残すべきか」を
    // deleteScheduleCascade/deleteIssueCascade が判断する根拠として、ここでは参照用に置く。
    const LOGGED_STORES = ["projects", "schedules", "tasks", "issues"];

    // 【前提】scheduleId は取得したいスケジュールの id。
    // 【処理】主キー(id)で1件を直接取得する（絞り込みではなく1件特定のため、インデックス不要）。
    //   schedules の既存CRUDには「idで1件取得」が無かったが、連鎖削除・日付再計算の複合操作で
    //   「特定のスケジュール1件の最新状態」を読む必要があるため、ここで追加する。
    // 【結果】見つかった場合はそのオブジェクトを、存在しない場合は undefined を resolve する。
    async function getScheduleById(scheduleId) {
      const db = await getDB();
      const transaction = db.transaction(STORE_SCHEDULES, "readonly");
      const store = transaction.objectStore(STORE_SCHEDULES);
      return promisifyRequest(store.get(scheduleId), transaction);
    }

    // 【設計判断：祖先日付の再計算をなぜ独立した関数にするか】
    //   基本設計書4.3節「子の開始日・終了日を変更すると、親の日付は全子の最早開始日〜最遅終了日に
    //   自動更新され、上位階層へも再帰的に伝播する」は、連鎖削除に限らず、将来スケジュールの
    //   日付編集機能（バーのドラッグ等）でも同じ処理が必要になる（詳細設計書3.2.3節
    //   syncParentDates/syncAncestorDates相当）。そのため削除処理に埋め込まず、
    //   「対象1件の日付を、その子に合わせて再計算し、必要なら親へ伝播する」という
    //   単独の責務を持つ関数として切り出す。
    //
    // 【前提】scheduleId は日付を再計算したい対象の id（削除された行の「元の親」から呼び出す想定）。
    // 【処理】対象の直下の子（by_parentIdインデックス）を取得し、日付を持つ子だけを対象に
    //   「最早開始日〜最遅終了日」を計算して対象自身に保存する。
    //   ※基本設計書4.3節「子を全て削除した場合、親の日付は再計算・リセットされない」の仕様どおり、
    //   日付を持つ子が1件も残っていない場合は何もしない（対象の日付をそのまま残す）。
    //   更新できた場合は、対象の親についても同じ処理を再帰的に行い、祖先全体へ伝播させる。
    // 【結果】更新が完了した時点で resolve する（戻り値なし）。
    async function syncAncestorDates(scheduleId) {
      const schedule = await getScheduleById(scheduleId);
      if (!schedule) return;

      const children = await getChildSchedules(scheduleId);
      const childrenWithDates = children.filter((child) => child.startDate && child.endDate);
      if (childrenWithDates.length === 0) {
        return;
      }

      const startDates = childrenWithDates.map((child) => child.startDate).sort();
      const endDates = childrenWithDates.map((child) => child.endDate).sort();
      const earliestStartDate = startDates[0];
      const latestEndDate = endDates[endDates.length - 1];
      await addSchedule({ ...schedule, startDate: earliestStartDate, endDate: latestEndDate });

      if (schedule.parentId !== null && schedule.parentId !== undefined) {
        await syncAncestorDates(schedule.parentId);
      }
    }

    // 【設計判断：スケジュールの連鎖削除】
    //   基本設計書L155-157・L200、シーケンス図集「3. 親スケジュール削除」の仕様どおり、
    //   1つの複合操作として次の3段階で実装する。
    //   1. 読み切り：getSchedulesByProjectでプロジェクト内の全件を1回だけ読み、
    //      アプリ層のツリー走査で「起点＋全子孫」のidを集める
    //      （データモデル設計6章：複数ストアにまたがる書き込みは、先に読み切ってから行う）。
    //   2. 書き込み：集めた各idについて、紐づくコメントを削除→スケジュール自体を削除→
    //      個別に削除ログ(changelog)を記録する（親・子・孫それぞれ個別にログが残る仕様＝L200）。
    //   3. 起点スケジュールの「元の親」がまだ存在するなら、syncAncestorDatesで日付を再計算する。
    //
    // 【前提】scheduleId は削除起点のスケジュール id。projectId は所属プロジェクトの id
    //   （呼び出し側は現在開いているプロジェクトを把握しているため受け取る）。
    // 【処理】上記の3段階を実行する。
    // 【結果】実際に削除されたスケジュールidの配列を resolve する（対象が存在しなければ空配列）。
    async function deleteScheduleCascade(scheduleId, projectId) {
      const allSchedules = await getSchedulesByProject(projectId);
      const scheduleById = new Map(allSchedules.map((schedule) => [schedule.id, schedule]));
      const targetSchedule = scheduleById.get(scheduleId);
      if (!targetSchedule) {
        return [];
      }

      const childSchedulesByParentId = new Map();
      for (const schedule of allSchedules) {
        if (schedule.parentId === null || schedule.parentId === undefined) continue;
        if (!childSchedulesByParentId.has(schedule.parentId)) {
          childSchedulesByParentId.set(schedule.parentId, []);
        }
        childSchedulesByParentId.get(schedule.parentId).push(schedule);
      }

      const idsToDelete = [];
      let frontier = [targetSchedule];
      while (frontier.length > 0) {
        const nextFrontier = [];
        for (const node of frontier) {
          idsToDelete.push(node.id);
          nextFrontier.push(...(childSchedulesByParentId.get(node.id) || []));
        }
        frontier = nextFrontier;
      }

      for (const id of idsToDelete) {
        const schedule = scheduleById.get(id);
        const comments = await getCommentsByTask(id);
        for (const comment of comments) {
          await deleteComment(comment.id);
        }
        await deleteSchedule(id);
        await addChangelogEntry({
          id: generateId(),
          projectId: schedule.projectId,
          action: "delete",
          store: "schedules",
          storeLabel: "スケジュール",
          itemId: schedule.id,
          itemName: schedule.name,
          changes: [],
          snapshot: schedule,
          createdAt: new Date().toISOString(),
        });
      }

      const originalParentId = targetSchedule.parentId;
      if (originalParentId !== null && originalParentId !== undefined) {
        await syncAncestorDates(originalParentId);
      }

      return idsToDelete;
    }

    // 【設計判断：マインドマップノードの連鎖削除】
    //   詳細設計書3.5.3節の仕様どおり、対象ノード＋子孫ノードを収集して削除する。
    //   deleteScheduleCascade と同じ考え方だが、issues には次の3点の違いがある：
    //   ・comments のような紐づく別ストアが無い（削除するのはissues自体のみ）
    //   ・日付の概念が無いため、祖先の再計算（syncAncestorDates相当）は不要
    //   ・parentNodeId にインデックスが無いため、子孫収集は getIssuesByProject の結果を
    //     アプリ層でツリー走査する（issues側のCRUD設計方針と同じ理由）
    //   なお issues は LOGGED_STORES に含まれるため、schedules と同様に個別の削除ログを残す。
    //   子孫id収集はcollectIssueSubtreeIds（折りたたみ機能と共通）に委譲し、ここで
    //   ツリー走査ロジックを重複させない。
    //
    // 【前提】issueId は削除起点のノード id。projectId は所属プロジェクトの id。
    // 【処理】起点＋全子孫ノードを収集し、それぞれ削除・削除ログ記録を行う。
    // 【結果】実際に削除されたノードidの配列を resolve する（対象が存在しなければ空配列）。
    async function deleteIssueCascade(issueId, projectId) {
      const allIssues = await getIssuesByProject(projectId);
      const issueById = new Map(allIssues.map((issue) => [issue.id, issue]));
      if (!issueById.has(issueId)) {
        return [];
      }

      const idsToDelete = collectIssueSubtreeIds(allIssues, issueId);

      for (const id of idsToDelete) {
        const issue = issueById.get(id);
        await deleteIssue(id);
        await addChangelogEntry({
          id: generateId(),
          projectId: issue.projectId,
          action: "delete",
          store: "issues",
          storeLabel: "マインドマップノード",
          itemId: issue.id,
          itemName: issue.title,
          changes: [],
          snapshot: issue,
          createdAt: new Date().toISOString(),
        });
      }

      return idsToDelete;
    }

    // ===== UI：状態・純粋関数（DOM非依存） =====
    // 【設計判断】このセクションの関数は「データ配列を受け取り、データ/文字列を返す」だけの
    //   純粋関数と、実際にDOMへ反映する薄い関数に分ける。前者はdocumentに一切触れないため、
    //   ブラウザが無い環境（Node.js等）でも配列を渡すだけで動作を検証できる。
    //
    // 【今回のスコープ（UIデザイン仕様書・基本設計書2章に基づくメイン画面の忠実再現）】
    //   実装：2段ヘッダー、WBSパネル(520px)＋ガントチャート本体（日付軸・バー・
    //   マイルストーンマーカー・親子バーの視覚差・完了時の不透明度・土日の背景色）、
    //   カンバン、マインドマップ（issueのx,y座標を使った絶対配置＋親子を結ぶ線）。
    //   静的表示のみ：バーのドラッグリサイズ、カンバンのドラッグ&ドロップ、
    //   マインドマップのノードドラッグは実装しない。
    //   別工程：サイドパネル一式（コメント/メモ/即時メモ/スナップショット/変更履歴）、
    //   モーダル（マイルストーン管理／プロジェクト編集）、インポート/エクスポート、
    //   表示粒度（週/月）切替、全て開く・閉じるの実際の開閉状態管理。
    //   これらの未実装ボタンは視覚的には配置し、クリック時は
    //   handleOutOfScopeButtonClickで「スコープ外」である旨を明示する。

    // 現在選択中のプロジェクトのid。未選択時はnull。
    let currentSelectedProjectId = null;
    // 現在選択中のプロジェクトの最新データ（startDate/endDate/locked/milestones参照用）。
    let currentProjectObject = null;
    // 列トグル（開始/終了/状態）を再描画する際、DBへ再度問い合わせずに済むようキャッシュする。
    let currentScheduleTreeRows = [];
    // 「今日」ボタンでのスクロール位置計算に使う、現在表示中タイムラインの先頭日。
    let currentTimelineStartDateString = null;
    // WBSパネルの追加列（開始/終了/状態）の表示状態。基本設計書2.2節の固定順（開始→終了→状態）で
    // 右側から列を追加する仕様のため、この順序のままレンダリングする。
    const visibleWbsColumns = { startDate: false, endDate: false, status: false };
    // 折りたたまれているスケジュールidの集合。DBには保存しない画面上だけの一時状態
    // （プロジェクト切替・再読み込みでリセットされてよい表示上の状態のため）。
    const collapsedScheduleIds = new Set();
    // 折りたたまれているマインドマップのissueidの集合。collapsedScheduleIdsと同じ理由で
    // DB非保存の画面上だけの一時状態にする。
    const collapsedMindmapIssueIds = new Set();
    // ドラッグ操作中のスケジュールid。ドラッグ開始時に設定し、ドロップ処理後にnullへ戻す。
    let draggedScheduleId = null;
    // ドラッグ操作中のタスクid（カンバンのカード）。draggedScheduleIdと同じ理由・同じ寿命。
    let draggedTaskId = null;

    // taskStatus（"todo"|"inprogress"|"done"）の日本語表示名（データモデル設計3.2節）。
    const SCHEDULE_STATUS_LABELS = { todo: "未着手", inprogress: "進行中", done: "完了" };

    // ガント1日あたりの描画幅（px）。表示粒度（日/週/1ヶ月/3ヶ月）ごとに、全体の横幅が
    // 極端に長大化しないよう、粒度が粗くなるほど1日あたりの幅を狭くする。
    const GRANULARITY_PIXELS_PER_DAY = { day: 32, week: 6, month: 2.2, quarter: 0.9 };
    // 現在選択中の表示粒度（"day" | "week" | "month" | "quarter"）。
    let currentGranularity = "day";
    // ガント1行の高さ（px）。CSS変数 --gantt-row-height と同じ値を保つこと（JS側で絶対配置の
    // 計算に使うため、CSSだけでなくJS定数としても持つ）。
    const GANTT_ROW_HEIGHT_PX = 44;
    const MILLISECONDS_PER_DAY = 24 * 60 * 60 * 1000;
    // マインドマップノードの固定カラーパレット（UIデザイン仕様書1.5節・9色）。
    const MINDMAP_NODE_COLORS = ["#2563EB", "#7C3AED", "#0891B2", "#059669", "#D97706", "#DC2626", "#DB2777", "#EA580C", "#4B5563"];

    // 【前提】rawText はユーザー入力を含みうる未エスケープの文字列（null/undefinedの可能性あり）。
    // 【処理】HTML特殊文字（& < > " '）を実体参照に置き換え、意図しないタグ・属性の注入を防ぐ。
    // 【結果】そのままHTML文字列に埋め込んでよいエスケープ済み文字列を返す。
    function escapeHtmlText(rawText) {
      return String(rawText ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // 基本設計書4.1節：親→子→孫の3階層まで（ひ孫＝孫の子は作成不可）。depthLevelは0始まりのため、
    // 「これ以上子を追加できない最大depthLevel」は2（孫）。子追加ボタンの無効化判定に使う。
    const MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN = 2;

    // 【前提】scheduleList は同一プロジェクト内のスケジュール全件（親子関係はparentIdで表現）。
    // 【処理】親→子の順にたどり、各行がツリー上で何階層目か（depthLevel、ルートは0）、
    //   子を1件でも持つか（hasChildren）、兄弟内の位置（siblingIndex・siblingCount）を付与する。
    //   同じ親を持つ兄弟同士はorderの昇順に揃える。
    //   hasChildrenは、ガントのバー描画で「親行の太いバー」と「葉（子なし）行の細いバー」を
    //   区別するために必要（UIデザイン仕様書3章）。
    //   siblingIndex/siblingCountは、上下矢印の並び替えが「同一階層（同じ親を持つ兄弟グループ）
    //   内でのみ可能」「先頭行では上矢印、末尾行では下矢印を無効化」という基本設計書4.1節の
    //   仕様を判定するために必要。
    // 【結果】ガントチャートの行として上から順に描画できる配列
    //   {schedule, depthLevel, hasChildren, siblingIndex, siblingCount}[] を返す。
    function buildScheduleTreeRows(scheduleList) {
      const childSchedulesByParentId = new Map();
      const rootSchedules = [];
      for (const schedule of scheduleList) {
        if (schedule.parentId === null || schedule.parentId === undefined) {
          rootSchedules.push(schedule);
          continue;
        }
        if (!childSchedulesByParentId.has(schedule.parentId)) {
          childSchedulesByParentId.set(schedule.parentId, []);
        }
        childSchedulesByParentId.get(schedule.parentId).push(schedule);
      }

      const sortByOrder = (a, b) => a.order - b.order;
      rootSchedules.sort(sortByOrder);
      for (const childSchedules of childSchedulesByParentId.values()) {
        childSchedules.sort(sortByOrder);
      }

      const scheduleTreeRows = [];
      function appendScheduleAndDescendants(schedule, depthLevel, siblingIndex, siblingCount) {
        const childSchedules = childSchedulesByParentId.get(schedule.id) || [];
        scheduleTreeRows.push({
          schedule,
          depthLevel,
          hasChildren: childSchedules.length > 0,
          siblingIndex,
          siblingCount,
        });
        childSchedules.forEach((childSchedule, childIndex) => {
          appendScheduleAndDescendants(childSchedule, depthLevel + 1, childIndex, childSchedules.length);
        });
      }
      rootSchedules.forEach((rootSchedule, rootIndex) => {
        appendScheduleAndDescendants(rootSchedule, 0, rootIndex, rootSchedules.length);
      });
      return scheduleTreeRows;
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値（深さ優先順）。
    // 【処理】各行のWBS番号（例：1, 1.1, 1.1.1, 1.2, 2, 2.1）を計算する。
    //   深さごとにカウンタを持ち、ある深さの行が現れるたびにそのカウンタを+1し、
    //   それより深い階層のカウンタは（兄弟が変われば無効になるため）切り捨てる。
    //   深さ優先順（親→その子孫全部→次の兄弟）で辿ることが前提のアルゴリズム。
    // 【結果】スケジュールid→WBS番号文字列 のMapを返す。
    function calculateWbsNumbers(scheduleTreeRows) {
      const counters = [];
      const wbsNumberByScheduleId = new Map();
      for (const { schedule, depthLevel } of scheduleTreeRows) {
        counters[depthLevel] = (counters[depthLevel] || 0) + 1;
        counters.length = depthLevel + 1;
        wbsNumberByScheduleId.set(schedule.id, counters.join("."));
      }
      return wbsNumberByScheduleId;
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値。collapsedScheduleIds は
    //   折りたたまれているスケジュールidの集合（Set）。
    // 【処理】折りたたまれた行の子孫を、深さ優先順の性質を使って除外する（折りたたまれた行
    //   自身より深いdepthLevelが続く間はスキップし、同じか浅いdepthLevelに戻ったら解除する）。
    // 【結果】実際に画面へ表示すべき行だけの配列を返す（WBS番号は事前に計算済みのものを使う
    //   前提のため、この関数はdepthLevel/hasChildren等をそのまま維持する）。
    function filterVisibleScheduleTreeRows(scheduleTreeRows, collapsedScheduleIds) {
      const visibleRows = [];
      let collapsedAncestorDepth = null;
      for (const row of scheduleTreeRows) {
        if (collapsedAncestorDepth !== null) {
          if (row.depthLevel > collapsedAncestorDepth) continue;
          collapsedAncestorDepth = null;
        }
        visibleRows.push(row);
        if (collapsedScheduleIds.has(row.schedule.id)) {
          collapsedAncestorDepth = row.depthLevel;
        }
      }
      return visibleRows;
    }

    // 【前提】taskList は同一プロジェクト内のタスク全件。
    // 【処理】status（"backlog"|"doing"|"done"）で3列に振り分け、各列内はorderの昇順に揃える。
    // 【結果】カンバンの3列分のタスク配列 {backlog, doing, done} を返す。
    function groupTasksByStatus(taskList) {
      const sortByOrder = (a, b) => a.order - b.order;
      return {
        backlog: taskList.filter((task) => task.status === "backlog").sort(sortByOrder),
        doing: taskList.filter((task) => task.status === "doing").sort(sortByOrder),
        done: taskList.filter((task) => task.status === "done").sort(sortByOrder),
      };
    }

    // 【前提】dateString は "YYYY-MM-DD" 形式の文字列であること。
    // 【処理】ローカルタイムゾーンによるずれを避けるため、常にUTC基準のタイムスタンプとして解釈する。
    // 【結果】その日付のUTC深夜0時のミリ秒タイムスタンプを返す。
    function parseDateStringToUtcTimestamp(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return Date.UTC(year, month - 1, day);
    }

    // 【前提】startDateString <= endDateString（"YYYY-MM-DD"形式）であること。
    //   プロジェクトのendDateがstartDateより前という既知の非整合（基本設計書1.3節No.1相当の
    //   プロジェクト側バリデーション無し仕様）の場合でも、最低1日分は描画できるようにする。
    // 【処理】startからendまでの日数分、各日の情報（日付文字列・年月・曜日・週末か）を列挙する。
    // 【結果】タイムライン列として左から順に描画できる配列を返す。
    function buildGanttTimelineDays(startDateString, endDateString) {
      const startTimestamp = parseDateStringToUtcTimestamp(startDateString);
      const endTimestamp = parseDateStringToUtcTimestamp(endDateString);
      const totalDayCount = Math.max(Math.round((endTimestamp - startTimestamp) / MILLISECONDS_PER_DAY) + 1, 1);

      const timelineDays = [];
      for (let dayOffset = 0; dayOffset < totalDayCount; dayOffset++) {
        const currentDate = new Date(startTimestamp + dayOffset * MILLISECONDS_PER_DAY);
        const dayOfWeek = currentDate.getUTCDay();
        timelineDays.push({
          year: currentDate.getUTCFullYear(),
          month: currentDate.getUTCMonth() + 1,
          dayOfMonth: currentDate.getUTCDate(),
          isSaturday: dayOfWeek === 6,
          isSunday: dayOfWeek === 0,
        });
      }
      return timelineDays;
    }

    // 【前提】targetDateString/timelineStartDateStringは"YYYY-MM-DD"。
    // 【処理】タイムライン先頭日から対象日までの経過日数を計算する。
    // 【結果】経過日数（整数）。範囲外の日付なら負の値、またはタイムラインを超える大きな値になる。
    function calculateDayOffsetFromTimelineStart(targetDateString, timelineStartDateString) {
      const targetTimestamp = parseDateStringToUtcTimestamp(targetDateString);
      const startTimestamp = parseDateStringToUtcTimestamp(timelineStartDateString);
      return Math.round((targetTimestamp - startTimestamp) / MILLISECONDS_PER_DAY);
    }

    // 【前提】timelineDays は buildGanttTimelineDays の戻り値。timelineStartDateString は
    //   タイムライン先頭日。todayDateString は基準日（"YYYY-MM-DD"）。呼び出し元（refreshGanttPanel）が
    //   `new Date()`から求めて渡す。この関数自体はnew Date()を呼ばない（固定値を渡してテストできる
    //   ようにするため。純粋関数として保つ設計判断）。
    // 【処理】基準日がタイムライン表示範囲内にあるかを判定し、範囲内ならx座標(px)を計算する。
    // 【結果】範囲内ならleftPx（数値）、範囲外（表示中のプロジェクト期間の外）ならnullを返す。
    function calculateTodayMarkerPosition(timelineDays, timelineStartDateString, pixelsPerDay, todayDateString) {
      const dayOffset = calculateDayOffsetFromTimelineStart(todayDateString, timelineStartDateString);
      if (dayOffset < 0 || dayOffset >= timelineDays.length) {
        return null;
      }
      return dayOffset * pixelsPerDay;
    }

    // 【前提】schedule.startDate/endDateのどちらかが未設定の場合、バーは描画できない
    //   （データモデル設計3.2節：両方とも必須ではないフィールドのため）。
    // 【処理】タイムライン先頭日・1日あたりのピクセル幅から、バーのleft/widthをpx単位で計算する。
    // 【結果】{leftPx, widthPx, durationDays} を返す。日付が無い場合はnullを返す。
    function calculateBarGeometry(schedule, timelineStartDateString, pixelsPerDay) {
      if (!schedule.startDate || !schedule.endDate) {
        return null;
      }
      const dayOffsetStart = calculateDayOffsetFromTimelineStart(schedule.startDate, timelineStartDateString);
      const dayOffsetEnd = calculateDayOffsetFromTimelineStart(schedule.endDate, timelineStartDateString);
      const durationDays = Math.max(dayOffsetEnd - dayOffsetStart + 1, 1);
      return { leftPx: dayOffsetStart * pixelsPerDay, widthPx: durationDays * pixelsPerDay, durationDays };
    }

    // 【前提】milestones は project.milestones（{name, date}の配列）。
    // 【処理】日付を持つマイルストーンについて、タイムライン上のx座標（px）を計算する。
    // 【結果】{leftPx, name}[] を返す。
    function calculateMilestoneMarkerPositions(milestones, timelineStartDateString, pixelsPerDay) {
      return milestones
        .filter((milestone) => Boolean(milestone.date))
        .map((milestone) => ({
          leftPx: calculateDayOffsetFromTimelineStart(milestone.date, timelineStartDateString) * pixelsPerDay,
          name: milestone.name,
        }));
    }

    // 【前提】issueList は同一プロジェクト内のissue全件。rootIssueId は起点ノードのid。
    // 【処理】parentNodeIdをたどり、rootIssueId自身を含む子孫issueのidを幅優先で収集する
    //   （issuesにはparentNodeIdのインデックスが無いため、getIssuesByProjectで読み切った
    //   全件をアプリ層で辿る。deleteIssueCascade・折りたたみ機能の両方で使う共通ロジック）。
    // 【結果】[rootIssueId, ...子孫id...] の配列を返す。
    function collectIssueSubtreeIds(issueList, rootIssueId) {
      const childIssuesByParentNodeId = new Map();
      for (const issue of issueList) {
        if (issue.parentNodeId === null || issue.parentNodeId === undefined) continue;
        if (!childIssuesByParentNodeId.has(issue.parentNodeId)) {
          childIssuesByParentNodeId.set(issue.parentNodeId, []);
        }
        childIssuesByParentNodeId.get(issue.parentNodeId).push(issue);
      }

      const collectedIds = [];
      let frontier = [rootIssueId];
      while (frontier.length > 0) {
        const nextFrontier = [];
        for (const id of frontier) {
          collectedIds.push(id);
          const childIssues = childIssuesByParentNodeId.get(id) || [];
          nextFrontier.push(...childIssues.map((childIssue) => childIssue.id));
        }
        frontier = nextFrontier;
      }
      return collectedIds;
    }

    // 【前提】issueList は同一プロジェクト内のissue全件。collapsedIssueIds は
    //   折りたたまれているissueidの集合（Set）。
    // 【処理】折りたたまれた各ノードについて、collectIssueSubtreeIdsで子孫id（自身は除く）を
    //   集めて非表示集合にまとめ、issueListからそれらを除外する。
    // 【結果】実際に画面へ表示すべきissueだけの配列を返す。
    function filterVisibleIssues(issueList, collapsedIssueIds) {
      if (collapsedIssueIds.size === 0) return issueList;
      const hiddenIssueIds = new Set();
      for (const collapsedIssueId of collapsedIssueIds) {
        for (const descendantId of collectIssueSubtreeIds(issueList, collapsedIssueId)) {
          if (descendantId !== collapsedIssueId) {
            hiddenIssueIds.add(descendantId);
          }
        }
      }
      return issueList.filter((issue) => !hiddenIssueIds.has(issue.id));
    }

    // 【前提】issueList は同一プロジェクト内のissue全件（親子関係はparentNodeIdで表現）。
    // 【処理】parentNodeIdが実在する行同士を「親→子」のペアとして列挙する
    //   （マインドマップの線描画はx,y座標を結ぶ形のため、depthLevelではなくペア単位で扱う）。
    // 【結果】{fromIssue, toIssue}[] を返す。
    function buildMindmapEdgeList(issueList) {
      const issueById = new Map(issueList.map((issue) => [issue.id, issue]));
      const edges = [];
      for (const issue of issueList) {
        if (issue.parentNodeId === null || issue.parentNodeId === undefined) continue;
        const parentIssue = issueById.get(issue.parentNodeId);
        if (parentIssue) {
          edges.push({ fromIssue: parentIssue, toIssue: issue });
        }
      }
      return edges;
    }

    // 【前提】2点の座標(fromX,fromY)→(toX,toY)。
    // 【処理】2点間を結ぶ「幅lengthPx・高さ1pxの線」をCSSのtransform:rotateで描画するための
    //   left/top/width/角度を計算する（線の要素自体はfrom側を起点に、toの向きへ回転させる）。
    // 【結果】{leftPx, topPx, widthPx, angleDeg} を返す。
    function calculateEdgeGeometry(fromX, fromY, toX, toY) {
      const deltaX = toX - fromX;
      const deltaY = toY - fromY;
      const lengthPx = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      const angleDeg = (Math.atan2(deltaY, deltaX) * 180) / Math.PI;
      return { leftPx: fromX, topPx: fromY, widthPx: lengthPx, angleDeg };
    }

    // 【前提】projectList はプロジェクト全件。selectedProjectId は現在<select>に選ばせたいid。
    // 【処理】<option>タグのHTML文字列を組み立てる（DOMには触れない）。
    // 【結果】<select>のinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderProjectOptionsToHtml(projectList, selectedProjectId) {
      if (projectList.length === 0) {
        return '<option value="">(プロジェクトがありません)</option>';
      }
      return projectList
        .map((project) => {
          const isSelectedAttribute = project.id === selectedProjectId ? " selected" : "";
          return `<option value="${escapeHtmlText(project.id)}"${isSelectedAttribute}>${escapeHtmlText(project.name)}</option>`;
        })
        .join("");
    }

    // 【前提】scheduleTreeRows は buildScheduleTreeRows の戻り値（折りたたみ状態に関係なく
    //   常に全件）。visibleColumns は {startDate, endDate, status} の表示可否
    //   （基本設計書2.2節の固定順で右側から列を追加）。collapsedScheduleIds は折りたたまれている
    //   スケジュールidの集合。
    // 【処理】WBSパネル（ドラッグハンドル＋番号＋開閉＋スケジュール名列＋トグルされた追加列＋
    //   操作アイコン）のHTML文字列を組み立てる。WBS番号はcalculateWbsNumbersで全件から計算し
    //   （折りたたみで隠れていても採番自体は変わらないようにするため）、実際に描画する行は
    //   filterVisibleScheduleTreeRowsで絞り込む。
    //
    //   1行のレイアウト（左→右）：
    //   [ドラッグハンドル・ホバー時のみ] [開閉アイコン・子を持つ行のみ・常時表示]
    //   [WBS番号（太字・強調色）＋スケジュール名] [開始/終了/状態の追加列]
    //   [操作アイコン群（↑↓✎＋🗑）・ホバー時のみ]
    //
    //   開閉アイコンだけは「常時表示」（基本設計書4.1節に記載のある機能のため、ホバー無しでも
    //   操作できるようにする）。それ以外（ドラッグハンドル・操作アイコン群）はモーダル・
    //   ダイアログ一覧「1.」の指示どおりホバー時のみうっすら表示する。
    // 【結果】wbsPanel要素のinnerHTMLにそのまま入れられるHTML文字列を返す。
    function renderWbsPanelToHtml(scheduleTreeRows, visibleColumns, collapsedScheduleIds) {
      const headerExtraColumnsHtml = [
        visibleColumns.startDate ? '<div class="wbs-column-extra">開始日</div>' : "",
        visibleColumns.endDate ? '<div class="wbs-column-extra">終了日</div>' : "",
        visibleColumns.status ? '<div class="wbs-column-extra">状態</div>' : "",
      ].join("");
      const headerHtml = `<div class="wbs-header-row"><span class="wbs-drag-handle-spacer"></span><div class="wbs-column-name">スケジュール名</div>${headerExtraColumnsHtml}<div class="wbs-row-icons"></div></div>`;

      if (scheduleTreeRows.length === 0) {
        return headerHtml + '<p class="empty-state-message">スケジュールがありません。</p>';
      }

      const wbsNumberByScheduleId = calculateWbsNumbers(scheduleTreeRows);
      const visibleRows = filterVisibleScheduleTreeRows(scheduleTreeRows, collapsedScheduleIds);

      const rowsHtml = visibleRows
        .map(({ schedule, depthLevel, hasChildren, siblingIndex, siblingCount }) => {
          const wbsNumber = wbsNumberByScheduleId.get(schedule.id);
          const indentedName =
            "　".repeat(depthLevel) +
            `<span class="wbs-number">${escapeHtmlText(wbsNumber)}</span>`;
          const statusLabel = SCHEDULE_STATUS_LABELS[schedule.taskStatus] || schedule.taskStatus;
          const extraColumnsHtml = [
            visibleColumns.startDate ? `<div class="wbs-column-extra">${escapeHtmlText(schedule.startDate)}</div>` : "",
            visibleColumns.endDate ? `<div class="wbs-column-extra">${escapeHtmlText(schedule.endDate)}</div>` : "",
            visibleColumns.status ? `<div class="wbs-column-extra">${escapeHtmlText(statusLabel)}</div>` : "",
          ].join("");

          // 開閉アイコンは「WBS番号とスケジュール名の間」に常時表示する（ホバー不要）。
          // 子を持たない行はアイコン自体を出さない（スペーサーも置かない）。
          const isCollapsed = collapsedScheduleIds.has(schedule.id);
          const toggleButtonHtml = hasChildren
            ? `<button type="button" class="wbs-icon-button wbs-toggle-button" data-action="toggle-collapse" title="開閉">${isCollapsed ? "＋" : "－"}</button>`
            : "";

          const isFirstInGroup = siblingIndex === 0;
          const isLastInGroup = siblingIndex === siblingCount - 1;
          const canAddChild = depthLevel < MAX_SCHEDULE_DEPTH_LEVEL_ALLOWING_CHILDREN;
          // 操作アイコン群は行の右端（追加列のさらに右）に、上／下／編集／子追加／削除の順で表示する。
          const iconsHtml = `<div class="wbs-row-icons">
            <button type="button" class="wbs-icon-button" data-action="move-up" ${isFirstInGroup ? "disabled" : ""} title="上へ移動">↑</button>
            <button type="button" class="wbs-icon-button" data-action="move-down" ${isLastInGroup ? "disabled" : ""} title="下へ移動">↓</button>
            <button type="button" class="wbs-icon-button" data-action="edit" title="編集">✎</button>
            <button type="button" class="wbs-icon-button" data-action="add-child" ${canAddChild ? "" : "disabled"} title="子スケジュール追加">＋</button>
            <button type="button" class="wbs-icon-button" data-action="delete" title="削除">🗑</button>
          </div>`;

          return `<div class="wbs-row" draggable="true" data-schedule-id="${escapeHtmlText(schedule.id)}"><span class="wbs-drag-handle" title="ドラッグして並び替え">⋮⋮</span><div class="wbs-column-name">${indentedName}${toggleButtonHtml} ${escapeHtmlText(schedule.name)}</div>${extraColumnsHtml}${iconsHtml}</div>`;
        })
        .join("");
      return headerHtml + rowsHtml;
    }

    // 【前提】month は1〜12の整数。
    // 【処理】月から四半期番号（1〜4）を求める（Q1=1-3月, Q2=4-6月, Q3=7-9月, Q4=10-12月）。
    // 【結果】四半期番号を返す。
    function calculateQuarterNumber(month) {
      return Math.ceil(month / 3);
    }

    // 【設計判断：なぜtimelineDaysは常に「日」単位のままなのか】
    //   表示粒度（日/週/1ヶ月/3ヶ月）が変わっても、buildGanttTimelineDaysが返す「プロジェクト
    //   全期間ぶんの日単位配列」自体は作り直さない。粒度ごとの見出し・列幅は、この日単位配列を
    //   「どうグルーピングするか」だけを変えて表現する。こうすることで、
    //   ①スケジュール件数に関係なくプロジェクト全期間の列が必ず生成される（今回の不具合の根本原因は
    //   　0件時に本体の描画自体を早期returnでスキップしていたこと。グルーピング元を「常に完全な
    //   　日単位配列」に統一し、行の有無と列の生成を分離することで解消する）、
    //   ②粒度切替のたびに日付計算をやり直さずに済む、という2つの利点がある。
    //
    // 【前提】timelineDays は buildGanttTimelineDays の戻り値（必ずプロジェクト全期間ぶん）。
    //   granularity は "day" | "week" | "month" | "quarter"。
    // 【処理】1段目（大分類の見出し）・2段目（詳細列の見出し）を、指定した粒度でグルーピングする。
    //   - day：2段目=1日ごと（日付）／1段目=同年月をまとめた「年月」
    //   - week：2段目=7日ごと（先頭日の月/日）／1段目=先頭日が属する「年月」
    //   - month：2段目=暦月ごと（月）／1段目=同じ（年,四半期）をまとめた「年 Q数」
    //   - quarter：2段目=暦四半期ごと（Q数（開始月-終了月月））／1段目=同じ年をまとめた「年」
    //   いずれの粒度でも、timelineDaysの全区間を漏れなくグループ化する（途中で打ち切らない）。
    // 【結果】{ level1Groups, level2Groups } を返す。各グループは
    //   { label, startIndex, dayCount } を持ち、startIndex/dayCountはtimelineDays配列上の
    //   位置・日数（px座標の計算にそのまま使える）。
    function buildGanttTimelineHeaderGroups(timelineDays, granularity) {
      const level2Groups = [];

      if (granularity === "day") {
        timelineDays.forEach((day, index) => {
          level2Groups.push({
            label: String(day.dayOfMonth),
            startIndex: index,
            dayCount: 1,
            level1Key: `${day.year}-${day.month}`,
            level1Label: `${day.year}年${day.month}月`,
          });
        });
      } else if (granularity === "week") {
        for (let startIndex = 0; startIndex < timelineDays.length; startIndex += 7) {
          const dayCount = Math.min(7, timelineDays.length - startIndex);
          const firstDay = timelineDays[startIndex];
          level2Groups.push({
            label: `${firstDay.month}/${firstDay.dayOfMonth}`,
            startIndex,
            dayCount,
            level1Key: `${firstDay.year}-${firstDay.month}`,
            level1Label: `${firstDay.year}年${firstDay.month}月`,
          });
        }
      } else if (granularity === "month") {
        let groupStartIndex = 0;
        for (let index = 1; index <= timelineDays.length; index++) {
          const isBoundary =
            index === timelineDays.length ||
            timelineDays[index].year !== timelineDays[groupStartIndex].year ||
            timelineDays[index].month !== timelineDays[groupStartIndex].month;
          if (!isBoundary) continue;
          const { year, month } = timelineDays[groupStartIndex];
          const quarter = calculateQuarterNumber(month);
          level2Groups.push({
            label: `${month}月`,
            startIndex: groupStartIndex,
            dayCount: index - groupStartIndex,
            level1Key: `${year}-Q${quarter}`,
            level1Label: `${year}年 Q${quarter}`,
          });
          groupStartIndex = index;
        }
      } else if (granularity === "quarter") {
        let groupStartIndex = 0;
        for (let index = 1; index <= timelineDays.length; index++) {
          const currentQuarter = calculateQuarterNumber(timelineDays[groupStartIndex].month);
          const isBoundary =
            index === timelineDays.length ||
            timelineDays[index].year !== timelineDays[groupStartIndex].year ||
            calculateQuarterNumber(timelineDays[index].month) !== currentQuarter;
          if (!isBoundary) continue;
          const { year } = timelineDays[groupStartIndex];
          const quarterStartMonth = (currentQuarter - 1) * 3 + 1;
          const quarterEndMonth = quarterStartMonth + 2;
          level2Groups.push({
            label: `Q${currentQuarter}（${quarterStartMonth}-${quarterEndMonth}月）`,
            startIndex: groupStartIndex,
            dayCount: index - groupStartIndex,
            level1Key: `${year}`,
            level1Label: `${year}年`,
          });
          groupStartIndex = index;
        }
      }

      // 1段目は、連続するlevel2Groupsのうちlevel1Keyが同じものをまとめて1つの見出しにする。
      const level1Groups = [];
      for (const level2Group of level2Groups) {
        const lastLevel1Group = level1Groups[level1Groups.length - 1];
        if (lastLevel1Group && lastLevel1Group.level1Key === level2Group.level1Key) {
          lastLevel1Group.dayCount += level2Group.dayCount;
        } else {
          level1Groups.push({
            label: level2Group.level1Label,
            level1Key: level2Group.level1Key,
            startIndex: level2Group.startIndex,
            dayCount: level2Group.dayCount,
          });
        }
      }
